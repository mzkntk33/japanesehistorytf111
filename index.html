  { id: 787, name: "源融", power: 78, hp: 122, attribute: "STRATEGY", desc: "平安時代前期の公卿。嵯峨天皇の皇子（嵯峨源氏）。左大臣にまで上り詰めた。風流を愛する絶世の貴公子として知られ、京都の六条河原院に陸奥国の塩釜の風景を模した壮大な庭園を造営し、毎月海水を運ばせて塩焼きの風情を楽しんだとされる。紫式部の『源氏物語』の主人公・光源氏のモデルの一人と言われている。", skill: { name: "河原院の風流", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 788, name: "藤原兼通", power: 84, hp: 116, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原師輔の次男。関白であった実兄の伊尹の死後、実弟である兼家と次期関白の座を巡って血を洗うような激しい権力闘争を繰り広げた。妹の円融天皇中宮・安子の遺言を利用して関白・太政大臣の座を勝ち取り、兼家を徹底的に冷遇して失脚寸前まで追い込んだが、わずか数年で病死した。", skill: { name: "兄弟の骨肉", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 789, name: "藤原兼家", power: 95, hp: 105, attribute: "STRATEGY", desc: "平安時代中期の公卿。道隆・道兼・道長の父。兄・兼通との激しい権力争いに敗れて不遇をかこったが、兄の死後に復権。花山天皇を欺いて出家・退位させる（寛和の変）という陰謀を仕組んで孫の一条天皇を即位させ、みずから摂政となって権力を独占した。彼の手法により、藤原氏による摂関政治の絶頂期への扉が開かれた。", skill: { name: "寛和の陰謀", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 790, name: "丹後局", power: 89, hp: 111, attribute: "STRATEGY", desc: "平安時代末期から鎌倉時代初期の女性。本名は高階栄子。後白河法皇の晩年の寵妃として絶大な権力を握り、法皇の意向を左右して「事実上の女帝」と称された。源頼朝と通じて親幕府派の九条兼実の失脚（建久七年の政変）を画策するなど、幕府草創期の朝廷内の複雑な権力闘争において暗躍した辣腕の政治家。", skill: { name: "法皇の寵妃", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 791, name: "坊門局", power: 77, hp: 123, attribute: "STRATEGY", desc: "鎌倉時代初期の女性。藤原信隆の娘（七条院）で、高倉天皇の典侍。後鳥羽上皇の生母にあたる。後鳥羽上皇が院政を開始すると、天皇の母としての絶大な権威を背景に、八条院領に匹敵する広大な荘園群である「長講堂領」を相続して巨大な経済的基盤を持った。承久の乱の直前まで、朝廷内で最高の実力者として君臨した。", skill: { name: "長講堂領の相続", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 792, name: "中原親能", power: 86, hp: 114, attribute: "STRATEGY", desc: "鎌倉時代初期の幕府官僚。大江広元の実兄（または異母兄）。源頼朝の旗揚げに合流して京都との外交・折衝を一手に引き受け、朝廷や公家社会に対する鎌倉幕府の代弁者として活躍した。初代の京都守護や公文所寄人に就任し、弟の広元や三善康信らとともに、草創期の鎌倉幕府の政治・行政機構の整備に不可欠な役割を果たした。", skill: { name: "幕府の外交官", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 793, name: "二階堂行政", power: 90, hp: 110, attribute: "STRATEGY", desc: "鎌倉時代初期の幕府官僚。母が源頼朝の母の妹であった縁で頼朝に招かれ、鎌倉に下って幕府の政務機関である公文所（のちの政所）の初代令（のちの執事）に就任した。財務や文書管理に卓越した能力を発揮し、以後、彼の子孫である二階堂氏が鎌倉幕府および室町幕府において政所執事などの実務官僚の要職を代々世襲した。", skill: { name: "政所執事の家", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 794, name: "北条長時", power: 83, hp: 117, attribute: "STRATEGY", desc: "鎌倉幕府の第6代執権。北条重時の子。第5代執権である北条時頼が病のために引退したのち、時頼の嫡男である時宗が成長するまでの中継ぎとして執権職を委ねられた。在任中は実権を握り続けた時頼の強い影響下で無難に幕政を運営したが、若くして病没し、そののち叔父の北条政村を経て時宗へと執権職が継承された。", skill: { name: "中継ぎの執権", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 795, name: "赤橋登子", power: 76, hp: 124, attribute: "STRATEGY", desc: "鎌倉時代末期から南北朝時代の女性。鎌倉幕府の最後の執権である北条守時の妹であり、足利尊氏の正室。室町幕府の第2代将軍・足利義詮の母。北条氏一族の出身でありながら、夫である尊氏の挙兵と鎌倉幕府打倒を支え、のちに室町幕府が成立すると「御台所」として強い政治的発言力を持ち、足利氏の権力安定に寄与した。", skill: { name: "御台所の内助", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 796, name: "畠山満家", power: 92, hp: 108, attribute: "STRATEGY", desc: "室町時代中期の守護大名。畠山基国の子。足利義持・義教の2代の将軍に仕えて幕府の管領を長年務め、斯波義将のあとの幕政を安定させた。細川満元らとともに宿老として将軍を補佐し、応永の外寇への対応や上杉禅秀の乱の事後処理にあたって、管領畠山氏の全盛期と室町幕府の政治的安定期（応永の平和）を現出させた。", skill: { name: "応永の平和", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 797, name: "細川晴元", power: 91, hp: 109, attribute: "STRATEGY", desc: "戦国時代中期の武将。室町幕府の管領。大物崩れで細川高国を自害に追い込んで幕政の実権を掌握した。一向一揆や法華一揆といった巨大な宗教勢力や三好元長を巧みに利用・排除して畿内を支配したが、のちに元長の子である三好長慶の台頭によって京都を追放され、管領細川氏による室町幕府の実質的な支配は終わりを告げた。", skill: { name: "管領家の落日", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 798, name: "斎藤妙椿", power: 93, hp: 107, attribute: "STRATEGY", desc: "室町時代後期の武将・僧侶。美濃国守護代である斎藤氏の一族。応仁の乱において西軍の主力として美濃・尾張・伊勢などを転戦して圧倒的な武功を挙げた。守護である土岐氏をしのぐ実力を持ち、「美濃の国は妙椿の思いのままである」と評されるほど専横を極め、下克上による戦国大名化の萌芽を示した実力者。", skill: { name: "美濃の実権", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.9 } },
  { id: 799, name: "田沼意知", power: 80, hp: 120, attribute: "STRATEGY", desc: "江戸時代中期の幕臣。老中・田沼意次の嫡男。父の強力な引き立てで若年寄にまで異例のスピード出世を果たし、蝦夷地の開発計画や財政再建など父の重商主義的政策の実行部隊として活躍した。しかし、1784年に江戸城内で旗本の佐野政言に突然斬りつけられて暗殺され、これが田沼意次の権勢が崩壊する致命的なきっかけとなった。", skill: { name: "若き改革者の死", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 800, name: "筒井政憲", power: 87, hp: 113, attribute: "STRATEGY", desc: "幕末の幕臣。長崎奉行や江戸南町奉行を歴任した有能な官僚。ペリー来航後、プチャーチン率いるロシア使節団が長崎に来航した際、川路聖謨とともに幕府の全権として厳しい外交交渉にあたった。1855年の日露和親条約の調印を実現させ、千島列島や樺太の国境画定という、日本の近代外交における最初の重要な成果を挙げた。", skill: { name: "日露国境の画定", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 801, name: "川路聖謨", power: 94, hp: 106, attribute: "STRATEGY", desc: "幕末の幕臣。勘定奉行。ロシア使節プチャーチンとの日露和親条約の交渉において、堂々とした態度と優れた論理でロシア側を圧倒し、「ヨーロッパの外交官にも劣らない」と絶賛された。また江川太郎左衛門らを登用して海防の強化にも尽力したが、将軍継嗣問題で一橋派に属したため井伊直弼に罷免され、江戸城開城の日にピストル自殺した。", skill: { name: "幕臣の矜持", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 802, name: "岩瀬忠震", power: 96, hp: 104, attribute: "STRATEGY", desc: "幕末の幕臣。外国奉行。阿部正弘に見出されて幕閣の中枢となり、ハリスとの日米修好通商条約の締結交渉において、幕府側の全権として実務を取り仕切った。開国による積極的な貿易と富国強兵を主張する開明派官僚の筆頭であったが、将軍継嗣問題で一橋慶喜を推したため、大老の井伊直弼によって左遷され不遇のうちに没した。", skill: { name: "開国と通商の理", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.95 } },
  { id: 803, name: "小栗忠順", power: 98, hp: 102, attribute: "STRATEGY", desc: "幕末の幕臣。勘定奉行。遣米使節団として世界を視察し、帰国後は幕府の軍事・財政の近代化を強力に推進した。フランスの支援を受けて横須賀製鉄所（造船所）を建設し、フランス式軍制を導入して幕府権力の絶対化を目指した。戊辰戦争では新政府軍に対する徹底抗戦を主張したが徳川慶喜に容れられず、新政府軍に捕らえられ斬首された。", skill: { name: "横須賀製鉄所", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 804, name: "由利公正", power: 89, hp: 111, attribute: "STRATEGY", desc: "幕末から明治期の政治家。越前藩出身で、横井小楠に学んで藩の財政再建に貢献。明治新政府の参与として、新政府の基本方針となる『五箇条の御誓文』の原案（議事之体大意）を起草した。また、極度の財政難であった新政府の資金を調達するため、日本最初の全国的な紙幣である「太政官札」の発行を建議・実現させた。", skill: { name: "太政官札の発行", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 805, name: "福岡孝弟", power: 85, hp: 115, attribute: "STRATEGY", desc: "幕末から明治期の政治家。土佐藩出身で、板垣退助らとともに大政奉還の実現に奔走した。明治新政府の参与となり、由利公正が起草した『五箇条の御誓文』の原案を修正し、「列侯会議」を「広く会議を興し」と改めるなど、より普遍的な内容に洗練させた。のちに文部卿などを歴任し、近代日本の初期の制度構築に尽力した。", skill: { name: "御誓文の修正", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 806, name: "山口尚芳", power: 82, hp: 118, attribute: "STRATEGY", desc: "明治時代の官僚・政治家。肥前国佐賀藩出身。1871年に派遣された岩倉使節団において、木戸孝允、大久保利通、伊藤博文という薩長の巨頭とともに副使に選ばれ、欧米の近代的な司法制度や財政を深く視察した。帰国後は元老院議官や会計検査院長などを歴任し、地味ながらも堅実に明治国家の法制・財務の基礎を支えた。", skill: { name: "岩倉使節の副使", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 807, name: "品川弥二郎", power: 91, hp: 109, attribute: "STRATEGY", desc: "明治から大正期の政治家。長州藩出身で松下村塾に学ぶ。山県有朋の強力な側近として内務省を拠点に官僚閥を形成した。第1次松方正義内閣の内務大臣として、1892年の第2回衆議院議員総選挙において、警察力を動員して民党（自由党・改進党）の候補者に対する大規模で流血を伴う「選挙干渉」を強行したが、批判を浴びて辞任した。", skill: { name: "血の選挙干渉", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 808, name: "牧野伸顕", power: 95, hp: 105, attribute: "STRATEGY", desc: "明治から昭和初期の政治家・外交官。大久保利通の次男。パリ講和会議に次席全権として出席し、日本の国際連盟の常任理事国入りに貢献。のちに内大臣を長く務め、西園寺公望とともに宮中グループ（穏健な英米協調派）の重鎮として昭和天皇を補佐し、政党内閣期を支えたが、軍部や右翼の標的となり二・二六事件で襲撃を受けた。", skill: { name: "内大臣の補佐", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.92 } },
  { id: 809, name: "内田康哉", power: 88, hp: 112, attribute: "STRATEGY", desc: "明治から昭和初期の外交官・政治家。外務大臣を5度務める。満洲事変の勃発後、斎藤実内閣の外相に就任し、「国を焦土にしても満洲の権益を譲らない」とする強硬な「焦土外交」を国会で演説。国際連盟によるリットン報告書の採択に反対して日本の国際連盟脱退を決定づけ、それまでの協調外交から国際的孤立への道を選択した。", skill: { name: "焦土外交の演説", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 810, name: "広田弘毅", power: 90, hp: 110, attribute: "STRATEGY", desc: "昭和期の外交官・政治家。二・二六事件後に内閣総理大臣に就任。軍部の要求に屈して「軍部大臣現役武官制」を復活させ、日独防共協定を締結するなど、軍部の政治介入と大陸侵略を法的に追認する形となった。第1次近衛内閣の外相として日中戦争の不拡大方針を放棄。戦後、文官としてただ一人、極東国際軍事裁判でA級戦犯として処刑された。", skill: { name: "軍部大臣制復活", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 811, name: "司馬達等", power: 78, hp: 122, attribute: "CULTURE", desc: "6世紀初め（継体天皇の時代）に日本に渡来したとされる渡来人。鞍作鳥（止利仏師）の祖父。『扶桑略記』によれば、百済の聖明王からの仏教公伝（538年または552年）よりも前に、個人的に仏像を草庵に安置して礼拝しており、日本における民間仏教信仰の最も早い先駆者として歴史に名を残している。", skill: { name: "私的な仏教伝来", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 812, name: "道慈", power: 82, hp: 118, attribute: "CULTURE", desc: "奈良時代の三論宗の学僧。702年の遣唐使に参加して長安の西明寺などで約16年間学び、多くの仏典をもたらした。帰国後、大安寺（もとの百済大寺）の建設を指導し、中国式の壮麗な伽藍を完成させ、南都六宗の教理研究の基礎を築いた。また、国家の安泰を祈願する『金光明最勝王経』の信仰を広く朝廷に勧めた。", skill: { name: "大安寺の造営", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 813, name: "泰澄", power: 85, hp: 115, attribute: "CULTURE", desc: "奈良時代の修験道の僧。越前国に生まれ、幼少から山林で厳しい修行を行った。717年に霊山として名高い白山（石川・岐阜・福井の県境）を開山したという伝説を持つ。日本古来の山岳信仰と仏教（密教）が融合した神仏習合の形態である修験道の開拓者の一人として、役小角（役行者）とともに後世の山伏たちから深く尊崇された。", skill: { name: "白山開山", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 814, name: "鳥羽僧正覚猷", power: 81, hp: 119, attribute: "CULTURE", desc: "平安時代後期の天台宗の僧侶・画家。大僧正の位に就き、鳥羽離宮の証金剛院に住んだ。絵画に極めて秀でており、蛙や兎、猿などの動物を擬人化して仏教界や貴族社会の腐敗を痛烈に風刺した国宝『鳥獣人物戯画』（甲巻・乙巻）の作者として古くから伝えられている。日本における漫画やアニメのルーツとも言える軽妙な筆致が特徴。", skill: { name: "鳥獣戯画の風刺", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 815, name: "橘成季", power: 79, hp: 121, attribute: "CULTURE", desc: "鎌倉時代中期の貴族・文人。下級貴族であったが、九条道家に仕えて和歌や管弦など豊かな教養を身につけた。1254年に、神代から鎌倉時代に至るまでの宮廷の儀式や武士の武勇、庶民の奇談など多岐にわたる説話を集大成した『古今著聞集』を編纂した。『今昔物語集』の補遺を意図したこの書は、中世説話文学の最大の傑作の一つ。", skill: { name: "古今著聞集", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 816, name: "無住", power: 83, hp: 117, attribute: "CULTURE", desc: "鎌倉時代中期の臨済宗の僧侶。円爾に禅を学びながらも宗派にとらわれない幅広い知識を持っていた。1283年に仏教説話集『沙石集』を著した。「砂や石からでも黄金を引き出せる」という題名の通り、全国の庶民の生活や笑い話の中に仏教の真理を見出し、平易な言葉で人々に仏の功徳を説いた、中世民衆仏教の貴重な記録者。", skill: { name: "沙石集の教訓", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 817, name: "叡尊", power: 88, hp: 112, attribute: "CULTURE", desc: "鎌倉時代中期の真言律宗の僧。思円とも称される。荒廃していた奈良の西大寺を復興し、堕落していた仏教界に対して厳格な戒律の遵守を主張した。一方で、殺生を禁じる放生会の実施や、ハンセン病患者や貧民・孤児の救済、宇治橋の架橋工事など、民衆のための社会事業（忍辱行）に生涯を捧げ、弟子の忍性とともに絶大な支持を集めた。", skill: { name: "西大寺の戒律", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 818, name: "桂庵玄樹", power: 86, hp: 114, attribute: "CULTURE", desc: "室町時代後期の臨済宗の禅僧。遣明船で明に渡り、最新の朱子学を学んで帰国。のちに島津忠昌に招かれて薩摩国へ下り、儒学の講義を行った。彼が講じた実践的で厳格な朱子学は「薩南学派」と呼ばれて島津氏の家臣らに大きな影響を与え、のちの幕末における薩摩藩の強力な精神的土壌を形成する思想的源流となった。", skill: { name: "薩南学派の祖", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 819, name: "肖柏", power: 84, hp: 116, attribute: "CULTURE", desc: "室町時代後期の連歌師。公家の出身であったが出家し、宗祇の最も優秀な弟子として正風連歌の普及に貢献した。1488年、師の宗祇、弟弟子である宗長とともに、後鳥羽上皇を祀る水無瀬神宮において『水無瀬三吟百韻』を詠んだ。和歌の美意識を連歌の極限まで高めたこの作品は、日本連歌史上の最高傑作として燦然と輝いている。", skill: { name: "水無瀬三吟", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.95 } },
  { id: 820, name: "金春禅竹", power: 87, hp: 113, attribute: "CULTURE", desc: "室町時代中期の猿楽師。大和猿楽四座の一つ、金春座の太夫。世阿弥の娘婿にあたり、世阿弥から能の奥義を伝授された。世阿弥が幽玄を説いたのに対し、彼はさらに一休宗純から学んだ禅の深い精神性や哲学を取り入れ、『六輪一露之記』などの難解で高度な芸術論を著した。『芭蕉』『定家』などの静寂で神秘的な能の名作を残した。", skill: { name: "六輪一露之記", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 821, name: "海北友松", power: 91, hp: 109, attribute: "CULTURE", desc: "安土桃山時代から江戸時代初期の絵師。浅井長政の家臣の家に生まれたが主家滅亡後に絵師となった。狩野派に学びつつも宋元画（特に梁楷）を深く研究し、大胆に省略された鋭く気迫に満ちた筆致（袋墨の技法）による水墨画の独自の画風を確立した。建仁寺の方丈にある『雲龍図』は、戦国武将の力強い精神を見事に表現した彼の最高傑作。", skill: { name: "建仁寺の雲龍", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 822, name: "角倉了以", power: 94, hp: 106, attribute: "CULTURE", desc: "安土桃山時代から江戸時代初期の京都の豪商。朱印船貿易によってベトナムなどに船を派遣して巨万の富を築いた。その財力を注ぎ込み、保津川（大堰川）や富士川、高瀬川などの私財を投じた大規模な河川開削工事を次々と成功させ、内陸水運を飛躍的に発展させた。また、本阿弥光悦らとともに嵯峨本を出版するなど文化パトロンでもあった。", skill: { name: "高瀬川の開削", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 823, name: "野々村仁清", power: 92, hp: 108, attribute: "CULTURE", desc: "江戸時代前期の陶工。丹波国出身で京都に御室窯を開いた。中国の陶磁器技術を昇華させ、ろくろの精緻な技術と、赤・緑・金・銀などの絵の具を用いて器の表面に華麗な絵画を描き込む「色絵（上絵付）」の技法を完成させた。国宝『色絵藤花文茶壺』などに代表される、京焼の豪華絢爛で雅なスタイルを決定づけた天才陶工。", skill: { name: "色絵の完成", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 824, name: "坂田藤十郎", power: 89, hp: 111, attribute: "CULTURE", desc: "江戸時代前期（元禄期）の歌舞伎役者。初代。京都や大坂（上方）で活躍し、近松門左衛門が彼のために書いた『夕霧名残の正月』などの脚本で大当りをとった。柔和で優美な身のこなしで遊女との恋愛模様を演じる「和事（わごと）」の芸を確立し、江戸の市川団十郎の「荒事」と並んで、歌舞伎の演劇としての基礎を完成させた名優。", skill: { name: "上方の和事", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 825, name: "市川団十郎", power: 95, hp: 105, attribute: "CULTURE", desc: "江戸時代前期（元禄期）の歌舞伎役者。初代。江戸で活躍し、顔に隈取を施し、誇張された派手な衣装と力強い動作で、悪人を退治する超人的な英雄を演じる「荒事（あらごと）」の芸を創始した。荒々しくも痛快な彼の舞台は、血気盛んな江戸の町人たちの熱狂的な支持を集め、以後「市川団十郎」の名は江戸歌舞伎の最高権威となった。", skill: { name: "江戸の荒事", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 826, name: "芳沢あやめ", power: 80, hp: 120, attribute: "CULTURE", desc: "江戸時代前期（元禄期）の歌舞伎役者。初代。女歌舞伎・若衆歌舞伎が禁止された野郎歌舞伎の時代において、男性でありながら女性の役を演じる「女方（おんながた）」の芸を極めた。舞台の上だけでなく、日常生活においても女性としての言葉遣いや振る舞いを徹底的に貫くことを説き、歌舞伎における女方の芸術性を確立した。", skill: { name: "女方の極意", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 827, name: "手島堵庵", power: 77, hp: 123, attribute: "CULTURE", desc: "江戸時代中期の思想家。石田梅岩の最も優秀な弟子。師の没後、京都に明倫舎などの講舎を多数設立し、商人の倫理や日常の道徳を説く「石門心学」を全国的な大衆教育運動へと組織化・拡大させた。子ども向けの平易な教訓書を著したり、女性の聴講を奨励したりするなど、江戸時代の庶民教育の普及に極めて大きな役割を果たした。", skill: { name: "心学の全国普及", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 828, name: "大原幽学", power: 85, hp: 115, attribute: "CULTURE", desc: "江戸時代後期の農政家・思想家。諸国を放浪したのち下総国長部村（現在の千葉県）に土着し、神道・儒教・仏教を融合した独自の道徳論である「性学」を説いた。耕地整理や農業技術の改良を指導するだけでなく、日本初の農業協同組合ともいえる「先祖株組合」を創設して農村の復興を図ったが、幕府に疑われて弾圧され切腹した。", skill: { name: "先祖株組合", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 829, name: "二宮尊徳", power: 93, hp: 107, attribute: "CULTURE", desc: "江戸時代後期の農政家。通称は金次郎。相模国の貧農の出身だが、苦学して一家を再興した。その手腕を買われて小田原藩家老の家を立て直し、さらに下野国桜町領などの荒廃した農村の復興を任された。徹底した調査と、「至誠・勤労・分度・推譲」を基本とする独自の「報徳仕法」により、生涯で600以上の村落を復興させた農政の神様。", skill: { name: "報徳仕法", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 830, name: "只野真葛", power: 76, hp: 124, attribute: "CULTURE", desc: "江戸時代後期の女流文学者。仙台藩の医師・工藤平助の娘。江戸で恵まれた教養環境に育ったのち、仙台の藩士に嫁いだ。女性の立場から武家社会の矛盾や儒教の偽善を鋭く批判し、男女の知的能力に差はないと主張する先駆的な思想書『むかしばなし』を著し、曲亭馬琴らに送りつけて議論を挑んだ、当時の最も自立した女性思想家の一人。", skill: { name: "真葛の知性", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.85 } },
  { id: 831, name: "恋川春町", power: 81, hp: 119, attribute: "CULTURE", desc: "江戸時代後期の戯作者。駿河国小島藩の留守居役という武士でありながら、絵入りの娯楽小説である草双紙の制作に打ち込んだ。1775年に、夢の中で栄華を極める男を描いた『金々先生栄花夢』を刊行し、大人向けの風刺とユーモアに満ちた「黄表紙」という新しいジャンルを確立したが、のちに寛政の改革の弾圧を恐れて自害したとされる。", skill: { name: "黄表紙の創始", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 832, name: "為永春水", power: 83, hp: 117, attribute: "CULTURE", desc: "江戸時代後期の戯作者。洒落本が禁止されたのち、江戸の町人の複雑な恋愛模様や色恋沙汰を、会話文を多用して情緒豊かに描く「人情本」という新しいジャンルを大成させた。代表作『春色梅児誉美』は女性読者を中心に爆発的な人気を博したが、天保の改革において風俗を乱すとして水野忠邦から手鎖の処罰を受けた。", skill: { name: "春色梅児誉美", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.9 } },
  { id: 833, name: "柳亭種彦", power: 86, hp: 114, attribute: "CULTURE", desc: "江戸時代後期の戯作者。幕臣。黄表紙を長編化した「合巻（ごうかん）」という絵入り小説の第一人者。紫式部の『源氏物語』を室町時代に翻案し、将軍足利義政の愛妾などをめぐる大奥の陰謀や恋愛を豊富な挿絵とともに描いた『偐紫田舎源氏』が大ベストセラーとなった。しかし、11代将軍家斉の大奥を風刺していると疑われ絶版処分となった。", skill: { name: "偐紫田舎源氏", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 834, name: "大田南畝", power: 90, hp: 110, attribute: "CULTURE", desc: "江戸時代後期の狂歌師・幕臣。蜀山人、四方赤良などの号を持つ。漢詩文の深い教養を活かし、五七五七七の形式で世相を痛烈に皮肉り、滑稽に詠み上げる「狂歌」を流行させ、天明文化の江戸文壇の中心人物となった。寛政の改革が始まると「世の中に蚊ほどうるさきものはなし…」と詠んで風刺したが、のちに筆を折って優秀な官僚として働いた。", skill: { name: "天明の狂歌", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 835, name: "亜欧堂田善", power: 88, hp: 112, attribute: "CULTURE", desc: "江戸時代後期の洋風画家・銅版画家。陸奥国須賀川の出身。白河藩主の松平定信に見出されて谷文晁に画法を学んだのち、長崎のオランダ人から本格的な銅版画の技術を習得した。日本で初めて実用的な銅版画による世界地図『新訂万国全図』や、江戸の風景を西洋の遠近法で精密に描いた『浅間山図屛風』などを残した。", skill: { name: "銅版画の精緻", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 836, name: "藤島武二", power: 92, hp: 108, attribute: "CULTURE", desc: "明治から昭和期の洋画家。黒田清輝の指導を受け、白馬会の創立に参加した。フランスやイタリアに留学して印象派以降の画風を学び、帰国後は東京美術学校教授として後進を指導。雑誌『明星』の表紙デザインを手掛けるなどロマン主義的な傾向から出発し、代表作『天平の面影』や『黒扇』などで、重厚で力強い日本近代洋画の一時代を築いた。", skill: { name: "天平の面影", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 837, name: "下村観山", power: 89, hp: 111, attribute: "CULTURE", desc: "明治から昭和期の日本画家。幼少から狩野派を学び、東京美術学校の第1期生として岡倉天心に師事した。天心が野に下ると行動を共にし、横山大観や菱田春草らと日本美術院を創設。古典的な大和絵や狩野派の確かな筆致に、西洋画の空間表現や色彩感覚を融合させ、『大原御幸』などの気品あふれる歴史画の名作を数多く残した。", skill: { name: "大原御幸の気品", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 838, name: "伊沢修二", power: 84, hp: 116, attribute: "CULTURE", desc: "明治時代の教育者。アメリカに留学して近代的な教育制度を学び、帰国後は文部省の中心官僚として音楽と体育の教育導入に尽力した。東京音楽学校（現在の東京藝術大学）の初代校長となり、西洋音楽の唱歌を学校教育に取り入れるため『小学唱歌集』を編纂。また、台湾総督府の学務部長として、台湾における日本語教育にも従事した。", skill: { name: "唱歌の導入", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 839, name: "山田美妙", power: 87, hp: 113, attribute: "CULTURE", desc: "明治時代の小説家。尾崎紅葉らとともに文学結社「硯友社」を創立し、『我楽多文庫』を発刊した。二葉亭四迷の『浮雲』に刺激を受け、言文一致体の確立を目指して「だ」調の文章を用いた短編小説集『夏木立』を発表し、近代日本文学の文体改革に先駆的な役割を果たした。のちに紅葉と対立して硯友社を離れ、歴史小説などを執筆した。", skill: { name: "夏木立の言文一致", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 840, name: "平塚らいてう", power: 71, hp: 129, attribute: "CULTURE", desc: "明治から昭和期の女性解放運動家・思想家。1911年に女性のための文芸雑誌『青鞜』を創刊し、「元始、女性は実に太陽であった」という宣言で、封建的な道徳に縛られていた女性の自我の覚醒を強烈に訴えた。のちに市川房枝らと新婦人協会を設立し、治安警察法第5条の改正を実現して女性の政治集会への参加権を勝ち取った。", skill: { name: "原始、女性は太陽", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 841, name: "大野東人", power: 85, hp: 115, attribute: "VALOR", desc: "奈良時代中期の武将。按察使兼鎮守将軍として多賀城を築き、東北経営の強固な拠点とした。740年に九州で藤原広嗣の乱が起きると、大将軍として追討軍を率いて九州へ下向し、広嗣を捕らえて乱を鎮圧する大功を立てた。聖武天皇の信頼が厚く、奈良時代の地方支配と軍事を支えた武断派の代表的人物。", skill: { name: "多賀城の鎮守", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 842, name: "文室綿麻呂", power: 130, hp: 70, attribute: "VALOR", desc: "平安時代初期の武将。坂上田村麻呂に次ぐ蝦夷征討の将。薬子の変において嵯峨天皇の信任を得て活躍し、のちに征夷大将軍に任命された。田村麻呂の平定後も抵抗を続けていた蝦夷の残党を完全に帰順させ、朝廷の支配領域をさらに北へと拡大した。武人としてだけでなく、有能な行政官としても高く評価された。", skill: { name: "蝦夷の完全平定", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.7 } },
  { id: 843, name: "平忠正", power: 95, hp: 105, attribute: "VALOR", desc: "平安時代末期の武将。平清盛の叔父。保元の乱において、一門の長である甥の清盛が後白河天皇方についたのに対し、忠正は源為義とともに崇徳上皇方（敗者側）に加わって奮戦した。白河殿の夜討ちで敗北したのち降伏したが、天皇方のきびしい処断方針により、甥である清盛の手によって六条河原で斬首された。", skill: { name: "叔父の意地", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 844, name: "公暁", power: 80, hp: 120, attribute: "VALOR", desc: "鎌倉時代前期の僧。鎌倉幕府第2代将軍・源頼家の次男。父が北条氏によって暗殺されたのち出家し、鶴岡八幡宮の別当となった。1219年、右大臣拝賀の儀式を終えて退出する第3代将軍・源実朝（公暁の叔父）を、親の仇として大銀杏の陰から襲撃して暗殺した。直後に北条義時の命を受けた討手に殺害された。", skill: { name: "大銀杏の暗殺", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.95 } },
  { id: 845, name: "懐良親王", power: 82, hp: 118, attribute: "VALOR", desc: "南北朝時代の皇族。後醍醐天皇の皇子。建武の新政崩壊後、征西大将軍に任命されて九州へ派遣された。菊池武光らの強力な支援を得て九州の足利方を次々と打ち破り、大宰府を占領して「征西府」の全盛期を築き上げた。明から「日本国王」に封じられるほどの独立勢力となったが、のちに今川了俊に敗れて隠棲した。", skill: { name: "征西将軍の威", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 846, name: "織田信忠", power: 92, hp: 108, attribute: "VALOR", desc: "安土桃山時代の武将。織田信長の嫡男。父から織田家の家督と美濃・尾張を譲られ、武田氏を滅亡させた甲州征伐では総大将として見事な指揮を執り、武田勝頼を自刃に追い込んだ。信長の後継者として十分な器量を示したが、本能寺の変の際、京都の二条新御所で明智光秀の軍勢に包囲され、父の後を追って自害した。", skill: { name: "甲州征伐の総将", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.8 } },
  { id: 847, name: "秋山虎繁", power: 88, hp: 112, attribute: "VALOR", desc: "戦国時代の武将。武田信玄・勝頼の2代に仕え、武田二十四将の一人に数えられる猛将。信玄の西上作戦の際、東美濃の要衝である岩村城を攻略し、織田信長の叔母（おつやの方）を妻に迎えて城主となった。しかし長篠の戦い後に織田軍の猛攻を受け、開城降伏したものの信長の命によって妻とともに逆さ磔で処刑された。", skill: { name: "岩村城の猛攻", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 848, name: "佐々成政", power: 84, hp: 116, attribute: "VALOR", desc: "安土桃山時代の武将。織田信長に仕え「黒母衣衆」として数々の武功を挙げ、越中国を与えられた。本能寺の変後、柴田勝家に味方して羽柴秀吉と対立。小牧・長久手の戦いでは、厳冬の飛驒山脈を踏破する「さらさら越え」を敢行して徳川家康に結びつこうとしたが失敗。のちに肥後国を与えられたが一揆を招き切腹した。", skill: { name: "さらさら越え", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 849, name: "仙石秀久", power: 75, hp: 125, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。羽柴秀吉の最古参の家臣として四国平定などで活躍し、讃岐一国を与えられた。しかし九州征伐の戸次川の戦いで軍監として大敗を喫し、領地を没収され高野山に追放される。のちの小田原攻めで陣借りを願って鈴なり武者として決死の奮戦を見せ、見事大名への復帰を果たした不屈の男。", skill: { name: "鈴なり武者の奮戦", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 850, name: "前田利常", power: 86, hp: 114, attribute: "VALOR", desc: "江戸時代前期の大名。加賀藩の第3代藩主。前田利家の四男。大坂の陣において真田信繁の軍勢から猛攻を受けるが、これを防ぎ切って武功を挙げた。幕府から謀反を疑われないよう、わざと鼻毛を伸ばして暗愚を装ったという伝説がある。一方で改作法などの農政改革を行い、加賀百万石の財政基盤を確固たるものにした。", skill: { name: "鼻毛の偽装", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 851, name: "武内宿禰", power: 70, hp: 130, attribute: "STRATEGY", desc: "記紀神話に登場する古代の伝説的な忠臣。景行天皇から仁徳天皇まで5代の大王に仕え、およそ300年生きたとされる。神功皇后の三韓征伐に従軍し、のちに大和政権の初期の国政や軍事を長きにわたって取り仕切った。巨勢氏や平群氏、蘇我氏など、ヤマト政権の中核を担う多くの中央豪族たちの共通の祖とされている。", skill: { name: "五代の忠臣", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 852, name: "小野妹子", power: 78, hp: 122, attribute: "STRATEGY", desc: "飛鳥時代の官人。推古天皇の時代、607年に第1回（または第2回）の遣隋使として中国の隋へ渡った。「日出づる処の天子…」で始まる国書を持参し、煬帝の怒りを買ったものの、結果として答礼使の裴世清をともなって帰国し、大国と対等な外交関係を築こうとするヤマト政権の独立性を国際社会に示す大任を果たした。", skill: { name: "日出づる処の使者", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 853, name: "犬上御田鍬", power: 95, hp: 105, attribute: "STRATEGY", desc: "飛鳥時代の外交官。舒明天皇の時代の630年、遣唐大使として第1回の遣唐使を率いて唐に渡った。隋が滅んで新たに唐が統一を果たした中国大陸の最新の国際情勢や制度を視察し、翌年に唐の使者である高表仁をともなって帰国。以後200年以上にわたって続く遣唐使の歴史の第一歩を記し、大陸文化導入の道を切り開いた。", skill: { name: "第一回遣唐使", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 854, name: "以仁王", power: 76, hp: 124, attribute: "STRATEGY", desc: "平安時代末期の皇族。後白河法皇の第3皇子。平氏の専横によって皇位継承から外され冷遇されていた。1180年、源頼政の勧めに従って「平氏打倒の令旨」を発し、全国の源氏に決起を促した。自身は宇治平等院の戦いで平氏の追討軍に敗れて討ち死にしたが、彼の令旨が源頼朝や義仲らの挙兵の大義名分となり、平氏滅亡の引き金となった。", skill: { name: "平氏打倒の令旨", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 855, name: "比企能員", power: 91, hp: 109, attribute: "STRATEGY", desc: "鎌倉時代初期の有力御家人。源頼朝の乳母である比企尼の養子。娘の若狭局を第2代将軍・源頼家の妻とし、頼家の外戚として北条氏をしのぐ絶大な権勢を握った。頼家が病に倒れた際、北条時政と激しく権力を争ったが（比企能員の乱）、謀略によって自邸に誘い出されて暗殺され、一族も北条氏の軍勢によって滅ぼされた。", skill: { name: "外戚の権勢", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 856, name: "太原雪斎", power: 89, hp: 111, attribute: "STRATEGY", desc: "戦国時代の臨済宗の僧侶・武将。今川義元の軍師として絶大な影響力を持った。義元の家督相続（花倉の乱）を主導し、今川仮名目録の追加制定や、甲相駿三国同盟の締結という卓越した外交手腕を発揮して今川氏の全盛期を築き上げた。また、人質として駿府にいた幼少の徳川家康（竹千代）に学問を教えたことでも知られる。", skill: { name: "黒衣の軍師", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 857, name: "豊臣秀長", power: 73, hp: 127, attribute: "STRATEGY", desc: "安土桃山時代の武将。豊臣秀吉の異父弟で「大和中納言」と呼ばれた。兄・秀吉の天下統一の過程において、軍事・内政・外交のすべての面で最も重要な補佐役として活躍した。温厚で人望が厚く、諸大名と秀吉との間の調整役（ブレーキ役）を見事に果たしていた。彼の病死が、その後の豊臣政権の暴走と崩壊の大きな要因となった。", skill: { name: "大和中納言の調調", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 858, name: "豊臣秀頼", power: 72, hp: 128, attribute: "STRATEGY", desc: "安土桃山時代から江戸時代初期の大名。豊臣秀吉と淀殿の子。秀吉の死後、わずか6歳で豊臣家の家督を継ぐ。関ヶ原の戦いののち、徳川家康によって摂津・河内・和泉の65万石の一大名へと転落したが、依然として大坂城にあって公家社会や西国大名から主君として仰がれた。大坂の陣で徳川軍に敗れ、母とともに大坂城で自刃した。", skill: { name: "豊臣家の落日", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 859, name: "吉田東洋", power: 94, hp: 106, attribute: "STRATEGY", desc: "幕末の土佐藩の家老。藩主・山内豊信（容堂）に登用されて「新おこぜ組」と呼ばれる改革派を率い、門閥を打破した人材登用や財政の緊縮、殖産興業などの強力な藩政改革を断行した。しかし、開国論・公武合体論を主張したため、尊王攘夷を唱える武市瑞山ら土佐勤王党の激しい反発を招き、雨の夜に暗殺された悲劇の改革者。", skill: { name: "おこぜ組の改革", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 860, name: "斎藤実", power: 87, hp: 113, attribute: "STRATEGY", desc: "大正から昭和期の海軍大将・政治家。朝鮮総督などを歴任。1932年の五・一五事件で犬養毅が暗殺された後、政党政治にかわって挙国一致内閣を組織し、満洲国の承認や国際連盟の脱退という重大な外交的決断を下した。温厚な人柄で各方面の調整にあたったが、内大臣として昭和天皇を補佐していた際に二・二六事件で暗殺された。", skill: { name: "挙国一致の重責", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 861, name: "道鏡", power: 81, hp: 119, attribute: "CULTURE", desc: "奈良時代後期の法相宗の僧。看病禅師として孝謙上皇の病を治したことから絶大な寵愛を受け、太政大臣禅師、さらには仏教界と政界の最高位である法王にまで上り詰めた。西大寺の造営など仏教を厚く保護したが、宇佐八幡宮の神託事件によって天皇の位を奪おうと企てたとして、称徳天皇の崩御後に下野国に左遷された。", skill: { name: "法王の野望", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 862, name: "淀殿", power: 79, hp: 121, attribute: "CULTURE", desc: "安土桃山時代から江戸時代初期の女性。浅井長政とお市の方の長女・茶々。豊臣秀吉の側室となり、待望の世継ぎである秀頼を生んだことで豊臣政権内で絶大な権力を握った。秀吉の死後は秀頼の保護者として大坂城の実権を握り、徳川家康と対立。大坂の陣では和睦を拒否して徹底抗戦を選び、落城の炎の中で秀頼とともに自刃した。", skill: { name: "大坂城の女帝", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 863, name: "徳川光圀", power: 93, hp: 107, attribute: "CULTURE", desc: "江戸時代前期の大名。水戸藩の第2代藩主。「水戸黄門」として知られる。明から亡命した儒学者・朱舜水らを招き、修史局（彰考館）を設けて『大日本史』の編纂という国家的な大事業を開始した。天皇を正統とする尊王論（水戸学）を確立し、江戸時代の思想界に多大な影響を与えた。また、殉死の禁止や上水道の整備など名君として治世を行った。", skill: { name: "大日本史の編纂", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.8 } },
  { id: 864, name: "室鳩巣", power: 74, hp: 126, attribute: "CULTURE", desc: "江戸時代中期の朱子学者。木下順庵に学んだのち、新井白石の推薦で江戸幕府の儒官となった。8代将軍・徳川吉宗の厚い信任を受け、侍講として「享保の改革」を思想面から支え、足高の制の立案などに関与した。また、赤穂浪士の討ち入りを義挙として称賛した『赤穂義人録』や、平易な道徳書である『駿台雑話』を著した。", skill: { name: "駿台の侍講", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 865, name: "徳川宗春", power: 77, hp: 123, attribute: "CULTURE", desc: "江戸時代中期の尾張藩主。第7代。8代将軍・徳川吉宗が享保の改革で徹底した質素倹約を強要したのに対し、著書『温知政要』で「過度な倹約はかえって庶民を苦しめる」として真っ向から反論。名古屋の城下町で芝居興行や遊郭を大いに奨励し、華やかな消費経済による藩政の活性化を図ったが、吉宗の怒りを買って隠居・謹慎させられた。", skill: { name: "温知政要の反発", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 866, name: "吉田松陰", power: 98, hp: 102, attribute: "CULTURE", desc: "幕末の長州藩の思想家。兵学者として諸国を遊学し、ペリー艦隊への密航を企てて失敗し投獄された。出獄後、萩で私塾「松下村塾」を主宰し、高杉晋作、久坂玄瑞、伊藤博文など、のちの明治維新を牽引する幾多の若き志士たちに強烈な尊王攘夷の思想と行動力を植え付けた。安政の大獄で井伊直弼によって死罪となり、29歳で散った。", skill: { name: "松下村塾の教え", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 867, name: "渋沢栄一", power: 100, hp: 100, attribute: "CULTURE", desc: "明治から昭和期の日本の実業家。「日本資本主義の父」と称される。幕臣として渡欧して近代経済を学び、維新後は大蔵省で国立銀行条例などの制定に尽力。のちに実業界に転じ、第一国立銀行をはじめ、抄紙会社（王子製紙）や大阪紡績会社など、約500もの企業の設立に関わり、「論語と算盤」による道徳的経済の合一を説き実践した。", skill: { name: "論語と算盤", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.8 } },
  { id: 868, name: "岩崎弥太郎", power: 80, hp: 120, attribute: "CULTURE", desc: "明治期の実業家。土佐藩の地下浪人の出身。長崎で藩の貿易業務に従事し、維新後に九十九商会を設立して海運業を始めた。台湾出兵や西南戦争における政府の軍事輸送を独占的に請け負って莫大な利益を上げ、三菱商会（のちの日本郵船）へと発展させた。政府の保護と自身の強烈な専制経営により、三菱財閥の基礎を一代で築き上げた政商。", skill: { name: "三菱の独占", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 869, name: "津田梅子", power: 82, hp: 118, attribute: "CULTURE", desc: "明治から昭和期の教育者。わずか8歳で岩倉使節団の日本最初の女子留学生としてアメリカに渡り、約11年間学んで帰国。華族女学校の教師などを務めたのち、日本の女性が高等教育を受けて自立することの重要性を痛感し、1900年に女子英学塾（現在の津田塾大学）を創立。近代日本における女性の地位向上と語学教育に生涯を捧げた。", skill: { name: "女子英学の創立", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.8 } },
  { id: 870, name: "石橋湛山", power: 90, hp: 110, attribute: "CULTURE", desc: "大正から昭和期のジャーナリスト・政治家。東洋経済新報の主幹として、大正デモクラシー期に軍部の中国侵略や植民地支配を痛烈に批判する「小日本主義」を主張した稀有なリベラリスト。戦後に政界入りし、大蔵大臣などを経て1956年に首相となるが、わずか2カ月で病に倒れ退陣。その後も日中・日ソの国交回復運動に尽力した。", skill: { name: "小日本主義の理", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
 ];　

// ★追加：fixed_damage および absorb_hp スキルのバランス調整（威力・発動率を一律10%ダウン、説明文も自動更新）
CHARACTERS.forEach(char => {
  if (char.skill && (char.skill.type === 'fixed_damage' || char.skill.type === 'absorb_hp')) {
    char.skill.value = Math.max(0, parseFloat((char.skill.value - 0.1).toFixed(2)));
    char.skill.rate = Math.max(0, parseFloat((char.skill.rate - 0.1).toFixed(2)));
    // 表記をキャッチして、計算後の正しい数値に置き換える
    if (char.skill.type === 'fixed_damage') {
        char.skill.desc = char.skill.desc.replace(/最大(?:HP|兵力)の\d+%/, `最大HPの${Math.round(char.skill.value * 100)}%`);
    } else if (char.skill.type === 'absorb_hp') {
        char.skill.desc = char.skill.desc.replace(/敵(?:HP|兵力)の\d+%/, `敵HPの${Math.round(char.skill.value * 100)}%`);
    }
  }
});

const ITEMS = [
  { id: 1, name: "打製石器", type: "buff_attr", target: "VALOR", value: 0.15, desc: "旧石器時代から縄文時代にかけて使用された、石を打ち欠いて作られた鋭利な道具。ナイフ形石器や尖頭器などがあり、主に狩猟における動物の解体や、木や骨の加工作業に用いられた。人類が初めて手にした強力な武器であり、道具の歴史の原点である。" },

  { id: 5, name: "七支刀", type: "buff_attr", target: "VALOR", value: 0.20, desc: "石上神宮に伝わる、剣の身の左右に三つずつ枝刃が出た特異な形をした鉄剣。銘文の解読から、4世紀頃に百済の王がヤマト政権の倭王に友好の証として贈ったものと推定されている。当時のヤマト政権と朝鮮半島の密接な外交・軍事関係を証明する歴史的遺物である。" },
  { id: 6, name: "十七条の憲法", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "推古天皇の時代に聖徳太子（厩戸王）が制定したとされる日本初の成文法。「和を以て貴しと為す」など、仏教や儒教の思想を取り入れ、役人のあるべき道徳的規範や心構えを示した。豪族の連合体から、天皇を中心とした中央集権国家へと移行する理念が明確に表れている。" },
  { id: 7, name: "和同開珎", type: "buff_all", value: 0.15, desc: "708年、武蔵国からの銅の献上（和銅改元）を機に鋳造された日本最古級の流通貨幣。唐の「開元通宝」をモデルに作られた。国家の威信を示すとともに、平城京建設などの莫大な公的支払いを円滑にする目的があり、蓄銭叙位令を出して流通を促したが、当初は畿内周辺でのみ使われた。" },
  { id: 8, name: "古事記", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "712年に太安万侶が編纂した日本最古の歴史書。稗田阿礼が暗誦した神代から推古天皇までの系譜や神話、伝承を和化漢文で記す。天皇家の支配の正当性を神話的起源から説明し、国家の成り立ちを物語ることで、律令国家の権威を国内に示す強い政治的意図を持っていた。" },
  { id: 9, name: "東大寺盧舎那仏像", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "聖武天皇の「大仏造立の詔」により、国家事業として建造された巨大な仏像（奈良の大仏）。仏教の力（鎮護国家思想）によって相次ぐ疫病や飢饉、反乱といった社会不安を鎮め、国家の安泰を図ろうとした律令政府の悲願であり、当時の絶大な国力と技術力の結晶である。" },
  { id: 10, name: "墾田永年私財法", type: "buff_attr", target: "STRATEGY", value: 0.15, desc: "743年、聖武天皇の時代に発布された法令。人口増加による口分田不足を解消するため、新たに開墾した土地（墾田）の永久私有を認めた。これにより律令制の根幹であった公地公民制が事実上崩壊し、力のある貴族や寺社が広大な荘園を形成する契機となった重要な転換点である。" },
  { id: 11, name: "源氏物語", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "平安時代中期、紫式部によって執筆された全54帖からなる長編小説。光源氏の栄華と恋愛、そしてその子孫たちの没落を描く。当時の貴族社会の雅やかな生活や複雑な人間心理を「もののあはれ」の理念のもとに描き出した日本文学の最高峰であり、世界最古の長編小説とも言われる。" },
  { id: 12, name: "日本刀", type: "buff_attr", target: "VALOR", value: 0.25, desc: "平安時代後期以降、武士の台頭とともに発展した反りのある鋭利な刀剣。折れず、曲がらず、よく切れるという相反する性質を高度な鍛冶技術で実現した。「武士の魂」とも呼ばれ、実戦の武器としてだけでなく、信仰の対象や権威の象徴、美術品としても極めて高い価値を持つ。" },
  { id: 13, name: "御成敗式目", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "1232年、鎌倉幕府の北条泰時が制定した日本初の武家政権による成文法（貞永式目・全51ヶ条）。源頼朝以来の先例や武家社会の道理に基づき、御家人間の所領紛争を公平に裁く基準を示した。これ以後、武家社会の基本法として長く尊重され、室町・江戸時代の法律にも影響を与えた。" },
  { id: 14, name: "元寇防塁", type: "debuff_all", value: 0.20, desc: "文永の役の後、モンゴル帝国（元）の再襲来に備えて、鎌倉幕府の命により博多湾沿岸の約20kmにわたって築かれた石組みの防壁（石築地）。弘安の役では、この防塁が元軍の上陸をことごとく阻み、日本軍が防衛戦を有利に進めるための最大の軍事的要衝として機能した。" },
  { id: 15, name: "建武式目", type: "buff_attr", target: "STRATEGY", value: 0.15, desc: "1336年、足利尊氏が室町幕府を開くにあたり制定した17箇条の政治方針。鎌倉幕府の御成敗式目を引き継ぎつつ、倹約の奨励や礼儀の尊重など新たな武家政権のあるべき姿を宣言し、建武の新政の失敗から脱却して武士のための政権を再興することを内外にアピールした。" },
  { id: 16, name: "金閣（鹿苑寺）", type: "buff_all", value: 0.15, desc: "室町幕府第3代将軍・足利義満が造営した北山山荘の象徴的な建築物。公家文化、武家文化、禅宗文化が見事に融合した北山文化の代表作。義満の絶大な権力と、明との勘合貿易で得た莫大な財力を背景に、内外に金箔が惜しみなく貼られた豪華絢爛な姿は、当時の幕府の権威を見せつける。" },
  { id: 17, name: "火縄銃", type: "buff_attr", target: "VALOR", value: 0.25, desc: "1543年、種子島に漂着したポルトガル人を乗せた船によってもたらされた新兵器。従来の騎馬・弓矢中心の戦術を根本から覆し、足軽の集団戦を主力とする近代的な戦法を生み出した。織田信長が長篠の戦いで大量運用して武田勝頼を破ったことで、戦国大名の勢力図を一変させた。" },
  { id: 18, name: "楽市・楽座令", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "織田信長らが推進した革新的な経済政策。座（同業者組合）の特権を廃止し、市場での自由な商売や新規参入を認めた。関所の撤廃と合わせて流通を活性化させ、城下町に商人と富を集中させることで、強大な軍事力を支える強固な経済基盤を確立し、近世的な都市発展の基礎となった。" },
  { id: 19, name: "太閤検地帳", type: "buff_all", value: 0.15, desc: "豊臣秀吉が全国規模で実施した土地調査（太閤検地）の記録。京枡を用いて度量衡を統一し、土地の生産力を石高で表す「石高制」を確立した。一地一作人の原則により農民の土地保有権を認める一方、年貢負担者を明確にし、江戸幕府の強固な支配体制（幕藩体制）の経済的基礎となった。" },
  { id: 20, name: "武家諸法度", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "江戸幕府が全国の諸大名を統制するために制定した基本法。城の無断修築の禁止や大名間の婚姻の制限など厳格なルールを定めた。将軍の代替わりごとに発布され、違反した大名は容赦なく改易（領地没収）されるなど、幕藩体制の維持・強化を図るための最も強力な法的ツールであった。" },
  { id: 21, name: "寛永通宝", type: "buff_all", value: 0.15, desc: "江戸時代を通じて全国で広く流通した銅銭。幕府が貨幣鋳造権を独占し、全国の銭座で大量かつ均質に作らせた。室町時代から続いていた粗悪な私鋳銭や渡来銭の混用（撰銭）による混乱を一掃して全国的な通貨統一を実現し、三都を中心とした商品流通と貨幣経済の飛躍的な発展を支えた。" },
  { id: 22, name: "解体新書", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "杉田玄白や前野良沢らが、オランダ語の解剖書「ターヘル・アナトミア」を苦心惨憺の末に翻訳・出版した医学書。日本の医学史における画期的な業績であると同時に、本格的な蘭学発展の出発点となり、後の西洋近代科学や思想の受容に多大な影響を与えた金字塔である。" },
  { id: 23, name: "大日本沿海輿地全図", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "江戸時代後期、伊能忠敬が約17年かけて全国の海岸線を自らの足で測量し、作成した驚異的な精度の日本地図。現代の衛星写真と比べても遜色のない正確さを誇り、当時の日本の測量技術の高さを世界に示した。幕府の海防政策など国防上の重要な機密資料としても扱われた。" },
  { id: 24, name: "ペリーの黒船", type: "buff_attr", target: "VALOR", value: 0.25, desc: "1853年、アメリカのペリー提督が率いて浦賀沖に来航した、蒸気船を含む艦隊。巨大な船体と大砲による威嚇射撃は、泰平の眠りについていた日本人に多大な衝撃（黒船来航）を与えた。圧倒的な軍事的脅威によって日本に開国を迫り、200年以上続いた鎖国体制を終わらせた象徴。" },
  { id: 25, name: "大政奉還の建白書", type: "buff_attr", target: "STRATEGY", value: 0.15, desc: "1867年、土佐藩の勧めを受けた山内豊信が、15代将軍・徳川慶喜に提出した建白書。政権を朝廷に返上することを提案し、武力による討幕派（薩長）の機先を制することで、徳川家を中心とした新たな合議制の政治体制（公議政体）を目指すという高度な政治的妥協案であった。" },
  { id: 26, name: "五箇条の御誓文", type: "buff_all", value: 0.20, desc: "1868年、明治新政府が天皇が神々に誓うという形式で発表した、新しい国是。「広く会議を興し万機公論に決すべし」など、近代国家としての基本方針を示した。欧米列強に伍する近代化を目指す政府の強い決意表明であり、のちの自由民権運動において国会開設を求める強力な拠り所ともなった。" },
  { id: 27, name: "廃藩置県の布告", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "1871年、明治新政府が全国の藩を強制的に廃止し、代わりに府と県を置いて中央から府知事・県令を派遣した大改革。数百年続いた幕藩体制という封建的な地方分権を根本から解体し、近代的な中央集権国家の枠組みを一挙に作り上げた、明治維新における最大の政治的・社会的変革である。" },
  { id: 28, name: "大日本帝国憲法", type: "buff_all", value: 0.20, desc: "1889年に発布されたアジア初の近代憲法。伊藤博文らが君権の強いプロイセン憲法を模範として起草し、天皇に軍の統帥権など強大な権限（天皇大権）を持たせる一方、臣民の権利や帝国議会の開設も規定した。富国強兵を目指す近代日本の強固な法的基盤となり、列強への条約改正交渉を後押しした。" },
  { id: 29, name: "零式艦上戦闘機", type: "buff_attr", target: "VALOR", value: 0.25, desc: "太平洋戦争において無敵を誇った日本海軍の主力戦闘機（零戦）。徹底的な軽量化による驚異的な航続距離と、他国の追随を許さない優れた格闘・旋回性能を持ち、真珠湾攻撃など緒戦の圧倒的な勝利に大きく貢献した。しかし、防弾装備の脆弱さと後継機開発の遅れにより、大戦末期には苦戦を強いられた。" },
  { id: 30, name: "日本国憲法", type: "heal_round", value: 0.20, desc: "1946年に公布された戦後日本の最高法規。「国民主権」「基本的人権の尊重」「平和主義（戦争放棄）」の三大原則を掲げる。ポツダム宣言受諾に伴うGHQの指導の下で制定され、軍国主義からの完全な決別を宣言し、民主的で平和な近代国家として再出発する現在の日本の社会構造を規定している。" },
  { id: 31, name: "骨角器", type: "buff_attr", target: "CULTURE", value: 0.15, desc: "旧石器時代から縄文時代にかけて使用された、動物の骨や角を加工して作られた道具。釣り針や銛、縫い針、装身具などに用いられ、人々の生活と狩猟・漁労技術の向上に大きく貢献した。" },
  { id: 32, name: "細石器", type: "buff_attr", target: "VALOR", value: 0.20, desc: "旧石器時代末期に出現した、長さ数センチの小型で鋭利な石器。木や骨の軸に複数個はめ込んで槍や銛として使用された。シベリアから伝わったとされ、機動力のある狩猟を可能にした画期的な道具である。" },
  { id: 33, name: "磨製石器", type: "buff_hp", value: 0.15, desc: "新石器時代（縄文時代）を特徴づける、表面を砥石で磨いて仕上げた石器。石斧として木材の伐採や加工に用いられ、丸木舟の建造や竪穴住居の建築など、定住生活の基盤を築くための不可欠な道具となった。" },
  { id: 34, name: "翡翠の勾玉", type: "damage_cut_all", value: 0.20, desc: "縄文時代から古墳時代にかけて作られた装身具。特に新潟県糸魚川周辺で産出される硬玉（翡翠）で作られたものは珍重され、呪術的・宗教的な権威の象徴として、日本列島各地の広範囲に交易で流通した。" },
  { id: 35, name: "貝塚", type: "heal_round", value: 0.15, desc: "縄文時代の人々が食べた貝殻や動物の骨、土器などを捨てたごみ捨て場であり、同時に死者の埋葬場でもあった。当時の人々の豊かな食生活や精神世界を知るための、極めて貴重な考古学上の宝庫である。" },
  { id: 36, name: "竪穴住居", type: "buff_hp", value: 0.20, desc: "地面を円形や方形に掘り下げ、その上に柱を立てて屋根を葺いた古代の一般的な住居。縄文時代から平安時代まで広く庶民の住居として利用され、中央の炉を中心に家族が寄り添って定住生活を営んだ。" },
  { id: 37, name: "高床倉庫", type: "buff_all", value: 0.15, desc: "弥生時代に稲作の普及とともに登場した、収穫した籾を貯蔵するための倉庫。湿気を防ぎ、ネズミなどの害を防ぐために「ねずみ返し」が設けられ、農耕社会における富の蓄積と権力の発生を象徴する建造物である。" },
  { id: 38, name: "石包丁", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "弥生時代前期から中期にかけて、稲の穂先を刈り取る（穂首刈り）ために使用された磨製石器。大陸から稲作技術とともに伝来し、農耕社会の発展を支えたが、のちに鉄製農具の普及により姿を消した。" },
  { id: 39, name: "鉄製農具", type: "buff_all", value: 0.20, desc: "弥生時代後期から普及し始めた鉄先の鍬や鋤などの農具。木製農具や石器に比べてはるかに耐久性と作業効率が高く、耕地の開墾や大規模な灌漑工事を可能にし、農業生産力を飛躍的に増大させた画期的な技術である。" },
  { id: 40, name: "銅矛", type: "buff_attr", target: "VALOR", value: 0.20, desc: "弥生時代に青銅で作られた武器形の祭器。本来は武器であったが、日本では大型化して実用性を失い、主に九州北部を中心に、農耕の豊穣を祈る共同体の祭祀において権威の象徴として用いられた。" },
  { id: 41, name: "銅戈", type: "buff_attr", target: "VALOR", value: 0.25, desc: "弥生時代に用いられた青銅製の祭器。矛と同様に本来は柄の先に取り付ける武器であるが、日本では祭祀の道具として大型化・装飾化し、九州北部から中部の有力な首長たちの権力の象徴として副葬された。" },
  { id: 42, name: "三角縁神獣鏡", type: "damage_cut_all", value: 0.25, desc: "古墳時代前期の古墳から多数出土する、縁の断面が三角形の大型銅鏡。邪馬台国の卑弥呼が魏から賜った銅鏡とする説があり、ヤマト政権が地方豪族に分与して支配関係を結ぶための重要な政治的・呪術的宝器とされた。" },
  { id: 43, name: "甕棺墓", type: "debuff_all", value: 0.20, desc: "弥生時代に九州北部で盛んに行われた、2つの大型の甕を合わせた棺に死者を埋葬する墓制。奴国や伊都国の王とみられる甕棺からは、多数の銅鏡や鉄剣などの豪華な副葬品が発見され、身分差の発生を示している。" },
  { id: 44, name: "支石墓", type: "buff_hp", value: 0.15, desc: "弥生時代前期に九州北部で見られた、大きな平石を数個の支石で支えてその下に埋葬する墓制。朝鮮半島から稲作文化とともに伝来したものであり、当時の日本列島と大陸との密接な文化交流を示す重要な遺跡である。" },
  { id: 45, name: "方形周溝墓", type: "heal_round", value: 0.20, desc: "弥生時代から古墳時代にかけて造られた、周囲に方形の溝をめぐらせた低い墳丘を持つ墓。近畿地方を中心に全国へ広まり、家族や同族集団の墓域として用いられた。のちの巨大な古墳へと発展していく源流とされる。" },
  { id: 46, name: "形象埴輪", type: "buff_all", value: 0.20, desc: "古墳時代の中期から後期にかけて、古墳の墳丘に立て並べられた素焼きの土製品。家や盾、武具、そして人物や動物などをかたどり、当時の人々の服装や風俗、祭祀の様子を立体的に今に伝える極めて貴重な歴史資料である。" },
  { id: 47, name: "須恵器", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "古墳時代中期に朝鮮半島から伝わった、ろくろを用い、登り窯で1000度以上の高温で還元焰焼成される灰色で硬質の土器。祭祀用や貴族の食器として珍重され、日本の陶磁器技術の飛躍的な進歩をもたらした。" },
  { id: 48, name: "土師器", type: "buff_hp", value: 0.20, desc: "弥生土器の系統を引く、赤褐色でやや軟質の素焼きの土器。古墳時代から平安時代にかけて、主に庶民の日常的な煮炊き用の実用器として広く生産・使用され、日本の古代における生活文化の基盤を支え続けた。" },
  { id: 49, name: "横穴式石室", type: "damage_cut_all", value: 0.25, desc: "古墳時代後期に普及した、遺体を納める玄室とそこへ至る羨道からなる石室。入り口を開閉できるため、同じ家族や一族の者を次々と追葬することが可能であり、巨大な前方後円墳の終焉と群集墳の流行をもたらした。" },
  { id: 50, name: "装飾古墳", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "古墳時代後期に、石室の内部に赤や黒の顔料で幾何学文様や人物、馬、船などの壁画が描かれた古墳。九州や茨城県などに多く分布し、古代人の他界観や呪術的な精神世界を色鮮やかに現代に伝えている。" },
  { id: 51, name: "屯倉", type: "buff_hp", value: 0.30, desc: "大化改新以前にヤマト政権が全国に設定した大王家の直轄地。磐井の乱の鎮圧などを機に地方豪族から土地を取り上げて設置され、大王の強大な経済的・軍事的基盤となり、のちの公地公民制への重要な足がかりとなった。" },
  { id: 52, name: "部曲", type: "buff_all", value: 0.20, desc: "大化改新以前のヤマト政権において、有力な氏（豪族）が私有していた民衆。豪族の経済的基盤として耕作や雑役に従事したが、大化改新の詔によって私地私民制が廃止されたことで、国家の公民へと組み込まれていった。" },
  { id: 53, name: "飛鳥大仏", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "蘇我馬子が発願した日本最古の本格的寺院である飛鳥寺の本尊。鞍作鳥（止利仏師）によって造立された釈迦如来像であり、北魏様式の面長で厳しい表情と杏仁形の目を持ち、飛鳥時代の仏教文化の始まりを象徴している。" },
  { id: 54, name: "玉虫厨子", type: "damage_cut_all", value: 0.30, desc: "法隆寺に伝わる、飛鳥時代を代表する宮殿形の仏具。装飾に玉虫の羽が透かし彫りの金具の下に敷き詰められていた。側面に描かれた『捨身飼虎図』などの仏教絵画は、日本の絵画史において最古級の傑作である。" },
  { id: 55, name: "冠位十二階の制", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "603年に推古天皇と聖徳太子が制定した日本初の位階制度。氏族単位ではなく、個人の才能や功績に応じて徳・仁・礼・信・義・智の冠を授け、天皇を中心とする官僚制的な中央集権国家の形成を目指した画期的な制度。" },
  { id: 56, name: "飛鳥寺", type: "heal_round", value: 0.25, desc: "蘇我馬子が596年に創建した日本最古の本格的な伽藍配置を持つ仏教寺院（法興寺）。百済から最新の建築技術が導入され、瓦葺きの屋根や塔を中心に金堂が配置され、当時のヤマト政権における蘇我氏の絶大な権威を示した。" },
  { id: 57, name: "法隆寺金堂", type: "damage_cut_all", value: 0.30, desc: "飛鳥時代に聖徳太子が建立した法隆寺の主要な建造物で、現存する世界最古の木造建築。エンタシスの柱や雲肘木などの大陸の建築様式を今に伝え、内部には釈迦三尊像や世界的な傑作である金堂壁画（焼損）が安置された。" },
  { id: 58, name: "遣隋使の国書", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "607年に小野妹子が隋の煬帝に手渡した国書。「日出づる処の天子、書を日没する処の天子に致す」と記され、強大な隋に対して対等な外交関係を要求し、東アジアにおける独立国家としての日本の自立を強く主張した。" },
  { id: 59, name: "大化改新の詔", type: "buff_all", value: 0.30, desc: "646年に孝徳天皇が発布した4カ条の政治改革の基本方針。私地私民の廃止（公地公民）、新たな地方行政組織の整備、班田収授法の実施、統一的な税制の導入を宣言し、天皇を中心とした律令国家建設の設計図となった。" },
  { id: 60, name: "水城", type: "damage_cut_all", value: 0.35, desc: "663年の白村江の戦いで大敗した後、唐・新羅の侵攻に備えて天智天皇の命により大宰府の防衛のために築かれた長大な土塁と水濠。西日本の防衛の最前線であり、古代日本が直面した最大の国家危機を今に物語る遺跡。" },
  { id: 61, name: "防人", type: "buff_attr", target: "VALOR", value: 0.25, desc: "白村江の戦い以後、九州北部の沿岸防衛のために主に東国から徴発されて配置された兵士。3年交代で過酷な任務につき、家族との別れや望郷の悲しみを詠んだ彼らの「防人歌」は『万葉集』に多数収められている。" },
  { id: 62, name: "庚午年籍", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "670年に天智天皇の命によって作成された日本初の全国的な戸籍。氏姓の根本台帳として永久保存され、人民を国家が直接把握するための公地公民制と班田収授の基盤となり、律令国家の支配体制を決定的に強化した。" },
  { id: 63, name: "八色の姓", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "684年に天武天皇が制定した新たな身分制度。真人・朝臣・宿禰などの8つの姓を豪族に与え、皇族を中心とした新しい政治的身分秩序に再編成することで、天皇の絶対的な権力を確立し、官僚制の土台を築いた。" },
  { id: 64, name: "富本銭", type: "buff_hp", value: 0.20, desc: "飛鳥池遺跡などから出土した、7世紀後半の天武天皇の時代に鋳造されたとされる銅銭。「和同開珎」よりも古い日本最古の鋳造貨幣の可能性が高く、律令国家が中国にならって独自の貨幣経済の導入を試みた証拠である。" },
  { id: 65, name: "飛鳥浄御原令", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "天武天皇が編纂を命じ、持統天皇の時代である689年に施行された法令。大宝律令に先立つ本格的な法典であり、この令に基づいて庚寅年籍が作成され、班田収授法が実施されるなど、律令国家体制の骨格を形作った。" },
  { id: 66, name: "藤原京", type: "buff_hp", value: 0.30, desc: "持統天皇が694年に飛鳥から遷都した、日本で最初の中国式の条坊制を備えた本格的な都城。大和三山に囲まれた広大な都市であり、天皇の権威を示すとともに、律令国家の首都としての機能を完備した最初の都であった。" },
  { id: 67, name: "大宝律令", type: "buff_all", value: 0.35, desc: "701年に刑部親王や藤原不比等らによって編纂・施行された、日本初の本格的で総合的な律令法典。唐の制度を模範としつつ日本の実情に合わせ、これにより二官八省の国家機構や刑罰、税制などの法体制が完全に確立した。" },
  { id: 68, name: "平城京", type: "buff_hp", value: 0.35, desc: "710年に元明天皇によって唐の長安をモデルに造営された壮大な都。朱雀大路を中心に碁盤目状に区画され、約10万人が暮らした。以後70年余りにわたり、天平文化が華々しく咲き誇る奈良時代の政治と文化の中心となった。" },
  { id: 69, name: "蓄銭叙位令", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "711年に政府が定めた法令。和同開珎などの銭貨の流通を促進するため、一定額の銭を蓄えて政府に納入した者に位階を与えるとした。しかし、人々が銭を退蔵してしまい、本来の目的である市場での流通効果は乏しかった。" },
  { id: 70, name: "百万町歩開墾計画", type: "heal_round", value: 0.25, desc: "722年、人口増加による口分田の不足を解消するために長屋王の政権下で立てられた国家的な大規模開墾計画。東北地方などを対象に良田の開墾を目指したが、国家の力だけでは実現不可能であり、土地私有化への布石となった。" },
  { id: 71, name: "三世一身法", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "723年に制定された法令。新たに灌漑施設を造って開墾した土地は三世代、古い施設を再利用した場合は一世代の私有を認めた。公地公民制の原則を崩すものであり、貴族や寺社による初期荘園の形成を促す第一歩となった。" },
  { id: 72, name: "国分寺建立の詔", type: "buff_all", value: 0.30, desc: "741年、度重なる災害や反乱に苦しむ聖武天皇が、仏教の力で国家の安泰を図る「鎮護国家」の思想のもと発布した詔。各国に国分僧寺と国分尼寺を建立させ、金光明最勝王経を読ませて、国家の精神的な統一を企図した。" },
  { id: 73, name: "東大寺正倉院", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "聖武天皇の遺愛品などを収めるために建てられた校倉造の宝庫。シルクロードを通ってペルシャや唐から伝わった楽器や工芸品など、天平文化の豊かな国際性を現代に伝える、奇跡的に保存された古代世界のタイムカプセル。" },
  { id: 74, name: "日本書紀", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "720年に舎人親王らが完成させた、漢文の編年体で記された日本初の官撰正史。中国の史書にならって国家の威信を内外に示すために編纂され、以後『六国史』へと連なる、日本の古代国家としての正統性を証明する歴史書。" },
  { id: 75, name: "続日本紀", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "『日本書紀』に続く六国史の第二の正史。文武天皇から桓武天皇までの奈良時代を中心とする約100年間の歴史を記す。律令国家の発展や政争、仏教政策の詳細な記録を含み、奈良時代の政治と社会を知るための根本史料。" },
  { id: 76, name: "風土記", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "713年の政府の命により、各国が特産物や土地の伝承、地名の由来などを記録して提出した地誌。現在『出雲国風土記』がほぼ完全な形で残り、古代の地方社会の様子や独自の神話を知るための極めて貴重な文献である。" },
  { id: 77, name: "万葉集", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "奈良時代末期に成立した日本最古の和歌集。大伴家持らが編纂に関わり、天皇から防人や農民まで幅広い階層の人々が詠んだ約4500首を収録。万葉仮名を用いて、古代日本人の素朴で力強い感情（ますらをぶり）を見事に表現した。" },
  { id: 78, name: "懐風藻", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "751年に成立した現存する日本最古の漢詩集。大友皇子や大津皇子などの皇族や貴族、僧侶の漢詩を集める。唐風の文化を重んじる「文章経国」の思想のもとで、奈良時代の知識人たちが漢文学を深く受容していたことを示す。" },
  { id: 79, name: "乾漆像", type: "damage_cut_all", value: 0.25, desc: "天平文化を代表する仏像彫刻の技法。粘土の原型の上に麻布を漆で何枚も貼り重ねて造る。興福寺の阿修羅像や東大寺法華堂の不空羂索観音像など、写実的でありながら内面的な深い精神性を表現した最高傑作が多数生み出された。" },
  { id: 80, name: "塑像", type: "damage_cut_all", value: 0.20, desc: "木や草の芯に粘土を塗り重ねて造る仏像彫刻の技法。天平時代に盛んに用いられ、東大寺法華堂の日光・月光菩薩像や執金剛神像など、粘土ならではの柔らかな表情や、写実的でダイナミックな肉体表現に優れた名作が造られた。" },
  { id: 81, name: "唐招提寺", type: "heal_round", value: 0.30, desc: "度重なる苦難の末に来日した唐の高僧・鑑真が、759年に創建した寺院。金堂は天平時代の寄棟造の建築様式を今に伝える美しさで知られ、日本の仏教界に厳格な戒律を根付かせた律宗の総本山として重要な役割を果たした。" },
  { id: 82, name: "百万塔陀羅尼", type: "debuff_all", value: 0.25, desc: "称徳天皇が恵美押勝の乱の戦没者供養と国家安泰を祈願し、小さな木造の塔100万基に納めて十大寺に奉納した経文。年代が明確な現存する世界最古の印刷物の一つであり、奈良時代の高度な木版印刷技術を証明する国宝。" },
  { id: 83, name: "平安京", type: "buff_hp", value: 0.35, desc: "794年に桓武天皇が長岡京から遷都した、以後約1000年にわたり日本の首都となる都。仏教勢力の影響を断ち切り、天皇親政と律令政治の再建を目指して唐の長安を模して造営され、華やかな貴族文化の舞台となった。" },
  { id: 84, name: "勘解由使", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "桓武天皇が設置した令外官。国司の交替の際に前任者から後任者へと渡される「解由状」を厳格に審査し、地方行政の不正や不正な搾取を取り締まることで、弛緩していた律令国家の地方支配を強力に引き締める役割を担った。" },
  { id: 85, name: "健児の制", type: "buff_attr", target: "VALOR", value: 0.25, desc: "桓武天皇が、従来の農民徴発による軍団を廃止し、郡司の子弟や志願する有力農民を採用した新しい少数精鋭の軍事制度。農民の負担軽減を図るとともに、実戦的で質の高い武力を確保し、のちの武士の発生の遠因ともなった。" },
  { id: 86, name: "弘仁格式", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "嵯峨天皇の時代に編纂された、律令の修正令である「格」と施行細則である「式」を体系的に分類・整理した最初の法典。社会の変化に合わせて複雑化した法令を整理し、天皇による強力な法治体制の維持と実務の円滑化を図った。" },
  { id: 87, name: "蔵人頭", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "薬子の変に際して嵯峨天皇が新設した令外官。天皇の秘書官として機密文書を扱い、太政官を介さずに直接天皇の命令を伝達することで天皇親政を強力に支えた。のちには藤原北家の台頭の足がかりとなる重要な役職となった。" },
  { id: 88, name: "検非違使", type: "buff_attr", target: "VALOR", value: 0.30, desc: "嵯峨天皇の時代に設置された令外官。平安京の治安維持や警察、裁判、さらには行政機能までも統合して強力な権限を持った。律令制の役所である弾正台や京職の役割を吸収し、平安時代の都の秩序を守る最強の治安機関となった。" },
  { id: 89, name: "公営田", type: "heal_round", value: 0.20, desc: "律令国家の財政難を補うため、823年に大宰府管内に設けられた政府直営の農地。農民を賃労働で使役して確実な収益を確保しようとしたものであり、班田収授に基づく従来の税制から、土地そのものを対象とした課税への転換を示す。" },
  { id: 90, name: "延喜の荘園整理令", type: "debuff_all", value: 0.25, desc: "902年、醍醐天皇の時代に発布された法令。違法な荘園の拡大を禁じて公領を守り、班田収授の励行を命じた。しかし、これが歴史上最後の班田となり、律令制の崩壊と荘園公領制への歴史的な転換を決定づける象徴的な法令となった。" },
  { id: 91, name: "金剛峯寺", type: "heal_round", value: 0.30, desc: "空海（弘法大師）が嵯峨天皇から下賜された高野山に開創した真言宗の根本道場。山岳修行の厳しい環境の中で密教の奥義を探求し、現世利益を祈願する加持祈祷の中心地として、皇族や貴族から絶大な帰依を集めた霊場である。" },
  { id: 92, name: "延暦寺", type: "buff_all", value: 0.30, desc: "最澄（伝教大師）が比叡山に開いた天台宗の総本山。法華経を中心とする新しい仏教の拠点となり、大乗戒壇の設立によって南都仏教からの独立を果たした。法然、親鸞、日蓮など、のちの鎌倉仏教の開祖たちを次々と輩出した日本仏教の母山。" },
  { id: 93, name: "両界曼荼羅", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "密教において、大日如来を中心とする宇宙の真理や悟りの世界を視覚的・幾何学的に表現した絵画。金剛界と胎蔵界の二つの図からなり、言葉では伝えきれない仏の教えを直感的に理解するための最も重要な宗教芸術である。" },
  { id: 94, name: "一木造", type: "damage_cut_all", value: 0.25, desc: "平安時代前期（弘仁・貞観文化）に流行した、一本の巨木から仏像の頭部と胴体を彫り出す技法。神仏習合や山岳信仰の影響を受け、木の持つ神秘的な生命力を活かした、重厚で威圧感のある神秘的な仏像彫刻を生み出した。" },
  { id: 95, name: "翻波式", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "平安時代前期の木彫仏に見られる、仏像の衣のひだを大波と小波が交互に繰り返すように深く鋭く彫り込む様式。神秘的でダイナミックな立体感を生み出し、当時の密教の呪術的で重厚な精神性を視覚的に見事に表現している。" },
  { id: 96, name: "古今和歌集", type: "buff_attr", target: "CULTURE", value: 0.40, desc: "905年、醍醐天皇の命で紀貫之らが編纂した日本初の勅撰和歌集。漢詩偏重の時代を経て和歌の地位を飛躍的に高め、「たをやめぶり」と称される優美で知的な歌風を確立。以後の日本の美意識と文学の方向性を決定づけた金字塔。" },
  { id: 97, name: "仮名文字", type: "buff_attr", target: "CULTURE", value: 0.45, desc: "漢字の草書体を崩した平仮名や、一部を省略した片仮名など、日本独自の文字。平安時代中期に広く普及し、人間の繊細な感情や風景の美しさを自由に表現することを可能にして、国風文化における女流文学の爆発的な開花をもたらした。" },
  { id: 98, name: "竹取物語", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "平安時代前期に成立した、日本最古の仮名による物語文学（伝奇物語）。かぐや姫の数奇な運命を通じて、貴族社会への風刺や人間の欲望を鮮やかに描き出し、のちの『源氏物語』などの物語文学の発達の偉大な源流となった作品。" },
  { id: 99, name: "枕草子", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "清少納言が一条天皇の中宮定子に仕えた宮廷生活の中で記した、日本最古の随筆。四季の情景や日常の人間観察を、鋭い感性と知的な「をかし」の美意識をもって軽妙な文体で綴り、平安王朝の文化的洗練の極致を示す傑作。" },
  { id: 100, name: "和泉式部日記", type: "heal_round", value: 0.25, desc: "恋多き歌人・和泉式部が、敦帥親王との身分違いの激しい恋愛の軌跡と、数々の和歌の贈答を赤裸々に書き綴った日記文学。日記という形式を借りながらも物語的な構成を持ち、女性の情熱的な愛と哀しみを美しく表現した名作。" },
  { id: 101, name: "蜻蛉日記", type: "debuff_all", value: 0.30, desc: "藤原道綱母が、権力者である夫・藤原兼家の奔放な愛情に対する苦悩や嫉妬、一夫多妻制の貴族社会における女性の絶望を克明に記した自伝的日記。人間の複雑な内面を深くえぐり出し、のちの女流文学の発展に決定的な影響を与えた。" },
  { id: 102, name: "更級日記", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "菅原孝標女が、少女時代の『源氏物語』への強い憧れと、その後の約40年にわたる現実の人生とのギャップ、そして仏教信仰への傾倒を回想して綴った日記。平安貴族の女性の夢と現実の姿を、静かな哀愁とともに伝えている。" },
  { id: 103, name: "大鏡", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "11世紀後半に成立した、藤原道長の栄華を中心に語る歴史物語。二人の老人の対話という形式（紀伝体）を用い、藤原氏の権力闘争の裏側や権力者への批判を生き生きと鋭く描き出し、日本における歴史叙述の新たな境地を開いた。" },
  { id: 104, name: "栄花物語", type: "buff_all", value: 0.25, desc: "11世紀に成立した、仮名文字による編年体の歴史物語。藤原道長の全盛期を賛美し、宮廷の華やかな儀式や貴族の生活を女性的な柔らかい筆致で詳細に記録しており、摂関政治期の国風文化の爛漫さを知るための貴重な文学作品。" },
  { id: 105, name: "寝殿造", type: "heal_round", value: 0.30, desc: "平安時代中期に完成した日本風の貴族の住宅様式。中心となる寝殿と、透渡殿で結ばれた対屋、そして池や島を配した広大な庭園からなり、日本の自然の移ろいを取り入れた開放的で雅やかな空間が、国風文化の華やかな舞台となった。" },
  { id: 106, name: "大和絵", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "平安時代に発達した、日本の四季の風景や人々の生活風俗を描いた日本独自の絵画。中国風の「唐絵」に対して成立し、屏風や障子を飾り、あるいは絵巻物として発展し、のちの土佐派や琳派へと連なる日本美術の絶対的な基盤となった。" },
  { id: 107, name: "蒔絵", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "漆で文様を描き、乾く前に金や銀の金属粉を蒔きつけて定着させる、日本独自の高度な漆工芸技術。平安時代の貴族の調度品や建築装飾に盛んに用いられ、金銀の輝きと漆の漆黒の対比が、国風文化の絢爛豪華な美意識を象徴している。" },
  { id: 108, name: "螺鈿", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "夜光貝やアワビなどの貝殻の光沢のある部分を薄く削り、漆器の表面にはめ込んで文様を描く装飾技法。中尊寺金色堂の須弥壇や鞍馬寺の経箱などに用いられ、蒔絵とともに平安・鎌倉時代の工芸品の美しさを極限まで高めた技術。" },
  { id: 109, name: "平等院鳳凰堂", type: "buff_all", value: 0.30, desc: "1052年、末法初年に藤原頼通が宇治に建立した阿弥陀堂。極楽浄土の宮殿をこの世に再現した壮麗な建築であり、内部には定朝作の阿弥陀如来像が安置され、当時の貴族の浄土信仰の熱狂と摂関家の絶大な権力と富を今に伝えている。" },
  { id: 110, name: "往生要集", type: "buff_all", value: 0.30, desc: "985年に源信が著した浄土教の根本聖典。恐ろしい地獄の苦しみと極楽の安楽を対比して具体的に描き、ひたすら念仏を唱えることを勧めた。この書は貴族から庶民に至るまで浄土信仰を爆発的に広め、後世の文学や芸術に絶大な影響を与えた。" },
  { id: 111, name: "定朝の寄木造", type: "damage_cut_all", value: 0.30, desc: "11世紀に仏師・定朝が完成させた、複数の木材を組み合わせて一つの仏像を造る画期的な技法。巨木の制約から解放されて大量生産を可能にし、平等院鳳凰堂の本尊に代表される、優美で穏やかな「和様」の仏像の黄金時代を築いた。" },
  { id: 112, name: "来迎図", type: "heal_round", value: 0.30, desc: "臨終の際に、阿弥陀如来が菩薩たちを従えて極楽浄土から死者を迎えに現れる情景を描いた仏教絵画。浄土教の流行とともに盛んに描かれ、人々に死への恐怖を和らげ、極楽往生への強い希望を抱かせる極めて重要な宗教芸術であった。" },
  { id: 113, name: "浄土教", type: "heal_round", value: 0.35, desc: "阿弥陀仏の救いを信じて念仏を唱え、死後に極楽浄土へ生まれ変わることを願う教え。末法思想と社会不安を背景に平安時代中期に空也や源信によって広められ、のちの鎌倉仏教でさらに発展して日本の民衆信仰の最大の中核となった。" },
  { id: 114, name: "名田", type: "buff_hp", value: 0.25, desc: "平安時代中期以降、律令制の崩壊に伴い、徴税の単位として有力な農民（田堵・名主）に請け負わせるために編成された土地。これによって国家の税制は人頭税から土地に対する課税へと転換し、荘園公領制の基礎的な構成単位となった。" },
  { id: 115, name: "受領の目代", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "平安時代、任国に赴任しない国司（遙任）や、現地にいても政務を委任した受領に代わって、国衙（留守所）で在庁官人を指揮して実務を取り仕切った代官。彼らを通じて富を搾取する受領に対する農民の反発（尾張国解文など）を招いた。" },
  { id: 116, name: "寄進地系荘園", type: "buff_hp", value: 0.30, desc: "11世紀以降、地方の開発領主が国司のきびしい徴税を逃れるために、名目上の所有権を中央の有力貴族（領家）や大寺社（本家）に寄進して不輸・不入の権を得た私有地。これにより摂関家などに莫大な富が集中し、国家財政を圧迫した。" },
  { id: 117, name: "刀伊の入寇", type: "debuff_all", value: 0.30, desc: "1019年、中国東北部の女真族（刀伊）が対馬・壱岐・九州北部を大規模に襲撃した事件。大宰権帥の藤原隆家を中心に九州の武士たちが激戦の末に撃退したが、国家の正規軍ではなく地方武士の実力が国防を担う時代の到来を証明した。" },
  { id: 118, name: "院政", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1086年に白河上皇が開始した、天皇が譲位した後に上皇（法皇）として実権を握り続ける政治形態。摂関家の外戚関係を排除して専制的な権力を振るい、北面の武士を組織して武士の台頭を促し、中世という新たな時代への扉を開いた。" },
  { id: 119, name: "知行国制", type: "buff_hp", value: 0.25, desc: "院政期に一般化した、上級貴族や寺社、あるいは上皇自身に特定国の支配権を与え、その国からの税収を私物化させる制度。律令制の地方統治は完全に形骸化し、国家の領土を私的な財源として分割支配する中世的な国家構造の象徴。" },
  { id: 120, name: "僧兵", type: "buff_attr", target: "VALOR", value: 0.30, desc: "平安時代後期以降、広大な荘園の権益を守るために延暦寺や興福寺などの大寺院が武装組織化した下級僧侶の集団。神木や神輿を掲げて朝廷に「強訴」を行い、白河上皇をして「意のままにならない」と嘆かせるほどの強大な軍事勢力となった。" },
  { id: 121, name: "奥州平泉の黄金", type: "buff_all", value: 0.30, desc: "奥州藤原氏が100年にわたり繁栄を極める基盤となった、陸奥国で産出される豊富な砂金。この圧倒的な財力を背景に京都の朝廷や寺社に貢ぎ物を送り、中尊寺金色堂などの華麗な仏教文化を東北の地に咲かせ、半独立の王国を築いた。" },
  { id: 122, name: "厳島神社", type: "heal_round", value: 0.25, desc: "平清盛が平氏一門の氏神として厚く保護した安芸国の神社。海上に浮かぶ壮麗な寝殿造の社殿が造営され、清盛自らが書写した豪華な『平家納経』が奉納された。瀬戸内海の制海権を握り日宋貿易を推進した平氏政権の繁栄の象徴である。" },
  { id: 123, name: "平家納経", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "平清盛が一門の繁栄を祈願して厳島神社に奉納した、一族で書写した全33巻の法華経などの経巻。最高級の料紙に金銀の箔をふんだんに散らし、緻密で美しい装飾画が描かれた、平安時代末期の貴族文化の美意識の頂点を示す至宝。" },
  { id: 124, name: "扇面古写経", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "平安時代末期、扇形の紙に法華経などを書写したもの。経文の背景には、市井の職人や女性、子供など、当時の庶民の生き生きとした生活や風俗が大和絵の手法で描かれており、貴族社会だけでなく民衆生活を知る極めて貴重な視覚資料。" },
  { id: 125, name: "鳥獣人物戯画", type: "debuff_all", value: 0.30, desc: "高山寺に伝わる、平安時代後期の絵巻物。カエルやウサギなどの動物を擬人化して仏教界や貴族社会を痛烈かつユーモラスに風刺した墨線の傑作。詞書を持たず、現代の漫画やアニメのルーツとも評される、日本美術史上の特異な名作。" },
  { id: 126, name: "守護・地頭", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1185年、源頼朝が義経追討を名目に朝廷に設置を認めさせた役職。諸国に置かれた守護が警察・軍事権（大犯三カ条）を、荘園・公領に置かれた地頭が土地管理と年貢徴収権を握り、鎌倉幕府が全国を実質的に支配する決定的基盤となった。" },
  { id: 127, name: "鎌倉の館", type: "damage_cut_all", value: 0.25, desc: "鎌倉時代の武士（御家人）が、自らの所領の中に築いた居住と軍事防衛を兼ねた拠点。周囲に堀や土塁をめぐらせ、内部には「笠懸」や「犬追物」の訓練場を備え、いざ鎌倉の事態に備えて武芸を磨く「弓馬の道」の精神の源流となった。" },
  { id: 128, name: "流鏑馬", type: "buff_attr", target: "VALOR", value: 0.25, desc: "疾走する馬上から的を射抜く、鎌倉武士が鍛錬した「騎射三物」の一つ。実戦に直結する高度な武芸であるとともに、天下泰平や五穀豊穣を祈願する神事としての性格も持ち、鶴岡八幡宮の放生会などで盛大に奉納され武士の魂を象徴した。" },
  { id: 129, name: "新補率法", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "1221年の承久の乱後、幕府が没収した朝廷側の膨大な所領に新たに任命した新補地頭の収益基準を定めた法令。田畑11町につき1町の免田や、1段につき5升の加徴米などを保障し、武家政権の西国への経済的・実質的支配を決定づけた。" },
  { id: 130, name: "宝治合戦", type: "buff_attr", target: "VALOR", value: 0.30, desc: "1247年、第5代執権北条時頼を擁する安達氏らと、強大な勢力を持つ有力御家人の三浦泰村一族が鎌倉で激突した武力衝突。三浦氏の一族郎党500余名が頼朝の法華堂で自刃して滅亡し、北条氏による独裁的専制体制が完全に確立した。" },
  { id: 131, name: "引付衆", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "1249年に執権北条時頼が、御家人たちの所領をめぐる裁判（所務沙汰）を迅速かつ公正に処理するために新設した機関の役人。評定衆の下に置かれ、幕府への信頼を高めるとともに、武家法に基づく厳格な法治主義の充実をもたらした。" },
  { id: 132, name: "下地中分", type: "heal_round", value: 0.25, desc: "鎌倉時代中期以降、年貢の未納などで頻発した荘園領主と地頭との紛争の最終的な解決策。土地（下地）そのものを領主と地頭で折半し、相互の干渉を断ち切るものであり、結果的に地頭による土地の完全な私領化と荘園制の解体を促進した。" },
  { id: 133, name: "地頭請", type: "buff_hp", value: 0.20, desc: "荘園領主が現地での年貢徴収や管理を地頭に全て委任し、その代わりに毎年定額の年貢納入を契約させる制度。領主側は安定した収入を期待したが、地頭の権限が強化され、農民への直接的な支配を深めていく結果となった。" },
  { id: 134, name: "二毛作", type: "buff_all", value: 0.25, desc: "鎌倉時代に畿内や西日本を中心に普及した、同じ耕地で表作として米を、裏作として麦を年に二度栽培する画期的な農業技術。牛馬耕の普及や草木灰などの肥料の発展と相まって、中世社会の農業生産力と経済力を飛躍的に向上させた。" },
  { id: 135, name: "定期市", type: "heal_round", value: 0.25, desc: "鎌倉時代に交通の要所や寺社の門前で、月に三度（三斎市）などの決まった日に開かれた市場。年貢米の換金や手工業品の売買が盛んに行われ、宋銭が飛び交う貨幣経済の浸透と、中世の新しい流通ネットワークの形成を強力に推進した。" },
  { id: 136, name: "座", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "中世において、商工業者が天皇や貴族、大寺社の権威を頼って保護（本所）を求め、税や労役を納める代わりに製造・販売の独占権を獲得した同業組合。大山崎の油座などに代表され、中世の特権的な商業活動の絶対的な基盤となった。" },
  { id: 137, name: "問丸", type: "buff_all", value: 0.20, desc: "鎌倉時代に港や河川の要衝に発達した、商品の保管や輸送、委託販売を手がけた業者。年貢米の輸送など物流の急増を背景に成長し、のちの室町・江戸時代における巨大な問屋資本へと発展していく、中世の重要な流通拠点であった。" },
  { id: 138, name: "宋銭", type: "buff_hp", value: 0.25, desc: "日宋貿易によって中国から大量に輸入された銅銭。鎌倉時代には布や米に代わって年貢の金納化や定期市での売買決済に広く使用されるようになり、日本社会を根底から変革する貨幣経済の急速な浸透の最大の原動力となった。" },
  { id: 139, name: "永仁の徳政令", type: "debuff_all", value: 0.30, desc: "1297年、蒙古襲来後の軍役や分割相続で窮乏した御家人を救済するため、幕府が所領の売買・質入れを禁じ、無償での取り戻しを命じた法令。借金苦の武士を救うどころか経済の信用を崩壊させ、幕府の権威を致命的に失墜させた。" },
  { id: 140, name: "新古今和歌集", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "鎌倉時代初期に後鳥羽上皇の命で藤原定家らが編纂した勅撰和歌集。「幽玄」や「有心」を重んじ、余情や色彩感覚豊かな技巧的な歌風を完成させた。没落しゆく貴族階級の美意識が極限まで洗練された、中世文学の最高峰の一つ。" },
  { id: 141, name: "山家集", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "元北面の武士で出家した僧・西行の残した和歌集。諸国を漂泊しながら、桜や月などの美しい自然や、乱世を生きる人間の深い無常観を詠み上げ、その魂の叫びはのちの松尾芭蕉にまで至る日本の隠者文学に決定的な影響を与えた。" },
  { id: 142, name: "金槐和歌集", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "鎌倉幕府第3代将軍・源実朝の家集。藤原定家に和歌を学び、『万葉集』を深く研究した。貴族的な技巧に走らず、東国武士の力強さとおおらかさを表現した万葉調の独自の歌風を確立し、悲劇の将軍の研ぎ澄まされた感性を今に伝える。" },
  { id: 143, name: "平家物語", type: "buff_attr", target: "CULTURE", value: 0.40, desc: "「祇園精舎の鐘の声、諸行無常の響きあり」の書き出しで、平氏一門の栄華と滅亡を描いた軍記物語の最高傑作。盲目の琵琶法師によって平曲として全国に語り伝えられ、武士の勇猛さと仏教的な無常観を日本人の精神の奥深くに刻み込んだ。" },
  { id: 144, name: "方丈記", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "鴨長明が日野山の小さな庵（一丈四方の草庵）で執筆した随筆。「ゆく河の流れは絶えずして…」の名文で、大火や飢饉など相次ぐ天変地異や源平の争乱を克明に記録し、現世の執着を捨てる隠遁思想と深い無常観を見事に描き出した。" },
  { id: 145, name: "徒然草", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "鎌倉末期に兼好法師（吉田兼好）が著した随筆。「つれづれなるまゝに」で始まり、鋭い人間観察や人生論、深い古典の教養に基づく美意識を、滑稽味を交えながら自由に綴った。日本の随筆文学の最高傑作として後世に多大な影響を与えた。" },
  { id: 146, name: "愚管抄", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "鎌倉時代初期に天台座主の慈円が著した歴史書。神武天皇からの日本の歴史を、仏教的な「道理」という概念を用いて初めて体系的に解釈した。武士の台頭をも歴史の必然（道理）と捉え、公武協調による政治の安定を強く主張した。" },
  { id: 147, name: "金沢文庫", type: "buff_all", value: 0.25, desc: "鎌倉時代中期に北条実時が武蔵国称名寺に設立した、日本初の武家による本格的な私設図書館。政治、文学、仏教など膨大な和漢の古典籍を収集し、武士の豊かな教養を高めるとともに、中世の最高水準の学問の拠点として機能した。" },
  { id: 148, name: "東大寺南大門", type: "damage_cut_all", value: 0.30, desc: "平重衡の南都焼討で焼失した後、大勧進の重源によって再建された巨大な門。南宋から導入された、太い柱と水平の貫を多用する力強い「大仏様（天竺様）」の建築様式を採用し、鎌倉時代の質実剛健な武家文化の気風を象徴している。" },
  { id: 149, name: "金剛力士像", type: "buff_attr", target: "VALOR", value: 0.35, desc: "東大寺南大門に安置された、運慶・快慶らが率いる慶派仏師の集団によってわずか69日で造立された高さ8メートルを超える巨大な木彫の阿吽の像。躍動する筋肉と激しい怒りの表情は、鎌倉彫刻の写実的でダイナミックな極致である。" },
  { id: 150, name: "似絵", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "藤原隆信・信実父子によって完成された、対象となる人物の顔立ちや個性を極めてリアルに描写する鎌倉時代の肖像画の技法。「伝源頼朝像」に代表され、形式にとらわれず個人の本質を描き出そうとする当時の写実主義的傾向を示す。" },
  { id: 151, name: "蒙古襲来絵詞", type: "buff_attr", target: "VALOR", value: 0.30, desc: "肥後国の御家人・竹崎季長が、文永・弘安の役における自身の奮戦ぶりと恩賞獲得の経緯を子孫に伝えるために描かせた絵巻物。元軍の戦法や「てつはう」の威力、そして武士の生々しい戦闘の実態を正確に伝える第一級の歴史史料。" },
  { id: 152, name: "選択本願念仏集", type: "heal_round", value: 0.30, desc: "法然が九条兼実の求めに応じて著した浄土宗の根本聖典。数ある仏教の修行の中で「南無阿弥陀仏」と念仏を唱えること（専修念仏）こそが、末法の世においてすべての人が極楽往生できる唯一の道であると理論的に力強く宣言した。" },
  { id: 153, name: "教行信証", type: "heal_round", value: 0.30, desc: "親鸞が著した浄土真宗の根本聖典。阿弥陀仏の本願力を絶対的に信じる「絶対他力」の思想と、煩悩にまみれた人間こそが救済の対象であるとする「悪人正機」の教えを体系化し、日本の民衆仏教に最も深い精神的革命をもたらした。" },
  { id: 154, name: "立正安国論", type: "debuff_all", value: 0.30, desc: "日蓮が執権北条時頼に提出した過激な建白書。法華経以外の他宗を邪教として痛烈に批判し、正しい法華経の信仰を国教としなければ他国からの侵略（他国侵逼難）が起こると予言した。のちの蒙古襲来を的中させ、烈しい法難を招いた。" },
  { id: 155, name: "正法眼蔵", type: "damage_cut_all", value: 0.30, desc: "道元が著した曹洞宗の根本聖典。権力から離れてひたすら坐禅に打ち込むこと（只管打坐）自体がすでに悟りの姿であると説く、極めて深く難解な哲学書。武士だけでなく、生き方に厳しさを求める人々に時代を超えて読み継がれている。" },
  { id: 156, name: "建武の新政", type: "buff_all", value: 0.30, desc: "鎌倉幕府滅亡後、後醍醐天皇が開始した天皇親政。武家政治を否定し、公家と武家を統合する理念を掲げて綸旨を絶対視したが、恩賞の不公平や性急な改革が武士の激しい反発を招き、足利尊氏の離反によってわずか数年で崩壊した。" },
  { id: 157, name: "半済令", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "1352年、室町幕府が軍費調達のため、近江・美濃・尾張の荘園・公領の年貢の半分を兵糧として徴収する権限を守護に与えた法令。のちに永続的かつ全国に拡大され、守護が土地そのものを侵略し「守護大名」へと成長する決定的契機となった。" },
  { id: 158, name: "守護大名", type: "buff_attr", target: "VALOR", value: 0.35, desc: "室町時代に、幕府から与えられた権限（半済令や使節遵行権など）を利用して、一国全体の荘園・公領を横領し、国人などの武士を直接の家臣に組み込んで領国を強固に支配するようになった強大な権力者。応仁の乱の主役となる。" },
  { id: 159, name: "惣村", type: "heal_round", value: 0.25, desc: "南北朝時代以降、畿内を中心に発達した農民の強力な自治的村落。宮座を中心とする祭祀で結束し、寄合を開いて惣掟を定め、自ら警察権（地下検断）を行使し、領主と対等に交渉するまでに成長して、のちの土一揆の強固な基盤となった。" },
  { id: 160, name: "寄合", type: "buff_all", value: 0.20, desc: "惣村の農民たちが神社の境内などに集まり、村の規約（惣掟）の制定や違反者の処罰、用水や入会地の管理、領主への年貢の交渉（地下請）など、村の重要な問題を合議で決定した自治的な会議。中世農民の民主的な運営の象徴。" },
  { id: 161, name: "惣掟", type: "damage_cut_all", value: 0.25, desc: "惣村の寄合で農民たちが自ら定めた、村の生活と秩序を守るための自治的な法律（村掟）。山野の利用規定や窃盗・乱暴者の処罰（地下検断）などを厳格に定め、村八分などの制裁を伴って、領主の干渉を排除する強力な自衛手段となった。" },
  { id: 162, name: "地下請", type: "buff_hp", value: 0.25, desc: "惣村が村全体として領主に納める年貢の額を交渉して請け負う制度（百姓請）。領主側の役人の立ち入りや不正な搾取を排除できるため、村の自治と独立性を飛躍的に高め、農民の経済的な成長を力強く後押しした。" },
  { id: 163, name: "土一揆", type: "debuff_all", value: 0.35, desc: "室町時代に、惣村の強力な団結を基盤として、農民たちが馬借や地侍と結びつき、徳政（借金の帳消し）などを求めて土倉や酒屋、寺院を武力で襲撃した大暴動。「正長の徳政一揆」以降頻発し、幕府の権威を根底から揺るがした。" },
  { id: 164, name: "勘合符", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "日明貿易（朝貢貿易）において、正式な貿易船であることを証明するために明から与えられた割符。倭寇などの海賊船と区別するために使用され、この札を持つ船だけが莫大な利益をもたらす公式な貿易を行うことが許された。" },
  { id: 165, name: "倭寇", type: "debuff_all", value: 0.30, desc: "13世紀から16世紀にかけて、朝鮮半島や中国の沿岸部を荒らし回った海賊や密貿易商人の集団。前期は対馬や松浦などの日本人が主体であったが、後期は中国人の密貿易業者が中心となり、東アジアの国際関係を大きく脅かした。" },
  { id: 166, name: "馬借", type: "buff_attr", target: "VALOR", value: 0.20, desc: "室町時代に大津や坂本などの交通の要所で活躍した、馬を利用した陸上運送業者。強力な団結力を持ち、商品の流通を担うだけでなく、その機動力と組織力を活かして土一揆の際には先頭に立って蜂起し、権力に激しく抵抗した。" },
  { id: 167, name: "土倉", type: "heal_round", value: 0.25, desc: "室町時代に発達した、質物を預かって高利で金を貸し付けた金融業者（高利貸）。莫大な富を蓄積したため、幕府の重要な課税対象（土倉役）とされた一方で、借金に苦しむ農民らが起こす徳政一揆の標的となり、たびたび襲撃され破壊された。" },
  { id: 168, name: "割符", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "室町時代に遠隔地との取引で広く用いられた為替手形の一種。大量の銅銭を直接輸送する危険を避けるために考案され、大商業都市間の巨大な商取引を安全かつ円滑にし、中世の信用経済を飛躍的に発展させた画期的な金融技術。" },
  { id: 169, name: "明銭", type: "buff_hp", value: 0.30, desc: "日明貿易によって中国から大量に輸入された「永楽通宝」などの銅銭。室町時代の日本全国に広く流通し、農民の年貢の金納化や商業取引を支える基軸通貨として、日本経済の本格的な貨幣経済への移行を決定づけた。" },
  { id: 170, name: "撰銭令", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "室町時代に流通した私鋳銭などの粗悪な銭（鐚銭）を商人が受け取り拒否する「撰銭」が経済を混乱させたため、幕府や戦国大名が特定の銭の流通を強制し、交換比率を定めた法令。中世の激しい通貨混乱に対処する苦肉の策であった。" },
  { id: 171, name: "神皇正統記", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "南北朝時代に南朝の重臣・北畠親房が小田城で執筆した歴史書。神代から続く天皇の歴史を振り返り、三種の神器を持つ南朝こそが正統な天皇であると強烈に主張。南朝軍の精神的支柱となり、後世の尊王思想に決定的な影響を与えた。" },
  { id: 172, name: "太平記", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "後醍醐天皇の討幕計画から建武の新政、南北朝の動乱という激動の時代を、南朝に同情的な視点から描いた全40巻の壮大な軍記物語。琵琶法師や太平記読みによって広く語られ、楠木正成らの悲劇的な英雄像を日本人の心に刻み込んだ。" },
  { id: 173, name: "庭訓往来", type: "buff_all", value: 0.20, desc: "室町時代に広く普及した、書簡形式の教科書（往来物）。武士や庶民の子弟が寺子屋などで読み書きを学ぶために用いられ、日常生活に必要な単語や手紙の作法、社会の一般常識を教える、中世の教育の根幹をなす大ベストセラー。" },
  { id: 174, name: "五山文学", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "室町時代に京都・鎌倉の五山を中心とする禅僧たちによって創作された、極めて格調高い漢詩文の総称。絶海中津や義堂周信らが宋・元の最先端の文化を取り入れて大成させ、幕府の外交文書の起草など政治的にも多大な役割を果たした。" },
  { id: 175, name: "銀閣", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "室町幕府8代将軍・足利義政が東山に造営した山荘・慈照寺の象徴的な楼閣。下層の書院造と上層の禅宗様が見事に調和し、侘び・寂びや幽玄を重んじる簡素で精神性の高い東山文化の極致を示す、日本建築史上の国宝。" },
  { id: 176, name: "書院造", type: "heal_round", value: 0.25, desc: "室町時代に成立した武家住宅の建築様式。床の間、違い棚、付書院、明かり障子を備え、畳を敷き詰めた座敷を中心とする。銀閣の「東求堂同仁斎」に代表され、現代に至る日本の伝統的な和風住宅の原型を完成させた。" },
  { id: 177, name: "枯山水", type: "damage_cut_all", value: 0.30, desc: "室町時代に禅宗の精神を表現して発展した庭園様式。水を用いず、白砂と石組みだけで大自然の風景や宇宙の真理を象徴的に表現する。龍安寺の石庭や大徳寺大仙院庭園など、極限まで無駄を削ぎ落とした静寂の美学を誇る。" },
  { id: 178, name: "水墨画", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "鎌倉時代に禅宗とともに中国から伝来し、室町時代に大成された絵画。色彩を捨てて墨の濃淡と線の強弱だけで自然や精神の奥深さを表現する。雪舟によって日本独自の画風が完成され、東山文化の幽玄の美を視覚的に象徴する芸術。" },
  { id: 179, name: "瓢鮎図", type: "debuff_all", value: 0.25, desc: "室町幕府4代将軍・足利義持の命により、画僧・如拙が描いた初期水墨画の最高傑作。「ぬるぬるしたなまずを、丸いひょうたんで捕まえられるか」という禅の公案（禅問答）をユーモラスに描き出し、当時の禅の精神と知的遊戯を伝える。" },
  { id: 180, name: "能楽", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "室町時代初期に、観阿弥・世阿弥父子が足利義満の厚い庇護を受けて、猿楽に田楽のリズムなどを取り入れ、高度な演劇芸術として大成させた舞台芸術。「幽玄」の美を極限まで追求し、武家社会の最も格式高い式楽として完成した。" },
  { id: 181, name: "風姿花伝", type: "buff_all", value: 0.25, desc: "世阿弥が著した能楽の理論書であり、日本最古の演劇論。「秘すれば花」など、演技の極意や役者の心構え、年齢に応じた修行法を深く説き、能を単なる芸能から哲学的な芸術の域へと高めた、現代の演劇人にも読み継がれるバイブル。" },
  { id: 182, name: "狂言", type: "heal_round", value: 0.20, desc: "能の合間に演じられる、室町時代の大衆的な喜劇。日常の庶民生活や人間の愚かさ、大名と太郎冠者の滑稽なやり取りなどを、軽妙なセリフと笑いを通じて風刺的に描き出し、重厚な能の緊張感を和らげる役割を果たした。" },
  { id: 183, name: "侘茶", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "村田珠光が禅の精神を取り入れて創始し、武野紹鴎を経て、千利休によって大成された茶の湯。豪華な唐物を誇示する闘茶を否定し、極小の茶室で簡素な道具を用い、内面的な精神の深まりと静寂の美（わび・さび）を極限まで追求した。" },
  { id: 184, name: "御伽草子", type: "buff_all", value: 0.20, desc: "室町時代から江戸時代初期にかけて庶民の間で広く読まれた短編の絵入り物語。「一寸法師」や「浦島太郎」、「鉢かづき」など、勧善懲悪や立身出世、奇想天外な伝説を主題とし、文字の読めない層にも絵語りとして親しまれた大衆文学。" },
  { id: 185, name: "盆踊り", type: "heal_round", value: 0.25, desc: "室町時代に流行した風流踊りと念仏踊りが融合し、お盆の時期に祖先の霊を慰めるために村人たちが集まって踊るようになった大衆芸能。身分を超えて華やかな衣装で熱狂的に踊られ、農村の惣の連帯感を強める重要な娯楽行事であった。" },
  { id: 186, name: "戦国大名", type: "buff_attr", target: "VALOR", value: 0.35, desc: "応仁の乱後の下克上の乱世において、守護代や国人、さらには一介の素浪人から実力で成り上がり、旧来の幕府や守護の権威を完全に否定して、自らの力で独自の領国を切り取り、強力に支配した自立的な絶対的権力者たち。" },
  { id: 187, name: "分国法", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "戦国大名が自らの領国を統治するために独自に制定した法律（家法）。『甲州法度之次第』などに代表され、喧嘩両成敗の原則や家臣の統制、領民の保護などを厳格に規定し、領国内の治安維持と富国強兵を強力に推進した。" },
  { id: 188, name: "指出検地", type: "buff_hp", value: 0.25, desc: "戦国大名が、家臣や寺社、農民に対して、自らが所有する土地の面積や収穫高（貫高）を自己申告させた土地調査。領内の経済力を把握し、家臣に対する軍役の割り当てや農民への課税を明確にするための、戦国期の重要な領国支配策。" },
  { id: 189, name: "城下町", type: "buff_hp", value: 0.30, desc: "戦国大名が防衛と領国統治の拠点として築いた城郭を中心に、家臣団を強制的に集住させ、さらに商工業者（町人）を保護・誘致して計画的に建設した都市。大名の権力の象徴であり、近世の都市発展の最大の基盤となった。" },
  { id: 190, name: "石見銀山", type: "buff_hp", value: 0.35, desc: "戦国時代に開発され、灰吹法の導入により世界有数の産出量を誇った大銀山。大内・尼子・毛利氏らの間で激しい争奪戦が繰り広げられ、ここで産出された莫大な銀は南蛮貿易の決済に用いられ、世界経済に多大な影響を与えた。" },
  { id: 191, name: "灰吹法", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "16世紀前半に博多商人・神屋寿禎によって朝鮮から石見銀山に導入された、画期的な金銀の精錬技術。鉛を用いて鉱石から純度の高い銀を大量に抽出することを可能にし、日本の銀生産量を爆発的に飛躍させ、戦国大名の財政を支えた。" },
  { id: 192, name: "南蛮貿易", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "16世紀半ば以降、ポルトガル人やスペイン人（南蛮人）との間で行われた貿易。鉄砲や火薬、生糸などの貴重な物資をもたらし、戦国大名は富と強大な軍事力を得るためにこれを保護したが、同時にキリスト教の布教という政治的摩擦も生んだ。" },
  { id: 193, name: "キリシタン版", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "宣教師ヴァリニャーノがもたらした活版印刷機により、長崎や天草などで印刷・出版された書物（天草版）。『日葡辞書』やローマ字書きの『平家物語』などがあり、キリスト教の布教だけでなく、当時の日本語の発音を知る極めて貴重な史料。" },
  { id: 194, name: "天正遣欧使節", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "1582年、九州のキリシタン大名の名代として、ヴァリニャーノの勧めでローマ教皇のもとへ派遣された4人の少年使節。ヨーロッパ各地で熱狂的な大歓迎を受け、活版印刷機などを持ち帰り、日本と西洋の架け橋となる歴史的偉業を成し遂げた。" },
  { id: 195, name: "安土城", type: "buff_hp", value: 0.35, desc: "織田信長が天下布武の拠点として琵琶湖畔に築いた、日本初の本格的な高層の天主を持つ壮大な城郭。石垣の上にそびえる五層七重の天主の内部は狩野永徳の金碧障壁画で飾られ、信長の絶対的な権威と桃山文化の開幕を象徴した。" },
  { id: 196, name: "大坂城", type: "buff_hp", value: 0.40, desc: "豊臣秀吉が石山本願寺の跡地に築城し、天下統一の巨大な本拠地とした城郭。難攻不落の堀と石垣、金箔瓦で飾られた豪華絢爛な天守を持ち、城下町には全国の豪商を集め、天下人としての秀吉の莫大な富と絶大な権力を誇示した。" },
  { id: 197, name: "聚楽第", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "豊臣秀吉が京都の内野に造営した政庁兼邸宅。1588年に後陽成天皇の行幸を仰いで諸大名に忠誠を誓わせ、自らの権威が天皇に次ぐ最高のものであることを世に知らしめた、絢爛豪華な桃山文化の舞台。のちに秀次切腹に伴い破却された。" },
  { id: 198, name: "刀狩令", type: "debuff_all", value: 0.35, desc: "1588年、豊臣秀吉が方広寺大仏造営を口実として、全国の農民から刀や槍、鉄砲などの武器を没収した法令。農民の武装蜂起（一揆）を封じ込めて農業への専念を強制し、武士と農民の身分を明確に切り離す「兵農分離」を決定づけた。" },
  { id: 199, name: "石高制", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "太閤検地によって確立された、土地の生産力を米の収穫量（石高）で統一的に表示する画期的な制度。これにより、農民への年貢の賦課や大名・家臣への知行（軍役）の基準が全国一律で明確化され、江戸時代まで続く強固な支配の土台となった。" },
  { id: 200, name: "バテレン追放令", type: "debuff_all", value: 0.30, desc: "1587年、豊臣秀吉が九州平定の直後に突然発布したキリスト教宣教師の国外退去命令。神社仏閣の破壊やポルトガル人による日本人の奴隷売買に激怒したためとされ、南蛮貿易は維持しつつも布教を禁じるという厳しい統制政策の始まり。" },
  { id: 201, name: "朱印船", type: "buff_hp", value: 0.30, desc: "江戸時代初期、幕府から公式な海外渡航許可証である「朱印状」を与えられて東南アジアへ渡航した貿易船。角倉了以などの豪商や西国大名が派遣し、生糸などを輸入して莫大な利益を上げ、各地に日本町を形成する海外進出の象徴となった。" },
  { id: 202, name: "障壁画", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "桃山時代に城郭や寺院の襖、壁、屏風などに描かれた巨大な絵画。狩野永徳などに代表される、金箔を背景に濃密な色彩で描かれた「金碧障壁画」は、大名たちの権力と富を誇示する、豪壮で華麗な桃山文化の最も象徴的な芸術作品。" },
  { id: 203, name: "唐獅子図屏風", type: "buff_attr", target: "VALOR", value: 0.35, desc: "狩野永徳が描いたとされる、巨大な画面に力強い二頭の獅子を描いた金碧障壁画の最高傑作。その圧倒的な迫力と躍動感は、戦国を生き抜いた武将たちの力強い気風や、天下人の絶対的な権威と豪壮なエネルギーを余すところなく表現している。" },
  { id: 204, name: "松林図屏風", type: "damage_cut_all", value: 0.30, desc: "長谷川等伯が描いた、日本の水墨画の最高傑作とされる国宝の屏風絵。荒々しい筆致で松林のみを描き、余白を生かして霧に包まれた日本の湿潤な空気や静寂さ、奥深い幽玄の世界を見事に表現し、華美な金碧画に対抗する深い精神性を示した。" },
  { id: 205, name: "洛中洛外図屏風", type: "buff_all", value: 0.25, desc: "京都の市街地（洛中）と郊外（洛外）のパノラマ風景に、名所や四季の行事、そして生き生きと暮らす様々な身分の人々の風俗を詳細に描き込んだ屏風絵。狩野永徳の描いた上杉本などが有名であり、室町から桃山期の都市の繁栄を知る貴重な史料。" },
  { id: 206, name: "南蛮屏風", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "桃山時代に流行した、南蛮船の長崎への入港や、ポルトガル人・宣教師たちの異国情緒あふれる風俗を題材に描いた屏風絵。西洋文明との出会いに対する当時の日本人の驚きと強い好奇心を、和洋折衷の華やかな色彩で見事に表現している。" },
  { id: 207, name: "濃姫の小袖", type: "heal_round", value: 0.20, desc: "桃山時代に武家や裕福な町人の女性の間で一般化した、袖口が狭い衣服（小袖）。絞り染めや金銀の刺繍などの高度な染織技術が駆使され、着物そのものが自己主張の強いキャンバスとなり、現代の和服（着物）の直接の原点となった。" },
  { id: 208, name: "妙喜庵待庵", type: "damage_cut_all", value: 0.30, desc: "千利休が造営したと伝えられる、現存する日本最古の茶室建築（国宝）。広さはわずか二畳で、土壁やにじり口を備え、一切の装飾を削ぎ落とした極小の空間に、極限の緊張感と静寂を生み出す「わび茶」のストイックな精神が凝縮されている。" },
  { id: 209, name: "かぶき踊り", type: "buff_all", value: 0.25, desc: "安土桃山時代の末に、出雲阿国が京都で創始して大流行した芸能。異性装や派手な衣装、念仏踊りに劇的な要素を取り入れた奇抜でエネルギッシュな舞踊であり、江戸時代を通じて庶民を熱狂させる「歌舞伎」へと発展する偉大な原点。" },
  { id: 210, name: "三味線", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "16世紀半ばに琉球から伝来した「三線」を改良し、蛇皮の代わりに猫や犬の皮を張った弦楽器。その情念をかき立てる独特の音色は、浄瑠璃や歌舞伎、小唄などの伴奏として欠かせないものとなり、近世の庶民音楽を劇的に発展させた。" },
  { id: 211, name: "浄瑠璃", type: "heal_round", value: 0.25, desc: "室町時代の『浄瑠璃十二段草子』の語りに端を発し、三味線の伴奏に合わせて物語をドラマチックに語る音曲。のちに操り人形と結合して「人形浄瑠璃」となり、近松門左衛門の名作の数々を生み出して、江戸時代の大衆演劇の華となった。" },
  { id: 212, name: "参勤交代", type: "debuff_all", value: 0.35, desc: "1635年に徳川家光が武家諸法度で制度化した、大名に対し1年おきに江戸と領国を往復させる絶対的な統制制度。妻と子を人質として江戸に置き、莫大な旅費と江戸滞在費を大名に負担させることで、反乱の力を削ぎ落とし幕府の権力を盤石にした。" },
  { id: 213, name: "幕領", type: "buff_hp", value: 0.35, desc: "江戸幕府が直接支配した約400万石に及ぶ広大な直轄地（天領）。江戸・京都・大坂の三都や長崎などの重要都市、佐渡金山などの主要鉱山を完全に独占し、幕府の圧倒的な経済基盤となって、諸大名を圧倒する絶対的権力を支え続けた。" },
  { id: 214, name: "旗本・御家人", type: "buff_attr", target: "VALOR", value: 0.30, desc: "将軍に直接仕え、石高1万石未満の幕臣たち。将軍にお目見えできる上級の「旗本」と、お目見えできない下級の「御家人」からなり、その強固な軍事力と官僚としての行政能力が、江戸幕府の中央集権的な支配体制の強力な手足となった。" },
  { id: 215, name: "禁中並公家諸法度", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1615年に徳川家康らが朝廷や公家の行動を厳しく制限するために制定した法律。「天皇の第一の務めは学問である」と規定し、朝廷から政治的実権を完全に奪い去り、幕府の絶対的な支配下に天皇と朝廷を封じ込めるための決定的な足かせ。" },
  { id: 216, name: "寺請制度", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "江戸幕府がキリシタンを徹底的に弾圧するため、すべての民衆を強制的に地元の寺院の檀家（門徒）として登録させた制度。寺院に住民の戸籍管理や身分証明（寺請証文）を行わせることで、仏教寺院を幕府の末端の行政機関として完全に利用した。" },
  { id: 217, name: "宗門改帳", type: "debuff_all", value: 0.25, desc: "寺請制度に基づいて、各村の庄屋が住民一人ひとりの所属寺院や家族構成を詳細に記録して幕府に提出した帳簿。本来のキリシタン摘発の目的を超え、事実上の全国民の戸籍・租税台帳として機能し、江戸時代の徹底した民衆支配の根幹となった。" },
  { id: 218, name: "踏絵", type: "debuff_all", value: 0.30, desc: "幕府がキリシタンを見つけ出すために、キリストやマリアの描かれた銅版（踏み絵）を人々に踏ませた苛烈な思想統制の儀式。拒んだ者は拷問や処刑の対象となり、長崎などで毎年実施され、潜伏キリシタンを精神的に深く追いつめた。" },
  { id: 219, name: "出島", type: "heal_round", value: 0.25, desc: "鎖国体制下の長崎港に築かれた扇形の人工島。オランダ商館が置かれ、厳しい監視の下で日本とヨーロッパを結ぶ唯一の公式な窓口となった。ここを通じて西洋の近代的な科学や医学（蘭学）が日本にもたらされ、近代化への細い生命線となった。" },
  { id: 220, name: "朝鮮通信使", type: "buff_all", value: 0.25, desc: "豊臣秀吉の出兵で断絶した国交を徳川家康が回復し、将軍の代替わりごとに朝鮮から日本へ派遣された大規模な修好使節団。儒教の教養豊かな使節団は江戸へ向かう道中で日本の文人たちと盛んに交流し、平和と東アジアの国際交流の象徴となった。" },
  { id: 221, name: "オランダ風説書", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "オランダ船が長崎に入港するたびに、商館長（カピタン）に義務付けられた海外情勢の報告書。鎖国下において幕府がヨーロッパの政治情勢や戦争などの最新の世界の動向を正確に把握するための、唯一にして極めて重要な情報源であった。" },
  { id: 222, name: "本百姓", type: "buff_hp", value: 0.30, desc: "検地帳に登録されて田畑と屋敷を持ち、幕府や大名に年貢などの重い租税を直接負担した、江戸時代の農村社会の中核をなす自立した農民。村政に参加する権利を持ち、彼らの安定した農業労働こそが幕藩体制の経済基盤を決定的に支えていた。" },
  { id: 223, name: "五人組", type: "damage_cut_all", value: 0.30, desc: "幕府が数戸の農家を1組として編成した隣保組織。年貢の納入や治安維持、キリシタンの摘発などにおいて極めて厳しい連帯責任（連座）を負わせ、互いに監視し合うことで、農民の逃亡や犯罪を防ぐための最も効果的な末端支配システム。" },
  { id: 224, name: "備中鍬", type: "buff_hp", value: 0.20, desc: "江戸時代に発明され広く普及した、刃先が三つまたは四つに分かれた鉄製の鍬。深く固い土を効率よく深く掘り返す（深耕）ことが可能になり、労働力を劇的に軽減するとともに、全国的な農業生産力の飛躍的な向上をもたらした大発明。" },
  { id: 225, name: "千歯扱", type: "buff_all", value: 0.25, desc: "元禄期に考案された、多数の鉄歯を櫛状に並べた画期的な脱穀用農具。従来の扱箸に比べて作業能率が爆発的に向上し、あまりの便利さに後家（未亡人）の仕事を奪うとして「後家倒し」の異名をとった、農業技術革命の象徴。" },
  { id: 226, name: "唐箕", type: "heal_round", value: 0.20, desc: "中国から伝来した、手回しのハンドルで風を起こして籾殻や塵を吹き飛ばし、重い玄米だけを選別する効率的な農具。千歯扱や千石簁と並んで、江戸時代の収穫・調整作業にかかる多大な労力を飛躍的に省力化した革新的な道具。" },
  { id: 227, name: "干鰯", type: "buff_hp", value: 0.25, desc: "イワシを乾燥させて作った金肥（購入肥料）。非常に強い即効性の肥料効果を持ち、上方を中心に木綿や菜種などの商品作物の大規模な栽培に不可欠なものとして大量に消費され、網元による大規模な地引網漁などの漁業の発展も強く促した。" },
  { id: 228, name: "金肥", type: "buff_hp", value: 0.30, desc: "干鰯や油粕など、農民がお金を払って購入する強力な商品肥料。自給肥料（草木灰など）の限界を突破して商品作物の爆発的な生産を可能にしたが、同時に肥料代の負担が農民の貨幣経済への巻き込みと貧富の格差拡大（階層分化）を加速させた。" },
  { id: 229, name: "菱垣廻船", type: "heal_round", value: 0.25, desc: "江戸時代前期から活躍した、大坂から江戸へと日用品（木綿、油、醤油など）を大量に輸送した大型の定期貨物船。船体両舷のひし形に組まれた垣根が特徴。天下の台所・大坂と大消費地・江戸を結ぶ大動脈として、国内の物流ネットワークを完成させた。" },
  { id: 230, name: "樽廻船", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "江戸時代中期に、菱垣廻船から独立して伊丹や灘の高級な酒を専門に江戸へ高速輸送した廻船。のちに酒以外の商品も運ぶようになり、スピードと安さを武器に菱垣廻船を圧倒し、南海路の海上輸送の絶対的な主役として君臨した。" },
  { id: 231, name: "北前船", type: "buff_all", value: 0.30, desc: "江戸時代中期以降、日本海を航行して北海道（蝦夷地）と大坂を、下関経由（西廻り海運）で結んだ長距離の買積船。各寄港地で商品を安く買い、高く売ることで莫大な利益を生み出し、上方と東北・蝦夷の経済を力強く直結させた「動く総合商社」。" },
  { id: 232, name: "蔵屋敷", type: "buff_hp", value: 0.30, desc: "諸藩が年貢米や国元の特産物（蔵物）を売却して現金化するために、大坂や江戸の川沿いなどに設けた巨大な倉庫兼取引所。大坂には各藩の蔵屋敷が立ち並び、蔵元や掛屋といった御用商人が暗躍し、「天下の台所」を象徴する経済の中心地となった。" },
  { id: 233, name: "堂島米市場", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "大坂の堂島に設けられた、幕府公認の世界初とも言われる本格的な先物取引を行う米市場。ここで決まる米の価格（相場）は全国の米価の絶対的な基準となり、幕府や諸藩の財政、さらには日本経済全体を左右する強大な影響力を持った。" },
  { id: 234, name: "株仲間", type: "damage_cut_all", value: 0.30, desc: "江戸時代に幕府や諸藩から特権（株）を公認された商工業者の強力な同業組合。営業の独占を許される代わりに運上や冥加などの税を納め、幕府は彼らを利用して物価の統制や流通の支配を図った。田沼意次によって積極的に公認され奨励された。" },
  { id: 235, name: "慶安御触書", type: "debuff_all", value: 0.25, desc: "1649年に幕府が出したとされる、農民の生活の隅々にまで干渉した有名な法令。農業への専念を命じ、酒や茶の購入を戒めるなど徹底した倹約を強要した。年貢を確実に徴収するため、農民を土地に縛り付け、その生活を極限まで統制しようとした象徴。" },
  { id: 236, name: "生類憐みの令", type: "debuff_all", value: 0.30, desc: "5代将軍・徳川綱吉が発布した、極端な動物愛護を強要する前代未聞の法令群。犬だけでなく鳥や魚、虫に至るまで殺生を厳禁し、違反者は容赦なく死刑や流罪に処されたため、天下の悪法として江戸の民衆を極度の恐怖と苦痛に陥れた。" },
  { id: 237, name: "享保の改革", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "8代将軍・徳川吉宗が断行した幕政改革。新田開発や定免法の採用による年貢増徴、質素倹約、公事方御定書の制定、足高の制による人材登用など、実質的で合理的な政策を矢継ぎ早に展開し、破綻寸前だった幕府財政を見事に再建した「米将軍」の偉業。" },
  { id: 238, name: "定免法", type: "buff_hp", value: 0.30, desc: "享保の改革で採用された、豊作・凶作に関わらず、過去の数年間の平均から一定の年貢率を定めて毎年徴収する冷酷な税制。毎年の検見（作柄調査）の手間を省き、幕府に安定かつ強引な年貢の増収をもたらしたが、不作時の農民を極度の窮地に追いやった。" },
  { id: 239, name: "公事方御定書", type: "damage_cut_all", value: 0.30, desc: "徳川吉宗の命で編纂された、幕府の裁判や刑罰の厳格な基準となる基本法典。判例に基づいて刑罰を客観的に定めたことで、奉行による恣意的な裁判を防ぎ、江戸幕府の司法制度を確立した。のちに「御百箇条」と呼ばれて長らく幕府の極秘の法律とされた。" },
  { id: 240, name: "寛政の改革", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "老中・松平定信が天明の飢饉後の混乱を立て直すために断行した、極端に厳格な幕政改革。徹底した倹約令、旧里帰農令、棄捐令による旗本救済、寛政異学の禁による朱子学の強制など、強圧的な復古政策により一時的に秩序は回復したが、民衆の猛反発を買った。" },
  { id: 241, name: "旧里帰農令", type: "heal_round", value: 0.25, desc: "寛政の改革において、江戸に流入した無宿人や出稼ぎ農民に対し、旅費や農具代を与えて強制的に故郷の農村へ帰ることを奨励した政策。荒廃した農村の労働力を回復させ、同時に江戸の治安悪化を防ぐという一石二鳥を狙った苦肉の策。" },
  { id: 242, name: "天保の改革", type: "debuff_all", value: 0.30, desc: "老中・水野忠邦が幕藩体制の深刻な危機を打開するために強行した最後の幕政改革。株仲間の解散や人返しの法、徹底した風俗統制など極端な強権策を次々と打ったが、大名や旗本の領地を取り上げる上知令の失敗により、わずか2年余りで頓挫した。" },
  { id: 243, name: "人返しの法", type: "debuff_all", value: 0.25, desc: "天保の改革において水野忠邦が出した、農民の江戸への出稼ぎを一切禁止し、すでに江戸にいる農民も強制的に戸籍のある村へ送り返すという非情な法令。農村の荒廃を防ぎ年貢を確保するための政策であったが、実情に合わず失敗に終わった。" },
  { id: 244, name: "元禄文化", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "17世紀後半から18世紀初め、上方（京都・大坂）の豊かな経済力を背景に、裕福な町人たちを中心に花開いた上方町人文化。近松門左衛門の浄瑠璃、井原西鶴の浮世草子、松尾芭蕉の俳諧など、人間のありのままの欲望や感情を描く傑作が次々と誕生した。" },
  { id: 245, name: "浮世草子", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "井原西鶴が創始した、元禄期を代表する町人向けの娯楽小説。武士の道徳ではなく、金銭への執着（町人物）や男女の愛欲（好色物）など、江戸時代の町人たちの現実の姿と喜怒哀楽を極めて写実的かつ滑稽に描き出し、爆発的な人気を博した。" },
  { id: 246, name: "俳諧", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "連歌から派生し、松尾芭蕉によって芸術の域（蕉風）へと高められた五・七・五の短詩型文学。俗語を取り入れた滑稽さから出発し、自然の美しさや人間の孤独感を「わび・さび」の美意識で見事に表現し、江戸時代の庶民に最も愛された文学。" },
  { id: 247, name: "化政文化", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "19世紀前半の文化・文政期を中心に、爛熟した江戸の町人（庶民）を主体として発展した退廃的かつ洗練された大衆文化。滑稽本や人情本、錦絵（浮世絵版画）、歌舞伎が隆盛を極め、皮肉や風刺、享楽的な空気が都市を覆い尽くした。" },
  { id: 248, name: "錦絵", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "江戸時代中期に鈴木春信らによって創始された、多色刷りの極めて美しい浮世絵版画。歌麿の美人画、写楽の役者絵、北斎や広重の風景画など、江戸の庶民の娯楽として大量に印刷・消費され、のちにヨーロッパの印象派にも絶大な衝撃を与えた。" },
  { id: 249, name: "蘭学", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "江戸時代中期以降、オランダ語を通じて西洋の医学、天文学、物理学などを研究した学問。『解体新書』の翻訳を皮切りに杉田玄白や大槻玄沢らによって体系化され、鎖国下の日本に近代科学の光をもたらし、幕末の開国への決定的な思想的準備となった。" },
  { id: 250, name: "寺子屋", type: "buff_all", value: 0.30, desc: "江戸時代に全国の町や農村に爆発的に普及した、庶民の子供向けの初等教育機関。町人や僧侶が教師となり、「読み・書き・そろばん」などの実用的な知識を教え、日本の識字率を世界最高水準に押し上げ、近代化を支える極めて高い教育的土壌を作った。" },
  { id: 251, name: "異国船打払令", type: "debuff_all", value: 0.35, desc: "1825年に幕府が出した、日本沿岸に接近する外国船を理由を問わず無差別に砲撃して追い返すよう命じた極めて強硬な鎖国政策（無二念打払令）。しかしモリソン号事件などで国際的な批判を浴び、アヘン戦争での清の敗北を知って撤回を余儀なくされた。" },
  { id: 252, name: "日米和親条約", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "1854年、ペリーの強硬な圧力に屈して幕府がアメリカと結んだ条約。下田・箱館の開港、アメリカ船への燃料や食料の供給、片務的最恵国待遇の付与などを認め、日本が200年以上続いた「鎖国」の夢から目覚めさせられた歴史的転換点。" },
  { id: 253, name: "日米修好通商条約", type: "debuff_all", value: 0.35, desc: "1858年、大老井伊直弼が天皇の勅許を得ずに独断でアメリカ（ハリス）と調印した不平等条約。神奈川などの開港と自由貿易を定めたが、領事裁判権を認め、関税自主権を奪われるという屈辱的な内容であり、以後日本の外交の最大の重荷となった。" },
  { id: 254, name: "安政の大獄", type: "debuff_all", value: 0.30, desc: "大老・井伊直弼が、将軍継嗣問題や無勅許調印を激しく批判する一橋派の大名や尊王攘夷派の公卿、志士たちに対して行った徹底的で冷酷な弾圧。吉田松陰や橋本左内らが容赦なく処刑されたが、この強権的処断が尊攘派の怒りを爆発させ桜田門外の変を招いた。" },
  { id: 255, name: "尊王攘夷運動", type: "buff_attr", target: "VALOR", value: 0.35, desc: "幕末期に、天皇を絶対的に尊び（尊王）、外国勢力を武力で打ち払おう（攘夷）とする過激な政治運動。水戸学を理論的支柱とし、下級武士や草莽の志士たちを熱狂させ、外国船砲撃事件や要人暗殺を引き起こして幕藩体制を崩壊へと追い込んだ原動力。" },
  { id: 256, name: "薩長同盟", type: "buff_all", value: 0.40, desc: "1866年、坂本龍馬らの仲介により、犬猿の仲であった薩摩藩（西郷隆盛）と長州藩（木戸孝允）が秘密裏に結んだ軍事・政治同盟。幕府の第二次長州征討に対抗するため強力な武力を結集し、この同盟の成立が武力倒幕と明治維新への決定的な一撃となった。" },
  { id: 257, name: "奇兵隊", type: "buff_attr", target: "VALOR", value: 0.30, desc: "1863年に高杉晋作が長州藩で創設した、武士だけでなく農民や町人など身分を問わず有志を募った画期的な混成部隊。西洋式の軍事訓練を受け、高い士気と機動力を誇り、四国艦隊との戦闘や幕府軍との戦いで長州藩の主力として圧倒的な強さを見せた。" },
  { id: 258, name: "版籍奉還", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1869年、薩長土肥の藩主の建白を機に、全国の諸大名が天皇に対して土地（版）と人民（籍）の支配権を返上した政治的変革。大名は新たに知藩事に任命され、実質的な支配は続いたものの、天皇を中心とする近代的な中央集権国家への重要な第一歩となった。" },
  { id: 259, name: "廃藩置県", type: "buff_all", value: 0.40, desc: "1871年、明治新政府が御親兵の武力を背景に、全国の藩を完全に廃止し、新たに府県を置いて中央から府知事・県令を派遣した大改革。数百年に及ぶ武士による封建的な地方支配を根底から破壊し、近代的な統一国家の枠組みを一瞬にして完成させた。" },
  { id: 260, name: "徴兵令", type: "buff_attr", target: "VALOR", value: 0.35, desc: "1873年に発布された、満20歳以上のすべての男子に3年間の兵役を義務付けた法令。武士の軍事独占を否定して国民皆兵の近代的常備軍を創設し、富国強兵の基礎となったが、血税一揆と呼ばれる農民たちの猛烈な反発と暴動を引き起こした。" },
  { id: 261, name: "秩禄処分", type: "debuff_all", value: 0.30, desc: "1876年、明治政府が華族や士族に対して代々支給していた家禄などの特権的給与を全面的に廃止し、代わりに金禄公債証書を与えた政策。政府の最大の財政負担を解消したが、収入を絶たれた士族の不満を極限まで高め、西南戦争などの士族反乱の引き金となった。" },
  { id: 262, name: "地租改正", type: "buff_hp", value: 0.35, desc: "1873年に公布された条例に基づく近代的な税制改革。土地の所有者に地券を発行して地価の3％を現金で納めさせた。政府に豊凶に関わらない極めて安定した財源をもたらしたが、農民の負担は軽くならず、地租改正反対一揆などの激しい抵抗を招いた。" },
  { id: 263, name: "殖産興業", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "明治政府が欧米列強に対抗する国力（富国強兵）を身につけるため、官営模範工場の設立や鉄道・電信の整備などを通じて、近代的な資本主義産業を国主導で強力に育成した政策。日本の近代化と産業革命を猛スピードで牽引した国家の最重要課題。" },
  { id: 264, name: "富岡製糸場", type: "heal_round", value: 0.30, desc: "1872年、政府が群馬県に設立した日本初の本格的な官営の機械製糸工場。フランスの最新技術と機械を導入し、全国から集められた工女たちによって生産された高品質な生糸は日本の最大の輸出品となり、外貨獲得と近代産業発展の輝かしい象徴となった。" },
  { id: 265, name: "文明開化", type: "buff_all", value: 0.30, desc: "明治時代初期、西洋の近代的な制度や思想、文化が怒涛のように流れ込み、日本人の生活や価値観が劇的に変化した現象。ざんぎり頭や洋服、牛鍋の流行、ガス灯の設置など、伝統を否定して西洋化へ突き進む熱狂的な社会の風潮を指す。" },
  { id: 266, name: "学制", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "1872年に公布された、フランスの制度を模範とする日本初の近代的な学校制度の基本法令。身分や性別に関わらず「邑に不学の戸なく、家に不学の人なからしめん」という国民皆学の壮大な理想を掲げ、全国に小学校を設立して近代教育の強固な礎を築いた。" },
  { id: 267, name: "自由民権運動", type: "buff_attr", target: "STRATEGY", value: 0.40, desc: "1870年代から80年代にかけて、板垣退助らを中心に展開された、藩閥専制政府の打倒と国会開設、憲法制定を要求する全国的な政治運動。士族から豪農、平民へと広がり、西洋の天賦人権論を背景に日本における近代民主主義の力強い産声となった。" },
  { id: 268, name: "民撰議院設立建白書", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1874年、板垣退助や江藤新平らが政府（左院）に提出した歴史的な意見書。ごく一部の官僚による専制政治を痛烈に批判し、国民から選ばれた議員による国会（民撰議院）の開設を公然と要求し、自由民権運動の輝かしい出発点となった記念碑的文書。" },
  { id: 269, name: "内閣制度", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1885年、伊藤博文の主導で旧来の太政官制を廃止し、憲法制定に先立って導入された近代的な最高行政機関。初代総理大臣の伊藤のもと、各省の長官が国務大臣として連帯して政治を指導する体制を確立し、天皇を補佐する強力な行政機構が完成した。" },
  { id: 270, name: "教育勅語", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "1890年に発布された、天皇の言葉として国民の道徳と教育の根本理念を示した勅語。儒教的な「忠君愛国」を柱とし、国家の危機には命を捧げるよう説いた。学校儀式で神聖化され、第二次世界大戦敗戦まで、日本の国家主義的教育の絶対的な精神的支柱となった。" },
  { id: 271, name: "治安警察法", type: "debuff_all", value: 0.35, desc: "1900年、第2次山県有朋内閣が労働運動や農民運動などの社会運動を徹底的に弾圧するために制定したきわめて抑圧的な法律。政治集会や結社の自由を厳しく制限し、特に第5条で女性の政治参加を禁じ、第17条で労働者のストライキ権を実質的に剥奪した。" },
  { id: 272, name: "八幡製鉄所", type: "buff_hp", value: 0.40, desc: "日清戦争の賠償金を資金源として、1901年に福岡県に設立された日本初の本格的な官営の巨大製鉄所。筑豊炭田の石炭と中国産の鉄鉱石を利用して鉄鋼の国産化を実現し、日本の重工業の飛躍的な発展と軍事力強化（富国強兵）の絶対的な基盤となった。" },
  { id: 273, name: "財閥", type: "buff_hp", value: 0.35, desc: "明治時代以降、政商から発展し、持株会社（本社）を頂点として金融、貿易、鉱山、重工業などのあらゆる産業を多角的に独占・支配した三井、三菱、住友などの巨大な同族企業集団。戦前の日本経済を完全に牛耳り、政治や軍部とも深く癒着した。" },
  { id: 274, name: "大正デモクラシー", type: "buff_all", value: 0.35, desc: "大正時代から昭和初期にかけて、第一次世界大戦後の国際的な平和主義や民本主義の思想を背景に高揚した、政党内閣の実現や普通選挙の要求、労働・農民運動、女性解放運動などの民主主義的な社会・政治・文化運動の輝かしい総称。" },
  { id: 275, name: "治安維持法", type: "debuff_all", value: 0.40, desc: "1925年、普通選挙法と抱き合わせで制定された、日本の近現代史における最悪の思想弾圧法。国体の変革（共産主義）や私有財産制度の否認を目的とする結社を厳罰に処し、のちには特高警察による残酷な弾圧の根拠となり、自由な言論を完全に封殺した。" },
