  { id: 276, name: "普通選挙法", type: "buff_all", value: 0.35, desc: "長年の普選運動の実りとして1925年の加藤高明内閣で成立した選挙法。納税額による制限を完全に撤廃し、満25歳以上のすべての男子に選挙権を認めた。これにより有権者数は一気に4倍に激増し、無産政党の進出など大衆の政治参加の扉を大きく開いた。" },
  { id: 277, name: "国家総動員法", type: "damage_cut_all", value: 0.40, desc: "1938年、日中戦争の長期化に伴い第1次近衛文麿内閣が制定した法律。議会の承認を経ずに、勅令だけで全国民の労働力や物資、資金など、国家のすべての資源を戦争遂行のために強制的に統制・動員できる、全体主義的・ファシズム的な独裁法制の完成。" },
  { id: 278, name: "農地改革", type: "heal_round", value: 0.35, desc: "第二次世界大戦後、GHQの指令により政府が地主の土地を強制的に安値で買収し、小作人に売り渡した劇的な改革。これにより長年日本の農村を支配してきた寄生地主制は完全に解体され、大量の自作農が創設されて、農村の民主化と社会構造の根本的な変革を実現した。" },
  { id: 279, name: "新幹線", type: "buff_all", value: 0.30, desc: "1964年の東京オリンピック開幕直前に開業した、東京・新大阪間を夢の超特急で結んだ世界初の高速鉄道（東海道新幹線）。日本の極めて高い技術力を世界に証明し、大動脈として高度経済成長期の爆発的な経済発展と国民の移動を象徴する乗り物。" },
  { id: 280, name: "所得倍増計画", type: "buff_hp", value: 0.40, desc: "1960年、安保闘争後の政治的対立を収束させるため、池田勇人内閣が打ち出した壮大な経済計画。10年間で国民の所得を2倍にするという目標を掲げ、設備投資の減税や公共事業の拡大を推進。人々の関心を経済に向けさせ、日本の驚異的な高度経済成長の起爆剤となった。" },
  { id: 281, name: "海獣葡萄鏡", type: "damage_cut_all", value: 0.25, desc: "飛鳥時代から奈良時代にかけて唐から伝来、または国内で模倣して鋳造された銅鏡。背面には海獣（獅子など）と葡萄の唐草文様が緻密に浮き彫りにされており、シルクロードを経由してペルシャや西域の美術様式が日本にもたらされたことを示す国際色豊かな遺物である。" },
  { id: 282, name: "稲荷山古墳出土鉄剣", type: "buff_attr", target: "VALOR", value: 0.30, desc: "埼玉県の稲荷山古墳から出土した、金象嵌で115文字が刻まれた鉄剣。銘文には「獲加多支鹵大王（ワカタケル大王＝雄略天皇）」の名や、剣の持ち主であるヲワケの臣の系譜が記されており、5世紀後半におけるヤマト政権の東国支配の広がりを証明する第一級の金石文である。" },
  { id: 283, name: "江田船山古墳出土鉄刀", type: "buff_attr", target: "VALOR", value: 0.30, desc: "熊本県の江田船山古墳から出土した、銀象嵌の銘文を持つ大刀。稲荷山古墳の鉄剣と同じく「獲加多支鹵大王」の名が刻まれており、雄略天皇の時代にヤマト政権の支配が九州中部にまで及んでいたこと、および当時の地方豪族が大王に臣従して軍事的に奉仕していたことを示す。" },
  { id: 284, name: "高松塚古墳壁画", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "奈良県明日香村にある7世紀末から8世紀初めの古墳の石室内に描かれた極彩色の壁画。四神（青龍・白虎・朱雀・玄武）や星宿図、そして唐風の衣装をまとった色鮮やかな男女の群像が描かれており、当時の日本が中国や朝鮮半島から強い文化的影響を受けていたことを示している。" },
  { id: 285, name: "キトラ古墳壁画", type: "heal_round", value: 0.20, desc: "奈良県明日香村にある7世紀末から8世紀初めの古墳に描かれた壁画。高松塚古墳と同様に四神や十二支が描かれているが、特に天井に描かれた本格的な「天文図（星図）」は東アジア最古級のものとして極めて価値が高く、古代日本における高度な天文学の知識の存在を証明している。" },
  { id: 286, name: "楯築墳丘墓", type: "buff_hp", value: 0.25, desc: "岡山県倉敷市にある、弥生時代後期のものとしては日本最大級の墳丘墓。円形の墳丘の双方に突出部を持つ特異な形状（双方中円墳の原型）をしており、特殊器台と呼ばれる巨大な土器が供えられていた。のちのヤマト政権の前方後円墳の成立に大きな影響を与えた吉備地方の首長墓。" },
  { id: 287, name: "四隅突出型墳丘墓", type: "buff_hp", value: 0.20, desc: "弥生時代中期から後期にかけて、山陰地方（出雲）や北陸地方を中心に築造された特異な形状の墳丘墓。方形の墳丘の四隅がヒトデのように細長く突き出しており、斜面には石が葺かれている。当時の日本海沿岸地域における、ヤマトとは異なる独自の強力な文化圏と首長連合の存在を示す。" },
  { id: 288, name: "石舞台古墳", type: "damage_cut_all", value: 0.30, desc: "奈良県明日香村にある飛鳥時代の巨大な方墳。本来あった土の墳丘が失われ、巨大な天井石など横穴式石室の構造が完全にむき出しになっている。その圧倒的な規模から、7世紀前半に朝廷で絶対的な権力を握っていた蘇我馬子の墓であるとする説が極めて有力視されている。" },
  { id: 289, name: "箸墓古墳", type: "buff_hp", value: 0.35, desc: "奈良県桜井市にある、3世紀後半に築造された出現期の前方後円墳。全長約280mという当時としては破格の規模を誇り、ヤマト政権の初期の強大な大王の墓、あるいは邪馬台国の女王・卑弥呼の墓である可能性が指摘されている、日本古代史の謎を解く最重要の遺跡の一つ。" },
  { id: 290, name: "大仙陵古墳", type: "buff_hp", value: 0.40, desc: "大阪府堺市の百舌鳥古墳群に位置する、5世紀前半に築造された日本最大にして世界最大級の前方後円墳（仁徳天皇陵）。全長約486m、三重の濠に囲まれたその圧倒的な土木工事の規模は、当時のヤマト政権の大王が国内において絶大なる権力と労働力の動員基盤を持っていたことを象徴する。" },
  { id: 291, name: "薬師寺東塔", type: "heal_round", value: 0.30, desc: "奈良の薬師寺に現存する白鳳時代の唯一の建築物。各層に裳階（もこし）と呼ばれるひさしがついているため、三重塔でありながら六重塔のように見える。その規則正しくリズミカルな屋根の重なりは「凍れる音楽」と称賛され、飛鳥から天平へと向かう仏教建築の美しい過渡期を示している。" },
  { id: 292, name: "薬師寺薬師三尊像", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "白鳳文化の最高傑作とされる薬師寺金堂の金銅仏。本尊の薬師如来とその両脇に控える日光・月光菩薩からなる。飛鳥仏の硬さから脱却し、唐の初唐様式の影響を受けた豊満で丸みのある肉体表現と、流麗な衣のひだが特徴であり、古代日本の鋳造技術の高さと仏教美術の成熟を示している。" },
  { id: 293, name: "興福寺阿修羅像", type: "buff_attr", target: "VALOR", value: 0.30, desc: "奈良時代の天平文化を代表する乾漆像。興福寺の八部衆像の一体。三面六臂（顔が三つ、腕が六本）の異形の姿でありながら、少年のように細身で、眉をひそめて何かを憂い、深く思索するような神秘的な表情をもつ。激しい戦闘神が仏教に帰依して静寂を得た内面的な精神性を見事に表現している。" },
  { id: 294, name: "唐招提寺鑑真和上像", type: "debuff_all", value: 0.30, desc: "天平文化を代表する乾漆像で、日本最古の肖像彫刻。幾多の苦難の末に失明しながらも日本に戒律を伝えた唐の高僧・鑑真の姿を写実的に捉えている。静かに目を閉じ、深い瞑想に沈むその威厳に満ちた姿には、仏法に生涯を捧げた不屈の精神力と崇高な人格が余すところなく表現されている。" },
  { id: 295, name: "法起寺三重塔", type: "damage_cut_all", value: 0.25, desc: "奈良県斑鳩町にある、飛鳥時代（7世紀末）に建立された現存する日本最古の三重塔。聖徳太子ゆかりの寺院であり、法隆寺金堂や五重塔などとともに、雲肘木やエンタシスの柱など、大陸から伝わった初期の仏教建築様式を現在に伝える極めて貴重な国宝である。" },
  { id: 296, name: "過去現在絵因果経", type: "buff_all", value: 0.25, desc: "奈良時代に制作された、釈迦の前世と現世の生涯の物語（仏伝）を描いた絵巻物。巻物の下半分に経文を書き、上半分にその内容を図解している。中国の様式を忠実に模倣した素朴な画風であるが、のちの平安時代に大流行する日本の絵巻物文化の最も古い源流として重要な位置を占める。" },
  { id: 297, name: "鳥毛立女屏風", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "正倉院に伝わる天平時代の六曲一双の屏風。ふくよかな顔立ちの唐風の貴婦人が樹下にたたずむ姿（樹下美人図）が描かれており、もとは着物や樹木の部分に日本産のヤマドリの羽毛が貼り付けられていた。盛唐の絵画様式が日本の宮廷社会に深く浸透していたことを示す美術品。" },
  { id: 298, name: "螺鈿紫檀五絃琵琶", type: "heal_round", value: 0.35, desc: "正倉院の代表的な宝物で、現存する世界唯一の五絃の琵琶。インド産の高級木材である紫檀で作られ、表面には夜光貝を用いた螺鈿細工で、ラクダに乗って琵琶を弾く異国人の姿や熱帯の植物が華麗に描かれている。シルクロードを経由して天平の都にもたらされた国際色豊かな文化の象徴。" },
  { id: 299, name: "漆胡瓶", type: "buff_all", value: 0.20, desc: "正倉院宝物の一つ。鳥の頭のような注ぎ口と取っ手を持つ、ペルシャ（ササン朝）に起源を持つ独特の形状の水差し。木や竹で形を作り、漆を塗って仕上げる日本の伝統技術で模倣して作られたとされ、西アジアの文化がシルクロードを経て日本の工芸技術と見事に融合したことを示す遺物。" },
  { id: 300, name: "白瑠璃碗", type: "damage_cut_all", value: 0.25, desc: "正倉院に収められている、表面に円形の切子（カット）装飾が多数施された美しいガラス器。ササン朝ペルシャで作られ、はるばるシルクロードを通って天平の日本にもたらされたと考えられている。当時の東大寺や皇室が、遠く西アジアの高度な工芸品を珍重していたことを証明する宝物。" },
  { id: 301, name: "悲田院・施薬院", type: "heal_round", value: 0.35, desc: "奈良時代に、聖武天皇の皇后である光明子（光明皇后）が仏教の慈悲の精神に基づいて平城京内に設置した福祉施設。悲田院は孤児や身寄りのない老人などの生活困窮者を救済し、施薬院は病人に薬を与えて治療を行った。日本における国家的な医療・福祉事業の最も早い先駆的な事例である。" },
  { id: 302, name: "多賀城", type: "buff_attr", target: "VALOR", value: 0.25, desc: "奈良時代の724年、按察使の大野東人によって現在の宮城県に築かれた城柵。陸奥国の国府と、蝦夷に対する軍事拠点である鎮守府が置かれ、律令国家の東北経営と蝦夷支配の最大の拠点となった。のちに伊治呰麻呂の反乱で焼き討ちにあうなど、古代東北の激動の歴史の舞台となった。" },
  { id: 303, name: "胆沢城", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "平安時代初期の802年、征夷大将軍の坂上田村麻呂によって現在の岩手県水沢市に築造された大規模な城柵。阿弖流為ら蝦夷の反乱を平定したのち、多賀城から鎮守府がこの地に移され、律令国家の支配領域が北上川中流域にまで大きく前進したことを象徴する重要な軍事・行政拠点である。" },
  { id: 304, name: "払田柵", type: "damage_cut_all", value: 0.20, desc: "平安時代初期に、現在の秋田県大仙市に築かれたと推定される巨大な城柵遺跡。周囲を長大な材木塀で囲み、内部には整然とした役所の建物跡が発掘されている。日本海側の出羽国における律令国家の蝦夷支配と開拓の前進拠点であったと考えられ、古代の東北経営の実態を知る重要な遺跡。" },
  { id: 305, name: "令義解", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "平安時代初期の833年、淳和天皇の命により右大臣の清原夏野らが編纂した『養老令』の公式な注釈書。律令条文の解釈を政府として統一的に確定させる目的があり、のちに法的な効力を持つものとして扱われた。これにより日本の律令法制の運用基準が完成し、法治主義の充実が図られた。" },
  { id: 306, name: "令集解", type: "buff_all", value: 0.25, desc: "平安時代前期の9世紀後半に、明法博士（法律の専門家）である惟宗直本が私的に編纂した『養老令』の注釈書。公式の『令義解』をはじめ、飛鳥・奈良時代からの多数の学説や注釈を集大成しているため、散逸してしまった『大宝令』などの古代の法制を知るための極めて貴重な根本史料となっている。" },
  { id: 307, name: "弘仁格式", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "平安時代初期の嵯峨天皇の時代（820年）に編纂された、日本最初の格式（律令の追加法令集）。大宝律令の制定以降に蓄積された膨大な「格（追加・修正法）」と「式（施行細則）」を体系的に整理し、複雑化した法制度を整頓して行政の能率化と天皇親政の強化を図った重要な法典。" },
  { id: 308, name: "延喜格式", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "平安時代中期の醍醐天皇の時代（927年）に編纂された格式。弘仁格式、貞観格式に続く「三代格式」の最後のもので、律令法体系の集大成。特に『延喜式』全50巻は、当時の朝廷の儀式や神祇祭祀、諸国の行政規則を極めて詳細に規定しており、古代の政治や文化を知るための一級史料である。" },
  { id: 309, name: "凌雲集", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "平安時代初期の814年、嵯峨天皇の命で小野岑守らが編纂した日本初の勅撰漢詩集。唐風文化を極端に重んじる「文章経国（文学の力で国家を治める）」の思想のもと、天皇や貴族たちの優れた漢詩を集めた。この時代は国風の和歌よりも中国の漢詩文が公的な文学として圧倒的な地位を占めていた。" },
  { id: 310, name: "文華秀麗集", type: "buff_all", value: 0.20, desc: "平安時代初期の818年に、嵯峨天皇の命で藤原冬嗣らが編纂した第2の勅撰漢詩集。『凌雲集』に漏れた秀作や、その後に作られた新しい漢詩を収録している。空海や嵯峨天皇らの洗練された作品が収められており、弘仁・貞観文化における貴族社会の唐風化の絶頂期を象徴する文学作品集。" },
  { id: 311, name: "経国集", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "平安時代初期の827年に、淳和天皇の命で良岑安世らが編纂した第3の勅撰漢詩文集。「文章経国」という書名が示す通り、漢詩だけでなく、朝廷の公文書や対策（国家試験の答案）など実用的な文章も多数収録しており、当時の貴族にとって漢文学が政治の必須の教養であったことを示している。" },
  { id: 312, name: "性霊集", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "平安時代初期に、真言宗の開祖である空海の漢詩や書簡、上表文などの優れた文章を、高弟の真済が分類・編纂した個人の詩文集（正式名は『遍照発揮性霊集』）。空海の類まれな文学的才能と密教の奥深い思想、そして時の権力者たちとの幅広い交流を伝える、平安初期の漢文学の最高傑作の一つ。" },
  { id: 313, name: "三教指帰", type: "debuff_all", value: 0.30, desc: "空海が若き日に執筆した思想書（戯曲仕立ての評論）。儒教・道教・仏教の三つの教え（三教）をそれぞれの代表者に語らせ、最終的に仏教（特に密教）の教えが最も優れており、人間を真の救済へと導くものであると結論づけた。空海が大学での出世コースを捨てて仏道に入る決意を示した宣言の書。" },
  { id: 314, name: "綜芸種智院", type: "buff_all", value: 0.30, desc: "828年に空海が平安京に創設した私立の教育施設。貴族や官僚の子弟しか入学できなかった大学寮とは異なり、身分や貧富の差を問わず一般の庶民にも広く門戸を開き、儒教・仏教・道教などの幅広い学問を教育しようとした。日本における庶民教育機関の最も早い先駆的な試みとして極めて有名。" },
  { id: 315, name: "勧学院", type: "heal_round", value: 0.20, desc: "平安時代前期に藤原冬嗣が設立した、藤原氏一族の学生のための大学別曹（寄宿舎兼私塾）。一族の結束を固め、大学寮における勉学を強力に支援することで、有能な官僚を次々と輩出させた。これにより、藤原北家が朝廷の要職を独占していくための強固な教育的・政治的基盤が形成された。" },
  { id: 316, name: "学館院", type: "buff_hp", value: 0.25, desc: "平安時代初期に嵯峨天皇の皇后である橘嘉智子（檀林皇后）らが設立した、橘氏一族のための大学別曹。橘氏の子弟の学問を援助し、藤原氏の勧学院に対抗して一族の繁栄を維持しようとしたが、のちに承和の変などで橘氏の政治的勢力が衰退するとともに、その機能も次第に失われていった。" },
  { id: 317, name: "奨学院", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "平安時代前期に在原行平らが設立した、王氏（天皇家の血を引く皇族や源氏・平氏など）のための大学別曹。皇族から臣籍降下して貴族となった者たちの学問を支援し、朝廷の官僚としての出世を後押しするための施設であり、平安時代の貴族社会における学歴重視の風潮と氏族間の競争を示している。" },
  { id: 318, name: "神護寺両界曼荼羅", type: "buff_attr", target: "CULTURE", value: 0.40, desc: "京都の神護寺に伝わる、平安時代初期（弘仁・貞観文化）に描かれた現存最古の両界曼荼羅（国宝）。通称「高雄曼荼羅」。紫の綾地に金銀の泥を用いて金剛界・胎蔵界の仏たちを描き出しており、空海が直接指導して制作させたとも伝えられる、日本の密教美術の原点にして最高峰の傑作である。" },
  { id: 319, name: "東寺立体曼荼羅", type: "debuff_all", value: 0.35, desc: "京都の教王護国寺（東寺）の講堂に安置されている21体の仏像群。空海が構想し、大日如来を中心に五智如来、五菩薩、五大明王などを三次元的に配置して、密教の宇宙観（曼荼羅の世界）を視覚的かつ圧倒的な迫力で表現した。密教の神秘的な教えを民衆に直感的に伝えるための画期的な宗教空間。" },
  { id: 320, name: "室生寺五重塔", type: "damage_cut_all", value: 0.30, desc: "奈良県の山深い室生寺にある平安時代初期の建築物（国宝）。屋外に建つ五重塔としては日本最小であるが、周囲の深い森と見事に調和する優美なプロポーションを持つ。山岳寺院特有の地形に合わせて建てられており、山岳信仰と密教が結びついた弘仁・貞観時代の仏教建築の特色を色濃く残している。" },
  { id: 321, name: "観心寺如意輪観音像", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "大阪府の観心寺の本尊で、平安時代初期（弘仁・貞観文化）の密教彫刻を代表する国宝の木彫仏。秘仏として大切に守られてきたため、当時の華麗な極彩色がよく残っている。六本の腕を持つ神秘的な姿で、ふくよかな肉体と官能的とも言える妖しい美しさを漂わせ、密教の呪術的な精神を表現している。" },
  { id: 322, name: "薬師寺僧形八幡神像", type: "heal_round", value: 0.30, desc: "奈良の薬師寺に伝わる平安時代初期の木彫像（国宝）。日本の固有の神である八幡神を、仏教の僧侶の姿（僧形）で表現している。日本の神は仏が人々を救うために姿を変えて現れたものだとする「神仏習合」の思想が、彫刻美術の分野において明確に具現化された最初期の極めて重要な作例である。" },
  { id: 323, name: "新薬師寺十二神将像", type: "buff_attr", target: "VALOR", value: 0.35, desc: "奈良の新薬師寺本堂の本尊・薬師如来を取り囲むように配置された、天平時代を代表する12体の塑像（国宝）。それぞれが干支を守護する武神であり、目を怒らせ、武器を構えた激しい動きと豊かな感情表現を持つ。粘土（塑土）の特性を活かした写実的でダイナミックな造形美を誇る傑作群。" },
  { id: 324, name: "風信帖", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "平安時代初期の「三筆」の一人である空海が、天台宗の開祖である最澄に宛てて書いた3通の尺牘（手紙）をまとめたもの（国宝）。「風信雲書…」で始まる力強くも流麗で躍動感あふれる筆致は、中国の王羲之の書風（唐様）を完全に消化・吸収した空海の天才的な書道芸術の到達点を示している。" },
  { id: 325, name: "離洛帖", type: "debuff_all", value: 0.25, desc: "平安時代中期の「三跡」の一人である藤原佐理が書いた手紙（国宝）。大宰府へ赴任する途中、都を出発した際に挨拶を忘れたことを甥に詫びる内容。堅苦しい形式にとらわれない自由奔放で躍動感のある草書体（佐理流）で書かれており、日本独自の「和様」の書風が成熟していく過程をよく示している。" },
  { id: 326, name: "秋萩帖", type: "buff_all", value: 0.25, desc: "平安時代中期に書かれた和歌の草稿で、「三跡」の一人である小野道風の筆と長く伝えられてきた書巻（国宝）。王羲之の唐風の書から離れ、日本の柔らかな風土や優美な美意識に合った丸みを帯びた流麗な「和様」の書体が完成された姿を示しており、のちのかな書道の発展に多大な影響を与えた。" },
  { id: 327, name: "延暦寺根本中堂", type: "heal_round", value: 0.30, desc: "最澄が開創した天台宗の総本山・比叡山延暦寺の中心となる巨大な仏堂。堂内は、参拝者の座る場所よりも本尊の安置される内陣が低く作られている独特の構造（天台様式）を持ち、最澄の時代から「不滅の法灯」が絶えることなく燃え続けている、日本仏教における最も神聖な祈りの空間の一つ。" },
  { id: 328, name: "園城寺金堂", type: "buff_hp", value: 0.25, desc: "天台宗寺門派の総本山である園城寺（三井寺）の中心建築。円珍の死後、比叡山を下りた一派が拠点とし、山門派（延暦寺）との激しい抗争によって何度も焼き討ちにあったが、そのたびに力強く復興された。現在の建物は豊臣秀吉の正室・北政所によって再建されたもので、桃山時代の豪壮な建築様式を伝える。" },
  { id: 329, name: "中尊寺金色堂", type: "buff_attr", target: "CULTURE", value: 0.40, desc: "平安時代後期、奥州藤原氏の初代・清衡が平泉に建立した阿弥陀堂（国宝）。建物の内外に惜しみなく金箔が押され、夜光貝の螺鈿細工や象牙、蒔絵で極限まで華麗に装飾されている。奥州の莫大な砂金の富を背景に、現世に極楽浄土の光り輝く姿を具現化した、日本美術史上に燦然と輝く至宝。" },
  { id: 330, name: "白水阿弥陀堂", type: "damage_cut_all", value: 0.30, desc: "平安時代末期、奥州藤原氏の影響を受けて現在の福島県いわき市に建立された阿弥陀堂（国宝）。藤原清衡の娘（徳姫）が建立したとされ、簡素でありながら調和の取れた美しい宝形造の屋根を持つ。中央の浄土教建築（平等院など）の様式が東北地方にまで伝播し、独自に受容されていたことを示す貴重な遺構。" },
  { id: 331, name: "毛越寺庭園", type: "heal_round", value: 0.30, desc: "奥州藤原氏の2代・基衡と3代・秀衡によって平泉に造営された巨大な寺院の庭園遺跡。広大な大泉が池を中心に、州浜や出島、立石などが配された壮麗な浄土式庭園であり、『作庭記』の理念を忠実に再現している。度重なる戦火で堂塔は焼失したが、庭園の遺構は平安時代の極楽浄土の理想を今に伝える。" },
  { id: 332, name: "富貴寺大堂", type: "buff_hp", value: 0.25, desc: "大分県豊後高田市にある、平安時代後期に建立された九州最古の木造建築（国宝）。宇佐神宮の強い影響下に造営された阿弥陀堂であり、質実剛健な造りの中にも優美さを兼ね備えている。堂内には極彩色の壁画が残り、国風文化期の浄土信仰が九州の地方社会にまで深く根付いていたことを証明する貴重な遺産。" },
  { id: 333, name: "三仏寺投入堂", type: "buff_attr", target: "VALOR", value: 0.30, desc: "鳥取県の三徳山の切り立った絶壁のくぼみに、張り付くように建てられた平安時代後期の特異な仏堂（国宝）。修験道の開祖である役小角が法力で投げ入れたという伝説から「投入堂」と呼ばれる。神仏習合と過酷な山岳修行の精神を体現する、日本建築史上最も近づくことが困難で神秘的な建造物。" },
  { id: 334, name: "今様", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "平安時代末期に流行した、「現代風の流行歌」を意味する新しい歌謡。七・五調の四句を基本とするリズミカルな形式で、白拍子や遊女といった民間の芸能者によって歌い出された。仏教の教えから恋愛、世相まで多様な内容が歌われ、貴族から庶民まで身分を超えて広く愛好された時代の流行歌。" },
  { id: 335, name: "梁塵秘抄", type: "buff_all", value: 0.30, desc: "平安時代末期、今様を熱狂的に愛好した後白河法皇が自ら編纂した歌謡集。「遊びをせんとや生まれけむ…」など、民間の白拍子や遊女、傀儡子たちが歌っていた生々しくも美しい歌謡を多数収録している。貴族文学の陰に隠れていた庶民の生き生きとした感情や風俗を後世に伝える、極めて貴重な文学的遺産。" },
  { id: 336, name: "今鏡", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "平安時代末期（12世紀後半）に成立した歴史物語。「四鏡」の第2作。『大鏡』の記述を引き継ぎ、後一条天皇から高倉天皇までの約150年間の歴史を、老女の昔語りという形式で和文で記している。院政の開始から武士の台頭、そして平氏政権の成立へと至る、貴族社会の落日の時代を穏やかな筆致で描く。" },
  { id: 337, name: "水鏡", type: "heal_round", value: 0.20, desc: "鎌倉時代初期に成立した歴史物語。「四鏡」の第3作。神武天皇から仁明天皇までの古代の歴史を、修験者が老女から聞いた話を記すという形式で描いている。『大鏡』『今鏡』の時代より前の歴史を和文で通史としてまとめたものであり、仏教的な因果応報の史観に基づきながら古代の天皇の治世を回顧している。" },
  { id: 338, name: "増鏡", type: "buff_hp", value: 0.25, desc: "南北朝時代に成立した歴史物語。「四鏡」の最後の作品。源平の争乱後の後鳥羽天皇の即位から、鎌倉幕府が滅亡して後醍醐天皇が京都に帰還するまでの約150年間の歴史を描く。武家政権（鎌倉幕府）の支配下で翻弄される朝廷の姿や承久の乱の経緯を、公家側の同情的な視点から美しい和文で詳細に記述している。" },
  { id: 339, name: "将門記", type: "buff_attr", target: "VALOR", value: 0.35, desc: "平安時代中期に成立した、日本で最初の軍記物語。10世紀に関東で反乱を起こし「新皇」を名乗った平将門の生涯と、その滅亡までの激しい戦いの様子を変体漢文でドラマチックに描いている。地方武士の荒々しいエネルギーと実力主義の台頭を克明に記録し、のちの『平家物語』などへ続く軍記文学の出発点となった。" },
  { id: 340, name: "陸奥話記", type: "buff_all", value: 0.30, desc: "平安時代後期に成立した軍記物語。11世紀半ばに東北地方で起きた「前九年合戦」の経緯を漢文体で詳細に記している。安倍氏の頑強な抵抗と、源頼義・義家父子が苦戦の末に清原氏の援軍を得てこれを打ち破る様子が描かれ、東国における武士団の台頭と源氏の主従関係の結びつきを知る上で不可欠な史料。" },
  { id: 341, name: "伴大納言絵詞", type: "debuff_all", value: 0.35, desc: "平安時代末期に描かれた絵巻物の最高傑作の一つ。866年の応天門の変において、伴善男が陰謀によって源信を陥れようとし、のちに子供の喧嘩から真実が露見して失脚するまでのサスペンスを描く。「異時同図法」を巧みに駆使し、燃え上がる応天門の炎や群衆のパニックを、生々しいリアリズムと躍動感で描写している。" },
  { id: 342, name: "信貴山縁起絵巻", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "平安時代末期に描かれた絵巻物（国宝）。信貴山で修行する僧・命蓮が、法力で空飛ぶ鉢を操って強欲な長者の米倉を飛び去らせる「飛倉の巻」など、奇想天外な霊験譚を描く。貴族ではなく地方の庶民の生活や風俗、いきいきとした感情の動きが、連続する画面のなかでダイナミックに表現された傑作。" },
  { id: 343, name: "源氏物語絵巻", type: "heal_round", value: 0.40, desc: "平安時代末期（12世紀前半）に制作された、日本現存最古の絵巻物（国宝）。紫式部の『源氏物語』の各場面を、「吹抜屋台」の構図や、感情を押し殺した「引目鉤鼻」の技法を用いて描いている。濃密な色彩と極めて計算された構図によって、平安貴族の雅やかな生活と内に秘めた深い悲哀や愛憎を表現した国風美術の頂点。" },
  { id: 344, name: "平治物語絵巻", type: "buff_attr", target: "VALOR", value: 0.35, desc: "鎌倉時代に制作された、1159年の平治の乱を題材とする合戦絵巻（国宝）。「三条殿夜討の巻」では、藤原信頼や源義朝の軍勢が後白河上皇の御所を急襲し、火を放ち、逃げ惑う貴族たちを容赦なく殺戮する凄惨な戦闘シーンが、武士の甲冑や武具の細部まで極めて写実的かつ凄まじい迫力で描かれている。" },
  { id: 345, name: "粉河寺縁起絵巻", type: "buff_hp", value: 0.25, desc: "鎌倉時代初期に制作された絵巻物。和歌山県にある粉河寺の千手観音の霊験譚を描いている。猟師が観音の力によって救われる物語などを通じて、地方の武士や庶民の素朴な信仰心と日常生活の様子が、大和絵の柔らかな筆致でいきいきと描かれており、中世の民衆仏教の広がりを視覚的に伝える資料。" },
  { id: 346, name: "伝源頼朝像", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "京都の神護寺に所蔵されている、日本の肖像画（似絵）の最高傑作とされる国宝。長年、鎌倉幕府を開いた源頼朝の肖像とされてきた。黒い強装束に身を包み、鋭い眼光で前を見据える冷徹で威厳に満ちた姿は、武家の棟梁としての絶対的な権力と意思の強さを象徴的に表現しており、歴史の教科書でも極めて有名。" },
  { id: 347, name: "伝平重盛像", type: "damage_cut_all", value: 0.25, desc: "神護寺に伝わる国宝の肖像画。「伝源頼朝像」などとともに神護寺三像と呼ばれる。平清盛の長男で、優れた武将でありながら温厚で道理を重んじたとされる重盛の姿を描いたとされてきた。豪胆な頼朝像とは対照的に、どこか優雅で憂いを帯びた表情は、平氏政権の繁栄と落日を背負った貴公子像を見事に表現している。" },
  { id: 348, name: "伝藤原光能像", type: "buff_all", value: 0.20, desc: "神護寺三像の一つで、平安時代末期の公卿・藤原光能の肖像とされる国宝の似絵。後白河法皇の側近として活躍し、平氏打倒の謀議にも加わったとされる人物。他の二像と同様に、形式化された従来の肖像画とは一線を画し、個人の内面的な性格や風貌を極めてリアルに描き出す鎌倉時代の写実主義の先駆的な作品。" },
  { id: 349, name: "六波羅探題", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1221年の承久の乱の直後、鎌倉幕府が朝廷の監視と京都の治安維持、および西国御家人の統括を目的として、平氏の旧邸跡に設置した最重要の出先機関。北条泰時と時房が初代の長官となり、以後は北条氏の一族から有能な者が任命され、幕府の西日本における絶対的な支配の要として権勢を振るった。" },
  { id: 350, name: "長門探題", type: "debuff_all", value: 0.30, desc: "鎌倉時代後期、モンゴル襲来（元寇）の危機に対応するため、幕府が本州西端の防衛を強化する目的で周防・長門国に設置した特命の軍事機関。北条氏の一族が任命され、西国における異国警固番役の指揮統制にあたった。鎮西探題とともに、元軍の再来襲に備えるための幕府の強力な国防体制の一翼を担った。" },
  { id: 351, name: "草木灰", type: "buff_hp", value: 0.20, desc: "山野の草木を刈り取り、それを燃やして作った灰。カリウムを豊富に含み、鎌倉時代から室町時代にかけて、農業生産力を向上させるための主要な自給肥料として全国の農村で広く使用された。二毛作の普及や商品作物の栽培を根本から支えた、中世の基本的な農業技術の一つ。" },
  { id: 352, name: "刈敷", type: "heal_round", value: 0.25, desc: "山野で刈り取った若葉や草を、そのまま田畑の土の中にすき込み、腐葉土として利用する中世の代表的な自給肥料。草木灰とともに地力を回復させる効果が高く、入会地（村の共有地）からの草の刈り取りは、村落共同体（惣村）の農業経営において極めて重要な共同作業であった。" },
  { id: 353, name: "牛馬耕", type: "buff_all", value: 0.30, desc: "人力に代わって牛や馬に犂（すき）を引かせ、深く土を掘り起こす農業技術。鎌倉時代から室町時代にかけて畿内や西日本を中心に広く普及した。労働力を大幅に軽減するとともに耕作効率を飛躍的に高め、二毛作の展開や農業生産力の増大をもたらした、中世における農業技術の最大級の革新。" },
  { id: 354, name: "宇治拾遺物語", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "鎌倉時代前期に成立した説話集。作者は不詳。貴族の雅な逸話から、武士の勇猛な武勇伝、僧侶の霊験譚、そして「雀の恩返し」や「こぶとり爺さん」など、庶民の生活や笑いに根ざした民間伝承まで、約190の多種多様な説話が生き生きとした和文体で収められており、中世の人々の豊かな精神世界を今に伝える。" },
  { id: 355, name: "十訓抄", type: "buff_all", value: 0.25, desc: "1252年に成立した鎌倉時代の教訓説話集。編者は未詳。年少の武士や貴族の啓蒙を目的として、人に驕らないこと、腹を立てないことなど、10カ条の道徳的な教訓の項目を立て、それにふさわしい歴史上の説話や逸話を分類して収録している。中世前期における、儒教的な道徳観や処世術を反映した文学作品。" },
  { id: 356, name: "古今著聞集", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "1254年、橘成季によって編纂された鎌倉時代の壮大な世俗説話集。『今昔物語集』の続編を意図し、神代から鎌倉時代に至るまでの、朝廷の儀式、武勇、芸能、怪異など、多岐にわたる説話を分類して収録した。武家政権が確立する中で、かつての平安貴族の輝かしい宮廷文化への強いノスタルジーが込められている。" },
  { id: 357, name: "沙石集", type: "heal_round", value: 0.30, desc: "1283年、臨済宗の僧である無住によって書かれた仏教説話集。難解な仏教の教理を説くのではなく、各地の武士や庶民の日常生活における滑稽な失敗談や笑い話（沙や石）を題材にして、そこに仏教の深い真理（黄金）を見出し平易に説いた。鎌倉時代の生き生きとした民衆の姿と信仰の実態を伝える貴重な記録。" },
  { id: 358, name: "東関紀行", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "1242年、京都の知識人（作者不詳）が鎌倉へ下向した際の旅日記。承久の乱から約20年が経過し、武家政権の中心地として急速に発展する鎌倉の力強い都市の様子や、東海道の宿場の風景を、和漢混淆の流麗な文体で書き留めている。同じく鎌倉への旅を描いた『海道記』と並ぶ、中世紀行文学の代表作。" },
  { id: 359, name: "海道記", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "1223年に書かれた作者不詳の紀行文学。承久の乱の直後という緊張感の残る時期に、京都から鎌倉へと旅をした記録。戦乱の傷跡が残る東海道の風景や、作者自身の深い仏教的な無常観、そして新興の武家都市である鎌倉の実態を対比的に描き出しており、中世の人々の精神史を知る上での重要な作品。" },
  { id: 360, name: "十六夜日記", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "1277年、歌人の阿仏尼が著した紀行文。夫・藤原定家の遺領（播磨国細川荘）をめぐる実子と継子の相続争いの訴訟のため、京都から幕府のある鎌倉へと下る旅の道中を記した。道中の風景を多数の和歌を交えて優雅に綴りつつ、裁判のために直接鎌倉へ訴え出なければならない当時の武家社会の権力構造を反映している。" },
  { id: 361, name: "円覚寺舎利殿", type: "damage_cut_all", value: 0.35, desc: "鎌倉にある円覚寺に建つ、室町時代に再建された禅宗様（唐様）を代表する国宝の建築物。屋根の強い反りや、柱の上だけでなく柱の間にも組み物を置く「詰組（つめぐみ）」、弓形に曲がった「虹梁（こうりょう）」など、南宋から伝来した精緻で複雑な禅宗特有の建築様式の美しさを完璧な形で今に伝えている。" },
  { id: 362, name: "無著・世親像", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "鎌倉時代の天才仏師・運慶によって制作された、興福寺北円堂に安置されている国宝の木造彫刻。インドの大乗仏教の優れた学僧であった兄弟の姿を等身大で表現している。まるで生きているかのような圧倒的な写実性と、深く真理を探究するような精神性の高さを両立させた、日本の肖像彫刻の最高傑作。" },
  { id: 363, name: "天灯鬼・竜灯鬼像", type: "buff_all", value: 0.25, desc: "鎌倉時代に運慶の三男・康弁らによって制作されたとされる、興福寺の木造彫刻。従来は四天王などに踏みつけられるだけの脇役であった邪鬼を独立させ、重い灯籠を力強く支え、あるいは肩に担ぐ姿をユーモラスかつ筋肉隆々に描いた。鎌倉彫刻の自由で人間味あふれる造形感覚を示す異色の名作。" },
  { id: 364, name: "一遍上人絵伝", type: "heal_round", value: 0.35, desc: "時宗の開祖・一遍の生涯と、全国を巡礼（遊行）して踊念仏を広めた軌跡を描いた鎌倉時代の絵巻物（国宝）。円伊の筆とされる。宗教的業績だけでなく、当時の名所旧跡の風景や、熱狂する群衆、市や宿場の賑わいなど、鎌倉時代の庶民のリアルな生活風俗が極めて詳細かつ写実的に描かれた第一級の歴史資料。" },
  { id: 365, name: "春日権現験記絵", type: "damage_cut_all", value: 0.30, desc: "鎌倉時代後期に、宮廷絵所の絵師である高階隆兼によって描かれた全20巻の大絵巻（三の丸尚蔵館蔵）。藤原氏の氏神である春日大社と春日明神の様々な霊験譚を、最高級の絵の具を用いた極彩色で極めて精緻に描いている。鎌倉時代の公家や武士の邸宅、衣装などの風俗を知るための「視覚的百科事典」。" },
  { id: 366, name: "明恵上人樹上坐禅図", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "鎌倉時代初期の華厳宗の高僧・明恵が、高山寺の裏山の松の樹上で静かに坐禅を組む姿を描いた国宝の肖像画。形式化された仏画とは異なり、自然の木々や小鳥などの風景の中に溶け込むように修行者の姿を描き出しており、日本的な自然観と禅の精神が見事に融合した、中世肖像画（頂相）の白眉。" },
  { id: 367, name: "青蓮院流", type: "buff_all", value: 0.25, desc: "鎌倉時代後期に、伏見天皇の皇子である尊円入道親王が創始した書道の流派。伝統的な和様の優美さに、宋代の力強く実用的な書風を調和させた。その読みやすく美しい書体は、のちに室町幕府の公文書の書体として採用され、江戸時代には「御家流」として寺子屋の手本となり、広く日本社会の標準的文字となった。" },
  { id: 368, name: "備前長船長光の太刀", type: "buff_attr", target: "VALOR", value: 0.35, desc: "鎌倉時代後期、良質な砂鉄と水に恵まれた備前国（岡山県）で栄えた長船派の刀工・長光が鍛え上げた名刀。「大般若長光」などに代表される。折れにくく曲がりにくい実戦的な強靭さと、丁子乱れと呼ばれる華麗な刃文の美しさを兼ね備え、中世を通じて数多くの武将たちから最強の武器として愛用された。" },
  { id: 369, name: "岡崎正宗の刀", type: "buff_attr", target: "VALOR", value: 0.40, desc: "鎌倉時代末期、相模国（鎌倉）の刀工・正宗が完成させた「相州伝」による日本刀の最高峰。硬軟の鉄を巧みに組み合わせる独自の鍛造法により、モンゴル軍の堅い鎧をも断ち切る圧倒的な強度を実現した。その地刃の沸（にえ）の美しさは他の追随を許さず、のちの天下人たちが至宝として争って求めた名刀中の名刀。" },
  { id: 370, name: "粟田口吉光の短刀", type: "buff_attr", target: "VALOR", value: 0.30, desc: "鎌倉時代中期の山城国（京都）の刀工・藤四郎吉光が鍛えた短刀。直刃の美しい刃文を特徴とする山城伝を極め、短刀の制作においては日本刀史上最高の名手とされる。彼の打った「平野藤四郎」などの短刀は、実用的な護身用の武器であると同時に、大名間の最高級の贈答品（名物）として極めて重宝された。" },
  { id: 371, name: "瀬戸焼", type: "buff_all", value: 0.25, desc: "鎌倉時代に、道元とともに宋に渡ったとされる加藤景正（藤四郎）が尾張国の瀬戸で始めたと伝わる陶器。中国の先進技術を取り入れ、中世の日本において唯一、本格的に釉薬（灰釉や鉄釉）をかけて焼成された高級な陶器（古瀬戸）を生産し、武士や貴族の茶器・仏具として珍重された日本六古窯の筆頭。" },
  { id: 372, name: "鎌倉府", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "室町幕府が関東8カ国と伊豆・甲斐の計10カ国を統治するために鎌倉に設置した強大な地方機関。足利尊氏の子・基氏の子孫が「鎌倉公方」として世襲し、幕府とほぼ同じ独自の行政・司法組織を持った。しかし次第に自立化の傾向を強め、京都の将軍権力と幾度も激しく武力衝突（永享の乱など）を引き起こした。" },
  { id: 373, name: "関東管領", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "室町時代、鎌倉府の長官である鎌倉公方を補佐した最高役職。上杉憲顕に始まり、以後、山内上杉氏と扇谷上杉氏が世襲して関東の実権を握った。しかし、鎌倉公方との対立や両上杉氏の内紛（享徳の乱や長尾景春の乱）により関東を泥沼の戦国時代へと引きずり込み、最終的に北条早雲ら新興勢力に滅ぼされた。" },
  { id: 374, name: "奉公衆", type: "buff_attr", target: "VALOR", value: 0.35, desc: "室町時代、将軍の身辺を警護し、幕府の直轄軍として組織された直臣の武士団。諸国に分散する幕府の御料所（直轄地）の管理も任され、約3000人からなる5つの番に編成された。有力な守護大名の軍事力に対抗して将軍の権威と政治権力を支える、室町幕府にとって最も重要で強力な軍事的基盤であった。" },
  { id: 375, name: "御料所", type: "heal_round", value: 0.30, desc: "室町幕府が全国の要地に所有した将軍家の直轄領。奉公衆などが代官として管理して年貢を徴収し、室町幕府の基本的な財政基盤となった。しかし、その規模は鎌倉幕府の関東御領に比べるとはるかに小さく、この脆弱な経済基盤が室町幕府の慢性的な財政難と、将軍権力の弱体化の一因となった。" },
  { id: 376, name: "段銭", type: "buff_hp", value: 0.25, desc: "室町時代に、幕府や守護大名、朝廷が臨時の出費（天皇の即位儀式や内裏の造営、寺社の建築、戦費など）を賄うために、田地の面積（段）を基準として一律に課した臨時の金銭税。貨幣経済の浸透を背景に広く徴収され、室町幕府の重要な財源となったが、たびたび土一揆の激しい反発の対象ともなった。" },
  { id: 377, name: "棟別銭", type: "buff_hp", value: 0.20, desc: "室町時代に、幕府や守護大名が家屋の棟数（戸数）を基準にして、各戸ごとに課した臨時の金銭税。段銭とともに、幕府の財政難を補うための重要な臨時税として頻繁に徴収された。戦国大名たちも軍事費の調達のためにこれを独自に課税し、領民に対する過酷な経済的負担となった。" },
  { id: 378, name: "土倉役", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "室町幕府が、高利貸を営む土倉（質屋）の莫大な営業利益に対して定期的に課した営業税。酒屋役とともに室町幕府の最も重要な恒常的財源であり、幕府は彼らの営業を保護する見返りにこの税を徴収した。しかし、徳政一揆が起きて徳政令を出した際には、幕府はこの税収を失うというジレンマを抱えていた。" },
  { id: 379, name: "酒屋役", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "室町幕府が、酒造業者（酒屋）に対してその瓶の数などに応じて課した営業税。当時の酒屋の多くは土倉（高利貸）を兼営して巨大な富を蓄積しており、土倉役と並んで幕府財政を根底から支える最大の収入源であった。幕府の権力が商業資本に深く依存していた中世経済の構造を象徴する税制。" },
  { id: 380, name: "関銭", type: "debuff_all", value: 0.25, desc: "室町時代に、幕府や朝廷、有力な寺社・公家が、陸上の交通の要衝に設けた関所において、通行する商人や運送業者から強制的に徴収した通行税。物流の活発化に伴って関所は乱立し、これが商品流通の極めて重大な障害となったため、のちの織田信長らによる関所撤廃（楽市・楽座）の政策へとつながった。" },
  { id: 381, name: "津料", type: "debuff_all", value: 0.25, desc: "室町時代に、河川の渡し場や港湾（津）において、領主や寺社が通行する船や商人から徴収した通行税や停泊料。関銭と同様に水上交通の大きな障壁となり、商品の価格を高騰させる原因となった。兵庫の関などで徴収された莫大な関銭・津料は、興福寺や東大寺などの大寺院の重要な財源となっていた。" },
  { id: 382, name: "抽分銭", type: "buff_hp", value: 0.30, desc: "室町時代の日明貿易（勘合貿易）において、幕府や大内氏・細川氏などの貿易の主催者が、実際に船の運航や交易の実務を請け負った商人（博多や堺の豪商）に対して、その莫大な輸入利益の1割（10分の1）を上納させた税。この莫大な収益が、室町幕府や有力守護大名の強大な権力を支える資金源となった。" },
  { id: 383, name: "郷村", type: "heal_round", value: 0.30, desc: "室町時代以降、畿内を中心に形成された、複数の自然村落（惣村）が連合して形成されたより広域的な自治的村落のまとまり。用水路の管理や山野の利用、そして領主や他村との交渉において強力な団結力を発揮し、時には「郷村一揆」として武力蜂起し、守護大名の支配にすら対抗する巨大な民衆権力となった。" },
  { id: 384, name: "宮座", type: "buff_all", value: 0.25, desc: "中世の惣村において、村の鎮守である神社の祭祀を共同で運営するために、村の有力な農民（名主・おとな）たちによって組織された特権的な祭祀集団。神事を通じて村落内の身分秩序を確認するとともに、祭りの後の直会（宴会）などで村の重要事項を合議し、惣村の強固な結束を維持する中核的な機能を果たした。" },
  { id: 385, name: "惣百姓", type: "buff_attr", target: "VALOR", value: 0.30, desc: "室町時代の惣村を構成する一般の農民たち。かつての荘園制下のように領主に隷属するだけでなく、自立的な経済力を持ち、寄合を通じて村の掟を定め、自ら警察権（地下検断）を行使した。彼らの強固な団結（一味同心）こそが、土一揆や国人一揆の中核的な推進力となり、中世社会を根底から突き動かした。" },
  { id: 386, name: "月行事", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "室町時代の京都や堺などの都市（町）において、自治組織である「町組」の運営を月交代で担当した当番の役職。裕福な町衆の中から選ばれ、町の治安維持や祭礼の準備、幕府に対する税の取りまとめなどを行った。中世都市における、商人や手工業者による高度な自治的運営体制を象徴する役職である。" },
  { id: 387, name: "寄親・寄子制", type: "buff_attr", target: "VALOR", value: 0.35, desc: "戦国大名が領内の武士団を統制するために用いた軍事的な主従制度。有力な家臣を「寄親」とし、その下に地侍や国人などの小領主を「寄子」として強制的に配属させた。直接の血縁関係がなくても疑似的な親子関係を結ばせることで、強固な軍事的編成と大名への絶対的な忠誠体制を作り上げた。" },
  { id: 388, name: "指出検地", type: "buff_hp", value: 0.30, desc: "戦国大名が領国の経済力を把握するために行った土地調査。役人が直接測量するのではなく、家臣や寺社、村の百姓に対して、自らが所有する田畑の面積や収穫高（貫高・石高）を書面で「自己申告」させた。大名による領国の一元的な支配と、軍役の基準を定めるための画期的な政策であった。" },
  { id: 389, name: "喧嘩両成敗", type: "debuff_all", value: 0.30, desc: "戦国大名が分国法などで定めた極めて厳格な法原則。理由の如何や理非（善悪）を問わず、私闘（喧嘩）に及んだ当事者の双方を等しく死刑などの重罰に処した。武士の自力救済の慣習を強制的に否定し、領内のすべての紛争解決の権限を大名という唯一の公権力に独占させるための強力な治安維持政策。" },
  { id: 390, name: "梅松論", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "南北朝時代に成立した歴史書。作者は足利尊氏に近い武士か禅僧とされる。鎌倉幕府の滅亡から建武の新政の失敗、そして尊氏による室町幕府の樹立に至る動乱の歴史を、徹底して足利氏（北朝）を正当化する立場から描いている。南朝側の視点で描かれた『神皇正統記』や『太平記』と対をなす重要な歴史資料。" },
  { id: 391, name: "建武年間記", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "建武の新政期における朝廷の記録や公家の口中を書き留めた史料。その中に含まれる「二条河原落書」は、後醍醐天皇の親政下で激発した偽の綸旨や恩賞の不公平、急激な身分変動による社会のすさまじい混乱と無秩序ぶりを、七五調の軽妙なリズムで痛烈に風刺した中世最大の風刺文学として極めて有名。" },
  { id: 392, name: "節用集", type: "buff_all", value: 0.20, desc: "室町時代に広く普及した、日常的な単語を「イロハ順」などの発音や意味の部門別に分類して引けるようにした国語辞典・漢字字典。商工業の発展に伴って文字を読み書きする必要に迫られた庶民層の実用的な要求に応え、江戸時代に至るまで寺子屋の教科書として爆発的なベストセラーとなった。" },
  { id: 393, name: "足利学校", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "下野国（栃木県）にあった中世の高等教育機関。関東管領の上杉憲実が多くの古典籍を寄進して再興し、全国から禅僧や武士が集まり儒学や易学、兵学を学んだ。16世紀には宣教師フランシスコ・ザビエルによって「日本国中最も大にして最も有名な坂東の大学」とヨーロッパに紹介された最高学府。" },
  { id: 394, name: "狂雲集", type: "debuff_all", value: 0.25, desc: "室町時代中期の臨済宗の異端の禅僧・一休宗純の漢詩集。権威にすり寄る五山派の腐敗した僧侶たちを極めて痛烈な言葉で批判し、肉食や飲酒、女性との性愛などの破戒（風狂）を赤裸々に謳い上げている。形式主義を打ち破り、人間の本質と真の禅の悟りを追求した中世文学の極北とも言える特異な詩集。" },
  { id: 395, name: "大徳寺大仙院庭園", type: "damage_cut_all", value: 0.35, desc: "京都の大徳寺にある室町時代（東山文化）の代表的な枯山水庭園。約100坪という極めて狭い空間に、多数の立石を組み合わせて険しい深山幽谷の滝を表現し、そこから流れ出た水が白砂の大河となって大海に注ぐまでの壮大な自然の風景を、水を使わずに石と砂だけでダイナミックに表現した禅宗庭園の最高傑作。" },
  { id: 396, name: "龍安寺石庭", type: "heal_round", value: 0.35, desc: "京都の龍安寺にある、東山文化を象徴する最も有名な枯山水庭園。塀に囲まれた長方形の平庭に白砂を敷き詰め、大小15個の石を極限まで計算された絶妙なバランスで配置している。一切の樹木や装飾を削ぎ落とし、見る者に無限の宇宙や禅の深い精神的な悟りの境地（無）を対話させる、日本美の到達点。" },
  { id: 397, name: "天龍寺庭園", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "京都の嵐山にある、夢窓疎石が設計したとされる室町時代初期の池泉回遊式庭園。雄大な嵐山や亀山を借景として巧みに取り入れ、大きな池の護岸には力強い石組み（滝組）を配している。平安時代の優美な寝殿造庭園の伝統と、中国からもたらされた厳格な禅宗様式が見事に融合した初期禅宗庭園の名作。" },
  { id: 398, name: "寒山拾得図", type: "buff_all", value: 0.25, desc: "室町時代初期の謎の画僧・可翁が描いたとされる国宝の水墨画。中国の唐代の伝説的な隠者である寒山と拾得を題材にしている。細かな描写を捨て、数本の極めて大胆で力強い「減筆体」の線だけで人物の不思議な表情と深い禅の境地を描き出しており、日本における初期水墨画の最高峰として高く評価されている。" },
  { id: 399, name: "天橋立図", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "室町時代の画僧・雪舟が80歳を過ぎてから描いたとされる国宝の水墨画。日本三景の一つである丹後の天橋立の雄大な景観を、現実の風景を正確に写生しながらも、俯瞰的な構図へと大胆に再構成している。中国画の模倣を超えて、日本の実際の風景を水墨画として描き切った、日本美術史上の不朽の名作。" },
  { id: 400, name: "四季山水図巻", type: "heal_round", value: 0.30, desc: "雪舟が描いた全長15メートルに及ぶ長大な水墨画の絵巻物（国宝）。通称「山水長巻」。春の穏やかな風景から始まり、夏、秋、そして厳しい冬の雪景色へと至る四季の自然の変化を、圧倒的な筆力と精緻な構成で描き出している。雪舟の中国での学びと日本的な詩情が完璧に融合した水墨画の集大成。" },
  { id: 401, name: "五山版", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "鎌倉時代から室町時代にかけて、京都や鎌倉の五山・十刹などの禅宗寺院において、高度な木版印刷技術を用いて出版された書物の総称。仏教の経典だけでなく、禅宗の語録や漢詩文、さらには儒学（宋学）の注釈書や医学書などが大量に印刷・普及し、中世日本の学問と文化の水準を飛躍的に高めた。" },
  { id: 402, name: "閑吟集", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "室町時代後期（1518年）に編纂された小歌（流行歌）の詞華集。編者は不明。武士や貴族の和歌とは異なり、室町時代の民衆の間で自由に歌われていた「何せうぞ くすんで 一期は夢よ ただ狂へ」といった、刹那的で享楽的な愛の歌や人生の哀感を、飾らない素直な言葉で収録した貴重な庶民文学の宝庫。" },
  { id: 403, name: "菟玖波集", type: "buff_attr", target: "CULTURE", value: 0.25, desc: "南北朝時代の1356年に、連歌師の二条良基が救済らとともに編纂した日本初の連歌の撰集。約2000句を収録し、勅撰和歌集に準ずる「准勅撰」の格式を得た。これにより、それまで和歌の余興や遊びとされていた連歌が、和歌と肩を並べる独立した高度な文学芸術として公的に認められる画期となった。" },
  { id: 404, name: "新撰菟玖波集", type: "buff_all", value: 0.30, desc: "室町時代後期の1495年、連歌の大成者である宗祇が諸国を行脚して集めた句を中心に編纂した第2の准勅撰連歌集。応仁の乱後の荒廃した世にあって、芸術性を極限まで高めた「正風連歌」の最高傑作が多数収録されており、室町時代の文芸の到達点を示すとともに、後世の連歌の絶対的な手本とされた。" },
  { id: 405, name: "犬筑波集", type: "debuff_all", value: 0.25, desc: "戦国時代に連歌師の山崎宗鑑が編纂したとされる俳諧連歌集。宗祇らが確立した格式張った正風連歌に対し、言葉遊びや卑語、強烈な滑稽味や風刺を大胆に取り入れた。この自由で反骨精神に満ちた「俳諧」の精神は、のちの江戸時代の松尾芭蕉らに受け継がれ、俳句という新しい大衆文学を生み出す源流となった。" },
  { id: 406, name: "水無瀬三吟百韻", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "1488年、宗祇とその高弟である肖柏・宗長の三人が、後鳥羽上皇を祀る水無瀬神宮で詠んだ百句の連歌。和歌の「幽玄」の美意識を連歌の世界で見事に表現し、一句ごとの見事な転換と全体の完璧な調和を達成した。日本連歌史上の最高傑作であり、東山文化の洗練の極致を示す文学作品。" },
  { id: 407, name: "宗長手記", type: "heal_round", value: 0.20, desc: "戦国時代の連歌師・宗長が、晩年に駿河から京都などを旅した際の見聞を綴った紀行日記。戦国大名たちの争乱の様子や、京都の荒廃、そして大名や豪商たちとの連歌を通じた豊かな文化交流が、自由な俳諧的表現や和歌を交えて記されており、戦国時代の社会と文化の素顔を伝える一級の史料。" },
  { id: 408, name: "朝倉孝景条々", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "越前国の戦国大名・朝倉氏が定めたとされる全17カ条の分国法（制定者は敏景とも）。家臣の領地居住を禁じて一乗谷への集住を強制し、名門の血筋よりも実力主義による人材登用を明記した。戦国大名による強固な領国支配と中央集権化を宣言した、戦国家法としての先駆的かつ最も有名な法令の一つ。" },
  { id: 409, name: "甲州法度之次第", type: "buff_attr", target: "VALOR", value: 0.35, desc: "甲斐国の武田信玄が1547年に制定した全57カ条の分国法。「喧嘩両成敗」の原則を厳格に規定して家臣間の私闘を固く禁じた。最大の特徴は、大名である信玄自身もこの法の下に服すると明記した点にあり、強大な武田騎馬軍団を統率するための強力な法治主義と絶対的な秩序維持の精神を示している。" },
  { id: 410, name: "今川仮名目録", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "駿河国の今川氏親が1526年に制定した全33カ条の分国法。武士や農民にも分かりやすいように平仮名交じりの和文で記された。守護の権限を超えて領内の土地支配や裁判権を大名が独占することを宣言し、室町幕府の法律（御成敗式目など）を明確に否定して、戦国大名としての完全な独立を宣言した画期的な法令。" },
  { id: 411, name: "塵芥集", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "陸奥国の戦国大名・伊達稙宗が1536年に制定した、全171カ条に及ぶ戦国時代最大の分国法。『御成敗式目』を強く意識して編纂され、刑罰や所領争いの規定だけでなく、質入れや売買などの経済活動のルールまで極めて詳細に定めている。広大な東北地方を支配するための伊達氏の高度な統治能力を示す。" },
  { id: 412, name: "結城氏新法度", type: "damage_cut_all", value: 0.30, desc: "下総国（茨城県）の戦国大名・結城政勝が1556年に制定した全104カ条の分国法。他国との婚姻の禁止やや農民の逃亡防止など、家臣と領民を大名の強い統制下に置く規定が並ぶ。関東地方の激しい戦乱（享徳の乱など）を生き抜くために、大名権力を極限まで強化しようとした東国武士の緊迫した実態を伝える。" },
  { id: 413, name: "六角氏式目", type: "buff_all", value: 0.25, desc: "南近江の戦国大名・六角義賢が1567年に制定した分国法。他の分国法が大名の一方的な命令であるのに対し、この法は有力家臣団からの起草・要求を大名が承認し、互いに誓約を交わすという特異な形式をとっている。近江における国人衆の連合体という六角氏の権力構造の限界と独自性を示している。" },
  { id: 414, name: "長宗我部氏掟書", type: "buff_attr", target: "VALOR", value: 0.30, desc: "四国を制覇した長宗我部元親らが1597年に制定した全100カ条の分国法。他国との激しい戦闘を前提とし、有名な「一領具足（農作業中も武器を携帯する半農半兵）」など、領内の全人民を徹底して軍事的に動員・統制するための苛烈な規定が数多く含まれている、戦国末期の総力戦体制を象徴する法令。" },
  { id: 415, name: "早雲寺殿廿一箇条", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "相模国の後北条氏の祖・北条早雲（伊勢宗瑞）が定めたとされる21カ条の家訓。朝夕の礼儀作法から、武具の手入れ、学問の奨励、そして「上下万民に対して虚言を言わない」といった民政の心得まで、戦国大名として乱世を生き抜くための実践的で合理的な心構えを説き、後北条氏繁栄の基礎的理念となった。" },
  { id: 416, name: "薩南学派", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "室町時代後期に、五山の禅僧・桂庵玄樹が島津氏の招きで薩摩国に伝えた朱子学の学派。観念的な理論よりも、君臣の義や実践的な道徳を強烈に重んじた。この厳格な教えは九州南部の武士社会に深く浸透し、のちの「郷中教育」へと繋がり、幕末に西郷隆盛ら数多くの維新の志士を輩出する強固な精神的土壌を形成した。" },
  { id: 417, name: "姫路城", type: "damage_cut_all", value: 0.40, desc: "豊臣秀吉ののち、池田輝政が慶長期に大改修した播磨国の平山城。五層七重の大天守と三つの小天守が渡櫓で結ばれた連立式天守の複雑な構造を持ち、白漆喰総塗籠の白く輝く外観から「白鷺城」と呼ばれる。その圧倒的な防衛力と比類なき美しさは、日本に現存する近世城郭の最高峰として世界遺産に登録されている。" },
  { id: 418, name: "彦根城", type: "buff_hp", value: 0.35, desc: "徳川四天王の一人・井伊直政の死後、その子らが西国大名の監視と防御の最前線として近江国に築いた平山城。小ぶりながらも多様な破風（唐破風・千鳥破風など）を組み合わせた美しい国宝の天守を持ち、玄宮園という大名庭園を備える。幕府の重鎮である井伊氏の権威を象徴する、江戸初期の軍事拠点。" },
  { id: 419, name: "熊本城", type: "buff_attr", target: "VALOR", value: 0.40, desc: "加藤清正が7年の歳月をかけて肥後国に築き上げた、難攻不落の名城。敵の侵入を防ぐために上部へ行くほど垂直に反り返る「武者返し」と呼ばれる漆黒の石垣や、籠城戦を想定して敷地内に多数の銀杏を植えた（銀杏城）ことで有名。1877年の西南戦争において、西郷軍の猛攻を最後まで防ぎ切ってその真価を証明した。" },
  { id: 420, name: "松本城", type: "damage_cut_all", value: 0.35, desc: "信濃国（長野県）に現存する、五重六階の複合連結式天守を持つ国宝の平城。豊臣秀吉の家臣・石川数正らが築城した。下部は黒漆塗り、上部は白漆喰という威厳ある外観を持ち、鉄砲戦に備えた多数の鉄砲狭間や矢狭間が設けられている。戦国末期の極めて実戦的な城郭建築の姿を今日に伝える貴重な遺構。" },
  { id: 421, name: "犬山城", type: "buff_hp", value: 0.30, desc: "尾張国（愛知県）の木曽川南岸の小高い丘に建つ平山城。1537年に織田信長の叔父・織田信康が築城したとされ、現存する日本最古の天守（国宝）を持つ。背後に大河を背負った「後堅固」の縄張りであり、小規模ながらも望楼型の古い建築様式を残し、戦国時代の荒々しい砦の雰囲気を色濃く残している。" },
  { id: 422, name: "弘前城", type: "heal_round", value: 0.25, desc: "陸奥国（青森県）の津軽氏が江戸時代初期に築いた平山城。現存する12天守の一つであり、東北地方で唯一の現存天守を持つ。落雷で本来の天守が焼失したのち、幕府への配慮から隅櫓の改築という名目で再建された三層の天守である。城跡には数千本の桜が植えられ、現在では日本屈指の桜の名所として知られる。" },
  { id: 423, name: "駿府城", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "徳川家康が将軍職を秀忠に譲った後、大御所として政治の実権を握り続けた拠点（静岡県）。江戸城をもしのぐ巨大な天守や強固な三重の堀が築かれ、全国の大名や外国の使節が謁見に訪れた。実質的な日本の首都として機能し、「大御所政治」の絶対的な権威と幕藩体制の完成を象徴する巨大城郭。" },
  { id: 424, name: "名古屋城", type: "buff_all", value: 0.30, desc: "徳川家康が西国大名（豊臣恩顧の大名）たちに命じて行わせた「天下普請」によって、尾張国に築城された巨大な平城。徳川御三家筆頭である尾張徳川家の居城。金鯱（金のしゃちほこ）を頂く五層の大天守は、徳川政権の圧倒的な財力と大坂城の豊臣氏に対する強烈な軍事的威圧を目的とした、近世城郭の到達点。" },
  { id: 425, name: "二条城", type: "buff_attr", target: "STRATEGY", value: 0.40, desc: "徳川家康が京都の守護と将軍上洛の際の宿泊所として築いた城。国宝の二の丸御殿は、豪華絢爛な狩野派の障壁画や精巧な彫刻で飾られた書院造の最高傑作。1603年に家康がここで将軍宣下の祝賀を行い、1867年に15代将軍・慶喜がここで大政奉還を発表したという、江戸幕府の始まりと終わりを見届けた歴史的舞台。" },
  { id: 426, name: "桂離宮", type: "heal_round", value: 0.35, desc: "江戸時代初期、後陽成天皇の弟・八条宮智仁親王らによって京都の桂川畔に造営された広大な別邸。書院造に茶室の簡素な意匠を取り入れた「数寄屋造」の建築群と、複雑に入り組んだ池泉回遊式の庭園が完璧な調和を見せている。装飾を排した直線的でモダンな美しさは、のちに世界中の建築家に絶賛された日本建築の奇跡。" },
  { id: 427, name: "修学院離宮", type: "buff_hp", value: 0.30, desc: "江戸時代前期、幕府の圧力で退位させられた後水尾上皇が、京都洛北の比叡山麓に造営した広大な山荘。下・中・上の三つの茶屋からなり、雄大な借景を利用して自然の山並みや棚田までも庭園の一部として取り込んだ、おおらかで開放的な池泉回遊式庭園の傑作。上皇の豊かな文化的教養と幕府への無言の抵抗を示す空間。" },
  { id: 428, name: "仙洞御所", type: "damage_cut_all", value: 0.25, desc: "退位した天皇（上皇・法皇）の住まい。特に京都御所の南東に小堀遠州らによって造営された後水尾上皇の仙洞御所の庭園は名高い。広大な池と優美な州浜を備え、公家文化の優雅さと茶の湯の精神が融合している。政治の実権を奪われた朝廷が、文化や芸術の保護者としてそのアイデンティティを保ち続けた象徴的な場所。" },
  { id: 429, name: "日光東照宮", type: "buff_attr", target: "STRATEGY", value: 0.40, desc: "徳川家康を「東照大権現」として祀るために、3代将軍・家光が莫大な幕府の財力をつぎ込んで造営した豪奢な霊廟建築群。本殿と拝殿を石の間で結ぶ「権現造」を基本とし、陽明門に代表される極彩色の彫刻（眠り猫や三猿など）で埋め尽くされている。将軍の神格化と幕府の絶対的な権威を全国に知らしめるための聖地。" },
  { id: 430, name: "久能山東照宮", type: "buff_hp", value: 0.30, desc: "徳川家康の遺言により、その遺骸が最初に埋葬された駿河国（静岡県）の山頂に建つ霊廟。2代将軍・秀忠によって総漆塗り・極彩色の権現造の社殿が造営された。のちに家光によって日光に改葬（勧請）された後も、徳川家発祥の聖地の一つとして幕府から極めて手厚く保護され続けた、初期江戸時代の華麗な建築様式を伝える。" },
  { id: 431, name: "天正大判", type: "buff_hp", value: 0.35, desc: "豊臣秀吉が後藤庄三郎らに命じて鋳造させた、世界最大級の純金製の楕円形金貨。日常の商取引に使用されるものではなく、主に大名や公家、寺社などへの莫大な恩賞や贈答品として用いられた。秀吉の天下人としての計り知れない圧倒的な経済力と絶対的な権威を、金という物質を通じて視覚的に誇示するための象徴。" },
  { id: 432, name: "慶長小判", type: "buff_all", value: 0.30, desc: "1601年、徳川家康が全国の貨幣制度を統一するために鋳造させた、極めて金の含有量（純度84%）が高い高品質な金貨。「両・分・朱」の4進法に基づく日本の近世貨幣体系の基準となった。この良質な貨幣の大量発行が経済の安定と信用を生み出し、江戸時代初期の商工業の爆発的な発展を根本から支えた。" },
  { id: 433, name: "元禄小判", type: "debuff_all", value: 0.30, desc: "5代将軍・綱吉の時代、勘定奉行の荻原重秀の献策により、慶長小判を改鋳して作られた金貨。金の含有量を大幅に減らして（純度約57%）通貨量を増発し、幕府は巨額の改鋳差益を得て財政赤字を解消した。しかし、貨幣価値の下落が激しいインフレーションを引き起こし、庶民の生活を大いに圧迫する結果となった。" },
  { id: 434, name: "宝永小判", type: "heal_round", value: 0.20, desc: "6代将軍・家宣の時代に、新井白石の指示によって鋳造された小判。元禄の改鋳による悪性インフレを鎮めるため、金の含有量を慶長小判とほぼ同等の高い水準に戻した（純度約84%）。しかし、世中に出回る貨幣の絶対量が急減したため、逆に深刻なデフレーションを招き、経済活動を停滞させてしまった。" },
  { id: 435, name: "天保小判", type: "debuff_all", value: 0.25, desc: "幕末の天保の改革の時期に、慢性的な幕府の財政難を補うために金の含有量を極端に下げて（純度約56%）大量に発行された小判。この質の悪い貨幣の濫発がさらに激しい物価高騰を招き、その後の開国時には、海外との金銀比価の違いによる深刻な金貨の大量流出（万延小判への改鋳）を引き起こす根本原因となった。" },
  { id: 436, name: "万延小判", type: "damage_cut_all", value: 0.25, desc: "1860年、日米修好通商条約による貿易開始後、海外との金銀交換比率の違いを突かれて日本の金貨が大量に海外へ流出したため、これを阻止する苦肉の策として鋳造された極小の金貨。重さを従来の約3分の1にまで減らしたため金の流出は止まったが、かつてない超インフレーションを引き起こし、幕府経済の崩壊を決定づけた。" },
  { id: 437, name: "藩札", type: "buff_hp", value: 0.25, desc: "江戸時代に各藩が独自の財源確保や領内の経済振興を目的として、自藩の領内のみで通用させた紙幣。福井藩の発行を皮切りに全国の多くの藩で発行された。銀や銅との交換（兌換）を建前としたが、藩の財政が悪化すると乱発されて紙切れ同然となることも多く、領民の激しい反発（一揆）を招く原因ともなった。" },
  { id: 438, name: "千石簁", type: "buff_all", value: 0.20, desc: "江戸時代（元禄期）に普及した、収穫した米や麦の選別作業を劇的に効率化させた農具。「簁（とおし）」とは金網を張ったふるいのことで、斜めに立てかけたこの網の上に穀物を流し落とすことで、大きさの違う未熟な粒や塵を自動的に素早く選り分けることができた。千歯扱や唐箕と並ぶ、江戸農業革命の三種の神器の一つ。" },
  { id: 439, name: "踏車", type: "heal_round", value: 0.25, desc: "17世紀半ば（江戸時代前期）に考案された、水田に水をくみ上げるための画期的な木製の揚水機。農民が車輪の上に乗って足で踏み板を回転させることで、連続して効率よく水を高い場所へ引き上げることができた。従来の竜骨車や釣瓶に比べてはるかに少ない労力で広大な水田の灌漑を可能にし、新田開発を強力に後押しした。" },
  { id: 440, name: "油粕", type: "buff_hp", value: 0.25, desc: "菜種や綿実から灯明用などの油を絞り取った後に残るカスを利用した金肥（購入肥料）。干鰯とともに、江戸時代の農業において極めて重要視された速効性の高い窒素肥料。商品作物の栽培が盛んになるにつれて大量に消費され、農村を貨幣経済の波に深く巻き込むとともに、肥料商人（問屋）の台頭を促した。" },
  { id: 441, name: "〆粕", type: "buff_attr", target: "STRATEGY", value: 0.20, desc: "イワシやニシンなどの魚を煮て、油（魚油）を強く絞り出した後に残る固形のカスを乾燥させた金肥。そのまま干した干鰯よりもさらに肥料としての効果が高く、運搬にも適していた。江戸時代後期に北海道（蝦夷地）のニシン漁が大規模化すると、北前船によって大量に上方や全国へと運ばれ、商品作物生産の生命線となった。" },
  { id: 442, name: "藍", type: "buff_all", value: 0.30, desc: "江戸時代、木綿の普及とともに日本人の衣料を染める最も主要な染料（青色）として全国で爆発的に需要が高まった商品作物（四木三草の一つ）。特に阿波国（徳島県）の吉野川流域で栽培された「阿波藍」は最高級品として全国の市場を独占し、徳島藩に莫大な富をもたらして「藍玉」の巨大な流通ネットワークを形成した。" },
  { id: 443, name: "紅花", type: "heal_round", value: 0.25, desc: "花びらから鮮やかな赤い染料や口紅の原料となる色素を抽出する、非常に高価な商品作物。江戸時代には出羽国（山形県）の最上地方が全国最大の産地となり、「最上紅花」として最上川から日本海ルート（北前船）を経て京都の西陣などの高級織物産地へ運ばれ、上方の華やかな町人文化と装いを色鮮やかに彩った。" },
  { id: 444, name: "荏胡麻", type: "buff_attr", target: "CULTURE", value: 0.20, desc: "種子から灯明用の油（荏胡麻油）を採取するために中世から盛んに栽培されたシソ科の商品作物。室町時代には京都の大山崎油座がこの荏胡麻の独占販売権を握って強大な権勢を誇った。しかし江戸時代に入ると、より安価で明るい光を放つ菜種油が普及したため、灯明用としての荏胡麻栽培は次第に衰退していった。" },
  { id: 445, name: "木綿", type: "damage_cut_all", value: 0.35, desc: "室町時代に朝鮮から伝来し、江戸時代に三河や河内を中心に全国的な栽培が爆発的に広まった商品作物。麻よりも暖かく丈夫で、絹よりも安価であったため、庶民の衣料に革命をもたらした。農家の副業として糸紡ぎや機織りが盛んに行われ（問屋制家内工業）、日本の産業革命における最大の主力産業（紡績業）の原点となった。" },
  { id: 446, name: "絹", type: "buff_hp", value: 0.30, desc: "蚕の繭から生糸を紡ぎ出して織られる、古来から最も尊ばれた最高級の衣料素材。江戸時代前期までは白糸（生糸）の多くを中国からの輸入（糸割符制度）に頼っていたが、次第に国内での養蚕や製糸技術が向上。幕末の開港後には、日本の生糸が欧米へ向けて最大の輸出品となり、近代日本の富国強兵を経済面で力強く牽引した。" },
  { id: 447, name: "結城紬", type: "buff_all", value: 0.25, desc: "下総国結城（茨城県）周辺で生産された、極めて高品質な絹織物。真綿から手作業で丁寧に糸を紡ぎ出し、地機（じばた）で織り上げる伝統的な手法で作られる。軽くて非常に暖かく、丈夫であるため、江戸時代の裕福な町人や武士の日常着・お洒落着として熱狂的に愛好された、日本を代表する最高級の絹織物ブランド。" },
  { id: 448, name: "西陣織", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "京都の西陣地区で生産される、極めて高度な技術を用いた絢爛豪華な高級絹織物。応仁の乱後に職人たちが集まり、明から導入した高機（たかはた）や紋織の複雑な技術を駆使して、将軍や公家、大名などの特権階級の需要を独占した。江戸時代を通じて日本の最高峰の織物産地として君臨し、地方の織物産業の手本となった。" },
  { id: 449, name: "小倉織", type: "damage_cut_all", value: 0.20, desc: "豊前国小倉（福岡県）で江戸時代初期から生産された、経糸（たていと）を非常に密にして織り上げる丈夫な綿織物。立体的な縞模様が特徴で、摩擦に強いため、全国の武士の袴（はかま）や帯の生地として爆発的に普及し大流行した。質実剛健を好む武家社会の需要を見事に捉えた、江戸時代の代表的な特産品。" },
  { id: 450, name: "久留米絣", type: "heal_round", value: 0.25, desc: "江戸時代後期に、筑後国久留米（福岡県）の井上伝という少女の工夫によって考案されたとされる綿織物。あらかじめ藍で染め分けた糸（絣糸）を用いて、緻密な幾何学模様などを織り出す。その丈夫さと素朴で美しい風合いから、庶民の日常着として全国に広く普及し、日本の代表的な絣織物としての地位を確立した。" },
  { id: 451, name: "越後縮", type: "buff_hp", value: 0.20, desc: "越後国（新潟県）の魚沼地方などで生産された、非常に細い苧麻（カラムシ）の糸で織り上げられた最高級の麻織物。雪の湿気を利用して糸を紡ぎ、雪の上に布をさらして漂白する（雪晒し）という雪国の厳しい風土が生んだ技術の結晶。通気性が良く肌触りが涼しいため、武士や富裕層の夏の式服として極めて珍重された。" },
  { id: 452, name: "伊万里焼", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "豊臣秀吉の朝鮮出兵（文禄・慶長の役）の際に連れ帰られた朝鮮人陶工・李参平らによって、肥前国（佐賀県）有田で磁器の原料となる陶石が発見されて始まった日本初の磁器。伊万里港から出荷されたためこう呼ばれる。酒井田柿右衛門による美しい「赤絵（色絵）」の技術が完成し、オランダ船を通じてヨーロッパの王侯貴族をも魅了した。" },
  { id: 453, name: "九谷焼", type: "debuff_all", value: 0.25, desc: "江戸時代前期（17世紀半ば）に、加賀藩主の前田利治の命により加賀国（石川県）の九谷村で生産が始まった磁器（古九谷）。有田から技術を導入したとされる。赤・緑・黄・紫・紺青の「九谷五彩」と呼ばれる極めて濃厚で鮮やかな色彩を用い、大胆で絵画的な構図を描き出す、独特の重厚で豪奢な美しさを誇る高級磁器。" },
  { id: 454, name: "薩摩焼", type: "buff_all", value: 0.25, desc: "豊臣秀吉の朝鮮出兵の際に連れ帰られた朝鮮人陶工の沈当吉（沈寿官の祖）らによって、薩摩国（鹿児島県）で創始された陶器。島津氏の厚い保護を受け、領民の日用品である黒褐色の「黒薩摩」と、藩主の御用品や幕府への献上品として金や極彩色で華麗な絵付けが施された「白薩摩」という、対照的な二つの様式が発展した。" },
  { id: 455, name: "唐津焼", type: "heal_round", value: 0.20, desc: "朝鮮出兵を機に渡来した陶工たちによって、肥前国（佐賀県）の唐津を中心に生産が盛んになった陶器。「一楽・二萩・三唐津」と称されるように、鉄絵（絵唐津）などの素朴で力強い風合いと温かみのある土の質感が茶人たちから熱狂的に愛された。茶の湯の器である茶碗や水指として、侘び寂びの美意識を最も体現する焼き物。" },
  { id: 456, name: "萩焼", type: "damage_cut_all", value: 0.25, desc: "毛利氏が長門国（山口県）の萩に本拠を移した際、朝鮮から連れ帰った陶工の李敬らによって御用窯として開かれた陶器。「一楽・二萩・三唐津」と称され、焼き締まりが少なく保温性が高い柔らかな土の質感が特徴。「萩の七化け」と呼ばれる、使い込むほどにお茶が浸透して表面のひび割れ（貫入）の色合いが変化する侘びの美が茶人に愛された。" },
  { id: 457, name: "輪島塗", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "能登国（石川県）の輪島地方で江戸時代前期に製法が確立した、極めて堅牢で実用的な漆器。漆に地元で採れる「地の粉（珪藻土）」を混ぜて下塗りを何度も繰り返すことで、圧倒的な耐久性を実現した。美しい沈金や蒔絵の装飾も施され、行商人による独自の販売網を通じて全国の富裕な農家や町人の間で一生モノとして珍重された。" },
  { id: 458, name: "春慶塗", type: "buff_hp", value: 0.20, desc: "木地の美しい木目をそのまま活かすために、黄色や赤色に染めた上に透明な漆（透漆）を塗って仕上げる漆器の技法。室町時代の堺の漆工・春慶が創始したと伝えられ、江戸時代には飛騨国（岐阜県）の高山や出羽国（秋田県）の能代などで特産品として発展した。自然の木目の美しさと実用性を兼ね備えた、簡素で上品な漆器。" },
  { id: 459, name: "会津塗", type: "heal_round", value: 0.25, desc: "陸奥国会津（福島県）で生産される漆器。戦国時代に蒲生氏郷が領主となった際、近江国から木地師や塗師を招き入れて産業として強力に奨励したのが本格的な始まり。のちの松平氏の時代にも手厚く保護され、金箔や金粉を用いた華やかな消金蒔絵などを特徴とし、東北地方における漆器産業の最大の拠点として大きく発展した。" },
  { id: 460, name: "天下之台所", type: "buff_all", value: 0.35, desc: "江戸時代における大商業都市・大坂の異名。全国の諸大名の蔵屋敷が立ち並び、日本中から集められた年貢米や特産品（蔵物）が一手に集積・取引された。ここでの相場が全国の物価の絶対的な基準となり、菱垣廻船などを通じて大消費地の江戸へと物資を供給する、日本経済の心臓部として圧倒的な繁栄を誇った。" },
  { id: 461, name: "金座", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "江戸幕府が金貨（小判や一分金）を独占的に鋳造し、極印を打って鑑定を行うために設けた特権的な機関。徳川家康が後藤庄三郎を御金改役に任命して江戸や京都に設置させた。幕府による全国的な貨幣統一の根幹をなす機関であり、ここで鋳造された慶長金銀が江戸時代の信用経済を確立する絶対的な基盤となった。" },
  { id: 462, name: "銀座", type: "buff_hp", value: 0.30, desc: "江戸幕府が丁銀や豆板銀などの銀貨を鋳造するために、大黒常是らに命じて伏見、京都、のちには江戸などに設置させた特権的な機関。江戸の銀座が置かれた場所は、現在の東京の中心的な商業地である「銀座」の地名の由来となっている。西日本で広く流通した秤量貨幣である銀貨の供給を完全にコントロールし、幕府の財政を支えた。" },
  { id: 463, name: "好色一代男", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "1682年、大坂の俳諧師であった井原西鶴が著した、浮世草子の最初の作品にして不朽の名作。主人公の世之介が7歳で恋に目覚めてから60歳で好色丸に乗って女護ヶ島へ旅立つまでの、54年にわたる数奇な恋愛遍歴を描く。武士の道徳から完全に解放された、町人の強烈な愛欲と生命力を写実的に描き、元禄文学の扉を開いた。" },
  { id: 464, name: "好色五人女", type: "debuff_all", value: 0.25, desc: "1686年、井原西鶴が著した浮世草子。「八百屋お七」をはじめとする、実際に社会事件として話題になった5つの悲劇的な駆け落ちや不義密通の物語を題材にしている。身分や封建的な義理といった古い秩序に縛られず、自らの情熱的な愛のために命を投げ打つ町人女性たちの姿を、鋭い観察眼と哀感をもってリアルに描き出した傑作。" },
  { id: 465, name: "世間胸算用", type: "heal_round", value: 0.30, desc: "1692年、井原西鶴が著した浮世草子（町人物）の最高傑作。「大晦日は一日千金」という副題の通り、借金の取り立てが集中する一年の終わりの大晦日を舞台に、借金取りの巧妙な手口と、あの手この手で逃げ回る貧しい町人たちの必死の攻防を、極めてコミカルかつリアルに描き、元禄時代の苛烈な金銭社会の現実を浮き彫りにした。" },
  { id: 466, name: "日本永代蔵", type: "buff_all", value: 0.35, desc: "1688年、井原西鶴が著した浮世草子（町人物）。様々な手段で巨万の富を築き上げた成功者の実話から、遊郭で身を持ち崩して破産する者まで、町人の経済活動のシビアな現実を描いた30の短編集。「金銀こそが町人の氏図譜（系図）である」と説き、倹約と才覚による資本蓄積を肯定する、江戸時代の優れたビジネス教訓書。" },
  { id: 467, name: "男色大鑑", type: "damage_cut_all", value: 0.25, desc: "1687年、井原西鶴が著した浮世草子。武士階級における主従の忠義と結びついた男色（衆道）の悲劇的な物語と、歌舞伎の若衆（役者）と町人たちとの華やかな男色の物語を対比させて描いている。武家社会の厳格な精神性と、町人社会の退廃的で享楽的な風俗という、江戸時代の二つの異なる価値観と美意識を鮮やかに切り取った作品。" },
  { id: 468, name: "武家義理物語", type: "buff_attr", target: "VALOR", value: 0.30, desc: "1688年、井原西鶴が著した浮世草子（武家物）。主君への絶対的な忠義や、面子（メンツ）を守るための仇討ち、そして義理のために我が子をも犠牲にする武士たちの過酷で非情な生き様を描く。町人の視点から武士階級の不条理な行動規範（武士道）を客観的かつ時に批判的に描き出し、泰平の世における武士の存在意義を問うた作品。" },
  { id: 469, name: "曽根崎心中", type: "debuff_all", value: 0.35, desc: "1703年、近松門左衛門が書き下ろした人形浄瑠璃の脚本（世話物）。実際に大坂の曽根崎の森で起きた、醬油屋の手代・徳兵衛と遊女・お初による情死事件を、わずか数週間後に舞台化して空前の大ヒットとなった。義理としがらみに縛られた現世を捨て、あの世での永遠の結びつきを信じて死へ向かう「道行」の名文は涙を誘った。" },
  { id: 470, name: "国性爺合戦", type: "buff_attr", target: "STRATEGY", value: 0.35, desc: "1715年、近松門左衛門が書き下ろした人形浄瑠璃の時代物の最高傑作。明の遺臣の父と日本人の母を持つ主人公・和藤内（鄭成功がモデル）が、清に滅ぼされた明王朝を再興するために中国大陸へ渡り、虎を退治し大軍を打ち破って大活躍する壮大なスケールの物語。大坂の竹本座で初演され、17カ月連続上演という空前の大記録を打ち立てた。" },
  { id: 471, name: "女殺油地獄", type: "enemy_debuff", value: 0.25, desc: "1721年、近松門左衛門が晩年に著した世話物の名作。借金に追われ自暴自棄になった放蕩息子の河内屋与兵衛が、親切にしてくれた同業の油屋の妻・お吉を借金のために惨殺してしまうという、実際に起きた凄惨な殺人事件を描く。人間の心の闇や衝動的な犯罪心理を極めてリアルにえぐり出し、近代文学にも通じる深みを持つ傑作。" },
  { id: 472, name: "冥途の飛脚", type: "damage_cut_all", value: 0.30, desc: "1711年、近松門左衛門による世話物の名作。飛脚問屋の養子・忠兵衛が、愛する遊女・梅川を身請けするため、絶対に手を付けてはならない幕府の公金（為替金）の封印を切ってしまう。死罪を覚悟した二人が、雪の降る故郷の大和新口村へと逃避行を続ける悲劇的な道行は、義理と人情の板挟みになる人間の弱さと悲哀を美しく描く。" },
  { id: 473, name: "大日本史", type: "buff_attr", target: "STRATEGY", value: 0.40, desc: "水戸藩主・徳川光圀（水戸黄門）が編纂を開始した、神武天皇から後小松天皇までの歴史を紀伝体で記した巨大な歴史書。大義名分（君臣の義）を極めて重んじ、南朝を正統とする独自の史観（水戸学）を確立した。完成までに約250年を要し、幕末の尊王攘夷運動の強力な理論的・精神的なバックボーンとなって倒幕へと繋がった。" },
  { id: 474, name: "読史余論", type: "buff_all", value: 0.30, desc: "江戸時代中期の儒学者・新井白石が、将軍・徳川家宣に日本の歴史を進講した内容をまとめた歴史書。「天下の形勢は九変して武家の代となり…」と、公家から武家への政権交代の歴史を独自の合理的な九段階の時代区分を用いて論理的に解説した。神話や仏教の因果律を排し、人間の政治的な動きによって歴史を解釈した画期的な名著。" },
  { id: 475, name: "折たく柴の記", type: "heal_round", value: 0.25, desc: "新井白石が晩年に著した自叙伝。極貧の浪人時代から猛勉強によって将軍の侍講にまで出世し、「正徳の治」と呼ばれる幕政改革を主導して失脚するまでの波乱万丈な生涯と、その時の政治的決断の舞台裏を詳細に綴っている。政治家の赤裸々な回想録として日本文学史上でも異彩を放ち、江戸時代中期の政治構造を知る一級の史料。" },
  { id: 476, name: "西洋紀聞", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "新井白石が、屋久島に潜入して捕らえられたイタリア人宣教師シドッチを直接尋問して得た知識をもとにまとめた、西洋の地理・歴史・宗教に関する画期的な研究書。キリスト教の教理そのものは非合理的と批判しつつも、西洋の科学技術や地理学の高度さを正確に認識し、鎖国下の日本において世界に目を開いた先駆的な著作。" },
  { id: 477, name: "采覧異言", type: "buff_all", value: 0.25, desc: "新井白石がシドッチへの尋問やオランダの地理書をもとに編纂した、日本初の本格的な世界地理書。五大州（アジア・ヨーロッパ・アフリカ・南北アメリカ）の各国の地理、歴史、風俗を詳細に記述している。鎖国という情報の壁の中で、為政者として正確な世界情勢を把握しようとした白石の卓越した知性を示す重要な文献。" },
  { id: 478, name: "万葉代匠記", type: "buff_attr", target: "CULTURE", value: 0.30, desc: "江戸時代前期、徳川光圀の依頼を受けて真言宗の僧・契沖が著した『万葉集』の本格的な注釈書。中世以来の和歌の秘伝（古今伝授など）や憶測を完全に排除し、古い文献に基づく厳格な実証主義的な手法で万葉仮名の解読や語義の解明を行った。この科学的な古典研究の手法が、のちの賀茂真淵や本居宣長へと続く「国学」の出発点となった。" },
  { id: 479, name: "和字正濫鈔", type: "buff_hp", value: 0.20, desc: "国学の祖である契沖が1693年に著した、日本語の仮名遣いに関する画期的な研究書。藤原定家らが定めた当時の不規則な仮名遣いを批判し、『万葉集』などの古代の文献の正確な表記に基づいた本来の正しい仮名遣い（歴史的仮名遣い）の法則を初めて体系的に提唱した。この法則は明治維新後、現代かなづかいが制定されるまで国語の基準とされた。" },
  { id: 480, name: "農業全書", type: "buff_all", value: 0.35, desc: "1697年、福岡藩の元武士・宮崎安貞が中国の農書『農政全書』を参考にしつつ、自ら全国を歩いて実地調査を重ねて著した日本初の体系的な農書。米や麦の栽培法だけでなく、商品作物や果樹、林業に至るまで多岐にわたる農業技術を図解入りで分かりやすく解説し、江戸時代の農業生産力の飛躍的な向上に絶大な貢献をした大ベストセラー。" },
  { id: 481, name: "大和本草", type: "heal_round", value: 0.30, desc: "1709年、儒学者の貝原益軒が79歳で完成させた、日本初の本格的な本草学（植物学・薬物学）の専門書。中国の『本草綱目』の分類に頼らず、日本国内の約1300種以上の動植物や鉱物を独自に実証的に分類・解説した。単なる薬学にとどまらず、農学や博物学の実学としての発展を促し、江戸時代の科学的思考の土台を築いた。" },
  { id: 482, name: "塵劫記", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "1627年、和算家の吉田光由が出版した数学の入門書。そろばん（珠算）の詳しい使い方から、米の売買、金利の計算、検地のための土地の測量法まで、江戸時代の経済生活に直結する実用的な計算方法を、豊富な挿絵を用いて極めて分かりやすく解説した。版を重ねて江戸時代を通じて寺子屋の算術の教科書として爆発的に普及した。" },
  { id: 483, name: "発微算法", type: "buff_attr", target: "CULTURE", value: 0.35, desc: "1674年、日本の「算聖」と称される関孝和が著した高度な和算書。未知数を文字（傍書法）で表して複雑な方程式を立て、それを解くための代数学の手法（点竄術）を日本で初めて体系的に解説した。この画期的な発明により、和算は単なる実用の計算から、西洋の微分積分にも匹敵する世界最高水準の純粋数学へと劇的な進化を遂げた。" },
  { id: 484, name: "貞享暦", type: "buff_attr", target: "STRATEGY", value: 0.30, desc: "1684年、安井算哲（渋川春海）が作成し、幕府に採用された日本独自の新しい暦。それまで800年以上使われ、日食の予測が外れるなど誤差が生じていた中国の宣明暦の誤りを、自らの天体観測と中国の授時暦の研究によって見事に修正した。この功績により春海は初代の幕府天文方に任じられ、日本の天文学が独立を果たす記念碑となった。" },
  { id: 485, name: "宝暦暦", type: "debuff_all", value: 0.20, desc: "1755年、江戸幕府が貞享暦の誤差を修正するために改暦した暦。しかし、改暦を担当した土御門家（陰陽頭）などの能力不足により、西洋の天文学を取り入れようとした本来の計画が頓挫し、かえって不正確なものとなってしまった。この失敗が、のちの麻田剛立や高橋至時ら民間学者による西洋天文学の本格的な導入と寛政の改暦を促した。" },
  { id: 486, name: "寛政暦", type: "buff_all", value: 0.25, desc: "1798年、幕府の天文方である高橋至時や間重富らが中心となって完成させた、極めて精度の高い新しい暦。不評であった宝暦暦を廃止し、オランダの天文書を通じてケプラーの地動説理論や西洋の最新の天体観測技術を部分的に導入して作成された。鎖国下の日本が西洋近代科学の実用的な恩恵を国家レベルで受け入れた重要な成果。" },
  { id: 487, name: "天保暦", type: "buff_hp", value: 0.25, desc: "1844年、高橋至時の息子である渋川景佑らが完成させた江戸時代最後の太陰太陽暦。西洋の近代天文学の成果を全面的に取り入れ、月の満ち欠けや太陽の運行を極めて精密に計算して作られた。太陰太陽暦としては世界最高水準の精度を誇ったが、明治維新後の1873年に近代化政策の一環として太陽暦（グレゴリオ暦）に切り替えられ廃止された。" },
  { id: 488, name: "紅白梅図屏風", type: "buff_attr", target: "CULTURE", value: 0.40, desc: "尾形光琳の最晩年の最高傑作とされる国宝の屏風絵（MOA美術館蔵）。金箔の背景に、老いた白梅と若々しい紅梅を左右に配し、中央を渦巻くような暗い川（光琳波）が大胆に分断する斬新な構図。写実性と装飾性が極限まで研ぎ澄まされ、琳派の華麗な美学と光琳の芸術的到達点を余すところなく示す、日本美術史上の金字塔。" },
  { id: 489, name: "燕子花図屏風", type: "heal_round", value: 0.35, desc: "尾形光琳が描いた国宝の六曲一双の屏風絵（根津美術館蔵）。『伊勢物語』の八橋の場面を題材としながらも、人物や橋を一切描かず、金箔を張った総金地の背景に、群生する燕子花（カキツバタ）だけを濃密な群青と緑青の絵の具でリズミカルに繰り返し描いた。単純化されたモチーフの反復が生み出す、圧倒的にモダンで華麗な装飾画。" },
  { id: 490, name: "八橋蒔絵螺鈿硯箱", type: "damage_cut_all", value: 0.30, desc: "江戸時代初期の天才芸術家・本阿弥光悦が制作した国宝の硯箱。『伊勢物語』の八橋の情景をモチーフとし、黒漆の背景に、鉛の分厚い板でギザギザの橋を大胆に配置し、燕子花の花を青く輝く螺鈿（夜光貝）で、葉を金の蒔絵で表現した。従来の伝統的な漆芸の常識を破壊する、力強さと前衛的なデザイン性を持つ工芸品の傑作。" },
  { id: 491, name: "舟橋蒔絵硯箱", type: "buff_attr", target: "STRATEGY", value: 0.25, desc: "本阿弥光悦による国宝の硯箱。丸みを帯びた高く盛り上がった独特の蓋の形状を持ち、金地の上に何艘もの小舟が並んだ舟橋の情景を鉛の板で大胆に表現している。さらに、その上に『後撰和歌集』の和歌の文字を銀の板で散らして配置（葦手書き）しており、書と文学、そして漆工芸が見事に一体化した光悦の総合芸術の真骨頂。" },

let globalAudioCtx = null;
const initAudioContext = () => {
  if (!globalAudioCtx) {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) globalAudioCtx = new AudioContext();
  }
  if (globalAudioCtx && globalAudioCtx.state === 'suspended') globalAudioCtx.resume().catch(() => {});
  return globalAudioCtx;
};

if (typeof window !== 'undefined') {
  const enableAudio = () => { initAudioContext(); document.removeEventListener('touchstart', enableAudio); document.removeEventListener('click', enableAudio); };
  document.addEventListener('touchstart', enableAudio, { passive: true }); document.addEventListener('click', enableAudio, { passive: true });
}

const parseQuestion = (q) => {
  if (!q) return { text: "エラー", choices: [], correctIndex: 0 };
  const parts = q.split('|');
  return { text: parts[0], choices: [parts[1], parts[2], parts[3], parts[4]], correctIndex: parseInt(parts[5], 10) };
};

const getIndividualValue = (id, col) => col ? Math.min(col.filter(i => i === id).length - 1, MAX_IV) : 0;
const getLevel = (id, enh) => (enh && enh[id]) ? enh[id] : 1;
const calculatePower = (char, col, enh) => char ? Math.floor(char.power * (1 + (getLevel(char.id, enh) - 1) * 0.02) * (1 + (getIndividualValue(char.id, col) * 0.01))) : 0;
const getPowerByLevel = (char, lv) => char && lv > 0 ? Math.floor(char.power * (1 + (lv - 1) * 0.02)) : 0;
const calculateHp = (char, col, enh) => char ? Math.floor((char.hp || 100) * (1 + (getLevel(char.id, enh) - 1) * 0.02) * (1 + (getIndividualValue(char.id, col) * 0.01))) : 0;
const getHpByLevel = (char, lv) => char && lv > 0 ? Math.floor((char.hp || 100) * (1 + (lv - 1) * 0.02)) : 0;
const getEnhanceCost = (lv) => Math.floor(650 * Math.pow(lv, 1.6));

const getItemEffectDescription = (item) => {
  const val = Math.round(item.value * 100);
  switch (item.type) {
    case 'buff_hp': return `最大HP+${val}%`;
    case 'buff_attr': return `【${ATTRIBUTES[item.target]?.name}】の味方 歴史力+${val}%`;
    case 'buff_all': return `味方全員 歴史力+${val}%`;
    case 'debuff_all': return `敵全員 歴史力-${val}%`;
    case 'heal_round': return `毎合戦HP${val}%回復`;
    case 'damage_cut_all': return `被痛手を${val}%軽減`;
    case 'buff_pos': return `${item.pos}番目の味方 歴史力+${val}%`;
    default: return item.desc;
  }
};

const playNoise = (ctx, start, dur, vol, freq = 2000) => {
    if (!ctx) return;
    try {
        const bufferSize = ctx.sampleRate * dur; const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate); const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource(); noise.buffer = buffer;
        const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = freq;
        const gain = ctx.createGain(); gain.gain.setValueAtTime(vol, start); gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        noise.start(start); noise.stop(start + dur);
    } catch(e){}
};

const playSound = (type) => {
  const ctx = initAudioContext(); if (!ctx) return;
  const now = ctx.currentTime;
  const playOsc = (oscType, freq, start, dur, vol, freqEnd = freq) => {
      try {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = oscType; osc.frequency.setValueAtTime(freq, start);
          if (freqEnd !== freq) osc.frequency.exponentialRampToValueAtTime(freqEnd, start + dur);
          gain.gain.setValueAtTime(vol, start); gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(start); osc.stop(start + dur);
      } catch(e) {}
  };
  switch (type) {
    case 'correct': playOsc('square', 1400, now, 0.05, 0.1, 1000); playOsc('square', 1400, now + 0.15, 0.05, 0.1, 1000); break;
    case 'incorrect': playNoise(ctx, now, 0.1, 0.1, 800); playOsc('triangle', 150, now, 0.1, 0.2, 100); break;
    case 'select': playOsc('sine', 600, now, 0.1, 0.05, 400); break;
    case 'levelup': [523.25, 587.33, 659.25, 783.99, 880.00].forEach((f, i) => playOsc('sine', f, now, 1.5, 0.05)); break;
    case 'gacha_start': for(let i=0; i<15; i++) { playNoise(ctx, now + i*0.1, 0.08, 0.1, 500); playOsc('square', 100, now + i*0.1, 0.05, 0.1); } break;
    case 'gacha_result': [523.25, 659.25, 783.99, 880.00, 1046.50].forEach((f, i) => playOsc('triangle', f, now + i*0.15, 0.6, 0.1)); break;
    case 'battle_start': playOsc('sawtooth', 180, now, 1.5, 0.15, 190); playOsc('square', 182, now, 1.5, 0.1, 192); playNoise(ctx, now, 1.5, 0.05, 400); break;
    case 'debate': playOsc('square', 800, now, 0.1, 0.05, 200); playNoise(ctx, now, 0.1, 0.05); break;
    case 'skill': [880, 784, 659, 587, 523].forEach((f, i) => playOsc('triangle', f, now + i*0.05, 0.2, 0.05)); break;
    case 'damage': playOsc('sawtooth', 80, now, 0.2, 0.3, 40); playNoise(ctx, now, 0.2, 0.2, 300); break;
    case 'win': [523.25, 659.25, 783.99, 1046.50].forEach((f,i)=>playOsc('sine', f, now + i*0.2, 0.6, 0.1)); playNoise(ctx, now, 0.3, 0.1, 600); playNoise(ctx, now+0.6, 0.4, 0.1, 600); break;
    case 'lose': playOsc('square', 60, now, 0.8, 0.2, 30); playNoise(ctx, now, 0.5, 0.1, 300); break;
    case 'draw': playOsc('square', 1200, now, 0.05, 0.1, 800); break;
    case 'mastery': [523.25, 659.25, 880.00].forEach((f) => playOsc('triangle', f, now, 0.6, 0.05)); break;
    default: break;
  }
};
window.playSound = playSound;

let bgmOscillators = []; let bgmInterval = null;
const playBattleBGM = () => {
    stopBattleBGM(); const ctx = initAudioContext(); if (!ctx) return;
    let tick = 0; const notes = [523.25, 587.33, 659.25, 783.99, 587.33, 659.25, 523.25, 880.00]; const bass = [130.81, 130.81, 196.00, 130.81];
    
    const playOsc = (type, freq, start, dur, vol) => {
        try { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, start); gain.gain.setValueAtTime(vol, start); gain.gain.linearRampToValueAtTime(0.001, start + dur); osc.connect(gain); gain.connect(ctx.destination); osc.start(start); osc.stop(start + dur); bgmOscillators.push(osc); } catch(e){}
    };
    bgmInterval = setInterval(() => {
        if(ctx.state === 'suspended') return;
        const time = ctx.currentTime; const m = notes[tick % notes.length]; const b = bass[Math.floor(tick / 2) % bass.length];
        playOsc('sine', m, time, 0.3, 0.03); 
        playOsc('square', b, time, 0.15, 0.06); 
        playNoise(ctx, time, 0.1, 0.05, 400); 
        if (tick % 2 === 0) { playOsc('square', b, time + 0.15, 0.1, 0.04); playNoise(ctx, time + 0.15, 0.05, 0.03, 400); }
        bgmOscillators = bgmOscillators.filter(osc => { try { return osc.context.currentTime < time + 2; } catch(e) { return false; } });
        tick++;
    }, 300);
};
const stopBattleBGM = () => { if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; } bgmOscillators.forEach(osc => { try { osc.stop(); } catch(e){} }); bgmOscillators = []; };
window.playBattleBGM = playBattleBGM; window.stopBattleBGM = stopBattleBGM;

      const data = JSON.parse(raw);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

      const date = new Date().toISOString().slice(0, 10);

const PreBattleQuizModal = ({ onClose, onComplete }) => {
    const [phase, setPhase] = useState('select_chapter'); const [selectedChapterId, setSelectedChapterId] = useState(null); const [questionQueue, setQuestionQueue] = useState([]); const [currentQIndex, setCurrentQIndex] = useState(0); const [correctCount, setCorrectCount] = useState(0); const [quizFeedback, setQuizFeedback] = useState(null); const [selectedChoiceIndex, setSelectedChoiceIndex] = useState(null);
    const currentQ = useMemo(() => { if (!questionQueue[currentQIndex]) return null; const parsed = parseQuestion(questionQueue[currentQIndex]); const indexedChoices = parsed.choices.map((c, i) => ({ text: c, originalIndex: i })); const shuffledIndexedChoices = [...indexedChoices].sort(() => Math.random() - 0.5); return { text: parsed.text, choices: shuffledIndexedChoices.map(item => item.text), correctIndex: shuffledIndexedChoices.findIndex(item => item.originalIndex === parsed.correctIndex) }; }, [questionQueue, currentQIndex]);

    const handleAnswer = (choiceIndex) => {
        initAudioContext(); if(quizFeedback) return; const isCorrect = choiceIndex === currentQ.correctIndex;
        setQuizFeedback(isCorrect ? 'correct' : 'incorrect'); setSelectedChoiceIndex(choiceIndex); playSound(isCorrect ? 'correct' : 'incorrect');
        if(isCorrect) setCorrectCount(prev => prev + 1);
        setTimeout(() => { if (currentQIndex < questionQueue.length - 1) { setCurrentQIndex(prev => prev + 1); setQuizFeedback(null); setSelectedChoiceIndex(null); } else { setPhase('result'); } }, 1000);
    };

    if (phase === 'select_chapter') return (
        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 font-sans">
            <div className="bg-stone-50 rounded-xl w-full max-w-sm h-[80vh] flex flex-col overflow-hidden animate-in zoom-in border-2 border-stone-300">
                <div className="p-4 border-b border-stone-300 flex justify-between items-center bg-stone-200"><h3 className="font-bold text-stone-800 font-serif">士気高揚 - 章選択</h3><button onClick={() => { initAudioContext(); onComplete(0); }} className="text-stone-500"><X size={20}/></button></div>
                <div className="flex-1 overflow-y-auto p-2">{CHAPTER_DATA.map(c => (<button key={c.id} onClick={() => { initAudioContext(); setSelectedChapterId(c.id); setPhase('select_section'); }} className="w-full text-left p-4 border-b border-stone-200 hover:bg-amber-100 font-bold text-stone-700">{c.title}</button>))}</div>
                <div className="p-4 border-t border-stone-300 bg-stone-100"><button onClick={() => { initAudioContext(); onComplete(0); }} className="w-full py-3 text-stone-600 font-bold text-sm">見送る（強化なし）</button></div>
            </div>
        </div>
    );
    if (phase === 'select_section') return (
        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 font-sans">
            <div className="bg-stone-50 rounded-xl w-full max-w-sm h-[60vh] flex flex-col overflow-hidden animate-in zoom-in border-2 border-stone-300">
                <div className="p-4 border-b border-stone-300 flex justify-between items-center bg-stone-200"><button onClick={() => { initAudioContext(); setPhase('select_chapter'); }} className="text-stone-600 text-sm font-bold">{'< 戻る'}</button><h3 className="font-bold text-stone-800 font-serif">項目の選択</h3><div className="w-8"></div></div>
                <div className="flex-1 overflow-y-auto p-2">
                    {CHAPTER_DATA.find(c => c.id === selectedChapterId)?.sections.map(s => (
                        <button key={s.id} onClick={() => { initAudioContext(); if (!s.questions || s.questions.length === 0) { alert("問題がありません"); return; } setQuestionQueue([...s.questions].sort(() => 0.5 - Math.random()).slice(0, 10)); setPhase('quiz'); }} className="w-full text-left p-4 border-b border-stone-200 hover:bg-amber-100 font-bold text-stone-700 flex justify-between items-center">
                            <span className="flex-1 pr-2">{s.title}</span><span className="text-xs bg-stone-300 px-2 py-1 rounded text-stone-700 whitespace-nowrap">{s.questions ? s.questions.length : 0}問</span>
                        </button>
                    ))}
                </div>
            </div>
        </div>
    );
    if (phase === 'quiz') return (
        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 font-sans">
            <div className="bg-stone-100 rounded-xl w-full max-w-sm flex flex-col overflow-hidden animate-in zoom-in relative border-2 border-stone-300">
                <div className="p-3 bg-stone-800 text-white flex justify-between items-center"><span className="font-bold text-sm font-serif">士気高揚 {currentQIndex + 1}/{questionQueue.length}</span><button onClick={() => { initAudioContext(); onComplete(0); }}><X size={16}/></button></div>
                <div className="p-5 flex items-center justify-center min-h-[140px] bg-white border-b border-stone-300 relative"><div className="font-bold text-stone-800 text-center">{currentQ.text}</div>{quizFeedback === 'correct' && (<div className="absolute inset-0 flex items-center justify-center bg-white/50 animate-in zoom-in duration-200"><div className="text-8xl text-red-600 font-black drop-shadow-lg">〇</div></div>)}{quizFeedback === 'incorrect' && (<div className="absolute inset-0 flex items-center justify-center bg-white/50 animate-in zoom-in duration-200"><div className="text-8xl text-stone-800 font-black drop-shadow-lg">×</div></div>)}</div>
                <div className="p-2 space-y-2 bg-stone-50">
                    {currentQ.choices.map((choice, i) => {
                        let style = "w-full text-left p-3 border-2 rounded-xl text-sm font-bold transition-all relative ";
                        if (quizFeedback) { if (i === currentQ.correctIndex) style += "bg-red-50 border-red-600 text-red-900"; else if (i === selectedChoiceIndex && quizFeedback === 'incorrect') style += "bg-stone-200 border-stone-600 text-stone-800"; else style += "bg-stone-100 border-stone-200 text-stone-400"; } 
                        else { style += "bg-white border-stone-300 hover:bg-amber-50 active:scale-[0.98] text-stone-700"; }
                        return (<button key={i} onClick={() => handleAnswer(i)} disabled={!!quizFeedback} className={style}>{i+1}. {choice}{quizFeedback && i === currentQ.correctIndex && <CheckCircle size={16} className="absolute right-3 top-3.5 text-red-700"/>}{quizFeedback === 'incorrect' && i === selectedChoiceIndex && <X size={16} className="absolute right-3 top-3.5 text-stone-700"/>}</button>)
                    })}
                </div>
            </div>
        </div>
    );
    if (phase === 'result') return (
        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 font-sans">
            <div className="bg-stone-50 rounded-xl p-6 w-full max-w-sm text-center animate-in zoom-in border-2 border-stone-300">
                <h3 className="text-xl font-bold mb-2 font-serif text-stone-800">士気高揚！</h3><div className="text-4xl mb-2">🔥</div>
                <div className="text-lg mb-4 text-stone-700 font-bold">{correctCount}問正解！<br/><span className="text-red-700 font-black text-2xl">歴史力加算 +{Math.round(correctCount * BUFF_PER_QUESTION * 100)}%</span></div>
                <button onClick={() => { initAudioContext(); onComplete(correctCount * BUFF_PER_QUESTION); }} className="bg-stone-800 hover:bg-stone-900 text-white font-bold py-3 px-8 rounded-full shadow-lg w-full">いざ出陣</button>
            </div>
        </div>
    );
    return null;
};

    return { text: parsed.text, choices: shuffledIndexedChoices.map(item => item.text), correctIndex: shuffledIndexedChoices.findIndex(item => item.originalIndex === parsed.correctIndex) };

              return prev - 100; 
          });

    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [currentQuestionIndex, quizFeedback, isOni]);

  useEffect(() => { if (isOni && timeLeft === 0 && quizFeedback === null) { const t = setTimeout(() => { handleTimeUp(); }, 0); return () => clearTimeout(t); } }, [timeLeft, isOni, quizFeedback]);
  useEffect(() => { if (popupScore) { const t = setTimeout(() => setPopupScore(null), 1500); return () => clearTimeout(t); } }, [popupScore]);

const GalleryScreen = ({ setView, collection, getLevel, getPower, getHp, onEnhance, points, getEnhanceCost, userItems, getIndividualValue }) => {
  const [selectedChar, setSelectedChar] = useState(null); const [selectedItem, setSelectedItem] = useState(null); 
  const [sortOrder, setSortOrder] = useState('power_desc'); const [activeTab, setActiveTab] = useState('char'); 
  const collectionSet = new Set(collection || []);
  
  const sortedChars = useMemo(() => {
    return [...CHARACTERS].sort((a, b) => {
        const hasA = collectionSet.has(a.id); const hasB = collectionSet.has(b.id);
        if (hasA && !hasB) return -1; if (!hasA && hasB) return 1;
        if (sortOrder === 'attribute') { const attrOrder = { VALOR: 1, STRATEGY: 2, CULTURE: 3 }; if (attrOrder[a.attribute] !== attrOrder[b.attribute]) return (attrOrder[a.attribute] || 99) - (attrOrder[b.attribute] || 99); return getPower(b) - getPower(a); }
        if (sortOrder === 'power_desc') return getPower(b) - getPower(a);
        if (sortOrder === 'hp_desc') return getHp(b) - getHp(a);
        if (sortOrder === 'name_asc') return a.name.localeCompare(b.name);
        return a.id - b.id;
    });
  }, [collection, sortOrder, getPower, getHp]);
  
  const sortedItems = useMemo(() => { return [...ITEMS].sort((a, b) => a.id - b.id); }, []);
  const charRate = CHARACTERS.length > 0 ? Math.round((collectionSet.size / CHARACTERS.length) * 100) : 0; 
  const itemRate = ITEMS.length > 0 ? Math.round(((userItems || []).length / ITEMS.length) * 100) : 0;

  return (
    <div className="min-h-screen bg-stone-100 p-4 pb-10 font-sans">
       <header className="fixed top-0 left-0 w-full bg-white shadow-md z-10 p-4 flex items-center justify-between border-b-2 border-stone-200"><button onClick={() => { initAudioContext(); setView('title'); }} className="text-stone-600 hover:text-stone-900"><Home /></button><h2 className="font-bold text-xl text-stone-800 font-serif">図録</h2><div className="text-xs font-bold text-stone-500 bg-stone-200 px-2 py-1 rounded">{activeTab === 'char' ? `人物: ${charRate}%` : `物資: ${itemRate}%`}</div></header>
      <div className="mt-20 mb-6 flex justify-center gap-4">
          <button onClick={() => setActiveTab('char')} className={`flex-1 py-3 rounded-xl font-bold transition-all shadow-sm font-serif tracking-widest ${activeTab === 'char' ? 'bg-stone-800 text-white ring-2 ring-stone-400' : 'bg-white text-stone-500 border border-stone-200 hover:bg-stone-50'}`}>人物</button>
          <button onClick={() => setActiveTab('item')} className={`flex-1 py-3 rounded-xl font-bold transition-all shadow-sm font-serif tracking-widest ${activeTab === 'item' ? 'bg-stone-800 text-white ring-2 ring-stone-400' : 'bg-white text-stone-500 border border-stone-200 hover:bg-stone-50'}`}>物資</button>
      </div>
      {activeTab === 'char' && (
          <>
            <div className="mb-4 flex justify-end">
                <select value={sortOrder} onChange={(e) => setSortOrder(e.target.value)} className="p-2 border border-stone-300 rounded text-sm bg-white text-stone-700 outline-none"><option value="power_desc">歴史力順</option><option value="hp_desc">HP順</option><option value="name_asc">名前順</option><option value="attribute">属性順</option></select>
            </div>
            <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 max-w-2xl mx-auto">
                {sortedChars.map(char => {
                const isUnlocked = collectionSet.has(char.id); const attr = ATTRIBUTES[char.attribute]; const level = getLevel(char.id); const iv = getIndividualValue(char.id);
                return (
                    <button key={char.id} onClick={() => isUnlocked && setSelectedChar(char)} className={`aspect-square rounded-lg flex flex-col items-center justify-center p-2 shadow-sm transition relative overflow-hidden border ${isUnlocked ? 'bg-white border-stone-200 hover:bg-amber-50 cursor-pointer' : 'bg-stone-200 border-stone-300 cursor-default'}`}>
                    {isUnlocked ? (<>{level > 1 && (<div className="absolute top-1 left-1 bg-stone-700 text-white text-[9px] font-bold px-1 rounded-sm">Lv.{level}</div>)}{iv > 0 && (<div className="absolute bottom-1 left-1 bg-red-700 text-white text-[9px] font-bold px-1 rounded-sm">+{iv}</div>)}<div className={`w-10 h-10 mb-1 mt-2 ${attr?.text}`}><CharIcon attribute={char.attribute}/></div><div className="text-[10px] font-bold text-center line-clamp-1 w-full text-stone-800 leading-tight h-3 overflow-hidden">{char.name}</div></>) : (<Lock size={24} className="text-stone-400" />)}
                    </button>
                );
                })}
            </div>
          </>
      )}
      {activeTab === 'item' && (
          <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 max-w-2xl mx-auto">
              {sortedItems.map(item => {
                  const isUnlocked = (userItems || []).includes(item.id);
                  return (
                    <button key={item.id} onClick={() => isUnlocked && setSelectedItem(item)} className={`aspect-square rounded-lg flex flex-col items-center justify-center p-2 shadow-sm transition relative overflow-hidden border ${isUnlocked ? 'bg-white border-stone-200 hover:bg-amber-50 cursor-pointer' : 'bg-stone-200 border-stone-300 cursor-default'}`}>
                        {isUnlocked ? (<><div className="w-8 h-8 mb-2 text-stone-700"><ItemIcon/></div><div className="text-[10px] font-bold text-center line-clamp-2 w-full text-stone-800 leading-tight h-6 overflow-hidden flex items-center justify-center">{item.name}</div></>) : (<Lock size={24} className="text-stone-400" />)}
                    </button>

const BattleAnimationView = ({ state, currentSequenceIndex, battleSequence, nextAnimationStep }) => {
    useEffect(() => {
        if(state) {
            if (state.type === 'start') playSound('battle_start');
            if (state.type === 'clash') { if (state.pDamage > 0 || state.eDamage > 0) playSound('damage'); else if (state.result === 'DRAW') playSound('draw'); else playSound('debate'); }
            if (state.type.startsWith('skill') || state.type === 'tactics' || state.type === 'advantage' || state.type === 'item') playSound('skill');
            if (state.type === 'end') playSound(state.win ? 'win' : 'lose');
        }
    }, [state]);
  
    if(!state) return null;
    const findCurrentRound = (idx) => { for(let i=idx; i>=0; i--) { if(battleSequence[i] && battleSequence[i].type === 'round_start') return battleSequence[i].round; } return 1; };
    const getRoundData = () => { const roundNum = state.round || findCurrentRound(currentSequenceIndex); return battleSequence.find(s => s.type === 'round_start' && s.round === roundNum); };
    const roundData = getRoundData();

    const HPBar = ({ currentHp = 0, maxHp = 1, isPlayer, damage = 0 }) => {
        const safeCurrentHp = isNaN(currentHp) ? 0 : currentHp; const safeMaxHp = isNaN(maxHp) || maxHp === 0 ? 1 : maxHp; const safeDamage = isNaN(damage) ? 0 : damage;
        const [displayHp, setDisplayHp] = useState(safeCurrentHp + safeDamage);
        useEffect(() => { setDisplayHp(safeCurrentHp + safeDamage); const timeout = setTimeout(() => { setDisplayHp(safeCurrentHp); }, 50); return () => clearTimeout(timeout); }, [safeCurrentHp, safeDamage]);
        const currentHpPercentage = Math.max(0, Math.min(100, (displayHp / safeMaxHp) * 100)); const previousHpPercentage = Math.max(0, Math.min(100, ((safeCurrentHp + safeDamage) / safeMaxHp) * 100));
        return (
            <div className={`flex flex-col w-full px-4 mb-2 font-sans ${isPlayer ? 'items-start' : 'items-end'}`}>
                <div className="flex items-end gap-1 mb-1"><span className="text-xs font-bold text-stone-500">{isPlayer ? '自軍' : '敵軍'}</span><span className="font-mono font-black text-lg text-stone-800 leading-none">{Math.max(0, safeCurrentHp)}</span><span className="text-[10px] text-stone-400">/{safeMaxHp}</span></div>
                <div className="w-full h-3 bg-stone-300 rounded-full overflow-hidden relative">
                    <div className="absolute top-0 h-full bg-red-700 transition-all duration-300" style={{ width: `${previousHpPercentage}%`, [isPlayer ? 'left' : 'right']: 0 }}></div>
                    <div className={`absolute top-0 h-full transition-all duration-500 ease-out ${currentHpPercentage > 50 ? 'bg-teal-600' : (currentHpPercentage > 20 ? 'bg-amber-500' : 'bg-rose-600')}`} style={{ width: `${currentHpPercentage}%`, [isPlayer ? 'left' : 'right']: 0 }}></div>
                </div>
            </div>
        );
    };
  
    return (
        <div className="flex-1 flex flex-col items-center justify-between p-4 w-full max-w-md mx-auto relative overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/rice-paper.png')] bg-stone-100 rounded-xl border-2 border-stone-400 shadow-xl font-sans">
            {state.pMaxHp && state.eMaxHp && (
                <div className="w-full flex-none pt-2 flex justify-between gap-4"><HPBar currentHp={state.pHp} maxHp={state.pMaxHp} isPlayer={true} damage={state.type === 'clash' ? state.pDamage : 0} /><HPBar currentHp={state.eHp} maxHp={state.eMaxHp} isPlayer={false} damage={state.type === 'clash' ? state.eDamage : 0} /></div>

            <div className="flex flex-col items-center justify-center flex-1 w-full min-h-[200px] relative z-10">
                {state.type === 'start' && state.tactic && (
                    <div className="text-center animate-in zoom-in duration-500 flex flex-col items-center w-full">
                        <h2 className="text-3xl font-bold text-red-900 mb-4 font-serif">合戦 開始</h2>

                            <div><p className="text-red-800 font-bold">自軍戦術: {state.tactic.name}</p><p className="text-stone-500 text-xs">携行物資: {state.items ? state.items.length : 0}種</p></div>
                            {state.enemyTactic && <div className="pt-2 border-t border-stone-200"><p className="text-stone-800 font-bold">敵軍戦術: {state.enemyTactic.name}</p><p className="text-stone-500 text-xs">携行物資: {state.enemyItems ? state.enemyItems.length : 0}種</p></div>}
