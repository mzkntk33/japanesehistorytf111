      if (customEnemyTeam && typeof customEnemyHp === 'number') { eMaxHp = customEnemyHp; } else { let eCharsHp = 0; enemies.forEach(c => { eCharsHp += getHpByLevel(c, c.level || currentStage); }); eMaxHp += eCharsHp; eMaxHp = Math.floor(eMaxHp * (1 + enemyItemHpBuffRate)); }
      let pHp = pMaxHp; let eHp = eMaxHp;
      sequence.push({ type: 'start', tactic, enemyTactic, items: myItems, enemyItems, pQuizBuff: playerBuff, eQuizBuff: enemyBuff, pMaxHp, eMaxHp, pHp, eHp });

      myItems.forEach(i => {
          sequence.push({ type: 'start_effect', name: i.name, desc: getItemEffectDescription(i), pMaxHp, eMaxHp, pHp, eHp, isPlayer: true });
          if (i.type === 'buff_all') { ctx.globalAllyBuffP += i.value; }
          if (i.type === 'debuff_all') { ctx.globalEnemyDebuffP += i.value; }
          if (i.type === 'damage_cut_all') { ctx.globalDamageCutP += i.value; }
      });
      enemyItems.forEach(i => {
          sequence.push({ type: 'start_effect', name: i.name, desc: getItemEffectDescription(i), pMaxHp, eMaxHp, pHp, eHp, isPlayer: false });
          if (i.type === 'buff_all') { ctx.globalAllyBuffE += i.value; }
          if (i.type === 'debuff_all') { ctx.globalEnemyDebuffE += i.value; }
          if (i.type === 'damage_cut_all') { ctx.globalDamageCutE += i.value; }
      });
  
      for(let i=0; i<BATTLE_TEAM_SIZE; i++) {
          let pChar = { ...myTeam[i], level: getLevel(myTeam[i].id, enhancements), power: calculatePower(myTeam[i], collection, enhancements) }; let eChar = { ...enemies[i], level: enemies[i].level || currentStage, power: getPowerByLevel(enemies[i], enemies[i].level || currentStage) };
          sequence.push({ type: 'round_start', round: i+1, pChar, eChar, pMaxHp, eMaxHp, pHp, eHp });
          let roundEnv = { basePP: pChar.power, baseEP: eChar.power, pAttr: pChar.attribute, eAttr: eChar.attribute, pDamageCut: 0, eDamageCut: 0 }; let pBuffTotal = playerBuff; let eBuffTotal = enemyBuff;

          const startPHp = pHp; // ターン開始時の自軍HPを記録
          const startEHp = eHp; // ターン開始時の敵軍HPを記録

          if (tactic.id === 'CHARGE' && roundEnv.pAttr === 'VALOR') pBuffTotal += 0.25; if (tactic.id === 'SCHEME' && roundEnv.pAttr === 'STRATEGY') pBuffTotal += 0.25; if (tactic.id === 'GUARD' && roundEnv.pAttr === 'CULTURE') pBuffTotal += 0.25; if (tactic.id === 'LOGISTICS') pBuffTotal += 0.10;
          if (enemyTactic.id === 'CHARGE' && roundEnv.eAttr === 'VALOR') eBuffTotal += 0.25; if (enemyTactic.id === 'SCHEME' && roundEnv.eAttr === 'STRATEGY') eBuffTotal += 0.25; if (enemyTactic.id === 'GUARD' && roundEnv.eAttr === 'CULTURE') eBuffTotal += 0.25; if (enemyTactic.id === 'LOGISTICS') eBuffTotal += 0.10;

          const currentRound = i + 1;
          myItems.forEach(it => {
              if (it.type === 'buff_attr' && it.target === roundEnv.pAttr) { pBuffTotal += it.value; sequence.push({ type: 'item', name: it.name, desc: `${ATTRIBUTES[roundEnv.pAttr].name}+${Math.round(it.value*100)}%`, pMaxHp, eMaxHp, pHp, eHp, isPlayer: true }); }
              if (it.type === 'heal_round') { const amt = Math.floor(pMaxHp * it.value); pHp = Math.min(pMaxHp, pHp + amt); sequence.push({ type: 'item', name: it.name, desc: `HP${amt}回復`, pMaxHp, eMaxHp, pHp, eHp, isPlayer: true }); }
              if (it.type === 'buff_pos' && it.pos === currentRound) { pBuffTotal += it.value; sequence.push({ type: 'item', name: it.name, desc: `布陣効果+${Math.round(it.value*100)}%`, pMaxHp, eMaxHp, pHp, eHp, isPlayer: true }); }
          });
          enemyItems.forEach(it => {
              if (it.type === 'buff_attr' && it.target === roundEnv.eAttr) { eBuffTotal += it.value; sequence.push({ type: 'item', name: it.name, desc: `【敵】${ATTRIBUTES[roundEnv.eAttr].name}+${Math.round(it.value*100)}%`, pMaxHp, eMaxHp, pHp, eHp, isPlayer: false }); }
              if (it.type === 'heal_round') { const amt = Math.floor(eMaxHp * it.value); eHp = Math.min(eMaxHp, eHp + amt); sequence.push({ type: 'item', name: it.name, desc: `【敵】HP${amt}回復`, pMaxHp, eMaxHp, pHp, eHp, isPlayer: false }); }
              if (it.type === 'buff_pos' && it.pos === currentRound) { eBuffTotal += it.value; sequence.push({ type: 'item', name: it.name, desc: `【敵】布陣効果+${Math.round(it.value*100)}%`, pMaxHp, eMaxHp, pHp, eHp, isPlayer: false }); }
          });

          pBuffTotal += ctx.globalAllyBuffP; eBuffTotal += ctx.globalAllyBuffE; pBuffTotal -= ctx.globalEnemyDebuffE; eBuffTotal -= ctx.globalEnemyDebuffP; pBuffTotal += ctx.nextAllyBuffP || 0; eBuffTotal += ctx.nextAllyBuffE || 0; pBuffTotal -= ctx.nextEnemyDebuffP || 0; eBuffTotal -= ctx.nextEnemyDebuffE || 0; ctx.nextAllyBuffP = 0; ctx.nextAllyBuffE = 0; ctx.nextEnemyDebuffP = 0; ctx.nextEnemyDebuffE = 0;
  
          const runSkill = (act, tgt, isP, actOrg, tgtOrg) => {
              if (!actOrg.skill) return; let s = actOrg.skill; if (Math.random() > s.rate) return; let did = false, desc = s.desc;
              if (s.type === 'buff_all') { if (isP) ctx.globalAllyBuffP += s.value; else ctx.globalAllyBuffE += s.value; if (isP) pBuffTotal += s.value; else eBuffTotal += s.value; did = true; }
              if (s.type === 'debuff_all') { if (isP) ctx.globalEnemyDebuffP += s.value; else ctx.globalEnemyDebuffE += s.value; if (isP) eBuffTotal -= s.value; else pBuffTotal -= s.value; did = true; }
              if (s.type === 'buff_self') { if (isP) pBuffTotal += s.value; else eBuffTotal += s.value; did = true; }
              if (s.type === 'debuff_enemy') { if (isP) eBuffTotal -= s.value; else pBuffTotal -= s.value; did = true; }
              if (s.type === 'cond_buff_self') { if (tgtOrg.attribute === s.target) { if (isP) pBuffTotal += s.value; else eBuffTotal += s.value; did = true; } }
              if (s.type === 'cond_debuff_enemy') { if (tgtOrg.attribute === s.target) { if (isP) eBuffTotal -= s.value; else pBuffTotal -= s.value; did = true; } }
              if (s.type === 'heal_hp') { const heal = Math.floor((isP ? pMaxHp : eMaxHp) * s.value); if (isP) pHp = Math.min(pMaxHp, pHp + heal); else eHp = Math.min(eMaxHp, eHp + heal); did = true; desc = `HPを${heal}回復`; }
              if (s.type === 'cond_pos_buff') { if (currentRound === s.pos) { if (isP) pBuffTotal += s.value; else eBuffTotal += s.value; did = true; } }
              if (s.type === 'cond_pos_revenge') { if (currentRound === s.pos) { const losses = isP ? ctx.roundWins.filter(w => w === false).length : ctx.roundWins.filter(w => w === true).length; const totalBuff = losses * s.value; if (isP) pBuffTotal += totalBuff; else eBuffTotal += totalBuff; did = true; desc = `負戦x${s.value*100}%UP (+${Math.round(totalBuff*100)}%)`; } }
              if (s.type === 'cond_pinch_buff') { const hpRatio = isP ? startPHp / pMaxHp : startEHp / eMaxHp; if (hpRatio <= 0.5) { if (isP) pBuffTotal += s.value; else eBuffTotal += s.value; did = true; } }
              if (s.type === 'cond_pinch_debuff_all') { const hpRatio = isP ? startPHp / pMaxHp : startEHp / eMaxHp; if (hpRatio <= 0.5) { if (isP) ctx.globalEnemyDebuffP += s.value; else ctx.globalEnemyDebuffE += s.value; if (isP) eBuffTotal -= s.value; else pBuffTotal -= s.value; did = true; desc = "敵全軍を弱体化!"; } }
              if (s.type === 'sacrifice_buff' || s.type === 'sacrifice_debuff') { const cost = Math.floor((isP ? pMaxHp : eMaxHp) * s.cost); if (isP) { pHp = Math.max(1, pHp - cost); if(s.type === 'sacrifice_buff') pBuffTotal += s.value; else eBuffTotal -= s.value; } else { eHp = Math.max(1, eHp - cost); if(s.type === 'sacrifice_buff') eBuffTotal += s.value; else pBuffTotal -= s.value; } did = true; desc = `HP-${cost} & 効果発動`; }
              if (s.type === 'fixed_damage') { const dmg = Math.floor((isP ? eMaxHp : pMaxHp) * s.value); if (isP) eHp = Math.max(1, eHp - dmg); else pHp = Math.max(1, pHp - dmg); did = true; desc = `敵陣に${dmg}の痛手`; }
              if (s.type === 'absorb_hp') { const amt = Math.floor((isP ? eMaxHp : pMaxHp) * s.value); if (isP) { eHp = Math.max(1, eHp - amt); pHp = Math.min(pMaxHp, pHp + amt); } else { pHp = Math.max(1, pHp - amt); eHp = Math.min(eMaxHp, eHp + amt); } did = true; desc = `HPを${amt}吸収`; }
              if (s.type === 'inherit_buff' || s.type === 'inherit_debuff') { if (isP) { if(s.type === 'inherit_buff') ctx.nextAllyBuffP += s.value; else ctx.nextEnemyDebuffE += s.value; } else { if(s.type === 'inherit_buff') ctx.nextAllyBuffE += s.value; else ctx.nextEnemyDebuffP += s.value; } did = true; }
              if (s.type === 'damage_cut') { if (isP) roundEnv.pDamageCut = s.value; else roundEnv.eDamageCut = s.value; did = true; desc = `被痛手を${Math.round(s.value*100)}%軽減`; }
              if (s.type === 'hp_to_one') { if (isP) eHp = 1; else pHp = 1; did = true; desc = `敵のHPを1に!`; }
              if(did) sequence.push({ type: 'skill_active', actor: act.name, name: s.name, desc, isPlayer: isP, pMaxHp, eMaxHp, pHp, eHp });
          };
  
          runSkill(pChar, eChar, true, myTeam[i], enemies[i]);
          runSkill(eChar, pChar, false, enemies[i], myTeam[i]);
  
          let advBonus = 0.2; 
          let pAdv = (roundEnv.pAttr === 'VALOR' && roundEnv.eAttr === 'STRATEGY') || (roundEnv.pAttr === 'STRATEGY' && roundEnv.eAttr === 'CULTURE') || (roundEnv.pAttr === 'CULTURE' && roundEnv.eAttr === 'VALOR');
          let eAdv = (roundEnv.eAttr === 'VALOR' && roundEnv.pAttr === 'STRATEGY') || (roundEnv.eAttr === 'STRATEGY' && roundEnv.pAttr === 'CULTURE') || (roundEnv.eAttr === 'CULTURE' && roundEnv.pAttr === 'VALOR');
          
          if (pAdv) { pBuffTotal += advBonus; sequence.push({ type: 'advantage', isPlayer: true, desc: `相性有利 (+${Math.round(advBonus*100)}%)`, pMaxHp, eMaxHp, pHp, eHp }); }
          else if (eAdv) { eBuffTotal += advBonus; sequence.push({ type: 'advantage', isPlayer: false, desc: `相性有利 (+${Math.round(advBonus*100)}%)`, pMaxHp, eMaxHp, pHp, eHp }); }
  
          const finalPP = Math.max(1, Math.floor(roundEnv.basePP * (1 + pBuffTotal)));
          const finalEP = Math.max(1, Math.floor(roundEnv.baseEP * (1 + eBuffTotal)));

          let pDamageCut = Math.min(1, ctx.globalDamageCutP + (roundEnv.pDamageCut || 0));
          let eDamageCut = Math.min(1, ctx.globalDamageCutE + (roundEnv.eDamageCut || 0));

          let res = 'DRAW'; let pDamage = 0; let eDamage = 0;
          if (finalPP > finalEP) { res = 'WIN'; eDamage = Math.floor(finalPP * (1 - eDamageCut)); eHp = Math.max(0, eHp - eDamage); ctx.roundWins.push(true); }
          else if (finalPP < finalEP) { res = 'LOSE'; pDamage = Math.floor(finalEP * (1 - pDamageCut)); pHp = Math.max(0, pHp - pDamage); ctx.roundWins.push(false); }
          else { res = 'DRAW'; ctx.roundWins.push(null); }
          
          sequence.push({ type: 'clash', pPower: finalPP, ePower: finalEP, result: res, pMaxHp, eMaxHp, pHp, eHp, pDamage, eDamage });

          if (pHp <= 0 || eHp <= 0) break; 
      }
  
      let finalWin = false;
      if (pHp > 0 && eHp <= 0) finalWin = true;
      else if (pHp <= 0 && eHp > 0) finalWin = false;
      else if (pHp <= 0 && eHp <= 0) finalWin = false; 
      else { const pRatio = pHp / pMaxHp; const eRatio = eHp / eMaxHp; finalWin = pRatio > eRatio; }

      sequence.push({ type: 'end', win: finalWin, pMaxHp, eMaxHp, pHp, eHp });
      setBattleSequence(sequence); setCurrentSequenceIndex(0); setBattleAnimationState(sequence[0]); setBattleStatus('animating');
    };
  
    const handleStartBattleMode = () => { initAudioContext(); setBattleStatus('team_select'); setEnemyTeam([]); setView('battle'); setBattleResultData(null); };
    const resetBattle = () => { initAudioContext(); setBattleStatus('team_select'); setBattleSequence([]); setCurrentSequenceIndex(0); setBattleAnimationState(null); setIsWin(false); setEnemyTeam([]); setBattleResultData(null); };
    const toggleCharSelection = (c, slotIndex = -1) => { 
        let n = Array.from({length: 5}, (_, i) => deck.chars[i] || null);
        const existingIdx = n.indexOf(c.id);
        if (existingIdx !== -1) { n[existingIdx] = null; } 
        else {
            if (slotIndex >= 0 && slotIndex < 5) n[slotIndex] = c.id;
            else { const emptyIdx = n.findIndex(id => id === null); if (emptyIdx !== -1) n[emptyIdx] = c.id; }
        }
        setDeck({ ...deck, chars: n }); saveData({ deck: { ...deck, chars: n } }); 
    };
    const toggleItemSelection = (it) => { let n = [...deck.items]; if (n.includes(it.id)) n = n.filter(i => i !== it.id); else if (n.length < 3) n.push(it.id); setDeck({ ...deck, items: n }); saveData({ deck: { ...deck, items: n } }); };
    const setTactic = (t) => { setDeck({ ...deck, tactic: t }); saveData({ deck: { ...deck, tactic: t } }); };
    
    const nextAnimationStep = () => {
      initAudioContext();
      if (currentSequenceIndex < battleSequence.length - 1) {
          const next = currentSequenceIndex + 1; setCurrentSequenceIndex(next); setBattleAnimationState(battleSequence[next]);
      } else {
          const res = battleSequence[battleSequence.length - 1];
          if (res.win && !isCustomBattle) {
              let reward = BATTLE_BASE_REWARD; 
              let isStageUp = false; let stageUpBonus = 0;
              let newSt = currentStage, newPr = stageProgress + 1;
              if (newPr >= WINS_FOR_LEVEL_UP) { if (newSt < MAX_STAGE) newSt++; newPr = 0; isStageUp = true; stageUpBonus = STAGE_UP_BONUS; }
              const totalEarned = reward + stageUpBonus; const newP = points + totalEarned;
              setPoints(newP); setCurrentStage(newSt); setStageProgress(newPr); saveData({ points: newP, currentStage: newSt, stageProgress: newPr });
              setBattleResultData({ baseReward: reward, stageUpBonus, isStageUp });
          }
          setIsWin(res.win); setBattleStatus('result');
      }
    };
  
    const handleStartBattleModeWrapper = () => handleStartBattleMode();

    const handleSelectPerfectReward = (type, charId) => {
      let updates = {};
      let resultData = null;
      if (type === 'item') {
          const unownedItems = ITEMS.filter(it => !userItems.includes(it.id));
          if (unownedItems.length > 0) {
              const newItem = unownedItems[Math.floor(Math.random() * unownedItems.length)];
              const newItems = [...userItems, newItem.id]; setUserItems(newItems); updates.items = newItems; 
              resultData = { type: 'item', item: newItem };
          } else { 
              const newPoints = points + 100000; setPoints(newPoints); updates.points = newPoints; 
              resultData = { type: 'points', amount: 100000 };
          }
      } else if (type === 'iv' && charId) {
          const newCol = [...collection, charId]; setCollection(newCol); updates.collection = newCol; const char = CHARACTERS.find(c => c.id === charId); 
          resultData = { type: 'iv', char: char };
      }
      saveData(updates);
      return resultData;
    };

    return (
      <div data-dark={isDarkMode ? "true" : undefined} style={{minHeight:'100vh'}}>
          <SaveIndicator isSaving={isSaving} />
          {view === 'chapterSelect' && <ChapterSelectScreen setView={setView} handleStartQuiz={handleStartQuiz} resumeQuiz={resumeQuiz} quizResumeData={quizResumeData} startReviewQuiz={startReviewQuiz} incorrectQuestions={incorrectQuestions} />}
          {view === 'weakness' && <WeaknessListScreen setView={setView} bookmarkedQuestions={bookmarkedQuestions} toggleBookmark={toggleBookmark} startWeaknessQuiz={startWeaknessQuiz} handleStartQuiz={handleStartQuiz} />}
          {view === 'quiz' && <QuizScreen selectedSection={selectedSection} currentQuestionIndex={currentQuestionIndex} questionQueue={questionQueue} batchStartIndex={batchStartIndex} QUESTIONS_PER_BATCH={QUESTIONS_PER_BATCH} quizFeedback={quizFeedback} quizHistory={quizHistory} handleAnswer={handleAnswer} nextQuestion={nextQuestion} confirmExitQuiz={() => setShowExitModal(true)} showExitModal={showExitModal} cancelExit={() => setShowExitModal(false)} saveAndExit={saveAndExit} exitQuiz={() => {}} quizMode={quizMode} startTime={startTime} bookmarkedQuestions={bookmarkedQuestions} toggleBookmark={toggleBookmark} isMaskingMode={isMaskingMode} />}
          {view === 'result' && <ResultScreen setView={setView} sessionCorrectCount={sessionCorrectCount} POINTS_PER_CORRECT={POINTS_PER_CORRECT} batchStartIndex={batchStartIndex} QUESTIONS_PER_BATCH={QUESTIONS_PER_BATCH} questionQueue={questionQueue} nextBatch={nextBatch} droppedItem={droppedItem} hpGained={hpGainedInSession} quizHistory={quizHistory} quizMode={quizMode} saveQuizStateForNextBatch={saveQuizStateForNextBatch} masteredCount={masteredCount} elapsedTime={elapsedTime} timeMultiplier={timeMultiplier} isPerfectOni={quizMode === 'oni' && sessionCorrectCount >= 90} onSelectPerfectReward={handleSelectPerfectReward} userItems={userItems} collection={collection} CHARACTERS={CHARACTERS} ITEMS={ITEMS} getPower={getPowerWrapper} bookmarkedQuestions={bookmarkedQuestions} toggleBookmark={toggleBookmark} isPvpReplay={isPvpReplay} />}
          {view === 'gacha' && <GachaScreen setView={setView} points={points} GACHA_COST={GACHA_COST} isGachaAnimating={isGachaAnimating} gachaResults={gachaResults} setGachaResults={setGachaResults} newCharacter={newCharacter} setNewCharacter={setNewCharacter} isDuplicate={isDuplicate} performGacha={performGacha} collection={collection} getLevel={getLevelWrapper} getPower={getPowerWrapper} getHp={getHpWrapper} getIndividualValue={getIndividualValueWrapper} />}
          {view === 'gallery' && <GalleryScreen setView={setView} collection={collection} getLevel={getLevelWrapper} getPower={getPowerWrapper} getHp={getHpWrapper} onEnhance={handleEnhance} points={points} getEnhanceCost={getEnhanceCostWrapper} userItems={userItems} getIndividualValue={getIndividualValueWrapper} />}
          {view === 'battle' && <BattleScreen setView={setView} battleStatus={battleStatus} setBattleStatus={setBattleStatus} deck={deck} setDeck={setDeck} userItems={userItems} collection={collection} startBattle={startBattle} enemyTeam={enemyTeam} battleAnimationState={battleAnimationState} currentSequenceIndex={currentSequenceIndex} battleSequence={battleSequence} nextAnimationStep={nextAnimationStep} isWin={isWin} setEnemyTeam={setEnemyTeam} currentStage={currentStage} resetBattle={resetBattle} toggleCharSelection={toggleCharSelection} toggleItemSelection={toggleItemSelection} setTactic={setTactic} points={points} onEnhance={handleEnhance} getEnhanceCost={getEnhanceCostWrapper} getLevel={getLevelWrapper} getPower={getPowerWrapper} getHp={getHpWrapper} getIndividualValue={getIndividualValueWrapper} isCustomBattle={isCustomBattle} stageProgress={stageProgress} battleResultData={battleResultData} playerMaxHp={getPlayerMaxHp()} />}
          {/* ★修正: TitleScreen の playerMaxHp には getPlayerBaseHp() を渡す */}
          {view === 'title' && <TitleScreen setView={setView} onStartBattle={handleStartBattleModeWrapper} isLoading={isLoading} points={points} totalCorrectCount={totalCorrectCount} showLoginBonusModal={showLoginBonusModal} setShowLoginBonusModal={setShowLoginBonusModal} LOGIN_BONUS_POINTS={LOGIN_BONUS_POINTS} startOniMode={startOniMode} oniHighScores={oniHighScores} playerMaxHp={getPlayerBaseHp()} isMaskingMode={isMaskingMode} setIsMaskingMode={setIsMaskingMode} isDarkMode={isDarkMode} toggleDarkMode={toggleDarkMode} />}
      </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>

  <script>
    // ── Service Worker: Blobから登録（外部ファイル不要）──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
const CACHE='nihonshi-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
      });
    }

    // ── Manifest + アイコン: CanvasとBlobで動的生成 ──
    window.addEventListener('DOMContentLoaded', () => {
      // Canvasでアイコンを生成（192x192）
      const c = document.createElement('canvas');
      c.width = c.height = 192;
      const ctx = c.getContext('2d');

      // 背景（深紅の角丸）
      const g = ctx.createLinearGradient(0, 0, 192, 192);
      g.addColorStop(0, '#991b1b');
      g.addColorStop(1, '#7c2d12');
      ctx.fillStyle = g;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(0, 0, 192, 192, 32);
      else ctx.rect(0, 0, 192, 192);
      ctx.fill();

      // 鳥居（赤）
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(28, 56, 136, 14);   // 上横棒
      ctx.fillRect(40, 76, 112, 10);   // 下横棒
      ctx.fillRect(44, 86, 16, 64);    // 左柱
      ctx.fillRect(132, 86, 16, 64);   // 右柱

      // 「日」の文字
      ctx.fillStyle = '#fef3c7';
      ctx.font = 'bold 72px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('日', 96, 96);

      // アプリ名
      ctx.fillStyle = 'rgba(254,243,199,0.7)';
      ctx.font = '14px sans-serif';
      ctx.fillText('日本史', 96, 166);

      const ico = c.toDataURL('image/png');

      // Manifestを動的生成してheadに追加
      const manifest = {
        name: '日本史一問一答',
        short_name: '日本史',
        start_url: './',
        scope: './',
        display: 'standalone',
        background_color: '#7c2d12',
        theme_color: '#7c2d12',
        lang: 'ja',
        icons: [
          { src: ico, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: ico, sizes: '192x192', type: 'image/png', purpose: 'maskable' }
        ]
      };
      const bl = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
      const lk = document.createElement('link');
      lk.rel = 'manifest';
      lk.href = URL.createObjectURL(bl);
      document.head.appendChild(lk);

      // Apple touch icon
      const al = document.createElement('link');
      al.rel = 'apple-touch-icon';
      al.href = ico;
      document.head.appendChild(al);
    });
  </script>

      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    #ios-overlay.open #ios-sheet { transform: translateY(0); }
    .sh-handle { width: 36px; height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; margin: 0 auto 16px; }
    .sh-title  { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
    .sh-sub    { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 20px; }
    .sh-step   { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .sh-num    { width: 26px; height: 26px; border-radius: 50%; background: #b91c1c; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    .sh-t      { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .sh-d      { font-size: 12px; color: rgba(255,255,255,.5); line-height: 1.5; }
    .tag-b     { display: inline-block; background: #0a84ff; border-radius: 5px; padding: 1px 6px; font-size: 11px; font-weight: 700; }
    .tag-d     { display: inline-block; background: #3a3a3c; border-radius: 5px; padding: 1px 6px; font-size: 11px; color: #0a84ff; font-weight: 700; }
    #btn-ios-close { width: 100%; padding: 13px; margin-top: 10px; background: rgba(255,255,255,.08); color: #fff; border: 1px solid rgba(255,255,255,.1); border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; }

    /* iOS専用インストールFAB */
    #ios-fab {
      display: none;
      position: fixed; bottom: 24px; right: 16px; z-index: 9999;
      align-items: center; gap: 8px;
      background: linear-gradient(135deg, #b91c1c, #7c2d12);
      color: #fff; border: none; border-radius: 28px;
      padding: 13px 20px; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(185,28,28,0.6);
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }
  </style>

  <button id="ios-fab">📲 インストール方法</button>

  <div id="ios-overlay">
    <div id="ios-sheet">
      <div class="sh-handle"></div>
      <div class="sh-title">📲 ホーム画面に追加</div>
      <div class="sh-sub">Safari で 3 ステップで完了</div>
      <div class="sh-step"><div class="sh-num">1</div><div><div class="sh-t">画面下の共有ボタンをタップ</div><div class="sh-d"><span class="tag-b">↑ 共有</span> をタップ</div></div></div>
      <div class="sh-step"><div class="sh-num">2</div><div><div class="sh-t">「ホーム画面に追加」を選択</div><div class="sh-d"><span class="tag-d">＋ ホーム画面に追加</span> をタップ</div></div></div>
      <div class="sh-step"><div class="sh-num">3</div><div><div class="sh-t">「追加」をタップ</div><div class="sh-d">ホーム画面にアイコンが追加されます 🎉</div></div></div>
      <button id="btn-ios-close">閉じる</button>
    </div>
  </div>

  <script>
    (function() {
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      var isStandalone = window.navigator.standalone === true
                      || window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone || !isIOS) return;
      // iOS Safariのみ: インストールFABを表示
      var fab = document.getElementById('ios-fab');
      var overlay = document.getElementById('ios-overlay');
      fab.style.display = 'flex';
      fab.addEventListener('click', function() { overlay.classList.add('open'); });
      document.getElementById('btn-ios-close').addEventListener('click', function() { overlay.classList.remove('open'); });
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.classList.remove('open'); });
    })();
  </script>
  <!-- ===== /PWA ===== -->

</body>
</html>
