// ==========================================
// BASE62 エンコード（対人戦コード用）
// ==========================================
const BASE62_CHARS = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
const encodeBase62_3 = (n) => {
  let s = '';
  for (let i = 0; i < 3; i++) { s = BASE62_CHARS[n % 62] + s; n = Math.floor(n / 62); }
  return s;
};
const decodeBase62_3 = (s) => {
  let n = 0;
  for (const c of s) n = n * 62 + BASE62_CHARS.indexOf(c);
  return n;
};
const encodeBattleCode = (partKey, indices) => {
  const partMap = { part1: 'p1', part2: 'p2', part3: 'p3', part4: 'p4', all: 'pa' };
  const header = partMap[partKey] || 'pa';
  return header + indices.map(i => encodeBase62_3(i)).join('');
};
const decodeBattleCode = (code) => {
  const partRevMap = { p1: 'part1', p2: 'part2', p3: 'part3', p4: 'part4', pa: 'all' };
  const partKey = partRevMap[code.slice(0, 2)] || 'all';
  const body = code.slice(2);
  const indices = [];
  for (let i = 0; i < body.length; i += 3) { indices.push(decodeBase62_3(body.slice(i, i + 3))); }
  return { partKey, indices };
};

  { id: 18, name: "雪舟", power: 65, hp: 135, attribute: "CULTURE", desc: "室町時代に活躍した禅僧であり、日本水墨画の完成者。遣明船に同乗して明に渡り、中国の本格的な画法や雄大な自然の風景を直接学んだ。帰国後は、単なる中国絵画の模倣にとどまらず、日本の風景に合わせた独自の力強い画風を確立。「秋冬山水図」や「天橋立図」など数多くの国宝を残し、後世の日本美術に計り知れない影響を与えた。", skill: { name: "水墨の極致", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 19, name: "武田信玄", power: 130, hp: 70, attribute: "VALOR", desc: "甲斐国の戦国大名。「風林火山」の軍旗を掲げ、戦国最強と謳われた無敵の騎馬軍団を率いた。上杉謙信との5度にわたる川中島の戦いは戦国史上屈指の激戦として有名。戦だけでなく、釜無川の治水事業（信玄堤）や金山の開発、甲州法度之次第の制定など内政にも極めて優れ、領民に深く慕われたが、西上作戦の途上で病に倒れた。", skill: { name: "風林火山", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 20, name: "上杉謙信", power: 135, hp: 65, attribute: "VALOR", desc: "越後国の戦国大名。自らを軍神・毘沙門天の化身と称し、領土的野心や私利私欲ではなく、助けを求める者のために「義」を重んじて戦った。野戦における戦術の天才であり、宿敵・武田信玄や北条氏康らと激闘を繰り広げた。敵である信玄の領国が塩不足で苦しんだ際、あえて塩を送ったという逸話は、彼の義侠心を示すものとして有名。", skill: { name: "毘沙門天の化身", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.5 } },
  { id: 21, name: "織田信長", power: 148, hp: 52, attribute: "VALOR", desc: "尾張国の小大名から桶狭間の戦いで今川義元を破り台頭。「天下布武」の印を使用し、比叡山焼き討ちなど古い権威を破壊しながら革新的な政策で勢力を拡大した。長篠の戦いでは鉄砲の連続射撃を成功させ武田の騎馬隊を撃破。楽市・楽座など経済政策でも近世への扉を開いたが、天下統一を目前に本能寺の変で非業の死を遂げた。", skill: { name: "天下布武", desc: "敵陣に最大HPの50%の固定ダメージを与える", type: "fixed_damage", value: 0.5, rate: 0.4 } },
  { id: 22, name: "豊臣秀吉", power: 110, hp: 90, attribute: "STRATEGY", desc: "農民の出から信長の草履取りを経て、本能寺の変後に明智光秀を討ち「天下人」となった。太閤検地によって全国の土地を石高で統一し、刀狩令によって農民から武器を没収するという画期的な兵農分離政策を実施。全国の戦国大名を屈服させて日本初の天下統一を達成したが、晩年の無謀な朝鮮出兵は多大な犠牲を払い失敗に終わった。", skill: { name: "太閤の威光", desc: "敵全員の歴史力を35%減少させる", type: "debuff_all", value: 0.35, rate: 0.6 } },
  { id: 23, name: "千利休", power: 60, hp: 140, attribute: "CULTURE", desc: "戦国時代から安土桃山時代にかけての茶人。堺の豪商の出身で、織田信長や豊臣秀吉の茶頭として重用された。豪華絢爛なものを避け、無駄を削ぎ落とした質素な狭い茶室の中で、精神的な深みと美を見出す「わび茶」を大成させた。しかし、その絶大な影響力と芸術的信念が秀吉の怒りを買い、最終的に切腹を命じられる悲運を辿った。", skill: { name: "わび寂びの心", desc: "相手が【軍事】属性なら敵の歴史力を50%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.5, rate: 1.0 } },
  { id: 24, name: "徳川家康", power: 115, hp: 85, attribute: "STRATEGY", desc: "幼少期を今川氏の人質として過ごし、信長・秀吉に従属しながら忍耐強く力を蓄えた。秀吉の死後、関ヶ原の戦いで石田三成らを破り、1603年に征夷大将軍に任命され江戸幕府を開く。大坂の陣で豊臣氏を滅ぼし、武家諸法度を制定して大名を厳しく統制。以後260年以上続く「パクス・トクガワーナ（泰平の世）」の盤石な礎を築いた。", skill: { name: "東照大権現", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 25, name: "徳川吉宗", power: 120, hp: 80, attribute: "STRATEGY", desc: "紀州藩主から迎えられた江戸幕府第8代将軍。「暴れん坊将軍」のモデルとして知られ、慢性的な幕府の財政難を立て直すために「享保の改革」を断行した。上げ米の制で大名から米を供出させる一方、新田開発や甘藷などの商品作物の栽培を奨励。目安箱を設置して庶民の声を政治に反映させるなど、質実剛健を旨とする優れた実務家であった。", skill: { name: "享保の改革", desc: "自身の歴史力を30%上昇させる", type: "buff_self", value: 0.3, rate: 0.7 } },
  { id: 26, name: "近松門左衛門", power: 70, hp: 130, attribute: "CULTURE", desc: "江戸時代前期から中期（元禄時代）にかけて活躍した浄瑠璃および歌舞伎の狂言作者。歴史上の事件を扱った「時代物」に加え、当時の町人の悲恋や義理人情の葛藤、実際に起きた心中事件などを題材とした「世話物」という新しいジャンルを開拓。『曽根崎心中』などの名作を次々と生み出し、大坂の庶民から熱狂的な支持を集めた。", skill: { name: "義理と人情", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.8 } },
  { id: 27, name: "坂本龍馬", power: 110, hp: 90, attribute: "STRATEGY", desc: "土佐藩を脱藩し、勝海舟の門下で海軍塾に学んだ幕末の志士。長崎に亀山社中（後の海援隊）を結成し、犬猿の仲であった薩摩藩と長州藩の間を取り持ち、「薩長同盟」を成立させるという奇跡を成し遂げた。また、大政奉還の構想となる「船中八策」を起草して新国家のビジョンを示したが、大政奉還の直前に京都の近江屋で暗殺された。", skill: { name: "薩長同盟", desc: "味方全員の歴史力を35%上昇させる", type: "buff_all", value: 0.35, rate: 0.6 } },
  { id: 28, name: "西郷隆盛", power: 135, hp: 65, attribute: "VALOR", desc: "薩摩藩の下級武士から島津斉彬に見出されて台頭し、大久保利通らと共に倒幕運動を主導した明治維新の三傑の一人。戊辰戦争では官軍の参謀として活躍し、勝海舟との会談で江戸城無血開城を実現。新政府では廃藩置県などを断行したが、征韓論争に敗れて下野。のちに不平士族に推されて西南戦争の盟主として担ぎ出され、城山で自刃した。", skill: { name: "敬天愛人", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 29, name: "大久保利通", power: 125, hp: 75, attribute: "STRATEGY", desc: "薩摩藩出身の明治維新の三傑の一人。幼馴染の西郷隆盛と共に倒幕を主導したが、新政府樹立後は冷徹なまでの現実主義者として振る舞った。内務卿として独裁的な権力を握り、地租改正、徴兵令、殖産興業など近代国家建設のための急進的な改革を強行。士族の反乱を容赦なく鎮圧したが、その強権的手法が恨みを買い紀尾井坂の変で暗殺された。", skill: { name: "富国強兵", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 30, name: "伊藤博文", power: 105, hp: 95, attribute: "STRATEGY", desc: "長州藩出身で松下村塾に学んだ。明治政府の中枢を担い、ヨーロッパの憲法を自ら調査し、ドイツ流の君権が強い大日本帝国憲法の起草を主導した。1885年に日本初の初代内閣総理大臣に就任し、立憲政友会を結成して政党政治の導入にも貢献。韓国統監として朝鮮半島の植民地化を進めたが、ハルビン駅で安重根により暗殺された。", skill: { name: "初代内閣総理大臣", desc: "相手が【文化】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.4, rate: 1.0 } },
  { id: 31, name: "日本武尊", power: 128, hp: 72, attribute: "VALOR", desc: "景行天皇の皇子と伝えられる古代の伝説的英雄（ヤマトタケル）。熊襲や蝦夷を討伐するため各地を転戦し、草薙剣を用いて難局を乗り越えた。大和に帰還する途中の伊吹山で病に倒れ、白鳥となって飛び去ったという悲劇の物語が『古事記』『日本書紀』に記され、古代大和政権の国土統一の象徴として長く語り継がれている。", skill: { name: "草薙の剣", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 32, name: "物部守屋", power: 112, hp: 88, attribute: "VALOR", desc: "飛鳥時代の有力豪族・大連。軍事・警察を司る物部氏の長として、日本古来の神祇信仰を重んじ、百済から伝来した仏教の受容に強硬に反対した（排仏派）。仏教受容を推進する大臣の蘇我馬子と激しく対立したが、587年の丁未の乱で厩戸王（聖徳太子）らを含む蘇我氏の連合軍に敗れ、一族もろとも滅ぼされた。", skill: { name: "排仏の執念", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 33, name: "大海人皇子", power: 126, hp: 74, attribute: "VALOR", desc: "天智天皇の弟。672年の壬申の乱で大友皇子（弘文天皇）を破って皇位に就き、天武天皇となった。飛鳥浄御原令の編纂を命じ、八色の姓を制定して皇族を中心とする新たな身分秩序を構築。また、富本銭の鋳造や日本初の本格的都城である藤原京の造営を計画するなど、天皇を中心とする強力な中央集権国家体制を完成させた。", skill: { name: "壬申の乱", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 34, name: "阿弖流為", power: 137, hp: 63, attribute: "VALOR", desc: "平安時代初期における胆沢地方の蝦夷の首長。地の利を活かした巧みなゲリラ戦術で、朝廷から派遣された紀古佐美率いる大規模な討伐軍を幾度も撃退し、勇名を轟かせた。しかし、坂上田村麻呂が率いる新たな遠征軍に対してついに降伏。田村麻呂は助命を嘆願したが、公卿らの反対により河内国で無念の処刑をされた。", skill: { name: "蝦夷の意地", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 35, name: "源義家", power: 119, hp: 81, attribute: "VALOR", desc: "平安時代後期の武将。「八幡太郎」の通称で知られる。前九年合戦で父の頼義とともに安倍氏を討ち、後三年合戦では清原氏の内紛に介入してこれを平定し、東国における清和源氏の武威と名声を不動のものとした。彼の武勇は後世の武士たちの理想とされ、のちの鎌倉幕府を開く源頼朝らへと連なる源氏隆盛の礎を築いた。", skill: { name: "八幡太郎", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 36, name: "源義仲", power: 142, hp: 58, attribute: "VALOR", desc: "平安時代末期の信濃源氏の武将。「木曾義仲」と呼ばれる。以仁王の令旨に応じて挙兵し、倶利伽羅峠の戦いで火牛の計を用いて平維盛の大軍を撃破。平氏を都から追放して一番乗りを果たし「朝日将軍」と称された。しかし、京都の治安維持に失敗して後白河法皇と激しく対立し、源頼朝が派遣した義経らの軍勢に粟津で討たれた。", skill: { name: "火牛の計", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 37, name: "北条泰時", power: 87, hp: 113, attribute: "VALOR", desc: "鎌倉幕府の第3代執権。1221年の承久の乱では幕府軍の総大将として上京し、朝廷軍を打ち破って幕府の絶対的優位を確立した。執権就任後は、叔父の時房を連署に任命し、合議制機関である評定衆を設置。さらに1232年には日本初の武家法である「御成敗式目（貞永式目）」を制定し、道理に基づく公正な政治（執権政治）を大成した。", skill: { name: "貞永の道理", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 38, name: "楠木正成", power: 114, hp: 86, attribute: "VALOR", desc: "鎌倉時代末期から南北朝時代にかけて活躍した河内国の武将。後醍醐天皇の倒幕の呼びかけにいち早く応じ、赤坂城や千早城に籠城してゲリラ戦術を駆使し、大軍を釘付けにして幕府滅亡の大きな要因を作った。建武の新政崩壊後も南朝に忠義を尽くし、湊川の戦いで足利尊氏の圧倒的大軍を迎え撃ち、壮絶な最期を遂げた。", skill: { name: "奇策・千早城", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.85 } },
  { id: 39, name: "新田義貞", power: 131, hp: 69, attribute: "VALOR", desc: "上野国を本拠とする清和源氏の武将。後醍醐天皇の綸旨を受けて挙兵し、分倍河原の戦いなどで幕府軍を連破。稲村ヶ崎を突破して鎌倉に攻め込み、北条高時らを自刃させて鎌倉幕府を滅亡させた。建武政権では武者所の頭人となるが、のちに離反した足利尊氏と激しく戦い、越前国の藤島で戦死するまで南朝軍の主力として戦い抜いた。", skill: { name: "稲村ヶ崎の奇跡", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 40, name: "北畠顕家", power: 127, hp: 73, attribute: "VALOR", desc: "南北朝時代の公卿・武将。北畠親房の長男で、若くして陸奥守に任じられ、後醍醐天皇の皇子を奉じて陸奥将軍府を樹立。建武政権に反旗を翻した足利尊氏を追討するため、奥州から驚異的な強行軍で西上し、一度は尊氏を九州へ追いやる大功を立てた。再び挙兵した尊氏軍に対しても果敢に挑んだが、和泉国の石津で21歳の若さで散った。", skill: { name: "奥州からの疾風", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 41, name: "北条早雲", power: 111, hp: 89, attribute: "VALOR", desc: "戦国大名・後北条氏の祖（伊勢宗瑞）。室町幕府の幕臣から駿河に下り、今川氏のお家騒動を収めたのち、伊豆の堀越公方を滅ぼして伊豆一国を平定。さらに相模の小田原城を奪取し、関東進出の足がかりを築いた。身分を問わず実力でのし上がる「下克上」を体現した最初の戦国大名とされ、家訓『早雲寺殿廿一箇条』を残した。", skill: { name: "下克上の先駆け", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 42, name: "毛利元就", power: 98, hp: 102, attribute: "VALOR", desc: "安芸国の小規模な国人領主から身を起こし、中国地方の覇者に上り詰めた稀代の謀将。1555年の厳島の戦いでは、奇襲により主君であった陶晴賢の大軍を撃破。さらに尼子氏をも滅ぼして中国地方のほぼ全域を支配下に置いた。息子たちに一族の結束を説いたとされる「三矢の訓え」の逸話は、彼の深謀遠慮を物語っている。", skill: { name: "三矢の訓え", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.7 } },
  { id: 43, name: "本多忠勝", power: 138, hp: 62, attribute: "VALOR", desc: "徳川家康に生涯仕えた徳川四天王の一人。愛槍「蜻蛉切」を振るい、50回以上の合戦に参加しながら一度もかすり傷すら負わなかったと伝わる無双の猛将。姉川の戦いや小牧・長久手の戦いで圧倒的な武勇を示し、敵である豊臣秀吉からも「家康に過ぎたるものが二つあり、唐の頭に本多平八」と絶賛された戦国最強の武士。", skill: { name: "蜻蛉切", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.5 } },
  { id: 44, name: "黒田官兵衛", power: 93, hp: 107, attribute: "VALOR", desc: "豊臣秀吉に仕え、その天下統一を大いに助けた天才軍師（黒田孝高・如水）。備中高松城の水攻めや、本能寺の変後の「中国大返し」など、数々の奇策を進言して秀吉の窮地を救った。そのあまりの知謀の深さは、秀吉に「次に天下を獲るのは官兵衛だ」と警戒されるほどであった。関ヶ原の戦いでは九州で独自に大軍を動かし暗躍した。", skill: { name: "水攻めの奇策", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.85 } },
  { id: 45, name: "竹中半兵衛", power: 82, hp: 118, attribute: "VALOR", desc: "美濃の戦国武将で、黒田官兵衛とともに「両兵衛」と並び称された豊臣秀吉の軍師。わずか十数人で主君・斎藤龍興の難攻不落の居城である稲葉山城を乗っ取るという離れ業を演じた。秀吉の三木城攻めの陣中で若くして病死するまで、その神算鬼謀により織田・豊臣軍の快進撃を影から支え続けた「今孔明」と呼ばれる智将。", skill: { name: "今孔明の智謀", desc: "敵全員の歴史力を30%減少させる", type: "debuff_all", value: 0.3, rate: 0.7 } },
  { id: 46, name: "真田信繁", power: 136, hp: 64, attribute: "VALOR", desc: "真田幸村の名で知られる戦国時代の武将。関ヶ原の戦いでは父・昌幸とともに西軍につき、上田城で徳川秀忠の大軍を釘付けにした。大坂冬の陣では「真田丸」と呼ばれる出城を築いて徳川軍を撃退。大坂夏の陣では、徳川家康の本陣に決死の突撃を敢行し、家康を自刃寸前まで追い詰めたことから「日本一の兵」と称賛された。", skill: { name: "日本一の兵", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 47, name: "伊達政宗", power: 124, hp: 76, attribute: "VALOR", desc: "奥州の覇者で「独眼竜」の異名をとる。若くして家督を継ぎ、周辺の豪族を次々と破って南奥州を制覇したが、豊臣秀吉の小田原攻めに遅参して服属。江戸時代には仙台藩62万石の初代藩主となり、北上川の治水や新田開発で領内を豊かにした。また、支倉常長ら慶長遣欧使節をローマに派遣するなど、広い世界観を持った野心家であった。", skill: { name: "独眼竜の野望", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 48, name: "柴田勝家", power: 129, hp: 71, attribute: "VALOR", desc: "織田信長の筆頭家老。「鬼柴田」と恐れられた猛将で、越前国北ノ庄城を本拠に北陸方面の平定を任された。本能寺の変後、清洲会議で豊臣秀吉と対立し、お市の方を正室に迎えて対抗したが、1583年の賤ヶ岳の戦いで秀吉に敗北。北ノ庄城に追い詰められ、妻のお市の方とともに辞世の句を残して壮絶な自刃を遂げた。", skill: { name: "鬼柴田の突撃", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 49, name: "長宗我部元親", power: 116, hp: 84, attribute: "VALOR", desc: "土佐の国人領主から身を起こし、四国統一を果たした戦国大名。「一領具足」と呼ばれる、農作業中も武器を手放さない半農半兵の屈強な兵士たちを率いて勢力を拡大した。しかし、豊臣秀吉の四国征伐によって降伏を余儀なくされ、土佐一国のみの領有を許された。その後は秀吉に従い、九州征伐や小田原攻め、朝鮮出兵に従軍した。", skill: { name: "一領具足", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 50, name: "島津義弘", power: 133, hp: 67, attribute: "VALOR", desc: "薩摩国の戦国大名で、島津四兄弟の次男。「鬼島津」と恐れられた勇猛な武将。朝鮮出兵では泗川の戦いで明・朝鮮の大軍を寡兵で打ち破り、その名を大陸に轟かせた。関ヶ原の戦いでは西軍に属したが、敗北が決定的となった際、敵の大軍の中を正面突破して薩摩への生還を果たすという前代未聞の「島津の退き口」を成し遂げた。", skill: { name: "島津の退き口", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 51, name: "天草四郎", power: 78, hp: 122, attribute: "VALOR", desc: "江戸時代初期の島原の乱（島原・天草一揆）における一揆軍の最高指導者（益田時貞）。キリシタンへの弾圧と過酷な年貢の取り立てに苦しむ農民たちから「天の使者」として擁立され、わずか16歳で数万の軍勢を率いて原城に籠城した。幕府の大軍を相手に数ヶ月にわたって頑強に抵抗したが、最後は兵糧攻めにより城は陥落し、討ち死にした。", skill: { name: "奇跡のカリスマ", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 52, name: "大石内蔵助", power: 102, hp: 98, attribute: "VALOR", desc: "播磨国赤穂藩の筆頭家老（大石良雄）。1701年、主君・浅野内匠頭が江戸城松の廊下で吉良上野介に刃傷におよび切腹・改易となると、お家再興に奔走。それが絶望的となると、仇討ちの意志を固め、遊郭で放蕩を装うなどして敵を油断させた。翌年、47人の赤穂浪士を率いて吉良邸に討ち入りを見事成功させ、武士の忠義の鑑と称えられた。", skill: { name: "赤穂浪士の忠義", desc: "相手が【文化】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.4, rate: 0.9 } },
  { id: 53, name: "大塩平八郎", power: 117, hp: 83, attribute: "VALOR", desc: "江戸時代後期の陽明学者で、元大坂町奉行所の与力。清廉潔白な役人として知られた。天保の飢饉の際、豪商たちが米を買い占め、奉行所が無策であることに激怒。蔵書を売って民衆を救済したのち、1837年に「救民」の旗を掲げて門弟らと蜂起した（大塩の乱）。乱は半日で鎮圧され自刃したが、幕府直轄地での反乱は全国に衝撃を与えた。", skill: { name: "救民の蜂起", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 54, name: "高杉晋作", power: 123, hp: 77, attribute: "VALOR", desc: "幕末の長州藩士で、吉田松陰の松下村塾に学んだ尊王攘夷派の志士。1863年、身分を問わず有志を募る画期的な軍隊「奇兵隊」を創設。四国艦隊下関砲撃事件の講和交渉にあたり、のちに功山寺で挙兵して藩の保守派を打倒し、長州藩を倒幕へと方向づけた。第二次長州征伐でも幕府軍を撃破したが、大政奉還を見ることなく労咳で病死した。", skill: { name: "奇兵隊結成", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 55, name: "大村益次郎", power: 134, hp: 66, attribute: "VALOR", desc: "長州藩出身の兵学者・蘭学者。緒方洪庵の適塾で蘭学を学び、宇和島藩や幕府の講武所で兵学を講じたのち、長州藩の軍制改革を主導。第二次長州征伐では、最新の西洋戦術で幕府軍を圧倒した。戊辰戦争でも新政府軍の総司令官として上野の彰義隊を1日で鎮圧。近代的な日本陸軍の創設に尽力したが、不平士族に襲撃されて落命した。", skill: { name: "近代兵学の導入", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 56, name: "乃木希典", power: 109, hp: 91, attribute: "VALOR", desc: "明治時代の陸軍大将。日露戦争において第3軍司令官として旅順攻囲戦を指揮し、多大な犠牲を払いながらも難攻不落の旅順要塞を陥落させ、バルチック艦隊を迎え撃つ日本海海戦の勝利に道を開いた。戦後は学習院院長を務め、明治天皇の崩御に際して妻とともに殉死。その忠君愛国の姿は当時の日本人の精神的象徴とされた。", skill: { name: "旅順攻囲戦", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 57, name: "東郷平八郎", power: 134, hp: 66, attribute: "VALOR", desc: "薩摩藩出身の海軍大将。日露戦争において連合艦隊司令長官を務め、旗艦「三笠」に座乗して日本海海戦の指揮を執った。Z旗を掲げて将兵を鼓舞し、敵前大回頭（丁字戦法）という大胆な戦術で、ロシアのバルチック艦隊をほぼ完全に撃滅するという世界海戦史上類を見ない圧倒的勝利を収め、「アドミラル・トーゴー」として世界的英雄となった。", skill: { name: "丁字戦法", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 58, name: "児玉源太郎", power: 113, hp: 87, attribute: "VALOR", desc: "長州藩出身の陸軍大将。日露戦争開戦時、すでに台湾総督や内務大臣を歴任する重鎮であったが、降格人事を受け入れて満州軍総参謀長に就任。大山巌総司令官を補佐して陸軍の作戦を立案し、遼陽・沙河・奉天会戦を勝利に導いた。また、苦戦する旅順攻囲戦において乃木希典を援助し、戦局打開に決定的な役割を果たした天才的戦略家。", skill: { name: "神算鬼謀の参謀", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 59, name: "土方歳三", power: 126, hp: 74, attribute: "VALOR", desc: "幕末の新選組副長。「鬼の副長」として厳しい局中法度を定め、近藤勇を支えて新選組を京都最強の治安維持組織に育て上げた。戊辰戦争勃発後は旧幕府軍の主戦力として、鳥羽・伏見の戦いや宇都宮城の戦いを転戦。最後は榎本武揚らとともに蝦夷地に渡り、箱館戦争で五稜郭の防衛戦の最中に銃弾を浴びて壮絶な戦死を遂げた。", skill: { name: "局中法度", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 60, name: "山県有朋", power: 127, hp: 73, attribute: "VALOR", desc: "長州藩出身の政治家・軍人。高杉晋作の奇兵隊で活躍し、維新後は徴兵令を制定して国民皆兵の近代軍隊を創設した。「軍部大臣現役武官制」を定め、軍の政治的独立性を高めて巨大な官僚・軍閥を形成。総理大臣を2度務め、地方自治制の確立や治安警察法の制定など、強力な保守主義的・天皇制絶対主義的な国家体制を築き上げた元老。", skill: { name: "軍閥の祖", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 61, name: "蘇我馬子", power: 112, hp: 88, attribute: "STRATEGY", desc: "飛鳥時代の有力豪族で、長年にわたり大臣として朝廷の権力を握った。百済から伝来した仏教を積極的に受容し、排仏派の物部守屋を滅ぼして国内の覇権を確立。のちに崇峻天皇を暗殺するという前代未聞の凶行に及んだが、推古天皇を擁立し、姪にあたる天皇や聖徳太子とともに飛鳥文化の開花と国政改革を主導して蘇我氏の全盛期を築いた。", skill: { name: "権力独占", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 62, name: "中臣鎌足", power: 107, hp: 93, attribute: "STRATEGY", desc: "飛鳥時代の政治家で、藤原氏の祖。中大兄皇子（のちの天智天皇）と密かに結び、645年の乙巳の変で、専横を極めていた蘇我入鹿を暗殺し蘇我氏本宗家を滅ぼした。その後、内臣として大化の改新と呼ばれる一連の政治改革を推し進め、天皇を中心とする律令国家体制の基礎を構築。死の直前に天智天皇から「藤原」の姓を賜った。", skill: { name: "乙巳の密謀", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 63, name: "藤原不比等", power: 116, hp: 84, attribute: "STRATEGY", desc: "中臣鎌足の次男で、奈良時代初期の政治家。壬申の乱で冷遇された時期を乗り越え、大宝律令や養老律令の編纂において中心的な役割を果たし、日本の律令国家体制を法的に完成させた。また、娘の宮子を文武天皇の夫人に、光明子を聖武天皇の皇后（非皇族で初）として入内させ、後世まで続く藤原氏の天皇家の外戚としての繁栄の絶対的基礎を築いた。", skill: { name: "律令の完成者", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 64, name: "長屋王", power: 94, hp: 106, attribute: "STRATEGY", desc: "奈良時代の皇族で天武天皇の孫。藤原不比等の死後、右大臣・左大臣として政権を主導し、百万町歩開墾計画や三世一身法の制定など、農地拡大のための政策を推進した。しかし、藤原四兄弟（不比等の子）の台頭により対立が深まり、729年に密告を受けて謀反の疑いをかけられ、邸宅を包囲されて自刃に追い込まれた（長屋王の変）。", skill: { name: "三世一身の法", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 65, name: "橘諸兄", power: 91, hp: 109, attribute: "STRATEGY", desc: "奈良時代中期の貴族。長屋王を滅ぼした藤原四兄弟が天然痘で相次いで病死したのち、聖武天皇の信任を得て右大臣となり政権を握った。唐から帰国した吉備真備や玄昉を重用して国政改革を行い、墾田永年私財法を制定して土地の私有を認めた。しかし、のちに台頭してきた藤原仲麻呂と対立し、政界を引退した。万葉歌人としても知られる。", skill: { name: "墾田永年私財法", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 66, name: "藤原百川", power: 103, hp: 97, attribute: "STRATEGY", desc: "奈良時代後期の貴族で、藤原式家の出身。称徳天皇が崩御し道鏡が失脚したのち、藤原永手らとともに天智天皇の孫である白壁王（光仁天皇）を擁立し、天武系から天智系への皇統の転換を成し遂げた。さらに政敵を排除して、のちの桓武天皇を皇太子に立てるなど、朝廷の権力闘争を巧みに泳ぎ切り、平安遷都へと至る道筋を整えた。", skill: { name: "皇統の転換", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.85 } },
  { id: 68, name: "菅原道真", power: 124, hp: 76, attribute: "STRATEGY", desc: "平安時代前期の学者・政治家。優れた漢詩文の才能で宇多天皇に重用され、894年には遣唐使の廃止を建議して国風文化発展の契機を作った。右大臣にまで異例の出世を遂げたが、藤原時平らの讒言により大宰府に左遷され、不遇の死を遂げた。死後、都で相次いだ落雷などの災害が彼の怨霊の仕業と恐れられ、北野天満宮に学問の神として祀られた。", skill: { name: "遣唐使廃止", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 69, name: "藤原時平", power: 106, hp: 94, attribute: "STRATEGY", desc: "平安時代前期の公卿で、藤原北家の氏長者。醍醐天皇のもとで左大臣となり、「延喜の治」と呼ばれる天皇親政を補佐した。政敵であった右大臣・菅原道真を謀略によって大宰府へ左遷し、藤原氏の権力基盤を確固たるものにした。また、荘園の拡大を防ぐために延喜の荘園整理令を出し、律令制度の立て直しを図ったが、39歳の若さで急死した。", skill: { name: "延喜の治", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.85 } },
  { id: 72, name: "北条義時", power: 114, hp: 86, attribute: "STRATEGY", desc: "鎌倉幕府の第2代執権。父・時政を追放して幕府の実権を掌握。和田義盛ら有力御家人を次々と滅ぼし、執権政治の体制を固めた。1221年の承久の乱では、後鳥羽上皇の討伐令に対して幕府軍を京都へ進撃させ、朝廷軍を撃破。上皇らを配流し、新たに六波羅探題を設置して新補地頭を配置するなど、武家政権の西国支配を決定的なものにした。", skill: { name: "承久の乱", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 74, name: "今川了俊", power: 96, hp: 104, attribute: "STRATEGY", desc: "南北朝時代の武将・政治家（今川貞世）。室町幕府から九州探題として派遣され、当時南朝の懐良親王の勢力が強かった九州において、巧みな外交と武力によって国人たちを帰順させ、約10年かけて九州の平定を成し遂げた。しかし、その強大化した勢力を将軍足利義満に警戒され、探題を罷免された。優れた歌人・学者としての顔も持つ。", skill: { name: "九州探題の威", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 75, name: "細川勝元", power: 101, hp: 99, attribute: "STRATEGY", desc: "室町時代中期の武将で、幕府の管領を務めた。将軍家や守護大名家の家督争いに介入し、1467年、山名宗全（持豊）と激しく対立して応仁の乱を引き起こした。東軍の総大将として京都の細川邸（花の御所周辺）を本陣とし、約11年にわたる未曾有の大乱を戦ったが、決着を見ることなく戦陣の中で病死し、戦国時代への扉を開く結果となった。", skill: { name: "応仁の東軍", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 76, name: "斎藤道三", power: 119, hp: 81, attribute: "STRATEGY", desc: "戦国時代の武将。「美濃の蝮（マムシ）」の異名をとる。油売りの商人から身を起こしたとされ、主君である美濃守護の土岐氏を追放し、国盗りを成し遂げた下克上の典型とされる大名。娘の帰蝶（濃姫）を織田信長に嫁がせ、正徳寺での会見で信長の才器を見抜き、「我が子孫は信長の門前に馬をつなぐことになる」と予言した。のち長男の義龍に討たれた。", skill: { name: "美濃のマムシ", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 77, name: "松永久秀", power: 108, hp: 92, attribute: "STRATEGY", desc: "戦国時代の武将。三好長慶の家臣として台頭し、畿内の政治を牛耳った。将軍・足利義輝の暗殺、主家である三好氏の乗っ取り、さらには東大寺大仏殿の焼討ちなど、当時の倫理観を破る悪逆非道な振る舞いで知られる。のちに織田信長に服属するが二度反逆し、最後は信長が欲しがった名物茶器「平蜘蛛」に爆薬を詰めて自爆したという伝説を持つ。", skill: { name: "平蜘蛛の爆砕", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 78, name: "石田三成", power: 74, hp: 136, attribute: "STRATEGY", desc: "豊臣政権の五奉行の一人で、秀吉の側近として内政・兵站で多大な功績を挙げた。太閤検地の実施や朝鮮出兵時の補給など、行政官として極めて優秀であった反面、妥協を許さない性格から加藤清正ら武断派の武将と激しく対立。秀吉の死後、徳川家康の専横を防ぐために西軍を組織し関ヶ原の戦いを起こしたが、小早川秀秋らの裏切りにより敗れ処刑された。", skill: { name: "大一大万大吉", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 79, name: "徳川家光", power: 83, hp: 117, attribute: "STRATEGY", desc: "江戸幕府の第3代将軍。1635年の武家諸法度改定で参勤交代を制度化し、大名統制を徹底した。また、キリスト教の弾圧を強化して島原の乱を鎮圧し、1639年にはポルトガル船の来航を禁止して「鎖国」体制を完成させた。「生まれながらの将軍」と称し、老中を中心とする幕府の強力な官僚機構と支配体制を確立し、江戸の泰平を盤石なものとした。", skill: { name: "参勤交代の制", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 80, name: "新井白石", power: 99, hp: 101, attribute: "STRATEGY", desc: "江戸時代中期の朱子学者・政治家。6代将軍家宣・7代家継に仕え、側用人の間部詮房とともに「正徳の治」と呼ばれる政治改革を行った。生類憐みの令の廃止や、朝鮮通信使の待遇簡略化、海舶互市新例による金銀の流出防止、良質の正徳金銀の鋳造など、幕府の権威向上と財政立て直しに尽力。著書に『読史余論』や『折たく柴の記』がある。", skill: { name: "正徳の治", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 81, name: "田沼意次", power: 112, hp: 88, attribute: "STRATEGY", desc: "江戸時代中期の政治家で、10代将軍家治のもとで老中として権势を振るった。米中心の経済から貨幣経済への転換を図り、株仲間を公認して運上金・冥加金を徴収。また、長崎貿易の拡大や印旛沼の干拓、蝦夷地開発の計画など、重商主義的な積極政策を展開した。しかし、賄賂政治との批判を浴び、天明の飢饉の発生もあって失脚した。", skill: { name: "重商主義政策", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 82, name: "松平定信", power: 103, hp: 97, attribute: "STRATEGY", desc: "江戸時代後期の老中で、白河藩主。8代将軍徳川吉宗の孫。天明の飢饉や打ちこわしで混乱した社会を立て直すため、「寛政の改革」を断行した。棄捐令による旗本・御家人の救済、囲米や旧里帰農令による農村復興を図る一方、寛政異学の禁で朱子学を正学とし、出版統制令で風紀を厳しく取り締まったが、その極端な緊縮政策は反発を招いた。", skill: { name: "寛政の改革", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 83, name: "水野忠邦", power: 94, hp: 106, attribute: "STRATEGY", desc: "江戸時代後期の老中。大塩の乱や異国船の接近など、内憂外患の危機に対応するため「天保の改革」を実施した。株仲間の解散による物価引き下げや、人返しの法による農村復興を試みたが、江戸・大坂周辺の領地を幕府直轄とする「上知令」を出したことで大名や旗本の猛反発を買い、わずか2年余りで失脚し、改革は失敗に終わった。", skill: { name: "天保の改革", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.7 } },
  { id: 84, name: "井伊直弼", power: 126, hp: 74, attribute: "STRATEGY", desc: "幕末の譜代大名（彦根藩主）で、江戸幕府の大老。ハリスの強硬な要求に対し、朝廷の勅許を得ないまま日米修好通商条約の調印を断行した。また、将軍継嗣問題では徳川慶福（家茂）を擁立。これらの強権的な政策に対する尊皇攘夷派からの激しい批判に対し、「安政の大獄」で吉田松陰らを厳しく弾圧したが、1860年の桜田門外の変で暗殺された。", skill: { name: "安政の大獄", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 85, name: "勝海舟", power: 122, hp: 78, attribute: "STRATEGY", desc: "幕末から明治期の政治家・幕臣。長崎海軍伝習所で学び、咸臨丸の艦長として太平洋を横断した。幕府の軍艦奉行として海軍の育成に尽力し、坂本龍馬らを育てた。戊辰戦争の際には、幕府軍の代表として新政府軍の西郷隆盛と会談し、江戸城の無血開城を実現して江戸の町を戦火から救った。維新後も旧幕臣の代表格として新政府に協力した。", skill: { name: "無血開城の交渉", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.9 } },
  { id: 86, name: "岩倉具視", power: 111, hp: 89, attribute: "STRATEGY", desc: "幕末から明治期の公家・政治家。公武合体派として和宮降嫁を推進して失脚したが、のちに倒幕派に転じ、王政復古のクーデターを主導して新政府の首脳となった。明治維新後は右大臣となり、廃藩置県の断行に尽力。1871年には岩倉使節団の全権大使として欧米を視察し、帰国後は西郷隆盛らの征韓論に反対して内治優先を貫き、近代国家の基礎を固めた。", skill: { name: "王政復古の密命", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 87, name: "板垣退助", power: 116, hp: 84, attribute: "STRATEGY", desc: "土佐藩出身の政治家。戊辰戦争で活躍して新政府の参議となったが、征韓論争に敗れて下野。1874年に民撰議院設立の建白書を提出して自由民権運動の口火を切り、立志社や自由党を結成して全国的な民主化運動の指導者となった。遊説中に暴漢に襲われた際の「板垣死すとも自由は死せず」の言葉は有名。のち第1次大隈内閣で内務大臣を務めた。", skill: { name: "自由民権の先駆", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 88, name: "大隈重信", power: 109, hp: 91, attribute: "STRATEGY", desc: "肥前藩出身の政治家。明治初期の新政府で財政・外交を担当したが、明治14年の政変で国会即時開設を主張して伊藤博文らと対立し下野。立憲改進党を結成し、東京専門学校（現在の早稲田大学）を創設した。1898年に板垣退助とともに日本初の政党内閣（隈板内閣）を組織。のち第2次内閣では第一次世界大戦への参戦や対華21カ条要求を行った。", skill: { name: "改進の志", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 89, name: "原敬", power: 128, hp: 72, attribute: "STRATEGY", desc: "岩手県出身の政治家・ジャーナリスト。爵位を持たず、衆議院に議席を持つ「平民宰相」として国民から熱狂的な歓迎を受け、1918年に陸・海軍・外務大臣以外を立憲政友会の党員で固めた日本初の本格的な政党内閣を組織した。高等教育機関の拡張や交通網の整備（建政）を推進したが、普通選挙の導入には消極的であり、1921年に東京駅で暗殺された。", skill: { name: "平民宰相の建政", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.6 } },
  { id: 90, name: "吉田茂", power: 64, hp: 136, attribute: "STRATEGY", desc: "外交官出身の政治家。第二次世界大戦後、計5次にわたり内閣総理大臣を務め、戦後日本の復興を強力に牽引した。1951年にサンフランシスコ平和条約に調印して日本の独立を回復させ、同時に日米安全保障条約を結んで西側陣営への帰属を決定づけた。軍備を最小限に抑え、経済成長に全力を注ぐ「吉田ドクトリン」は、戦後日本の基本路線となった。", skill: { name: "戦後復興の舵取り", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 91, name: "鑑真", power: 83, hp: 117, attribute: "CULTURE", desc: "奈良時代の唐の僧侶。日本からの要請を受け、正しい仏教の戒律を伝えるために渡日を決意。暴風雨や弟子の密告など幾多の苦難に遭い、失明しながらも6度目の航海で753年に日本の土を踏んだ。東大寺に戒壇を設けて聖武上皇らに戒を授け、のちに唐招提寺を建立して日本の仏教界に厳格な規律をもたらした不屈の精神の持ち主。", skill: { name: "不屈の渡日", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 92, name: "空海", power: 126, hp: 74, attribute: "CULTURE", desc: "平安時代初期の僧で、真言宗の開祖（弘法大師）。遣唐使として唐の長安に渡り、恵果から密教の奥義をわずかな期間で授かり帰国。高野山に金剛峯寺、京都に東寺（教王護国寺）を開き、加持祈祷による現世利益を説く密教を日本に広めた。また、庶民の学校である綜芸種智院を創設し、「三筆」の一人に数えられるなど、文化・教育面でも多大な足跡を残した。", skill: { name: "真言密教の呪法", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 93, name: "最澄", power: 111, hp: 89, attribute: "CULTURE", desc: "平安時代初期の僧で、天台宗の開祖（伝教大師）。比叡山にこもって修行ののち、還学生として唐に渡り天台の教えを学んだ。帰国後、比叡山延暦寺を拠点に「法華経」を中心とする天台宗を開宗。南都（奈良）の旧仏教勢力からの独立を目指して大乗戒壇の設立を激しく主張し、死後にそれが認められ、比叡山は鎌倉新仏教の祖たちを育む日本仏教の母山となった。", skill: { name: "大乗戒壇の悲願", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 94, name: "山上憶良", power: 76, hp: 124, attribute: "CULTURE", desc: "奈良時代の万葉歌人・官僚。遣唐使として唐に渡り、最新の学問や思想を学んだのち、筑前守などを歴任した。貴族の雅やかな恋の歌が多い中で、彼は「貧窮問答歌」で重税に苦しむ農民の悲惨な現実や、子を想う親の深い愛情など、社会の底辺に生きる人々の苦悩を鋭い観察眼と深い同情をもって詠み上げた、社会派歌人の先駆者である。", skill: { name: "貧窮問答歌", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 95, name: "清少納言", power: 92, hp: 108, attribute: "CULTURE", desc: "平安時代中期の女流作家。一条天皇の皇后・藤原定子に仕え、その宮廷生活の中で随筆『枕草子』を執筆した。「春はあけぼの…」で始まる四季の情景や、宮中での出来事、人間観察などを、鋭い感性と「をかし」の美意識をもって軽妙な筆致で綴った。紫式部の「もののあはれ」と並び、平安文学の双璧をなす知的な文学空間を創り上げた。", skill: { name: "をかしの美意識", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 96, name: "紀貫之", power: 101, hp: 99, attribute: "CULTURE", desc: "平安時代前期の歌人・官人。醍醐天皇の命により、初の勅撰和歌集である『古今和歌集』を凡河内躬恒らとともに編纂し、その「仮名序」で和歌の歴史と意義を論じた。また、土佐守の任期を終えて帰京するまでの旅の記録を、女性に仮託してかな文字で綴った『土佐日記』を著し、のちのかな文学・日記文学の発展に決定的な影響を与えた。", skill: { name: "古今伝授の祖", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.85 } },
  { id: 97, name: "法然", power: 81, hp: 119, attribute: "CULTURE", desc: "鎌倉時代初期の僧で、浄土宗の開祖（源空）。比叡山での長い修行の末に、厳しい修行や学問による自力救済を捨て、ただひたすら「南無阿弥陀仏」と念仏を唱えるだけで極楽往生できるという「専修念仏」の教えに到達した。身分や男女を問わず万人が救われるとする教えは爆発的に広まったが、旧仏教側の激しい反発を招き、一時は四国に流罪となった。", skill: { name: "専修念仏", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 98, name: "栄西", power: 94, hp: 106, attribute: "CULTURE", desc: "鎌倉時代初期の僧で、日本における臨済宗の開祖。二度にわたって宋に渡り、禅宗を学んで帰国。京都に建仁寺、鎌倉に建長寺を開き、武士階級を中心に「公案」を用いて悟りを開く禅の教えを広めた。また、宋から持ち帰った茶の種を栽培し、将軍源実朝に『喫茶養生記』を献上して、日本における喫茶の習慣の普及に多大な貢献をした。", skill: { name: "臨済の禅", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 99, name: "道元", power: 102, hp: 98, attribute: "CULTURE", desc: "鎌倉時代初期の僧で、日本における曹洞宗の開祖。宋に渡って修行し、帰国後は権力や世俗から離れ、越前の山深くに永平寺を開いた。ひたすら坐禅に打ち込むこと自体が悟りであるとする「只管打坐」を説き、厳しい修行生活を貫いた。その深い哲学的思索は主著『正法眼蔵』にまとめられ、武士から地方の農民にまで静かに教えが広まった。", skill: { name: "只管打坐", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 100, name: "日蓮", power: 116, hp: 84, attribute: "CULTURE", desc: "鎌倉時代中期の僧で、日蓮宗（法華宗）の開祖。様々な仏教を学んだ末に『法華経』こそが最高の教えであると確信し、「南無妙法蓮華経」の題目を唱えることを説いた。他宗を激しく非難し、前代未聞の国難（蒙古襲来）を予言した『立正安国論』を幕府に提出したため、伊豆や佐渡への流罪、さらには処刑寸前にまで追い込まれるなど激しい法難を受けた。", skill: { name: "立正安国論", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 101, name: "鴨長明", power: 69, hp: 131, attribute: "CULTURE", desc: "鎌倉時代初期の歌人・随筆家。下鴨神社の禰宜の家に生まれたが、神職への道が絶たれて出家し、洛外の日野山に小さな草庵を結んで隠遁生活を送った。源平の争乱や大地震・大火などの災害を身をもって体験し、その無常観と転換期の世相を深い思索の目で見つめ、名随筆『方丈記』を著して日本の隠者文学の最高峰の一つを形成した。", skill: { name: "方丈の無常観", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 102, name: "吉田兼好", power: 86, hp: 114, attribute: "CULTURE", desc: "鎌倉時代末期から南北朝時代の随筆家・歌人（卜部兼好）。朝廷に出仕したのちに出家し、隠遁生活を送りながら諸国の歌人や武士とも広く交流した。豊かな教養と鋭い観察眼を持ち、人生観や美意識、世間の愚かさや滑稽さを独自の視点で綴った随筆『徒然草』を執筆。「つれづれなるまゝに…」で始まるこの書は、後世の日本人の美意識に絶大な影響を与えた。", skill: { name: "徒然の思索", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 103, name: "世阿弥", power: 97, hp: 103, attribute: "CULTURE", desc: "室町時代初期の猿楽師。父の観阿弥とともに足利義満の庇護を受け、それまで庶民の娯楽や宗教行事であった猿楽に「幽玄」の美を取り入れ、高度な舞台芸術である「能」として大成させた。『風姿花伝』などの優れた芸術論を著し、「秘すれば花」といった演技や演出の極意を後世に残した。晩年は時の将軍の不興を買い、佐渡へ流罪となった。", skill: { name: "幽玄の美", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.85 } },
  { id: 104, name: "運慶", power: 132, hp: 68, attribute: "CULTURE", desc: "鎌倉時代初期の奈良仏師。源平の兵火で焼け落ちた東大寺や興福寺の復興造仏に携わった。平安時代の優美で繊細な定朝様式から脱却し、武士の気風を反映した力強く、写実的でダイナミックな彫刻様式（鎌倉彫刻）を確立。弟子の快慶らとともにわずか69日で造り上げた東大寺南大門の「金剛力士像（仁王像）」は、彼の圧倒的な力量を示す最高傑作である。", skill: { name: "剛健なる彫刻", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 105, name: "狩野永徳", power: 123, hp: 77, attribute: "CULTURE", desc: "桃山時代を代表する天才絵師。狩野派の当主として、織田信長の安土城や豊臣秀吉の大坂城・聚楽第など、権力者の巨大な建築物の内部を飾る障壁画を次々と制作した。水墨の力強い筆致に金箔をふんだんに用いた「金碧障壁画」を完成させ、雄大な構図の「唐獅子図屏風」や「洛中洛外図屏風」など、桃山文化の豪華絢爛な気風を体現する傑作を残した。", skill: { name: "金碧障壁画", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 106, name: "松尾芭蕉", power: 84, hp: 116, attribute: "CULTURE", desc: "江戸時代前期の俳諧師。伊賀国に生まれ、江戸に出て俳諧の指導者となったのち、言葉の遊びであった俳諧を、芸術的・精神的な高みへと引き上げる「蕉風俳諧」を確立した。「わび・さび・かるみ」の美意識を追求し、『奥の細道』や『野ざらし紀行』などの紀行文を残し、全国を旅しながら各地の門人と交流して俳句の道を大成させた「俳聖」。", skill: { name: "奥の細道", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 107, name: "井原西鶴", power: 88, hp: 112, attribute: "CULTURE", desc: "江戸時代前期（元禄期）の浮世草子作家・俳諧師。大坂の裕福な町人の出身。一昼夜で数千句を詠む「矢数俳諧」で名を馳せたのち、小説に転じた。町人の愛欲を描いた『好色一代男』、武士の義理と復讐を描いた『武家義理物語』、町人の経済活動のシビアな現実を描いた『日本永代蔵』や『世間胸算用』など、人間社会の欲望を極めて写実的に描き出した。", skill: { name: "浮世の写実", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 108, name: "尾形光琳", power: 106, hp: 94, attribute: "CULTURE", desc: "江戸時代前期の京都の画家・工芸家。俵屋宗達の装飾的な画風を慕い、それに洗練されたデザイン性と色彩感覚を加えて「琳派」と呼ばれる華麗な芸術様式を大成させた。金箔の背景に鮮やかな色彩で植物を描いた『燕子花図屏風』や『紅白梅図屏風』、さらには蒔絵の硯箱（八橋蒔絵螺鈿硯箱）など、絵画から工芸まで幅広い分野で傑作を生み出した。", skill: { name: "琳派の輝き", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 109, name: "本居宣長", power: 118, hp: 82, attribute: "CULTURE", desc: "江戸時代後期の国学者。伊勢松坂の医師でありながら、賀茂真淵の教えを受けて古典研究に生涯を捧げた。約35年の歳月をかけて『古事記』を厳密に解読した大著『古事記伝』を完成。儒教や仏教という外来の思想（漢意）を排除し、古代日本人の純粋な精神（惟神の道）への復帰を説く「復古神道」を大成させ、幕末の尊王攘夷思想に決定的な影響を与えた。", skill: { name: "古事記伝", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 110, name: "杉田玄白", power: 99, hp: 101, attribute: "CULTURE", desc: "江戸時代中期の蘭方医。前野良沢らとともに、刑死者の解剖（腑分け）を見学した際、オランダの解剖書『ターヘル・アナトミア』の正確さに驚嘆。辞書もないなかで苦心惨憺してこれを翻訳し、1774年に『解体新書』として刊行した。この偉業は日本の西洋医学の幕開けとなり、その後の本格的な蘭学発展の決定的な基礎を築いた。晩年に『蘭学事始』を著す。", skill: { name: "蘭学の夜明け", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 111, name: "伊能忠敬", power: 111, hp: 89, attribute: "CULTURE", desc: "江戸時代後期の測量家。下総国佐原の商人であったが、50歳で隠居したのちに江戸に出て高橋至時に天文学や測量術を学んだ。地球の大きさを知るために蝦夷地測量を幕府に願い出て以来、17年間にわたって全国の海岸線を歩いて測量し続けた。彼の死後に完成した『大日本沿海輿地全図』は、現代の地図と比べても遜色のない驚異的な精度を誇った。", skill: { name: "日本地図の完成", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 112, name: "葛飾北斎", power: 127, hp: 73, attribute: "CULTURE", desc: "江戸時代後期の浮世絵師。90年に及ぶ生涯で数万点の作品を残した「画狂老人」。西洋の遠近法や陰影法を取り入れ、役者絵や美人画が中心だった浮世絵において風景画という新たなジャンルを確立した。代表作『富嶽三十六景』の大胆な構図と鮮やかな色彩（ベロ藍）は、日本の民衆だけでなく、のちのヨーロッパの印象派画家たちにも絶大な衝撃を与えた。", skill: { name: "富嶽三十六景", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 113, name: "歌川広重", power: 93, hp: 107, attribute: "CULTURE", desc: "江戸時代後期の浮世絵師。葛飾北斎とともに風景版画を大成した。代表作『東海道五十三次』では、宿場の風景だけでなく、そこに生きる旅人や人々の生活、雨や雪といった自然の情景を抒情豊かに描き出し、江戸の庶民に空前の旅行ブームを巻き起こした。その穏やかで詩情あふれる画風は、ゴッホをはじめとする西洋の画家にも深く愛された。", skill: { name: "東海道五十三次", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 114, name: "十返舎一九", power: 82, hp: 118, attribute: "CULTURE", desc: "江戸時代後期（化政期）の戯作者。江戸の町人の間で流行していた滑稽本の代表的作家。弥次郎兵衛と喜多八のコンビがお伊勢参りの道中で引き起こすドタバタ劇を描いた『東海道中膝栗毛』が爆発的な大ヒットとなり、約20年にわたって続編が書かれるほどの人気を博した。庶民の笑いのツボを的確に捉えた、日本最初の職業作家の一人。", skill: { name: "膝栗毛の爆笑", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 115, name: "福沢諭吉", power: 134, hp: 66, attribute: "CULTURE", desc: "幕末から明治期の啓蒙思想家。幕臣として三度欧米に渡って近代文明を直接見聞し、帰国後に慶應義塾を創設して教育に尽力した。『西洋事情』や『学問のすゝめ』を著し、「天は人の上に人を造らず…」と封建的な身分制度を真っ向から否定して個人の「独立自尊」を説き、近代日本の教育・思想・メディアの発展に計り知れない影響を与えた最大の知識人。", skill: { name: "独立自尊", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 116, name: "森鴎外", power: 114, hp: 86, attribute: "CULTURE", desc: "明治から大正期の小説家、陸軍軍医総監。ドイツ留学の経験をもとに『舞姫』を発表し、日本のロマン主義文学の先駆けとなった。夏目漱石と並び称される文豪であり、豊富な海外知識を活かした翻訳や評論でも活躍。晩年は『阿部一族』や『高瀬舟』などの歴史小説や史伝へと境地を深め、武士の倫理観や死生観を冷徹な筆致で描き出した。", skill: { name: "文豪の威厳", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.9 } },
  { id: 117, name: "夏目漱石", power: 119, hp: 81, attribute: "CULTURE", desc: "明治から大正期の小説家・英文学者。イギリス留学後、東京帝国大学で教鞭をとる傍ら『吾輩は猫である』『坊っちゃん』を発表し、一躍人気作家となった。のちに朝日新聞社に入社し専業作家となり、自然主義文学とは一線を画す「余裕派（高踏派）」として活躍。『こころ』や『明暗』などで、近代知識人のエゴイズムや孤独、倫理的葛藤を深く掘り下げた。", skill: { name: "近代の苦悩", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 118, name: "樋口一葉", power: 73, hp: 127, attribute: "CULTURE", desc: "明治時代の小説家。極貧の生活に苦しみながらも、わずか24歳で結核で早世するまでの1年数ヶ月の間に『たけくらべ』『にごりえ』『十三夜』などの傑作を次々と発表した「奇跡の14ヶ月」で知られる。吉原遊廓の近くで育つ少年少女の淡い恋と悲哀や、封建的な因習に縛られる女性の姿を、擬古典主義の流麗な美しい文体で描き出した。", skill: { name: "たけくらべ", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 119, name: "野口英世", power: 101, hp: 99, attribute: "CULTURE", desc: "明治から昭和初期にかけて活躍した細菌学者。幼少期の左手の火傷によるハンデを乗り越え、苦学の末に渡米。ロックフェラー医学研究所を拠点に、梅毒スピロヘータの純粋培養や小児麻痺の病原体発見など数々の世界的業績を挙げ、ノーベル賞候補に何度も名を連ねた。のちに黄熱病の研究のためにアフリカ（現在のガーナ）に渡ったが、自身も感染し殉職した。", skill: { name: "執念の医学", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 120, name: "北里柴三郎", power: 112, hp: 88, attribute: "CULTURE", desc: "明治から昭和初期にかけて活躍した細菌学者。「日本の細菌学の父」と呼ばれる。ドイツに留学してコッホに師事し、世界で初めて破傷風菌の純粋培養に成功し、血清療法を確立するという世界的偉業を成し遂げた。帰国後は伝染病研究所を設立し、香港でペスト菌を発見するなど、近代日本の予防医学・公衆衛生の基礎を築き上げた巨人。", skill: { name: "血清療法の確立", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.6 } },
  { id: 121, name: "ワカタケル", power: 122, hp: 78, attribute: "VALOR", desc: "5世紀後半の大王。埼玉県の稲荷山古墳出土の鉄剣銘や、熊本県の江田船山古墳出土の鉄刀銘に刻まれた「獲加多支鹵大王（ワカタケル大王）」と同一人物とされる。倭の五王の「武」にあたり、中国の南朝の宋に遣使して、安東大将軍倭王の称号を得て、朝鮮半島南部での軍事や外交の優位性を国際的に認めさせようとした。", skill: { name: "大王の武威", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 122, name: "阿倍比羅夫", power: 114, hp: 86, attribute: "VALOR", desc: "飛鳥時代の将軍。斉明天皇の命を受け、水軍を率いて日本海を北上し、秋田や津軽地方の蝦夷を服属させ、さらに北上して異民族の粛慎（みしはせ）と交戦してこれを討伐した。白村江の戦いでも後送軍の将として朝鮮半島に出兵したが、唐・新羅の連合軍に大敗を喫し、多くの兵船を失って帰国した。", skill: { name: "水軍の統率", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 123, name: "藤原秀郷", power: 138, hp: 62, attribute: "VALOR", desc: "平安時代中期の武将。下野国の押領使として、朝廷に反逆して「新皇」を名乗った平将門の乱（天慶の乱）を、平貞盛らとともに鎮圧する大功を立てた。この功績により下野守・武蔵守に任じられ、関東における武士の地位を大きく向上させた。また、近江国の三上山で大百足（むかで）を退治したという伝説でも知られる。", skill: { name: "百足退治", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.85 } },
  { id: 124, name: "源頼信", power: 121, hp: 79, attribute: "VALOR", desc: "平安時代中期の武将。河内源氏の祖。1028年に上総国で発生した平忠常の乱の平定を朝廷から命じられると、戦わずして忠常を降伏させるという鮮やかな手腕を見せた。これにより坂東の武士たちから厚い名声と信頼を獲得し、のちに源頼義、源義家と続く清和源氏の東国における絶対的な勢力基盤を築き上げた。", skill: { name: "無血の平定", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 125, name: "源頼義", power: 117, hp: 83, attribute: "VALOR", desc: "平安時代後期の武将。源頼信の長男。陸奥国の豪族である安倍氏が国司に反抗して起こした前九年合戦において、陸奥守兼鎮守府将軍として現地に赴いた。苦戦を強いられたが、出羽国の豪族である清原氏の援軍を得て、12年の歳月をかけて安倍貞任らを滅ぼし、源氏の東国・奥州における声威を決定づけた。", skill: { name: "鎮守府将軍", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 126, name: "源義朝", power: 133, hp: 67, attribute: "VALOR", desc: "平安時代末期の武将。源頼朝や義経の父。保元の乱では、父・為義と対立して天皇方につき、平清盛とともに勝利を収めた。しかし、恩賞への不満から藤原信頼と結んで平治の乱を起こし、一時は京都を制圧するも、清盛の反撃にあって敗北。東国へ逃れる途中の尾張国で、家臣の長田忠致の裏切りに遭い暗殺された。", skill: { name: "東国武士の意地", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 127, name: "平重盛", power: 109, hp: 91, attribute: "VALOR", desc: "平安時代末期の武将。平清盛の長男で「小松殿」と呼ばれた。武勇に優れるとともに温厚で思慮深く、平氏政権の軍事的な柱として活躍した。父の清盛と後白河法皇の対立が激化するなか、両者の間に立って和解に尽力し、平氏一門の暴走を押しとどめる調整役を担ったが、鹿ヶ谷の陰謀ののち、父に先立って病死した。", skill: { name: "小松殿の調整", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 128, name: "源範頼", power: 112, hp: 88, attribute: "VALOR", desc: "平安時代末期の武将。源頼朝の異母弟。木曾義仲の討伐や平氏追討において、弟の義経とともに源氏軍の総大将として出陣した。一ノ谷の戦いや九州上陸作戦などで堅実な指揮を執り、平氏滅亡に大きく貢献。しかし、頼朝に謀反の疑いをかけられ、伊豆の修禅寺に幽閉されたのちに誅殺されるという悲運を辿った。", skill: { name: "堅実なる進軍", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 129, name: "和田義盛", power: 125, hp: 75, attribute: "VALOR", desc: "鎌倉時代初期の武将。源頼朝の挙兵に最初から従い、鎌倉幕府の軍事・警察を司る侍所の初代別当（長官）に任じられた有力御家人。頼朝の死後、北条氏による他氏排斥の動きのなかで、第2代執権の北条義時と激しく対立。1213年に和田合戦を起こして鎌倉市街で激闘を繰り広げたが敗死し、一族もろとも滅亡した。", skill: { name: "侍所別当", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 130, name: "北条時政", power: 116, hp: 84, attribute: "VALOR", desc: "鎌倉幕府の初代執権。源頼朝の舅として幕府創設を支え、頼朝の死後に幕政の実権を掌握した。比企能員ら有力御家人を次々と滅ぼし、自らの孫である源実朝を3代将軍に立てて執権政治の基礎を固めた。しかし、後妻の牧の方と謀って実朝を廃そうとしたため、子の政子や義時によって失脚させられ、伊豆へ追放された。", skill: { name: "初代執権の謀", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.9 } },
  { id: 131, name: "高師直", power: 131, hp: 69, attribute: "VALOR", desc: "南北朝時代の武将。足利尊氏の執事として、建武政権の打倒や南朝軍との戦いで圧倒的な軍事的才能を発揮し、楠木正行らを四条畷の戦いで討ち破った。新興武士層を代弁する急進派の筆頭であり、権威を軽視する「ばさら」な振る舞いで知られたが、保守派の足利直義と激しく対立し、観応の擾乱を引き起こして暗殺された。", skill: { name: "ばさらの軍才", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 132, name: "護良親王", power: 115, hp: 85, attribute: "VALOR", desc: "鎌倉時代末期の皇族。後醍醐天皇の皇子（大塔宮）。元弘の乱では独自の令旨を発して吉野や熊野でゲリラ戦を展開し、楠木正成らとともに倒幕の機運を全国に広めた。建武の新政では征夷大将軍に就任したが、足利尊氏の台頭を強く警戒して暗殺を企てたため、逆に捕らえられ鎌倉に幽閉。中先代の乱の混乱のなかで殺害された。", skill: { name: "大塔宮の令旨", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 133, name: "菊池武光", power: 126, hp: 74, attribute: "VALOR", desc: "南北朝時代の肥後国の武将。後醍醐天皇の皇子である懐良親王を征西将軍として迎え入れ、南朝方の主力として九州で奮戦した。大保原の戦いなどで足利方の少弐氏や大友氏を撃破し、九州における南朝（征西府）の全盛期を築き上げた。のちに室町幕府から派遣された九州探題・今川了俊の巧みな戦略の前に敗退した。", skill: { name: "征西府の猛将", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 134, name: "太田道灌", power: 128, hp: 72, attribute: "VALOR", desc: "室町時代後期の武将。扇谷上杉氏の家宰。江戸城をはじめ河越城、岩槻城を築城し、関東の防衛網を構築した。享徳の乱などの戦乱が続く関東において、優れた軍略で主家を支えるとともに、和歌にも通じた文武両道の名将として名声を轟かせた。しかし、その卓越した実力を主君の上杉定正に警戒され、暗殺された。", skill: { name: "江戸城築城", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 135, name: "今川義元", power: 103, hp: 97, attribute: "VALOR", desc: "戦国時代の駿河の戦国大名。足利氏一門の格式を誇り、『今川仮名目録』を追加制定して領国支配を徹底。武田氏・北条氏と甲相駿三国同盟を結んで後顧の憂いを絶ち、遠江や三河を平定して「海道一の弓取り」と称された。しかし、天下に号令すべく大軍を率いて尾張に侵攻した際、桶狭間の戦いで織田信長の奇襲に遭い討死した。", skill: { name: "海道一の弓取り", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 1.0 } },
  { id: 136, name: "浅井長政", power: 124, hp: 76, attribute: "VALOR", desc: "戦国時代の北近江の戦国大名。織田信長の妹であるお市の方を正室に迎え、織田家と同盟を結んで勢力を拡大した。しかし、信長が長年の盟友であった越前の朝倉義景を攻めたため、朝倉氏との義理を重んじて信長から離反。姉川の戦いで織田・徳川連合軍に敗れ、のちに居城の小谷城を攻め落とされて自刃し浅井氏は滅亡した。", skill: { name: "小谷城の義将", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 137, name: "本願寺顕如", power: 96, hp: 104, attribute: "VALOR", desc: "戦国時代の浄土真宗（一向宗）本願寺の第11世法主。織田信長の強圧的な要求に反発し、全国の門徒に檄を飛ばして信長包囲網の中核を担った。鉄砲で武装した傭兵や毛利水軍の支援を受けながら、難攻不落の石山本願寺に籠城し、約10年に及ぶ壮絶な石山合戦を戦い抜いたが、最後は天皇の勅命による和睦を受け入れ退去した。", skill: { name: "石山籠城戦", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 138, name: "明智光秀", power: 127, hp: 73, attribute: "VALOR", desc: "戦国時代の武将。教養豊かで鉄砲の扱いにも長け、織田信長の重臣として室町幕府との外交や丹波平定などで多大な武功を挙げた。しかし、1582年に「敵は本能寺にあり」と突如反旗を翻し、主君の信長を討つ（本能寺の変）。その後、いち早く駆けつけた羽柴秀吉との山崎の戦いに敗れ、逃走中に落ち武者狩りに遭い命を落とした。", skill: { name: "本能寺の変", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 139, name: "加藤清正", power: 135, hp: 65, attribute: "VALOR", desc: "安土桃山時代の武将。豊臣秀吉の子飼いの武将として育ち、賤ヶ岳の戦いで「七本槍」の一人として武名を馳せた。朝鮮出兵でも先陣を切って猛威を振るう。秀吉の死後は石田三成と対立し、関ヶ原の戦いでは徳川家康の東軍に加担。戦後は肥後52万石の領主となり、名城として名高い熊本城を築城した治水・築城の達人。", skill: { name: "虎退治の剛勇", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 140, name: "福島正則", power: 137, hp: 63, attribute: "VALOR", desc: "安土桃山時代の武将。豊臣秀吉の親戚にあたり、幼少から仕える。賤ヶ岳の戦いでは敵将を討ち取り「七本槍」の筆頭となる武功を挙げた。武断派の代表格として文治派の石田三成を激しく憎み、関ヶ原の戦いでは東軍の先鋒として西軍主力と激突し、東軍勝利の決定的な原動力となった。のちに広島藩主となるが幕府に改易された。", skill: { name: "七本槍の筆頭", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 141, name: "立花宗茂", power: 132, hp: 68, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。大友氏の重臣・戸次鑑連（立花道雪）の養子。島津軍の猛攻から城を守り抜き、豊臣秀吉から「その忠義、鎮西一」と絶賛され大名に取り立てられた。関ヶ原の戦いでは義を重んじて西軍につき改易されて浪人となったが、のちにその将器を惜しんだ徳川家康によって奇跡的に旧領柳川への復帰を果たした。", skill: { name: "鎮西一の忠勇", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 142, name: "徳川秀忠", power: 111, hp: 89, attribute: "VALOR", desc: "江戸幕府の第2代将軍。徳川家康の三男。関ヶ原の戦いでは中山道を進む本隊を率いたが、真田昌幸の防衛戦に手こずり遅参する失態を演じた。しかし将軍就任後は、父・家康の敷いた路線を受け継いで公家衆法度や武家諸法度を制定。福島正則ら有力な外様大名をも容赦なく改易し、幕藩体制の基礎を強固なものへと仕上げた。", skill: { name: "二代目の重圧", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 143, name: "宮本武蔵", power: 145, hp: 55, attribute: "VALOR", desc: "江戸時代初期の剣豪・兵法家。二刀を用いる「二天一流」の開祖。諸国を巡り、吉岡清十郎や佐々木小次郎（巌流島の決闘）など数々の武芸者と60回以上の決闘を行い、一度も敗れなかったとされる。晩年は細川氏に客分として招かれ、熊本の霊巌洞にこもって剣の精神や兵法の極意をまとめた名著『五輪書』を執筆し、水墨画の傑作も残した。", skill: { name: "二天一流", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.4 } },
  { id: 144, name: "近藤勇", power: 134, hp: 66, attribute: "VALOR", desc: "幕末の武士。天然理心流の剣客。上洛後、会津藩預かりの治安維持組織「新選組」の局長となる。池田屋事件で尊攘派の志士たちを多数討ち取り、京都の治安回復と幕府の威信維持に大きく貢献した。戊辰戦争では旧幕府軍に属して鳥羽・伏見の戦いや甲州勝沼の戦いで新政府軍に激しく抗戦したが、最後は投降して処刑された。", skill: { name: "誠の旗印", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 145, name: "中岡慎太郎", power: 123, hp: 77, attribute: "VALOR", desc: "幕末の土佐藩出身の志士。脱藩して長州藩に身を寄せ、各地の志士と連絡を取り合う。坂本龍馬とともに、犬猿の仲であった薩摩藩と長州藩の間の調停に奔走し、薩長同盟の成立に極めて重要な役割を果たした。のちに武力倒幕を目指す武装組織「陸援隊」を結成したが、大政奉還直後に京都の近江屋で龍馬とともに暗殺された。", skill: { name: "陸援隊結成", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 146, name: "榎本武揚", power: 119, hp: 81, attribute: "VALOR", desc: "幕末・明治期の海軍軍人、政治家。旧幕府の海軍副総裁。江戸城無血開城に不満を持ち、軍艦開陽丸などを率いて脱走。蝦夷地（北海道）に渡り、箱館の五稜郭を拠点に独立政権の樹立を目指して新政府軍と激戦を繰り広げた（箱館戦争）。降伏後はその豊富な西洋知識と才能を評価されて赦免され、明治政府で特命全権公使などを歴任した。", skill: { name: "蝦夷共和国の夢", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 147, name: "山本権兵衛", power: 115, hp: 85, attribute: "VALOR", desc: "明治・大正期の海軍大将・政治家。薩摩藩出身。海軍大臣として兵器の国産化や将官のリストラなど強力な軍制改革を断行し、日清・日露戦争における日本海軍の圧倒的勝利の基盤を築いた。大正時代に2度首相を務め、軍部大臣現役武官制を緩和して政党政治に道を開いたが、虎の門事件の責任をとり退陣した。", skill: { name: "海軍の父", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 148, name: "秋山真之", power: 129, hp: 71, attribute: "VALOR", desc: "明治期の海軍軍人。日露戦争において、東郷平八郎率いる連合艦隊の先任参謀を務める。旅順港閉塞作戦や黄海海戦などを経て、日本海海戦では「丁字戦法」や「秋山定石」と呼ばれる極めて精緻な戦術を立案し、ロシアのバルチック艦隊を劇的に殲滅する作戦の頭脳として活躍。「本日天気晴朗ナレドモ波高シ」の電文の起草者。", skill: { name: "智謀の戦術", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.85 } },
  { id: 149, name: "東條英機", power: 112, hp: 88, attribute: "VALOR", desc: "昭和期の陸軍大将、内閣総理大臣。日中戦争の拡大を推進し、第2次近衛内閣の陸相として日米交渉に強硬に反対した。近衛退陣後に首相となり、太平洋戦争の開戦を決定。大政翼賛会を通じた独裁的な戦争指導体制を敷いたが、サイパン島陥落による絶対国防圏の崩壊を受けて総辞職した。戦後、極東国際軍事裁判でA級戦犯として処刑された。", skill: { name: "戦時独裁体制", desc: "敵全員の歴史力を30%減少させる", type: "debuff_all", value: 0.3, rate: 0.7 } },
  { id: 150, name: "山本五十六", power: 136, hp: 64, attribute: "VALOR", desc: "昭和期の海軍大将。海軍次官時代は日独伊三国同盟に強く反対していたが、太平洋戦争への突入が避けられなくなると連合艦隊司令長官として、航空機を集中運用する真珠湾攻撃という前代未聞の奇襲作戦を立案・指揮し、緒戦の大勝をもたらした。しかしミッドウェー海戦で大敗し、前線視察中のブーゲンビル島上空で米軍機に撃墜され戦死した。", skill: { name: "真珠湾の奇襲", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 152, name: "中大兄皇子", power: 118, hp: 82, attribute: "STRATEGY", desc: "大化の改新を断行し、白村江の戦いでの大敗北の後、天智天皇として即位。唐・新羅の侵攻に備えて防人や水城を設置し、都を近江大津宮に移して防衛を固めた。また、日本初の全国的な戸籍である「庚午年籍」を作成し、近江令を制定するなど、強力な君主権を持つ律令国家体制の確立を急いだ。", skill: { name: "近江の改新", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 153, name: "藤原仲麻呂", power: 109, hp: 91, attribute: "STRATEGY", desc: "奈良時代中期の政治家（恵美押勝）。藤原南家の出身で、光明皇太后の絶大な信任を得て政敵の橘諸兄らを排斥し、最高権力者となった。唐風を好んで官名を変更し、祖父・不比等が編纂した養老律令を施行。しかし、孝謙上皇の寵愛を受けた道鏡が台頭すると危機感を抱き、764年に反乱（恵美押勝の乱）を起こしたが敗死した。", skill: { name: "唐風の専制", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 156, name: "藤原基経", power: 107, hp: 93, attribute: "STRATEGY", desc: "平安時代前期の公卿。藤原北家の権力を決定づけた人物。陽成天皇を退位させて光孝天皇を擁立し、日本で初めての「関白」に任命された。のちの宇多天皇の代にも、関白任命の詔書に関する用語をめぐって政務をボイコットし、天皇を謝罪させて起草者を処罰させるという「阿衡の紛議」を引き起こし、摂関家の強大な権力を誇示した。", skill: { name: "阿衡の紛議", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 157, name: "藤原頼通", power: 83, hp: 117, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原道長の長男で、「宇治殿」と呼ばれた。父から権力を継承し、後一条、後朱雀、後冷泉の3代の天皇にわたり、約50年もの長きにわたって摂政・関白を務め、摂関政治の極盛期を維持した。末法思想が流行するなか、1052年に宇治の別荘を寺に改め、壮麗な平等院鳳凰堂を建立したことで知られる。", skill: { name: "宇治殿の栄華", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 161, name: "九条兼実", power: 98, hp: 102, attribute: "STRATEGY", desc: "平安末期から鎌倉初期の公卿。源平争乱の動乱期を生き抜き、源頼朝の強力な推挙によって朝廷のトップである摂政・関白に就任し、幕府と朝廷の協調路線を探った。有職故実に通じ、彼が残した日記『玉葉』は当時の政治状況や武士の動向を詳細に記録した一級の歴史史料。法然に帰依し、『選択本願念仏集』の執筆を依頼した。", skill: { name: "公武協調の模索", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 162, name: "足利義政", power: 85, hp: 115, attribute: "STRATEGY", desc: "室町幕府の第8代将軍。自身の後継者をめぐる弟の義視と実子の義尚の対立が、細川勝元や山名宗全ら有力守護大名の権力争いと結びつき、戦国時代の幕開けとなる応仁の乱を引き起こした。戦乱の最中から政治への意欲を失い、京都の東山に隠棲。銀閣に代表される、禅宗の精神を取り入れた簡素で幽玄な東山文化を育んだ。", skill: { name: "東山殿の隠棲", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.6 } },
  { id: 163, name: "足利義教", power: 125, hp: 75, attribute: "STRATEGY", desc: "室町幕府の第6代将軍。青蓮院の門跡であったが、くじ引きによって将軍に選ばれた。失墜した将軍権力を回復するため、鎌倉公方の足利持氏を討伐し（永享の乱）、有力守護大名を次々と処罰・介入するという「万人恐怖」と呼ばれる強烈な専制政治を行った。しかし、その恐怖政治が反発を招き、赤松満祐によって暗殺された（嘉吉の乱）。", skill: { name: "万人恐怖の専制", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 164, name: "細川政元", power: 116, hp: 84, attribute: "STRATEGY", desc: "室町時代後期の幕府管領。修験道に傾倒し「半将軍」と呼ばれた実力者。1493年の明応の政変で、将軍・足利義材（義稙）が河内に出陣している隙を突いてこれを追放し、新たに足利義澄を11代将軍に擁立した。この政変により室町幕府の権威は完全に失墜し、下克上の嵐が吹き荒れる本格的な戦国時代へと突入した。", skill: { name: "明応の政変", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.9 } },
  { id: 165, name: "三好長慶", power: 121, hp: 79, attribute: "STRATEGY", desc: "戦国時代の武将。管領・細川氏の家臣であったが、主君を次々と追放し、さらには室町幕府13代将軍の足利義輝をも京都から追放して、畿内一円に強大な支配権を確立した下克上の体現者。織田信長に先駆けて室町幕府の権威を否定し、堺の経済力を掌握して独自の政権（三好政権）を樹立した「最初の天下人」とも評される。", skill: { name: "畿内制覇", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 166, name: "前田利家", power: 128, hp: 72, attribute: "STRATEGY", desc: "戦国時代から安土桃山時代の武将。織田信長に仕え「槍の又左」として活躍後、豊臣秀吉の盟友として北陸地方を平定し加賀百万石の基礎を築いた。豊臣政権下では徳川家康に次ぐ五大老の次席として重きをなし、秀吉の死後は暴走しがちな武断派を抑え、家康の牽制役として豊臣政権の崩壊を防ぐ最大の防波堤として機能した。", skill: { name: "五大老の重鎮", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 167, name: "徳川綱吉", power: 92, hp: 108, attribute: "STRATEGY", desc: "江戸幕府の第5代将軍。儒学（特に朱子学）を熱心に学び、武力ではなく法と道徳による文治政治を推進した。林家のために湯島聖堂を建立し学問を奨励したが、極端な動物愛護を強要する「生類憐みの令」を連発して民衆を苦しめ、また寺社造営や荻原重秀の献策による貨幣改鋳による悪性インフレを引き起こし、幕府財政を悪化させた。", skill: { name: "極端な文治政治", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 168, name: "柳沢吉保", power: 103, hp: 97, attribute: "STRATEGY", desc: "江戸時代中期の譜代大名。徳川綱吉の学問の弟子から側用人へと異例の大抜擢を受け、さらに甲府15万石の城主や大老格にまで上り詰めた。将軍の意向を老中たちに伝えるパイプ役として幕政の実務を握り、綱吉の文治政治を支えた。六義園を造営するなど文化的な教養も高く、赤穂事件の処理などにも深く関与した。", skill: { name: "側用人の台頭", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.8 } },
  { id: 169, name: "徳川慶喜", power: 112, hp: 88, attribute: "STRATEGY", desc: "江戸幕府の第15代（最後）の将軍。将軍継嗣問題では一橋派に推されるも敗れ、のちに将軍後見職となる。第2次長州征討の失敗後に将軍に就任し、フランスの支援で軍制改革を進めた。1867年、薩長による武力倒幕をかわすため大政奉還を断行。鳥羽・伏見の戦いで敗北した後は江戸城を無血開城し、恭順して幕府の歴史に幕を下ろした。", skill: { name: "最後の大君", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 170, name: "阿部正弘", power: 108, hp: 92, attribute: "STRATEGY", desc: "幕末の老中首座。ペリーの黒船来航という未曾有の国難に対し、これまでの幕府の独断を改め、朝廷に報告するとともに諸大名から広く意見を募った。苦渋の決断として日米和親条約を結んで開国に踏み切る一方、「安政の改革」として講武所や長崎海軍伝習所を設置し、徳川斉昭ら外様・親藩の雄藩大名を幕政に参加させ国防強化を図った。", skill: { name: "安政の協調策", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 171, name: "堀田正睦", power: 99, hp: 101, attribute: "STRATEGY", desc: "幕末の老中首座。佐倉藩主。蘭学を好む開明派（蘭癖大名）として知られた。アメリカ総領事ハリスとの間で日米修好通商条約の交渉をまとめ上げたが、国内の激しい反対を抑えるため、異例の事態として朝廷から勅許（天皇の許可）を得ようと自ら上洛。しかし尊攘派の公家の反対に遭って勅許を得られず、責任を問われて大老井伊直弼に罷免された。", skill: { name: "勅許獲得の失敗", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 172, name: "松平慶永", power: 117, hp: 83, attribute: "STRATEGY", desc: "幕末の越前藩主。号は春嶽。橋本左内らを登用して藩政改革を実施。一橋派として将軍継嗣問題に介入して安政の大獄で隠居謹慎させられたが、文久の改革で新設された「政事総裁職」に就任。幕政のトップとして参勤交代の緩和などを断行し、のちには四侯会議のメンバーとして公武合体運動を積極的に推進した幕末の賢侯の一人。", skill: { name: "文久の政事総裁", desc: "相手が【文化】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.4, rate: 0.85 } },
  { id: 173, name: "木戸孝允", power: 124, hp: 76, attribute: "STRATEGY", desc: "長州藩出身の政治家。もとの名は桂小五郎。吉田松陰に学び、高杉晋作らと長州閥の尊攘派を指導。池田屋事件の難を逃れ、坂本龍馬の仲介で西郷隆盛らと薩長同盟を結び、倒幕の中心的役割を担った。維新後は五箇条の御誓文の起草に関わり、大久保利通らと共に版籍奉還や廃藩置県といった新政府の中央集権化を強力に推し進めた維新の三傑。", skill: { name: "維新の設計者", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 174, name: "後藤象二郎", power: 110, hp: 90, attribute: "STRATEGY", desc: "土佐藩出身の政治家。藩主・山内豊信の信任を得て藩政を指導。坂本龍馬の「船中八策」に感銘を受け、これをもとに豊信を説得して、15代将軍徳川慶喜に対して「大政奉還」を建白させた。維新後は新政府の参議となるが、征韓論に敗れて下野。板垣退助らと共に民撰議院設立の建白書を提出し、自由民権運動の指導者として活躍した。", skill: { name: "大政奉還の建言", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 175, name: "江藤新平", power: 123, hp: 77, attribute: "STRATEGY", desc: "肥前国（佐賀藩）出身の政治家。明治新政府において初代司法卿を務め、四民平等の推進や、フランス法を模範とした近代的な司法制度・警察制度の確立に尽力した。しかし、西郷隆盛らとともに征韓論を主張して敗れ、政府を去る（明治六年の政変）。その後、郷里で不平士族に推されて「佐賀の乱」を起こしたが敗れ、非情な処刑を受けた。", skill: { name: "初代司法卿の法", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 176, name: "黒田清隆", power: 115, hp: 85, attribute: "STRATEGY", desc: "薩摩藩出身の軍人・政治家。五稜郭の戦いで榎本武揚を降伏させる。維新後は開拓長官として北海道開発を推進し、屯田兵制度を創設。第2代内閣総理大臣に就任した際、「政府は政党の意向に左右されるべきではない」とする超然主義演説を行い、大日本帝国憲法の発布に立ち会った。しかし不平等条約改正の失敗により退陣した。", skill: { name: "超然主義演説", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 177, name: "松方正義", power: 106, hp: 94, attribute: "STRATEGY", desc: "薩摩藩出身の政治家。大蔵卿（のち大蔵大臣）を長年務め、西南戦争後の激しいインフレーションを収束させるため、徹底した緊縮財政（松方デフレ）を断行。これにより農村は深刻な打撃を受けたが、日本銀行を設立して銀本位制に基づく兌換紙幣を発行し、近代的な近代資本主義経済の基礎を確立。のちに2度総理大臣を務めた。", skill: { name: "松方デフレ", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 178, name: "陸奥宗光", power: 130, hp: 70, attribute: "STRATEGY", desc: "紀州藩出身の外交官・政治家。第2次伊藤博文内閣の外務大臣として、長年の悲願であったイギリスとの条約改正（領事裁判権の撤廃を含む日英通商航海条約）に1894年に成功した。直後に日清戦争が開戦すると、列強の干渉を防ぐ巧妙な外交戦を展開し、下関条約を有利に結ぶなど「カミソリ大臣」と呼ばれた明治外交の立役者。", skill: { name: "カミソリの外交", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 1.0 } },
  { id: 179, name: "小村寿太郎", power: 129, hp: 71, attribute: "STRATEGY", desc: "日南（飫肥藩）出身の外交官・政治家。第1次桂太郎内閣の外相としてロシアの脅威に対抗するため日英同盟を締結。日露戦争終結の際は全権大使としてポーツマス条約に調印し、賠償金が取れず国内で非難を浴びながらも国益を守った。第2次桂内閣で再び外相となり、1911年にアメリカ等と交渉し「関税自主権の完全回復」を達成した。", skill: { name: "関税自主権回復", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 180, name: "犬養毅", power: 111, hp: 89, attribute: "STRATEGY", desc: "岡山県出身の政党政治家。尾崎行雄とともに第一次護憲運動を指導し「憲政の神様」と称された。満洲事変後の混乱のなかで立憲政友会総裁として首相に就任し、金輸出の再禁止などを断行。しかし、軍部の急進派を抑えようとしたため、1932年の五・一五事件で海軍の青年将校らに「話せば分かる」と応じたものの射殺され、政党内閣の時代が終わった。", skill: { name: "話せば分かる", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 181, name: "額田王", power: 76, hp: 124, attribute: "CULTURE", desc: "飛鳥時代の代表的な女流宮廷歌人。天智天皇・天武天皇という二人の兄弟の寵愛を受けたとされる。中大兄皇子の時代から宮廷の主要な行事や宴において、情感豊かで美しい和歌を詠み、『万葉集』には彼女の優れた作品が多く収められている。飛鳥時代の宮廷文化の優雅さと政治の荒々しさが交錯する時代を生きた。", skill: { name: "熟田津の歌", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 182, name: "柿本人麻呂", power: 84, hp: 116, attribute: "CULTURE", desc: "飛鳥時代後期から奈良時代初期にかけて活躍した宮廷歌人。持統天皇や文武天皇に仕え、天皇の行幸の際の讃歌や皇族の挽歌など、公的な性格を持つ長歌や短歌を荘厳な調べで多数詠み上げた。『万葉集』の代表的歌人であり、後世の和歌の世界において神格化され、「歌聖」として最高峰の尊崇を集めた。", skill: { name: "歌聖の長歌", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 183, name: "山部赤人", power: 82, hp: 118, attribute: "CULTURE", desc: "奈良時代の宮廷歌人。聖武天皇の時代に活躍し、天皇の行幸に供奉して歌を詠んだ。柿本人麻呂の荘厳な歌風に対し、自然の美しさや風景をあるがままに写し取る清澄な叙景歌を得意とした。「田子の浦ゆうち出でて見れば…」などの富士山を詠んだ名歌で知られ、人麻呂と並んで『万葉集』を代表する「歌聖」と称される。", skill: { name: "清澄なる叙景", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 184, name: "空也", power: 88, hp: 112, attribute: "CULTURE", desc: "平安時代中期の僧侶。比叡山の厳しい修行や貴族のための祈禱ではなく、京都の市中に立って一般庶民に「南無阿弥陀仏」と念仏を唱えれば救われると説いた。橋を架け、井戸を掘るなどの社会事業にも尽力し、民衆から「市聖」と慕われた。のちの鎌倉仏教へと繋がる民間における浄土教信仰の先駆者である。", skill: { name: "市聖の念仏", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 185, name: "源信", power: 94, hp: 106, attribute: "CULTURE", desc: "平安時代中期の天台宗の僧侶（恵心僧都）。比叡山に学び、末法思想が流行して社会不安が高まるなか、985年に名著『往生要集』を執筆した。恐ろしい地獄の苦しみと阿弥陀仏のいる極楽浄土の安楽を対比して具体的に描写し、極楽へ往生するためにはひたすら念仏を唱えるべきと説き、貴族から庶民まで浄土教を爆発的に広めた。", skill: { name: "往生要集", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 186, name: "菅原孝標女", power: 74, hp: 126, attribute: "CULTURE", desc: "平安時代中期の女流作家。少女時代を父の赴任先である上総国で過ごし、『源氏物語』などの物語世界に強く憧れながら育つ。のちに帰京してからの約40年間にわたる自身の人生と、物語への憧れと現実の人生とのギャップ、仏教信仰への傾倒などを綴った自伝的な回想録『更級日記』を記し、平安王朝文学の傑作を残した。", skill: { name: "更級の回想", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.7 } },
  { id: 187, name: "西行", power: 105, hp: 95, attribute: "CULTURE", desc: "平安時代末期から鎌倉時代初期の僧・歌人。もとは佐藤義清という鳥羽上皇に仕える北面の武士であったが、23歳で突如出家。以後、諸国を行脚しながら、自然の美しさや人生の無常観を詠んだ和歌を多数残した。その歌集『山家集』は後世の文学に多大な影響を与え、新古今和歌集には最多の94首が採録されている。", skill: { name: "山家集の無常", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 188, name: "慈円", power: 113, hp: 87, attribute: "CULTURE", desc: "鎌倉時代初期の僧。九条兼実の弟で天台座主を4度務めた。承久の乱を目前にした時期に、神武天皇から当時の順徳天皇までの歴史を仏教的な「道理」という概念を用いて解釈した歴史書『愚管抄』を執筆した。摂関政治を肯定しつつ、武士の台頭も時代の道理として捉え、公武協調によって国家の安定を図ろうとする独自の史観を展開した。", skill: { name: "愚管抄の道理", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 189, name: "夢窓疎石", power: 102, hp: 98, attribute: "CULTURE", desc: "鎌倉時代末期から南北朝時代の臨済宗の禅僧。後醍醐天皇や足利尊氏、直義ら多くの権力者から厚い帰依を受け、七朝帝師と称された。尊氏に後醍醐天皇の菩提を弔うため天龍寺の建立を勧め、その資金調達のために天龍寺船を派遣。また、西芳寺（苔寺）や天龍寺の庭園を設計するなど、禅宗様式を取り入れた作庭家としても非常に有名。", skill: { name: "枯山水の作庭", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 190, name: "観阿弥", power: 96, hp: 104, attribute: "CULTURE", desc: "室町時代初期の猿楽師。大和猿楽四座の一つである結崎座（のちの観世座）を率いた。単なる物真似や曲芸であった従来の猿楽に、田楽のリズムや白拍子の舞を取り入れ、芸術性を高めた。京都の今熊野で演じた舞台が時の将軍・足利義満の目に留まり、その強力な庇護を得て、息子の世阿弥とともに「能」の基礎を確立した。", skill: { name: "能楽の創始", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 191, name: "一休宗純", power: 116, hp: 84, attribute: "CULTURE", desc: "室町時代中期の臨済宗の禅僧。後小松天皇の落胤とも伝わる。権威や形式を重んじる五山派の腐敗を痛烈に批判し、自らを「狂雲子」と称して、肉食妻帯や飲酒を公然と行うなどの奇抜な言動（風狂）で知られた。大徳寺の再興に尽力する一方で、茶人の村田珠光らとも交流し、民衆に親しまれる自由で人間味あふれる禅の精神を体現した。", skill: { name: "風狂の禅", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 192, name: "狩野正信", power: 99, hp: 101, attribute: "CULTURE", desc: "室町時代後期の絵師。足利義政に仕えて室町幕府の初代御用絵師となった。中国から伝来した水墨画の力強い筆致を基礎としながらも、日本の伝統的な大和絵の装飾性や色彩感覚を取り入れ、武家社会の好みに合う新しい画風を創始した。彼が築いた基礎の上に、のちの狩野元信・永徳へと続く日本美術史上最大の画派である狩野派が発展した。", skill: { name: "狩野派の祖", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 193, name: "長谷川等伯", power: 108, hp: 92, attribute: "CULTURE", desc: "安土桃山時代の絵師。能登国の七尾出身で上京後、巨大な勢力を誇っていた狩野派に対抗して長谷川派を興し、千利休らの支持を得た。金碧障壁画の『智積院襖絵』などの華麗な作品を残す一方で、水墨画の最高傑作とされる国宝『松林図屏風』を描き、霧に包まれた松林の静寂と奥行きを見事に表現して日本の幽玄の美を極めた。", skill: { name: "松林図の幽玄", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 194, name: "俵屋宗達", power: 103, hp: 97, attribute: "CULTURE", desc: "江戸時代初期の京都の画家。扇絵などを制作する町絵師から出発し、本阿弥光悦に見出されて協作を行った。平安時代の大和絵の技法を学びつつ、金銀を大胆に用いた装飾性と斬新な構図を融合させ、国宝『風神雷神図屏風』などの傑作を生み出した。のちに尾形光琳に引き継がれ、「琳派」と呼ばれる華麗な芸術様式の事実上の祖となった。", skill: { name: "風神雷神図", desc: "相手が【文化】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.4, rate: 0.85 } },
  { id: 195, name: "出雲阿国", power: 91, hp: 109, attribute: "CULTURE", desc: "安土桃山時代から江戸時代初期の女性芸能者。出雲大社の巫女を自称し、京都の四条河原などで、当時流行していた念仏踊りに男装などの奇抜な風俗や簡単な寸劇を加えた「かぶき踊り」を演じて民衆の熱狂的な人気を集めた。これが女歌舞伎、若衆歌舞伎を経て、江戸時代を代表する大衆演劇である歌舞伎へと発展していく起源となった。", skill: { name: "かぶき踊り", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 196, name: "山鹿素行", power: 119, hp: 81, attribute: "CULTURE", desc: "江戸時代前期の儒学者・兵学者。江戸幕府の正学であった朱子学を後世の解釈と批判し、孔子や孟子の原典に直接学ぶ「古学」を提唱した。1666年に『聖教要録』を著して朱子学を批判したため幕府の怒りを買い、赤穂に配流された。配流先で赤穂浪士の大石内蔵助らにも影響を与え、武士の道徳規範である「士道」を論理的に説いた。", skill: { name: "古学の提唱", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 197, name: "荻生徂徠", power: 115, hp: 85, attribute: "CULTURE", desc: "江戸時代中期の儒学者。伊藤仁斎の古義学に対抗し、古代中国の先王が定めた礼楽制度などの原典（六経）を歴史的・言語学的に直接解読する「古文辞学」を提唱し、蘐園塾を開いた。政治と道徳を分離し、学問の目的は経世済民（政治による世の救済）にあると説き、8代将軍徳川吉宗の諮問に答えて『政談』を著し幕政改革に影響を与えた。", skill: { name: "経世済民の政談", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 198, name: "石田梅岩", power: 89, hp: 111, attribute: "CULTURE", desc: "江戸時代中期の思想家。京都の商家で奉公人として働きながら独学で神道・儒教・仏教を融合した教えを確立した。1729年に自宅で講席を開き、商人の利益追求は武士の俸禄と同じく正当であると肯定しつつ、正直・倹約・勤勉を重んじる実践的な町人道徳「石門心学（心学）」を説いた。その教えは全国に広まり、庶民教育に大きな役割を果たした。", skill: { name: "石門心学", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 199, name: "安藤昌益", power: 102, hp: 98, attribute: "CULTURE", desc: "江戸時代中期の思想家・医師。陸奥国八戸で町医者を開業する傍ら、独自の思想を深めた。主著『自然真営道』において、すべての人が自ら農耕に従事して平等に生きる「自然の世」を理想とした。武士階級が農民から搾取して労働せずに暮らす当時の封建社会を「法世」と呼んで徹底的に批判した、当時としては極めて先駆的な社会思想家。", skill: { name: "自然真営道", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 200, name: "曲亭馬琴", power: 101, hp: 99, attribute: "CULTURE", desc: "江戸時代後期の読本作家。山東京伝のもとで小説を書き始め、やがて独立して化政文化を代表する流行作家となった。儒教の「勧善懲悪」の理念を基盤とし、雄大な構想と緻密なプロットで『椿説弓張月』などを執筆。晩年に失明しながらも嫁に口述筆記させて28年の歳月をかけて完成させた『南総里見八犬伝』は空前のベストセラーとなった。", skill: { name: "勧善懲悪の八犬伝", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 201, name: "与謝蕪村", power: 97, hp: 103, attribute: "CULTURE", desc: "江戸時代中期の俳人・南画（文人画）家。松尾芭蕉を深く敬愛し、形骸化した当時の俳諧に対して「蕉風復興」を唱え、絵画的な美しい情景を詠み込む「天明調」と呼ばれる新しい俳風を確立した。画家としても優れており、中国の文人画の技法に日本の詩情を取り入れ、池大雅と合作した『十便十宜図』などの名作を残して南画を大成した。", skill: { name: "天明調の詩情", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 1.0 } },
  { id: 202, name: "平賀源内", power: 122, hp: 78, attribute: "CULTURE", desc: "江戸時代中期の蘭学者・本草学者・発明家。讃岐国高松藩の出身。長崎遊学で西洋の学問や技術に触れ、江戸に出て多彩な才能を発揮した。壊れたオランダ製の摩擦起電器を復元した「エレキテル」の製作をはじめ、西洋画法（秋田蘭画）の指導、鉱山開発、さらには浄瑠璃の脚本執筆など、その活躍は多岐にわたる天才的知識人。", skill: { name: "エレキテル", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 203, name: "渡辺崋山", power: 117, hp: 83, attribute: "CULTURE", desc: "江戸時代後期の画家・蘭学者。三河国田原藩の家老として農政改革などを指導する一方、高野長英らと尚歯会を結成し洋学を研究した。モリソン号事件に対する幕府の鎖国・打払政策を『慎機論』で批判したため、蛮社の獄で逮捕され国元で蟄居ののち自刃した。画家としても優れ、西洋の陰影法を取り入れた『鷹見泉石像』を描いた。", skill: { name: "洋学の憂国", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 204, name: "坪内逍遥", power: 104, hp: 96, attribute: "CULTURE", desc: "明治時代の小説家・評論家・劇作家。1885年に評論『小説神髄』を発表し、従来の江戸戯作のような勧善懲悪の道徳的教訓を排して、人間の心理や世相をありのままに描く「写実主義」を日本で初めて提唱した。自らも小説『当世書生気質』を著して近代日本文学の出発点となり、のちにはシェークスピアの全集翻訳など演劇界にも多大な貢献をした。", skill: { name: "写実主義の提唱", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 205, name: "二葉亭四迷", power: 106, hp: 94, attribute: "CULTURE", desc: "明治時代の小説家・翻訳家。坪内逍遥の『小説神髄』に深く共鳴し、1887年に小説『浮雲』を発表した。この作品で、日常の話し言葉に近い「〜だ」調の「言文一致体」を日本で初めて本格的に試み、近代を生きる知識人の内面的な苦悩や挫折を客観的・写実的に描き出し、日本の近代小説を事実上完成させたパイオニアである。", skill: { name: "言文一致体", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.7 } },
  { id: 206, name: "正岡子規", power: 111, hp: 89, attribute: "CULTURE", desc: "明治時代の俳人・歌人。新聞『日本』の記者を務めながら、結核による病床生活の中で短詩形文学の革新運動を展開。松尾芭蕉を再評価し、実際の風景をありのままに詠む「写生」の理論を提唱して近代俳句を確立。さらに『歌よみに与ふる書』で和歌の革新も行い、雑誌『ホトトギス』や『アララギ』の源流となる短歌・俳句の一時代を築いた。", skill: { name: "写生の理論", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 207, name: "岡倉天心", power: 120, hp: 80, attribute: "CULTURE", desc: "明治時代の美術行政家・思想家。文明開化の波で軽視されていた日本古来の伝統美術の価値を再評価し、アメリカ人のフェノロサとともにその保護と復興に尽力した。東京美術学校の設立に貢献して校長を務めたが、のちに辞職して横山大観や下村観山らとともに日本美術院を創設。『茶の本』などを英文で著し、東洋の精神文化を世界に発信した。", skill: { name: "日本美術の復興", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 208, name: "黒田清輝", power: 107, hp: 93, attribute: "CULTURE", desc: "明治から大正時代の洋画家。フランスに留学してラファエル・コランに師事し、明るい光と色彩を取り入れた「外光派（印象派）」の画風を日本に初めてもたらした。帰国後、明治美術会から独立して「白馬会」を結成し、東京美術学校の西洋画科教授として後進を育成。代表作『湖畔』『読書』『智・感・情』などにより、日本近代洋画の基礎を築いた。", skill: { name: "外光派の光", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.6 } },
  { id: 209, name: "芥川龍之介", power: 128, hp: 72, attribute: "CULTURE", desc: "大正時代の小説家。夏目漱石に才能を見出され文壇に登場。白樺派や自然主義に対抗し、知的な技巧と構成美を重んじる「新思潮派」を代表する作家となった。『今昔物語集』などの古典に題材をとった『羅生門』『鼻』『地獄変』など、人間のエゴイズムを冷徹に描いた短編小説の傑作を数多く残したが、のちに「ぼんやりした不安」を理由に自殺した。", skill: { name: "新思潮の知性", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 210, name: "谷崎潤一郎", power: 78, hp: 122, attribute: "CULTURE", desc: "大正から昭和時代にかけて活躍した小説家。自然主義や社会的なテーマとは一線を画し、道徳や倫理よりも芸術的・官能的な美しさを至上とする「耽美派」を代表する作家。初期の『刺青』『痴人の愛』から、古典への回帰を見せた『春琴抄』や『細雪』まで、生涯を通じて女性美や官能美、日本の伝統美を追求する傑作を書き続けた。", skill: { name: "耽美なる芸術", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 211, name: "源満仲", power: 123, hp: 77, attribute: "VALOR", desc: "平安時代中期の武将で、清和源氏発展の基礎を築いた人物。安和の変において源高明らの謀反を朝廷に密告して摂関家に接近し、摂津国の多田荘を本拠地として強力な武士団を形成した。のちの頼光や頼信へと続く、源氏が東国や畿内で武威を振るうための確固たる足がかりを作った。", skill: { name: "多田の源氏", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 212, name: "源頼光", power: 131, hp: 69, attribute: "VALOR", desc: "平安時代中期の武将。源満仲の長男。藤原道長に側近として仕え、莫大な富を献上して清和源氏の地位を磐石なものにした。武勇に優れ、渡辺綱ら「頼光四天王」を従えて、丹波国大江山の酒呑童子や土蜘蛛を退治したという英雄的な伝説が後世の御伽草子などで語り継がれている。", skill: { name: "童子退治", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 213, name: "平忠盛", power: 117, hp: 83, attribute: "VALOR", desc: "平安時代後期の武将。平正盛の子。白河・鳥羽上皇の院政下で北面の武士として仕え、瀬戸内海の海賊を平定して西国に地盤を築いた。さらに日宋貿易を積極的に行って莫大な富を蓄積し、武士として初めて昇殿を許されるなど、のちの息子の平清盛の時代に花開く平氏政権の繁栄の基礎を固めた。", skill: { name: "西海の平定", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 214, name: "源頼政", power: 109, hp: 91, attribute: "VALOR", desc: "平安時代末期の武将。保元の乱・平治の乱では平氏方に属して生き残り、源氏として特例の従三位に叙せられた長老。弓の名手であり、宮中に出没した鵺（ぬえ）を退治した伝説を持つ。のちに平氏の専横に反発し、1180年に以仁王を奉じて平氏打倒の兵を挙げたが、宇治平等院の戦いで敗死した。", skill: { name: "鵺退治の弓", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.88 } },
  { id: 215, name: "平知盛", power: 127, hp: 73, attribute: "VALOR", desc: "平安時代末期の武将。平清盛の四男。武勇と知略に優れた平氏一門の軍事的な柱であり、源平合戦（治承・寿永の乱）においては平氏軍の事実上の総大将として奮戦した。一ノ谷、屋島の敗戦を経て、最終決戦である壇ノ浦の戦いで敗北を悟ると、「見るべき程の事は見つ」と言い残し、碇を背負って壮絶な入水をとげた。", skill: { name: "碇知盛", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.6 } },
  { id: 216, name: "梶原景時", power: 111, hp: 89, attribute: "VALOR", desc: "鎌倉時代初期の武将。石橋山の戦いで大庭景親軍に属しながら洞窟に潜む源頼朝を見逃して救い、以後頼朝の厚い信任を得た。侍所の所司として御家人の統制にあたり、権勢を振るうとともに源義経と激しく対立した。しかし頼朝の死後、他の有力御家人66名から弾劾の連判状を出され、一族もろとも討伐された。", skill: { name: "侍所所司の眼", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 217, name: "三浦義村", power: 116, hp: 84, attribute: "VALOR", desc: "鎌倉時代前期の有力御家人。北条義時の盟友として行動を共にし、和田合戦では一族の和田義盛を裏切って幕府方についた。また承久の乱でも弟の胤義を討ち、北条氏の執権体制確立に決定的な役割を果たした。常に権力闘争を生き抜く老獪な武将であったが、彼の死後、三浦氏は宝治合戦で北条時頼に滅ぼされた。", skill: { name: "老獪な処世", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 218, name: "安達泰盛", power: 102, hp: 98, attribute: "VALOR", desc: "鎌倉時代中期の有力御家人。北条時宗の死後、外祖父として幕政を主導し、元寇後の恩賞問題などで疲弊した御家人を救済するための「弘安徳政」と呼ばれる幕政改革を推進した。しかし、得宗家の専制を目指す内管領の平頼綱と激しく対立し、1285年の霜月騒動で急襲されて敗死し、安達一族は滅亡した。", skill: { name: "弘安徳政", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.7 } },
  { id: 219, name: "平頼綱", power: 122, hp: 78, attribute: "VALOR", desc: "鎌倉時代中期の武将。北条得宗家に仕える御内人の筆頭である内管領。霜月騒動で対立する有力御家人の安達泰盛一族を滅ぼし、幼い9代執権北条貞時を擁して得宗専制政治の頂点に立ち、恐怖政治を敷いた。しかし、その権勢の強まりを恐れた貞時により、1293年の平禅門の乱で討伐され滅亡した。", skill: { name: "得宗専制の刃", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.5 } },
  { id: 220, name: "山名宗全", power: 136, hp: 64, attribute: "VALOR", desc: "室町時代中期の有力守護大名。名は持豊。嘉吉の乱で将軍を暗殺した赤松氏を討伐して武功を挙げ、数多くの分国を領して「六分一殿」の威勢を取り戻した。幕政の主導権や将軍家の家督継承を巡って管領の細川勝元と激しく対立し、1467年に西軍の総大将として11年に及ぶ応仁の乱を引き起こした。", skill: { name: "西軍の総帥", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 221, name: "赤松満祐", power: 118, hp: 82, attribute: "VALOR", desc: "室町時代中期の武将。播磨・備前・美作の守護を務める幕府四職の一人。6代将軍・足利義教による有力守護の弱体化や身内の家督介入に強い危機感を抱き、1441年の「嘉吉の乱」において、結城合戦の祝勝の宴と称して将軍義教を自邸に招き暗殺した。その後、領国に逃れたが山名宗全らの討伐軍に敗れ自刃した。", skill: { name: "嘉吉の凶刃", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 222, name: "大友宗麟", power: 115, hp: 85, attribute: "VALOR", desc: "戦国時代の豊後国の戦国大名。名は義鎮。九州北部を平定して強大な勢力を築き、南蛮貿易を積極的に行って富と最新兵器を得た。フランシスコ・ザビエルと接見し、自らも洗礼を受けた代表的なキリシタン大名であり、伊東マンショら天正遣欧使節の派遣にも関与した。晩年は島津氏の猛攻に苦しみ、豊臣秀吉に救援を求めた。", skill: { name: "南蛮兵器の威力", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.86 } },
  { id: 223, name: "島津義久", power: 129, hp: 71, attribute: "VALOR", desc: "戦国時代の薩摩国の戦国大名。島津四兄弟の長兄として家督を継ぎ、義弘や家久ら優秀な弟たちを巧みに統率。耳川の戦いで大友氏を、沖田畷の戦いで龍造寺氏を破り、九州統一の目前まで迫る類まれな指導力を発揮した。しかし、豊臣秀吉の圧倒的な九州平定軍の前に敗北を悟り、剃髪して降伏し本領を安堵された。", skill: { name: "四兄弟の結束", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 224, name: "吉川元春", power: 138, hp: 62, attribute: "VALOR", desc: "戦国時代の武将。毛利元就の次男。吉川家の家督を継ぎ、弟の小早川隆景とともに「毛利両川」の一角として毛利氏の軍事面を支えた。尼子氏討伐などで幾多の武功を挙げ、生涯において一度も合戦で敗れたことがないとも伝わる不敗の猛将。豊臣秀吉の中国大返し後も秀吉に従うことを潔しとせず、隠居を貫いた。", skill: { name: "不敗の猛将", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 225, name: "小早川隆景", power: 116, hp: 84, attribute: "VALOR", desc: "戦国時代の武将。毛利元就の三男。小早川家を継いで水軍を率い、厳島の戦いなどで大勝に貢献。「毛利両川」の知将として外交や政務を担い、本能寺の変後はいち早く豊臣秀吉との和睦・服属を主導して毛利家の存続を図った。その政治的手腕は秀吉から高く評価され、豊臣政権下で五大老の一人に任じられた。", skill: { name: "両川の知将", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.94 } },
  { id: 226, name: "北条氏康", power: 133, hp: 67, attribute: "VALOR", desc: "戦国時代の相模国の戦国大名。後北条氏の第3代当主。「相模の獅子」と呼ばれ、河越夜戦で関東管領軍を大破し関東の覇権を決定づけた。武田信玄や上杉謙信の侵攻を小田原城の堅守で退ける一方、税制改革や目安箱の設置など民政にも極めて優れ、北条氏の全盛期を築き上げた文武両道の名将。", skill: { name: "相模の獅子", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 227, name: "朝倉義景", power: 104, hp: 96, attribute: "VALOR", desc: "戦国時代の越前国の戦国大名。一乗谷に京都の公家や文化人を招き、華やかな京風文化を栄えさせた。足利義昭を保護したが上洛の要請には応じず、のちに浅井長政と結んで織田信長・徳川家康の連合軍と激突（姉川の戦い）。その後も信長包囲網の一角として抵抗を続けたが、最後は家臣の裏切りに遭い一族ごと滅亡した。", skill: { name: "一乗谷の栄華", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 228, name: "武田勝頼", power: 124, hp: 76, attribute: "VALOR", desc: "戦国時代の武将。武田信玄の四男として家督を継ぐ。武勇に優れ、父の代以上の最大版図を築いたが、1575年の長篠の戦いで織田・徳川連合軍の鉄砲隊と馬防柵の前に武田騎馬軍団が大敗を喫し、多くの重臣を失う。その後、新府城を築いて再起を図るも、織田軍の甲州征伐を受けて天目山で自刃し、武田氏は滅亡した。", skill: { name: "騎馬隊の突撃", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 229, name: "上杉景勝", power: 121, hp: 79, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。上杉謙信の養子で、御館の乱を制して家督を継承。豊臣秀吉に服属して五大老の一人となり、会津120万石を与えられる。秀吉の死後、徳川家康の専横に反発し、直江兼続とともに抗戦の姿勢を示して関ヶ原の戦いの引き金（会津征伐）を引いた。戦後は米沢30万石に減封された。", skill: { name: "義愛の決断", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 230, name: "直江兼続", power: 117, hp: 83, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。上杉景勝の筆頭家老として内政・外交を取り仕切った。兜に「愛」の字を掲げたことで知られる。豊臣秀吉から高く評価されたが、秀吉の死後、上杉氏に上洛を促す徳川家康の書状に対し、痛烈な皮肉を込めた返書「直江状」を送り付け、家康を激怒させて会津征伐を招いた。", skill: { name: "直江状の痛撃", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.91 } },
  { id: 231, name: "井伊直政", power: 137, hp: 63, attribute: "VALOR", desc: "戦国時代の武将。徳川四天王の一人。武田家遺臣を編入した「井伊の赤備え」と呼ばれる朱塗りの甲冑部隊を率い、小牧・長久手の戦いなどで先陣を切る活躍を見せ「井伊の赤鬼」と恐れられた。関ヶ原の戦いでも島津軍の退き口を追撃して重傷を負うなど、文字通り命懸けで徳川家康の覇業を支えた功臣。", skill: { name: "井伊の赤鬼", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.5 } },
  { id: 232, name: "榊原康政", power: 128, hp: 72, attribute: "VALOR", desc: "戦国時代の武将。徳川四天王の一人。小牧・長久手の戦いでは、豊臣秀吉の非道を責め立てる激文を立て札にしてばら撒き、秀吉を激怒させるとともに見事な奇襲で勝利に貢献した。「無の字の旗」を掲げ、常に冷静沈着な軍略と優れた武勇で家康の天下取りを支え、本多忠勝とともに徳川軍の双璧と称された。", skill: { name: "激文の奇襲", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 233, name: "藤堂高虎", power: 123, hp: 77, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。浅井長政や豊臣秀長など主君を7回も変えながら生き抜いた現実主義者。加藤清正と並ぶ築城の名手であり、層塔型天守を考案して今治城や宇和島城、江戸城の改築などを手がけた。関ヶ原の戦いでは東軍の工作活動に奔走し、外様大名でありながら徳川家康から別格の厚い信任を得た。", skill: { name: "築城の極意", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 234, name: "島左近", power: 132, hp: 68, attribute: "VALOR", desc: "戦国時代の武将。筒井氏などに仕えた後、石田三成に破格の禄で召し抱えられ「三成に過ぎたるもの」と謳われた名将。関ヶ原の戦いでは西軍の先鋒として奮戦し、黒田長政ら東軍の大軍を相手に鬼神のごとき突撃を見せて大いに苦しめたが、銃弾を浴びて壮絶な討死を遂げた。その武勇は東軍の武将たちの語り草となった。", skill: { name: "鬼神の突撃", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 235, name: "松平容保", power: 112, hp: 88, attribute: "VALOR", desc: "幕末の会津藩主。幕府の強い要請を受け、火中の栗を拾う形で京都守護職に就任。新選組を配下において池田屋事件などで尊攘派を厳しく弾圧し、八月十八日の政変や禁門の変で長州藩を京都から追放した。しかし、大政奉還後の戊辰戦争では朝敵の汚名を着せられ、会津若松城での凄惨な籠城戦の末に降伏した。", skill: { name: "京都守護職", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.87 } },
  { id: 236, name: "武市瑞山", power: 118, hp: 82, attribute: "VALOR", desc: "幕末の土佐藩士。通称は半平太。剣術道場を開き、坂本龍馬や岡田以蔵らを門下生とした。土佐勤王党を結成し、藩論を尊王攘夷に統一すべく公武合体派の重臣・吉田東洋を暗殺して京都で暗躍した。しかし、八月十八日の政変後に藩主・山内豊信（容堂）によって弾圧され、切腹を命じられて土佐の尊攘運動は壊滅した。", skill: { name: "勤王党の血誓", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 237, name: "久坂玄瑞", power: 126, hp: 74, attribute: "VALOR", desc: "幕末の長州藩士。高杉晋作とともに吉田松陰の松下村塾の双璧と称された。松陰の刑死後、長州藩における尊王攘夷運動の先頭に立ち、イギリス公使館焼き討ちや下関での外国船砲撃を実行。八月十八日の政変で失った長州藩の勢力を回復するため京都に進軍したが、禁門の変（蛤御門の変）で敗れ、鷹司邸で自刃した。", skill: { name: "松下村塾の双璧", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 238, name: "西郷従道", power: 109, hp: 91, attribute: "VALOR", desc: "明治時代の海軍軍人・政治家。西郷隆盛の弟。西南戦争では兄と袂を分かち政府側に残った。1874年の台湾出兵では、政府の制止を振り切って軍の指揮をとり出兵を強行。のちに初代海軍大臣を務め、日清戦争では海軍の軍備拡張と近代化を強力に推し進め、日本海軍を世界的なレベルに引き上げた立役者である。", skill: { name: "近代海軍の創設", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 239, name: "大山巌", power: 139, hp: 61, attribute: "VALOR", desc: "明治時代の陸軍大将・元帥。薩摩藩出身。初代陸軍大臣を務める。日清戦争では第2軍司令官として旅順・威海衛を攻略。日露戦争では満州軍総司令官として、児玉源太郎らの有能な参謀をまとめ上げ、陸軍の全作戦を大局的な視野から指揮し、遼陽・沙河・奉天の各会戦を勝利に導いた日本陸軍の重鎮。", skill: { name: "総司令官の威厳", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.6 } },
  { id: 240, name: "桂太郎", power: 119, hp: 81, attribute: "VALOR", desc: "明治から大正期の陸軍大将・政治家。長州藩出身で山県有朋の後継者。首相として日英同盟を締結して日露戦争を遂行し、韓国併合を断行した。西園寺公望と交互に政権を担う「桂園時代」を築いたが、大正政変（第1次護憲運動）により、民衆の非難を浴びて内閣総辞職に追い込まれ、ほどなくして病死した。", skill: { name: "桂園時代の幕開", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.89 } },
  { id: 241, name: "大伴金村", power: 96, hp: 104, attribute: "STRATEGY", desc: "古墳時代後期から飛鳥時代の大連。武烈天皇や継体天皇を擁立して朝廷で絶大な権勢を振るい、筑紫国造磐井の乱の鎮圧などを主導した。しかし、新羅の圧迫に苦しむ百済に対して任那四県（加耶西部）を割譲した外交政策の失敗を、のちに物部尾輿らに激しく追及され、失脚して政治の表舞台から姿を消した。", skill: { name: "任那割譲の失策", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.7 } },
  { id: 242, name: "蘇我蝦夷", power: 103, hp: 97, attribute: "STRATEGY", desc: "飛鳥時代の有力豪族で蘇我馬子の子。大臣として権力を継承し、舒明天皇や皇極天皇を擁立して蘇我氏の独裁体制をさらに強化した。山背大兄王を滅ぼした子の入鹿とともに絶頂期を迎えるが、645年の乙巳の変で中大兄皇子らによって入鹿が暗殺されると、自軍の離反を見て絶望し、自邸に火を放ち自害した。", skill: { name: "蘇我氏の専横", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 243, name: "高向玄理", power: 87, hp: 113, attribute: "STRATEGY", desc: "飛鳥時代の学者。遣隋使の留学生として小野妹子らとともに中国に渡り、隋から唐への激動の時代に約30年間滞在して最新の制度や学問を吸収した。帰国後、大化改新の新政府において旻とともに国博士に任じられ、八省百官の制度など、日本の律令国家体制の基礎となる政策の立案と制度設計に多大な貢献をした。", skill: { name: "国博士の知識", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 244, name: "旻", power: 84, hp: 116, attribute: "STRATEGY", desc: "飛鳥時代の学問僧。遣隋使として中国に渡り、仏教や儒教だけでなく、天文や暦法など幅広い知識を身につけて帰国した。その後、中大兄皇子や中臣鎌足らに国際情勢や中国の政治思想を教授し、大化改新の理論的支柱となった。新政府発足後は高向玄理とともに国博士に任命され、初期の律令国家建設を支えた。", skill: { name: "大陸の情勢指南", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 245, name: "吉備真備", power: 111, hp: 89, attribute: "STRATEGY", desc: "奈良時代の学者・政治家。遣唐使の留学生として渡唐し、兵学や暦学など多岐にわたる学問を修めて帰国。聖武天皇や橘諸兄に重用され、玄昉とともに国政改革を推進した。藤原仲麻呂の台頭で大宰府に左遷されるが、仲麻呂の乱の鎮圧で功を挙げ、学者出身ながら右大臣にまで異例の出世を遂げ称徳天皇を支えた。", skill: { name: "遣唐使の学識", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.93 } },
  { id: 246, name: "藤原宇合", power: 107, hp: 93, attribute: "STRATEGY", desc: "奈良時代初期の公卿。藤原不比等の三男で、藤原式家の祖。若くして遣唐副使として唐に渡り、帰国後は常陸守などの地方官を歴任して蝦夷征討でも武功を挙げた。長屋王の変の後、四兄弟で政権を独占したが、737年に日本中で大流行した天然痘により、他の兄弟全員とともに相次いで病死し、政界は混乱に陥った。", skill: { name: "式家の祖", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 247, name: "和気清麻呂", power: 113, hp: 87, attribute: "STRATEGY", desc: "奈良時代後期の官人。宇佐八幡宮神託事件において、称徳天皇の命で宇佐神宮に赴き、道鏡を天皇にせよという神託が偽りであると報告した。これに激怒した道鏡により「別部穢麻呂」と改名されて大隅国へ流罪となるが、光仁天皇の即位後に名誉回復を果たし、のちに桓武天皇に平安京への遷都を建言して造営に尽力した。", skill: { name: "真の神託", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 248, name: "藤原冬嗣", power: 114, hp: 86, attribute: "STRATEGY", desc: "平安時代前期の公卿。藤原北家復興の祖。薬子の変の鎮圧などで嵯峨天皇の厚い信任を得て、機密文書を扱う新設の蔵人頭に就任。法制の整備を進めて『弘仁格式』の編纂を主導し、律令制の立て直しを図った。また、娘を天皇の后とする外戚政策の布石を打ち、のちの藤原北家による摂関政治の権力基盤を磐石なものとした。", skill: { name: "初代蔵人頭", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 249, name: "伴善男", power: 69, hp: 131, attribute: "STRATEGY", desc: "平安時代前期の公卿。大納言として権勢を振るう。866年の応天門の変において、政敵であった左大臣・源信が放火の犯人であると誣告して失脚を図った。しかし、のちに善男自身とその息子の犯行であることが密告により発覚。藤原良房によって伊豆国へ流罪となり、古来からの名族であった伴氏（大伴氏）は没落した。", skill: { name: "応天門の放火", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 250, name: "藤原忠平", power: 117, hp: 83, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原基経の四男。醍醐天皇の延喜の治を右大臣として補佐し、朱雀天皇の代には摂政・関白に就任して権力を振るった。『延喜格式』の完成など律令政治の維持に努め、承平・天慶の乱（平将門の乱・藤原純友の乱）という未曾有の国難に対しても朝廷の最高責任者として鎮圧を指揮した。", skill: { name: "延喜格式の完成", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 251, name: "藤原実資", power: 113, hp: 87, attribute: "STRATEGY", desc: "平安時代中期の公卿。有職故実（朝廷の儀式や作法）に極めて通じており、権力を極めた藤原道長に対しても阿ることなく、筋を通した発言を繰り返した賢臣。彼が約50年にわたって書き綴った日記『小右記』は、道長の「この世をば…」の歌を現在に伝える唯一の史料であり、当時の貴族社会を知る上での一級史料である。", skill: { name: "小右記の記録", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.84 } },
  { id: 252, name: "源高明", power: 108, hp: 92, attribute: "STRATEGY", desc: "平安時代中期の公卿。醍醐天皇の皇子で源氏の姓を賜る。左大臣にまで上り詰め、有職故実の書『西宮記』を著すなど権勢と名声を誇った。しかし、冷泉天皇の時代に藤原氏の陰謀である安和の変によって謀反の罪を着せられ、大宰権帥に左遷された。この事件を最後に他氏の排斥は完了し、藤原北家の政権独占が確定した。", skill: { name: "西宮記の故実", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 253, name: "大江広元", power: 124, hp: 76, attribute: "STRATEGY", desc: "鎌倉時代初期の幕府の頭脳。朝廷の下級貴族であったが源頼朝の側近として招かれ、一般政務を担う公文所（のちの政所）の初代別当を務めた。1185年、源義経追討を理由に全国への守護・地頭の設置を建言して幕府の全国支配の基礎を作り、承久の乱の際にも北条政子とともに御家人の結束を固める強硬策を主張した。", skill: { name: "守護・地頭の建言", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 254, name: "三善康信", power: 118, hp: 82, attribute: "STRATEGY", desc: "鎌倉時代初期の幕府の官僚。京都の下級貴族であったが、伊豆に流罪となっていた源頼朝に挙兵前から京の情勢を伝え続けた。幕府創設後は初代の問注所執事として抜擢され、裁判事務や訴訟処理を統括した。彼らが整備した文書行政や法制の仕組みは、のちの御成敗式目制定など、武家法発展の重要な土台となった。", skill: { name: "問注所執事", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 255, name: "北条時頼", power: 126, hp: 74, attribute: "STRATEGY", desc: "鎌倉幕府第5代執権。宝治合戦で有力御家人の三浦泰村一族を滅ぼし、北条氏による独裁体制を確立した。また、将軍を藤原氏から皇族（宗尊親王）へ変更し権威を高める一方、訴訟の迅速化と公正を図るために引付衆を設置するなど、武家政治の充実にも尽力。出家後は最明寺入道と称し、諸国を巡ったという伝説も残る。", skill: { name: "引付衆の設置", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 256, name: "足利直義", power: 119, hp: 81, attribute: "STRATEGY", desc: "室町幕府草創期の指導者。足利尊氏の弟。軍事と恩賞を担当する兄・尊氏に対し、行政や裁判などの政務部門を統括する「二頭政治」を行い、『建武式目』の制定にも深く関与した。しかし、革新的な執事の高師直と激しく対立し、全国の武士を二分する観応の擾乱を引き起こし、最後は尊氏に敗れて鎌倉で毒殺されたとされる。", skill: { name: "二頭政治の崩壊", desc: "敵全員の歴史力を30%減少させる", type: "debuff_all", value: 0.3, rate: 0.6 } },
  { id: 257, name: "細川頼之", power: 121, hp: 79, attribute: "STRATEGY", desc: "室町時代初期の武将・政治家。幕府の管領として、幼少の第3代将軍・足利義満を厳格に補佐した。南朝との戦いを有利に進め、半済令を全国に施行して幕府の経済基盤を強化。また、京都室町に花の御所を造営するなど、将軍権力の絶対化と室町幕府の全盛期に向けた政治的・財政的な土台を完璧に築き上げた名補佐役。", skill: { name: "名管領の補佐", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 258, name: "足利義尚", power: 106, hp: 94, attribute: "STRATEGY", desc: "室町幕府第9代将軍。足利義政と日野富子の子。彼の誕生が将軍継嗣問題を引き起こし、応仁の乱の大きな原因となった。戦乱によって地に落ちた幕府権力の回復と将軍親政を目指し、近江の守護である六角氏討伐（長享の陣）のために自ら軍を率いて親征を行ったが、戦陣の中で病死し、幕府再建の夢は潰えた。", skill: { name: "長享の親征", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 259, name: "徳川家綱", power: 63, hp: 137, attribute: "STRATEGY", desc: "江戸幕府の第4代将軍。わずか11歳で就任。就任直後の由井正雪の乱（慶安の変）を機に、武功を重んじる武断政治から、儒学の理念に基づく文治政治へと幕政を大きく転換させた。末期養子の禁を緩和して大名の改易による牢人の発生を防ぎ、主君の後を追う殉死を禁止するなど、江戸時代の社会を安定期へと導いた。", skill: { name: "文治政治への転換", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 260, name: "徳川家宣", power: 107, hp: 93, attribute: "STRATEGY", desc: "江戸幕府の第6代将軍。甲府藩主から綱吉の養子となる。新井白石や間部詮房を登用して「正徳の治」と呼ばれる文治政治を推進。前代の悪法であった生類憐みの令を即座に廃止し、悪化していた朝鮮通信使の待遇を簡素化して幕府の負担を軽減するなど、道理と儒教的規範に基づいた堅実な政治改革を実行した。", skill: { name: "正徳の治", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 261, name: "徳川家重", power: 86, hp: 114, attribute: "STRATEGY", desc: "江戸幕府の第9代将軍。吉宗の長男。生まれつき虚弱体質で言語不明瞭であったため、彼の言葉を唯一聞き取れたとされる側用人の大岡忠光を重用して政務を任せた。彼の治世には、薩摩藩に多大な犠牲を強いた宝暦治水事件などが起きているが、有能な幕閣に支えられて幕政は次代の田沼意次へと引き継がれていった。", skill: { name: "側用人の重用", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.95 } },
  { id: 262, name: "松平信綱", power: 123, hp: 77, attribute: "STRATEGY", desc: "江戸時代前期の老中。徳川家光・家綱の2代を支え、その並外れた頭脳から「知恵伊豆」と称された。島原の乱では総大将として一揆を鎮圧し、由井正雪の乱を未然に防いで事後処理を迅速に行うなど、幕府の危機管理能力の高さを示した。武家諸法度の改定や玉川上水の開削など、幕藩体制の完成に極めて大きな功績を残した。", skill: { name: "知恵伊豆の采配", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 263, name: "荻原重秀", power: 112, hp: 88, attribute: "STRATEGY", desc: "江戸時代中期の幕臣。徳川綱吉の時代の勘定吟味役・勘定奉行。寺社造営などで極度に悪化していた幕府の財政難を救うため、貨幣の金銀含有量を減らして質を落とす改鋳（元禄金銀への改鋳）を断行した。これにより一時的に巨額の差益を得て財政を潤したが、結果として激しいインフレーションを招き経済を混乱させた。", skill: { name: "元禄の改鋳", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 264, name: "間部詮房", power: 108, hp: 92, attribute: "STRATEGY", desc: "江戸時代中期の幕臣。猿楽師の出身であったが、徳川家宣に才能を見出されて側用人に大抜擢された。家宣および幼少の7代将軍家継の時代に、新井白石とともに「正徳の治」と呼ばれる文治政治を推進し、幕政の実権を握った。しかし、家継が早世し吉宗が8代将軍に就任すると、側用人政治を否定されて失脚した。", skill: { name: "側用人の栄達", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.88 } },
