  { id: 265, name: "保科正之", power: 125, hp: 75, attribute: "STRATEGY", desc: "江戸時代前期の大名。徳川秀忠の四男で会津藩主。異母兄の家光から「徳川家を頼む」と厚い信任を受け、家綱の補佐役として幕政に重きをなした。山崎闇斎を招いて朱子学を奨励し、玉川上水開削や明暦の大火後の江戸復興に尽力。「会津家訓十五箇条」を定め、幕末まで続く会津藩の強固な精神的支柱を築いた名君。", skill: { name: "会津藩の忠誠", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 266, name: "島津斉彬", power: 127, hp: 73, attribute: "STRATEGY", desc: "幕末の薩摩藩主。優れた先見性を持つ開明派の君主。集成館事業を起こし、反射炉やガラス工場、造船所などを建設して洋式軍備の導入と富国強兵を強力に推進した。西郷隆盛ら下級武士を抜擢し、将軍継嗣問題では一橋慶喜を推して国政改革を目指したが、安政の大獄の直前に軍を率いて上洛する途上で急死した。", skill: { name: "集成館事業", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 267, name: "井上馨", power: 119, hp: 81, attribute: "STRATEGY", desc: "明治期の政治家。長州藩出身。初代外務大臣として、欧米列強との不平等条約の改正に全力を注いだ。列強に日本が文明国であることを示すため、鹿鳴館を中心とする極端な欧化政策を展開。しかし、領事裁判権撤廃の代償として外国人判事を任用する案が発覚すると、政府内外から国権侵害との激しい批判を浴びて辞任した。", skill: { name: "鹿鳴館外交", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 268, name: "寺島宗則", power: 111, hp: 89, attribute: "STRATEGY", desc: "明治期の外交官・政治家。薩摩藩出身。岩倉使節団が外遊中の留守政府において外務卿を務め、アメリカとの間で関税自主権の回復を目指す条約改正交渉を進めた。アメリカとの新条約の調印にこぎつけるという大きな成果を挙げたが、最恵国待遇を盾にするイギリスやフランスなど他国の強硬な反対に遭い、最終的に挫折した。", skill: { name: "関税回復の交渉", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 269, name: "星亨", power: 134, hp: 66, attribute: "STRATEGY", desc: "明治期の政治家。自由党の指導者。強引な政治手法から「押し取り主義」と呼ばれ、伊藤博文と結んで立憲政友会の結成に尽力し、政党内閣への道を開いた。鉄道敷設などの公共事業を地方に誘致し、見返りに支持を集めるという利益誘導型の政党政治の原型を作ったが、東京市会疑獄に絡み市庁舎内で反対派に暗殺された。", skill: { name: "押し取り主義", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 270, name: "尾崎行雄", power: 122, hp: 78, attribute: "STRATEGY", desc: "明治から昭和期にかけての政治家。「憲政の神様」と呼ばれ、衆議院議員連続25回当選の記録を持つ。隈板内閣の文相であったが共和演説事件で辞任。その後、犬養毅とともに第一次護憲運動の先頭に立って桂太郎内閣を打倒し、大正デモクラシーの象徴的存在として普通選挙の実現や軍部ファシズム批判に生涯を捧げた。", skill: { name: "憲政の神様", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 271, name: "曇徴", power: 81, hp: 119, attribute: "CULTURE", desc: "7世紀初頭（推古朝）に高句麗から渡来した僧侶。日本に初めて紙、墨、そして絵の具（彩色）の製法を伝えたとされ、日本の文字文化や美術の発展に決定的な基礎を提供した。単なる僧侶にとどまらず、最新の化学技術をもたらした技術者としても飛鳥文化の発展に大きく貢献した。", skill: { name: "紙墨の伝来", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 272, name: "観勒", power: 84, hp: 116, attribute: "CULTURE", desc: "7世紀初頭（推古朝）に百済から渡来した僧侶。日本に初めて暦法（暦）や天文、地理、遁甲方術（占術）などの高度な学術書をもたらした。推古天皇に重用され、日本で最初の僧正に任命されて、乱れがちであった仏教界の風紀を正し、僧尼を統制する制度づくりにも尽力した。", skill: { name: "暦法の伝授", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 273, name: "玄昉", power: 96, hp: 104, attribute: "CULTURE", desc: "奈良時代の法相宗の僧。遣唐使の学問僧として渡唐し、多数の経典を持ち帰る。聖武天皇の母・藤原宮子の病を治したことで信頼を得て、橘諸兄政権で吉備真備とともに重用されて国政に参画した。しかし、彼の排除を掲げた藤原広嗣の乱を招き、のちに権力を握った藤原仲麻呂によって筑紫に左遷され、同地で没した。", skill: { name: "法相宗の知恵", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.9 } },
  { id: 274, name: "小野篁", power: 106, hp: 94, attribute: "CULTURE", desc: "平安時代前期の官人・学者。遣唐副使に任じられたが、大使の藤原常嗣と乗船をめぐって対立し、遣唐使の任務を拒否したため、嵯峨上皇の怒りを買い一時隠岐に流罪となった。漢詩文に極めて優れ、奇行が多かったことから「夜は井戸を通って地獄へ下り、閻魔大王の補佐をした」という奇怪な伝説が後世に語り継がれている。", skill: { name: "冥界の補佐", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 275, name: "在原業平", power: 91, hp: 109, attribute: "CULTURE", desc: "平安時代前期の貴族・歌人。六歌仙の一人に数えられる。平城天皇の孫にあたるが臣籍降下した。情熱的で哀愁を帯びた和歌を多数詠み、その数奇な恋愛遍歴や、東下りなどの旅の体験が、日本最古の歌物語である『伊勢物語』の主人公（昔男）のモデルとされた、平安王朝を代表する絶世の美男子。", skill: { name: "伊勢の情歌", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 276, name: "凡河内躬恒", power: 89, hp: 111, attribute: "CULTURE", desc: "平安時代前期の歌人。紀貫之らとともに醍醐天皇の命を受け、最初の勅撰和歌集である『古今和歌集』の撰者の一人となった。身分は低い地方官に留まったが、自然の情景を技巧的で繊細に詠み込む歌風を持ち、三十六歌仙の一人として後世の歌壇に高く評価され、国風文化の和歌の隆盛を支えた。", skill: { name: "古今の撰者", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 277, name: "和泉式部", power: 83, hp: 117, attribute: "CULTURE", desc: "平安時代中期の女流歌人。藤原道長の娘である中宮彰子に仕えた。親王たちとの身分違いの恋など、恋多き情熱的な生涯を送り、自身の恋愛の軌跡と和歌の贈答を赤裸々に綴った『和泉式部日記』を残した。そのあふれ出る豊かな歌才は、同僚であった紫式部からも「感心させられる」と日記の中で絶賛されている。", skill: { name: "情熱の和歌", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 278, name: "藤原定家", power: 107, hp: 93, attribute: "CULTURE", desc: "鎌倉時代初期の公家・歌人。後鳥羽上皇の命で『新古今和歌集』を撰進し、余情や「幽玄」「有心」の美意識を大成して中世歌壇の頂点に立った。のちに京都小倉山の山荘で『百人一首』を選定。また、彼が克明に書き残した日記『明月記』は、源平の争乱から承久の乱に至る激動の時代の超一級の重要史料となっている。", skill: { name: "新古今の幽玄", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 279, name: "明恵", power: 113, hp: 87, attribute: "CULTURE", desc: "鎌倉時代初期の華厳宗の僧。通称は高弁。後鳥羽上皇の帰依を受けて京都の高山寺を復興した。法然の専修念仏を「菩提心を否定するもの」として『摧邪輪』を著して激しく論難し、戒律の復興と旧仏教の立て直しに努めた。山中で樹上に座禅を組む姿を描いた『明恵上人樹上坐禅図』のモデルとしても有名。", skill: { name: "摧邪輪の論陣", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.86 } },
  { id: 280, name: "忍性", power: 114, hp: 86, attribute: "CULTURE", desc: "鎌倉時代の律宗の僧。通称は良観。師の叡尊とともに戒律の復興に尽力した。のちに北条重時の招きで鎌倉の極楽寺の開山となり、幕府の保護を受けた。ハンセン病患者の救済施設である奈良の北山十八間戸を設けるなど、生涯にわたって貧民救済や架橋・道路整備といった大規模な社会事業に身を捧げた。", skill: { name: "極楽寺の救済", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 281, name: "蘭渓道隆", power: 103, hp: 97, attribute: "CULTURE", desc: "鎌倉時代中期に南宋から渡来した禅僧。第5代執権・北条時頼の厚い帰依を受け、鎌倉に日本初の純粋な禅宗様（唐様）の建築構造を持つ建長寺を開山した。公案を用いて厳格に悟りを追求する純粋な臨済禅を指導し、質実剛健を重んじる武士階級の間に禅宗の教えを広く浸透させる決定的な役割を果たした。", skill: { name: "建長寺開山", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 282, name: "無学祖元", power: 99, hp: 101, attribute: "CULTURE", desc: "鎌倉時代後期に南宋から渡来した禅僧。元軍の侵攻を逃れて来日し、第8代執権・北条時宗の厚い帰依を受けた。元寇という未曾有の国難に直面する時宗に対し、「莫煩悩（煩うこと莫れ）」と説いて精神的に深く支えた。弘安の役の後、時宗が戦死者の菩提を弔うために創建した鎌倉の円覚寺の開山となった。", skill: { name: "円覚寺開山", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 283, name: "宗祇", power: 97, hp: 103, attribute: "CULTURE", desc: "室町時代後期の連歌師。諸国を旅して東常縁から和歌の秘伝である「古今伝授」を受け、芸術性の高い正風連歌を確立した。応仁の乱後の荒廃した社会にあって、弟子の宗長・肖柏とともに連歌の最高傑作『水無瀬三吟百韻』を詠み、さらに勅撰に準ずる『新撰菟玖波集』を編纂して、連歌を文学の頂点へと高めた。", skill: { name: "正風連歌", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 284, name: "山崎宗鑑", power: 94, hp: 106, attribute: "CULTURE", desc: "戦国時代の連歌師。宗祇らが完成させた格式やルールを重んじる正風連歌に対し、庶民の日常語（俗語）や滑稽味を大胆に取り入れた、自由で娯楽性の高い「俳諧連歌」を創始した。その作品集である『犬筑波集』を編集して大衆の人気を集め、のちの江戸時代の松尾芭蕉へと続く俳句文学の大きな源流を作った。", skill: { name: "俳諧連歌の祖", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 285, name: "雪村", power: 97, hp: 103, attribute: "CULTURE", desc: "室町時代後期の画僧。常陸国の武家（佐竹氏の一族）に生まれたが、出家して主に関東・東北地方で活動した。雪舟を強く私淑し、その水墨画を独学で研究。激しい筆致で風雨や波濤といった動的な自然のエネルギーを描き出す、極めて個性的でダイナミックな関東水墨画の独自の画風を確立した孤高の画家。", skill: { name: "関東水墨の嵐", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 286, name: "狩野元信", power: 105, hp: 95, attribute: "CULTURE", desc: "室町時代後期の絵師。幕府御用絵師・狩野正信の子。父が用いた中国由来の水墨画の力強い線描表現に、日本の伝統的な大和絵が持つ華やかな色彩と装飾性を見事に融合させた。大寺院の障壁画などを工房による集団制作で多数手掛け、のちの安土桃山時代に全盛期を迎える狩野派の絶対的な様式を確立した。", skill: { name: "和漢融合の筆", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 287, name: "本阿弥光悦", power: 119, hp: 81, attribute: "CULTURE", desc: "江戸時代初期の文化人・芸術家。刀剣の鑑定を家業とする名門に生まれる。徳川家康から京都の鷹峯に広大な土地を与えられ、多くの職人を集めて芸術村（光悦村）を形成した。俵屋宗達を見出して『風神雷神図屏風』などの制作に協力し、自身も『舟橋蒔絵硯箱』や斬新な茶碗を残すなど、寛永文化を牽引した総合芸術家。", skill: { name: "光悦村の芸術", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 288, name: "菱川師宣", power: 112, hp: 88, attribute: "CULTURE", desc: "江戸時代前期の浮世絵師。安房国の縫箔屋の出身。それまで書物の挿絵（版本）の添え物であった版画を独立させ、一枚摺の鑑賞用版画を描いて「浮世絵の祖」と呼ばれた。『見返り美人図』などに代表される肉筆画においても、江戸の町人や遊女の生き生きとした風俗を官能的に描き出し、元禄期の庶民の心を掴んだ。", skill: { name: "浮世絵の祖", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 289, name: "尾形乾山", power: 83, hp: 117, attribute: "CULTURE", desc: "江戸時代中期の陶工・絵師。尾形光琳の弟。京都で野々村仁清から京焼の技法を学んで鳴滝に窯を開いた。兄・光琳が絵付けを行い、自身が書や意匠を施すという兄弟の合作により、型にはまらない雅でデザイン性の高い陶器を数多く制作。実用品であった陶器を、鑑賞に堪える高度な芸術作品（京焼）へと昇華させた。", skill: { name: "京焼の意匠", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 290, name: "鈴木春信", power: 105, hp: 95, attribute: "CULTURE", desc: "江戸時代中期（明和期）の浮世絵師。裕福な愛好家たちの要望に応え、複数の版木を用いた多色刷りの版画技術である「錦絵」を創始し、浮世絵界に色彩の革命をもたらした。華奢で可憐な少女たちが日常の何気ないしぐさを見せる、夢見るような叙情的な美人画を数多く描き、当時の江戸の美意識を決定づけた。", skill: { name: "錦絵の創始", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 291, name: "喜多川歌麿", power: 108, hp: 92, attribute: "CULTURE", desc: "江戸時代後期の浮世絵師。女性の上半身や顔を画面いっぱいに大写しにする「大首絵」の技法を完成させた。遊女や町娘がふと見せる微妙な心理の動きや艶やかな色香を、繊細かつ流麗な線で描き出し、美人画の最高峰と称された。しかし、寛政の改革における厳しい出版統制令に抵触して手鎖の処罰を受け、失意のうちに没した。", skill: { name: "大首絵の艶", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 292, name: "東洲斎写楽", power: 114, hp: 86, attribute: "CULTURE", desc: "江戸時代後期の浮世絵師。蔦屋重三郎の出版で突如デビューし、わずか10カ月という極めて短い期間に、役者の顔の特徴や内面を容赦なく誇張して描く強烈な個性の大首絵（役者絵）を約140点残して忽然と姿を消した謎の天才絵師。そのあまりにリアルでグロテスクな描写は、当時の江戸の役者や大衆には受け入れられなかった。", skill: { name: "誇張の役者絵", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 293, name: "池大雅", power: 102, hp: 98, attribute: "CULTURE", desc: "江戸時代中期の南画（文人画）家。中国から伝来した『八種画譜』などで画法を独学しつつ、実際に日本各地の名所を旅して風景をスケッチした。中国絵画の模倣にとどまらず、日本の風景を明るく大らかで詩情あふれる筆致で描き、与謝蕪村とともに『十便十宜図』を合作するなど、日本における文人画を大成した。", skill: { name: "文人画の大成", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 294, name: "山東京伝", power: 116, hp: 84, attribute: "CULTURE", desc: "江戸時代後期（化政期）の戯作者。遊里の風俗を「通」の視点から洗練された文章で描く「洒落本」や、風刺の効いた絵入り小説「黄表紙」の第一人者として絶大な人気を誇った。しかし、松平定信による寛政の改革の厳しい出版統制令に触れ、手鎖50日の処罰を受ける。以後は風紀を乱さない勧善懲悪の「読本」へと作風を転じた。", skill: { name: "洒落本の美学", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 295, name: "式亭三馬", power: 89, hp: 111, attribute: "CULTURE", desc: "江戸時代後期の戯作者。江戸の庶民の身近な社交場であった銭湯（湯屋）や髪結床を舞台に、集まってくる町人たちの生き生きとした日常会話をユーモラスかつ写実的に描写した滑稽本『浮世風呂』や『浮世床』を著し、大ベストセラーとなった。自らも売薬店を営みながら、化政文化の庶民の笑いを文学として定着させた。", skill: { name: "浮世風呂の笑い", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 296, name: "鶴屋南北", power: 98, hp: 102, attribute: "CULTURE", desc: "江戸時代後期の歌舞伎狂言作者。四世。退廃的な化政文化の暗い世相を色濃く反映し、下層民のリアルな生態や残酷な殺人、亡霊の凄惨な復讐劇を描く「生世話物」や怪談狂言で一世を風靡した。『東海道四谷怪談』では、忠臣蔵の世界の裏側で起きるお岩の怨念を描き、江戸の観客を恐怖と熱狂の渦に巻き込んだ。", skill: { name: "四谷怪談の恐怖", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 297, name: "河竹黙阿弥", power: 102, hp: 98, attribute: "CULTURE", desc: "幕末から明治期にかけて活躍した歌舞伎狂言作者。幕末期には『白浪五人男』など、盗賊を主人公とする哀愁漂う「白浪物」を書いて人気を博した。明治維新後は、文明開化による西洋風俗や新しい事物をいち早く取り入れた「散切物」を書き、旧劇から近代歌舞伎への橋渡しとなる基礎を築き上げた江戸歌舞伎最後の巨匠。", skill: { name: "白浪の哀愁", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 298, name: "滝廉太郎", power: 77, hp: 123, attribute: "CULTURE", desc: "明治時代の作曲家。東京音楽学校に学び、西洋音楽の和声や技法を本格的に取り入れながら、「荒城の月」「花」「箱根八里」など、日本人の心の原風景とも言えるなじみ深い名曲を次々と作曲した。文部省の留学生としてドイツに渡ったが、結核を発病して無念の帰国を余儀なくされ、23歳の若さで夭折した天才音楽家。", skill: { name: "荒城の月", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 299, name: "山田耕筰", power: 111, hp: 89, attribute: "CULTURE", desc: "大正から昭和期の作曲家・指揮者。ドイツに留学して西洋音楽の本格的な理論と作曲法を学び、「赤とんぼ」や「からたちの花」などの優れた芸術的童謡を作曲した。また、日本初の交響楽団を創設して自ら指揮棒を振り、オペラの創作も行うなど、日本の近代音楽の普及と水準向上に極めて大きな役割を果たした重鎮。", skill: { name: "近代音楽の父", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 300, name: "柳田国男", power: 118, hp: 82, attribute: "CULTURE", desc: "明治から昭和期の民俗学者。農商務省のエリート官僚であったが、日本列島の山村や離島を歩き回り、古文書に残らない名もなき民衆（常民）の生活用具や民間信仰、口承伝承を研究した。岩手県の伝承をまとめた『遠野物語』を著し、雑誌『郷土研究』を創刊して、日本独自の学問である「日本民俗学」を創始・確立した。", skill: { name: "常民の探求", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.85 } },
  { id: 301, name: "平忠常", power: 122, hp: 78, attribute: "VALOR", desc: "平安時代中期の武将。房総半島を本拠地とした桓武平氏の雄。1028年、安房守を焼き討ちして国府を占領し、上総・下総・安房を制圧して朝廷に大規模な反乱を起こした。追討使の平直方を退けるなど関東の独立勢力として猛威を振るったが、新たに追討使に任じられた源頼信の威名に恐れをなして戦わずして降伏した。", skill: { name: "房総の反乱", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 302, name: "平貞盛", power: 131, hp: 69, attribute: "VALOR", desc: "平安時代中期の武将。常陸大掾・平国香の長男。一族の平将門が父を殺害して「新皇」を名乗り関東で反乱を起こすと、復讐のために立ち上がった。下野国の押領使であった藤原秀郷らと協力して将軍軍を打ち破り、将門を討ち取るという大功を挙げた。のちに鎮守府将軍に任じられ、関東における伊勢平氏発展の基礎を築いた。", skill: { name: "将門討伐", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.85 } },
  { id: 303, name: "畠山重忠", power: 139, hp: 61, attribute: "VALOR", desc: "鎌倉時代初期の武将。武蔵国の有力御家人で「坂東武士の鑑」と称賛された清廉で勇猛な武将。一ノ谷の戦いでの鵯越の逆落としで愛馬を背負って崖を下った伝説を持つ。源頼朝の深い信任を得て幕府創設に貢献したが、頼朝の死後、北条時政の策謀によって謀反の疑いをかけられ、二俣川の戦いで北条義時軍に討ち取られた。", skill: { name: "坂東武士の鑑", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.5 } },
  { id: 304, name: "武蔵坊弁慶", power: 142, hp: 58, attribute: "VALOR", desc: "平安時代末期から鎌倉時代初期の僧兵。比叡山で修行したのち五条大橋で源義経と出会い、その家来となった伝説的武勇の持ち主。一ノ谷、屋島、壇ノ浦と義経に従って各地を転戦し、兄・頼朝に追われた義経が奥州平泉に逃れる際も最後まで付き従った。衣川の館で義経を守るため、全身に矢を浴びたまま立ち往生を遂げた。", skill: { name: "立ち往生", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 305, name: "佐藤継信", power: 125, hp: 75, attribute: "VALOR", desc: "平安時代末期の武将。奥州藤原氏の家臣。弟の忠信とともに、藤原秀衡の命を受けて源義経の郎党となり、源平の争乱で義経軍の中核として活躍した。屋島の戦いにおいて、平氏の猛将である平教経が義経を狙って放った強烈な矢を、主君の盾となってその身に受けて戦死した。その忠義は後世の武士から深く称賛されている。", skill: { name: "主君の盾", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 306, name: "巴御前", power: 134, hp: 66, attribute: "VALOR", desc: "平安時代末期の女武者。信濃国の豪族・中原兼遠の娘で、木曾義仲の愛妾。義仲の挙兵に従い、強弓精兵の勇将として俱利伽羅峠の戦いなどで平氏軍を圧倒した。『平家物語』には「一人当千の兵者」と記され、義仲が粟津の戦いで討死する直前まで奮戦したが、義仲の命令により戦場を離脱し、のちに尼となって菩提を弔った。", skill: { name: "一人当千の武", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 307, name: "平教経", power: 137, hp: 63, attribute: "VALOR", desc: "平安時代末期の武将。平清盛の弟・教盛の子。没落していく平氏一門の中で最も際立った武勇を誇り、水島合戦などで源氏軍を度々撃破した。壇ノ浦の決戦では、敗北が濃厚となる中で源義経を討ち取るべく執拗に追い回したが、義経の八艘飛びでかわされ、最期は源氏の剛の者二人を両脇に抱え込んで海へ飛び込み果てた。", skill: { name: "平家随一の猛将", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 308, name: "熊谷直実", power: 128, hp: 72, attribute: "VALOR", desc: "平安時代末期から鎌倉時代初期の武将。武蔵国の御家人。一ノ谷の戦いにおいて、平氏の若武者である平敦盛を組み伏せたが、我が子と同年代の美しい顔を見てためらい、泣く泣く首を討った悲劇で知られる。この出来事で武士の世の無常を深く悟り、のちに法然の弟子となって出家し、蓮生と名乗ってひたすら念仏の道を歩んだ。", skill: { name: "無常の弓矢", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 309, name: "名和長年", power: 121, hp: 79, attribute: "VALOR", desc: "鎌倉時代末期から南北朝時代の武将。伯耆国の豪族。隠岐に配流されていた後醍醐天皇が島を脱出した際、これを船上山に迎え入れて倒幕の兵を挙げ、幕府軍の猛攻を退けた。建武政権では天皇の絶対的な信任を得て「三木一草」の一人に数えられ権勢を振るった。のちに京都に攻め上ってきた足利尊氏の軍と激戦の末に戦死した。", skill: { name: "船上山の挙兵", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 310, name: "佐々木道誉", power: 119, hp: 81, attribute: "VALOR", desc: "南北朝時代の武将・守護大名（高氏）。室町幕府の創設期において足利尊氏を軍事・政治の両面で助け、政所執事として幕政を主導した。既存の権威を軽視し、派手な振る舞いや奇抜な装いを好む「婆娑羅（ばさら）」の代表的人物。華道や茶道、連歌にも極めて通じており、室町文化の初期における文化的パトロンでもあった。", skill: { name: "婆娑羅大名", desc: "相手が【文化】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.4, rate: 0.95 } },
  { id: 311, name: "今川氏真", power: 85, hp: 115, attribute: "VALOR", desc: "戦国時代の武将。今川義元の嫡男。桶狭間の戦いで父が討死したのち家督を継いだが、武田信玄と徳川家康の挟撃を受けて駿河を追われ、戦国大名としての今川家は滅亡した。しかし文化人としては極めて優れており、蹴鞠や和歌、連歌の達人であった。のちに家康の庇護を受けて長寿を全うし、公家社会との交流を深めた。", skill: { name: "蹴鞠の達人", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 312, name: "尼子経久", power: 126, hp: 74, attribute: "VALOR", desc: "戦国時代の出雲の戦国大名。室町幕府の守護代であったが、主家を追放されて牢人となったのち、奇襲によって月山富田城を奪還し、山陰・山陽11カ国に覇を唱えた下克上の典型。大内氏や毛利氏と激しく争い、「謀聖」と称されるほどの狡猾な戦略で尼子氏の全盛期を築き上げた、中国地方における戦国乱世の先駆者。", skill: { name: "謀聖の奇襲", desc: "敵全員の歴史力を30%減少させる", type: "debuff_all", value: 0.3, rate: 0.6 } },
  { id: 313, name: "龍造寺隆信", power: 133, hp: 67, attribute: "VALOR", desc: "戦国時代の肥前の戦国大名。大友氏の介入を退け、少弐氏を滅ぼして肥前を統一。「肥前の熊」と恐れられる猛将であり、大友宗麟・島津義久と並んで九州三強の一角を形成した。しかし、勢力拡大を急ぐあまり家臣や国人への強権的な統制が反発を招き、1584年の沖田畷の戦いで島津・有馬連合軍の奇襲を受けて討死した。", skill: { name: "肥前の熊", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 314, name: "本願寺教如", power: 114, hp: 86, attribute: "VALOR", desc: "戦国時代から安土桃山時代の浄土真宗の僧。本願寺第11世顕如の長男。石山合戦の終結に際し、信長への降伏・退去を決めた父に反発して徹底抗戦を主張し、教団を二分した。のちに徳川家康に接近して寄進を受け、京都に東本願寺（真宗大谷派）を創立。一向一揆の巨大な軍事力を背景に、戦国乱世を逞しく生き抜いた宗教指導者。", skill: { name: "抗戦の号令", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 315, name: "雑賀孫市", power: 129, hp: 71, attribute: "VALOR", desc: "戦国時代の紀伊国の国人衆である雑賀衆の頭領（鈴木孫一）。鉄砲の大量運用と傭兵集団としての高度な戦術を誇り、石山合戦では本願寺側について織田信長の大軍を散々に苦しめた。信長も手を焼いたゲリラ戦法と正確な狙撃技術で名を馳せたが、のちに豊臣秀吉の紀州征伐によって雑賀衆は降伏し、彼自身も流浪の身となった。", skill: { name: "雑賀鉄砲衆", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 316, name: "大谷吉継", power: 124, hp: 76, attribute: "VALOR", desc: "戦国時代の武将。豊臣秀吉に仕え、越前敦賀の領主となる。重い業病を患いながらも優れた軍略と行政手腕を発揮し、秀吉から「100万の軍勢の采配を任せてみたい」と評された。関ヶ原の戦いでは親友の石田三成の挙兵を無謀と諫めたが、義のために西軍に加わる。小早川秀秋の裏切りに遭って軍が崩壊し、陣中で自刃した。", skill: { name: "白頭の軍略", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 317, name: "酒井忠次", power: 130, hp: 70, attribute: "VALOR", desc: "戦国時代の武将。徳川四天王の筆頭。家康の今川氏からの独立以来の最古参として軍事・外交の両面で活躍した。長篠の戦いでは、鳶ヶ巣山への夜襲を提案・指揮して武田軍の退路を断ち、大勝の決定的な要因を作った。「海老すくい」の踊りを得意とするなど陽気な性格で、家臣団のまとめ役として徳川氏の躍進を支えた。", skill: { name: "鳶ヶ巣山の夜襲", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 318, name: "柿崎景家", power: 136, hp: 64, attribute: "VALOR", desc: "戦国時代の武将。上杉謙信の重臣で、越後軍の中で最も武勇に優れた猛将。「越後七郡に敵う者なし」と称賛され、第四次川中島の戦いでは武田軍の本陣深くへ突撃して武田信繁を討ち取るなど、幾多の激戦で先鋒を務めた。しかし、織田信長と内通しているという疑惑をかけられ、主君の謙信によって非業の死を遂げた。", skill: { name: "越後の先鋒", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 319, name: "山県昌景", power: 135, hp: 65, attribute: "VALOR", desc: "戦国時代の武将。武田四天王の一人。全身を赤で統一した「赤備え」の精鋭部隊を率い、他国から「武田の赤備え」として最も恐れられた猛将。三方ヶ原の戦いで徳川家康の軍を散々に打ち破ったが、長篠の戦いでは無謀な突撃を強いられ、織田・徳川軍の鉄砲隊の集中砲火を浴びて馬上で指揮を執りながら壮絶な討死を遂げた。", skill: { name: "武田の赤備え", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 320, name: "吉川広家", power: 117, hp: 83, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。吉川元春の三男。関ヶ原の戦いにおいて、西軍の総大将とされた毛利輝元の本領安堵を徳川家康と密約し、毛利軍を南宮山に釘付けにして西軍を敗北に導いた。戦後、家康から約束を破られ毛利家は周防・長門に減封されたが、彼独自の外交工作によって毛利家自体の取り潰しは免れた。", skill: { name: "南宮山の静観", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 321, name: "沖田総司", power: 143, hp: 57, attribute: "VALOR", desc: "幕末の武士。新選組一番隊組長。天然理心流の天才的な剣客であり、三段突きなどの鋭い剣技で恐れられた。池田屋事件などの尊攘派弾圧で先陣を切って活躍し、局長の近藤勇を剣の腕で支え続けた。しかし、若くして労咳（結核）を患い、戊辰戦争が激化する中で新選組の敗退を知らされないまま江戸の千駄ヶ谷で病死した。", skill: { name: "三段突き", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 322, name: "斎藤一", power: 138, hp: 62, attribute: "VALOR", desc: "幕末から明治期の武士・警察官。新選組三番隊組長。左利きの剣客として知られ、沖田総司と並ぶ剣の達人。戊辰戦争では会津戦争まで旧幕府軍として徹底抗戦した。維新後は「藤田五郎」と名を変えて警視庁に抜擢され、西南戦争では抜刀隊を率いて西郷軍と斬り合うなど、激動の時代を最後まで生き抜いた寡黙な剣士。", skill: { name: "無敵の左剣", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 323, name: "岡田以蔵", power: 132, hp: 68, attribute: "VALOR", desc: "幕末の土佐藩郷士。武市瑞山が結成した土佐勤王党に加わり、その指示のもとで「天誅」と称して公武合体派や佐幕派の要人を次々と暗殺し、「人斬り以蔵」と恐れられた。しかし、八月十八日の政変後に勤王党が弾圧されると捕縛され、過酷な拷問に耐えきれず同志の名を自白してしまい、土佐藩によって打ち首にされた。", skill: { name: "人斬りの天誅", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.95 } },
  { id: 324, name: "芹沢鴨", power: 125, hp: 75, attribute: "VALOR", desc: "幕末の武士。常陸国水戸藩の出身で、新選組の初代筆頭局長。豪放磊落で神道無念流の達人であり、壬生浪士組を新選組として組織化する上で強力なリーダーシップを発揮した。しかし、酒乱や市中での乱暴狼藉が絶えず、京都の治安維持を任とする会津藩の不興を買い、最後は近藤勇や土方歳三らによって八木邸で暗殺された。", skill: { name: "豪放の剣", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 325, name: "清河八郎", power: 121, hp: 79, attribute: "VALOR", desc: "幕末の出羽国庄内藩出身の志士。熱狂的な尊王攘夷論者で、将軍上洛の護衛を名目に江戸で浪士組を結成した。しかし京都に到着するや否や、本来の目的をひるがえして天皇のために尊攘運動を行うことを宣言。幕府の怒りを買い、江戸に呼び戻された直後に麻布で幕府の刺客（佐々木只三郎ら）によって暗殺された。", skill: { name: "浪士組結成", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 326, name: "大鳥圭介", power: 115, hp: 85, attribute: "VALOR", desc: "幕末から明治期の洋学者・幕臣。適塾などに学び、幕府の歩兵奉行としてフランス式軍制を導入した。戊辰戦争では旧幕府軍の指揮官として各地を転戦し、榎本武揚らと合流して蝦夷地の五稜郭に籠城（箱館戦争）。敗北して投獄されたが、赦免後は明治政府に出仕し、清国駐在公使などを歴任して近代外交に尽力した。", skill: { name: "フランス式軍制", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 327, name: "秋山好古", power: 130, hp: 70, attribute: "VALOR", desc: "明治期の陸軍大将。「日本騎兵の父」と呼ばれる。秋山真之の兄。フランスに留学して騎兵戦術を学び、日露戦争では騎兵第1旅団長として出陣。奉天会戦などの激戦において、当時世界最強と謳われたロシアのコサック騎兵の猛攻を機関銃を用いた巧みな防御戦術で防ぎ切り、日本軍の勝利に絶大な貢献をした。", skill: { name: "近代騎兵の防陣", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 328, name: "広瀬武夫", power: 127, hp: 73, attribute: "VALOR", desc: "明治期の海軍軍人。日露戦争における旅順港閉塞作戦で閉塞船「福井丸」を指揮した。退避の際、行方不明となった部下の杉野孫七を危険な船内で三度も捜し回ったのちに敵弾を受けて戦死した。その自己犠牲と部下思いの姿は「軍神」として国民に熱狂的に讃えられ、唱歌『廣瀬中佐』として長く歌い継がれた。", skill: { name: "旅順港閉塞", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 329, name: "石原莞爾", power: 134, hp: 66, attribute: "VALOR", desc: "昭和期の陸軍軍人・軍事思想家。関東軍作戦主任参謀として、中国との全面戦争を見据えた『世界最終戦論』を構想。その拠点として満洲を確保するため、独断で柳条湖事件を企てて満洲事変を引き起こし、満洲国を建国した。しかし、のちに日中戦争の拡大には強硬に反対したため軍部内で孤立し、予備役に退いた。", skill: { name: "世界最終戦論", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.9 } },
  { id: 330, name: "栗林忠道", power: 137, hp: 63, attribute: "VALOR", desc: "昭和期の陸軍大将。太平洋戦争末期、硫黄島の守備隊司令官に任命された。従来の水際作戦を否定し、島全体に堅固な地下陣地を構築する持久戦術を採用。圧倒的な物量とHPを誇るアメリカ軍に対して、補給が絶たれた中で一カ月以上も凄絶な防衛戦を展開し、米軍に上陸部隊を上回る多大な死傷者を出させて玉砕した。", skill: { name: "硫黄島の死闘", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 331, name: "蘇我倉山田石川麻呂", power: 64, hp: 136, attribute: "STRATEGY", desc: "飛鳥時代の政治家。蘇我氏の一族でありながら中大兄皇子と結び、645年の乙巳の変では蘇我入鹿の暗殺計画に加担した。大化の改新後の新政府では右大臣に任命され、初期の律令国家建設を補佐。しかし、異母弟の蘇我日向の讒言によって謀反の疑いをかけられ、山田寺で一族もろとも自害に追い込まれた悲劇の右大臣。", skill: { name: "改新の右大臣", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.7 } },
  { id: 332, name: "阿倍内麻呂", power: 101, hp: 99, attribute: "STRATEGY", desc: "飛鳥時代の政治家。乙巳の変後に成立した孝徳天皇の新政権において、最初の左大臣に就任した。中大兄皇子や中臣鎌足らを補佐し、公地公民制や新たな租税制度の導入を目指す「大化の改新」の推進に尽力した。のちに娘の小足媛が孝徳天皇の妃となるなど、初期の律令政権において重要な地位を占めた。", skill: { name: "改新の左大臣", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 333, name: "藤原武智麻呂", power: 109, hp: 91, attribute: "STRATEGY", desc: "奈良時代初期の公卿。藤原不比等の長男で藤原南家の祖。長屋王の変で政敵を排除し、弟の房前・宇合・麻呂とともに「藤原四兄弟」として政権を独占し右大臣に上り詰めた。妹の光明子を聖武天皇の皇后に立てて藤原氏の栄華の基礎を固めたが、737年に猛威を振るった天然痘によって兄弟全員が相次いで病死した。", skill: { name: "南家の祖", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 334, name: "藤原房前", power: 107, hp: 93, attribute: "STRATEGY", desc: "奈良時代初期の公卿。藤原不比等の次男で藤原北家の祖。元正・聖武天皇に仕え、参議として内政に手腕を発揮した。長屋王の変を通じて兄・武智麻呂とともに政権を掌握し、北家発展の礎を築いたが、737年の天然痘の大流行により病死。彼の子孫である北家が、のちの平安時代に摂関政治を独占することになる。", skill: { name: "北家の祖", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 335, name: "藤原清河", power: 94, hp: 106, attribute: "STRATEGY", desc: "奈良時代の貴族・遣唐使。藤原房前の子。752年に遣唐大使として阿倍仲麻呂らとともに唐の長安に渡り、玄宗皇帝に拝謁して厚遇された。しかし、帰国の途上で暴風雨に遭って安南（ベトナム）に漂着し、帰国を断念して長安に戻った。その後は唐の朝廷に仕え、日本に帰ることなく客死した。", skill: { name: "遣唐大使の悲運", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.95 } },
  { id: 336, name: "藤原良相", power: 98, hp: 102, attribute: "STRATEGY", desc: "平安時代前期の公卿。藤原冬嗣の子で、摂政となった良房の弟。右大臣として兄を補佐し、藤原北家の勢力拡大に貢献した。しかし、866年の応天門の変において、源信を失脚させようとする伴善男の策謀に関与した疑いをかけられ、兄・良房によって政界から排除されて失脚し、以後は不遇の晩年を送った。", skill: { name: "右大臣の失脚", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 337, name: "藤原伊周", power: 91, hp: 109, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原道隆の長男で、中宮定子の兄。若くして内大臣となり、叔父の藤原道長と激しく権力を争った。しかし、花山法皇に矢を射かけるという長徳の変を引き起こし、道長に大宰権帥への左遷を命じられて失脚。これにより道長の政権掌握が決定的となり、妹の定子とともに没落への道を歩んだ。", skill: { name: "長徳の変", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 338, name: "藤原教通", power: 103, hp: 97, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原道長の子で、頼通の弟。兄・頼通の長きにわたる関白時代を内大臣・右大臣として補佐した。頼通が高齢で引退したのちに関白を継いだが、のちに後三条天皇が即位して延久の荘園整理令などの親政を開始したため、摂関家の権勢を維持することが難しくなり、院政時代への過渡期に直面した。", skill: { name: "関白の継承", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 339, name: "信西", power: 115, hp: 85, attribute: "STRATEGY", desc: "平安時代末期の学者・政治家。名は藤原通憲。博学多才で知られ、出家して後白河天皇のブレーンとなり、保元の乱では天皇方の勝利に多大な貢献をした。その後、平清盛と結んで政治の刷新（保元新制）を主導し権勢を振るったが、藤原信頼や源義朝らの反発を買い、平治の乱で襲撃されて逃亡の末に自害した。", skill: { name: "保元新制の策", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 340, name: "北条時房", power: 106, hp: 94, attribute: "STRATEGY", desc: "鎌倉幕府の初代連署。北条時政の子で義時の弟。承久の乱では甥の泰時とともに幕府軍を率いて上京し、朝廷軍を撃破。戦後は泰時とともに初代六波羅探題に就任して京都の治安維持にあたった。泰時が第3代執権となると、それを補佐する初代の「連署」に就任し、御成敗式目の制定など執権政治の確立を支えた。", skill: { name: "初代連署の補佐", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 341, name: "北条重時", power: 102, hp: 98, attribute: "STRATEGY", desc: "鎌倉時代中期の武将・政治家。北条義時の三男。六波羅探題として長年にわたり京都の治安維持と朝廷の監視にあたった。その後鎌倉に戻り、第5代執権・北条時頼を連署として強力に補佐し、宝治合戦での三浦氏討伐などを主導。晩年に記した『六波羅殿御家訓』は、武士の心得や処世術を示す教訓書として名高い。", skill: { name: "極楽寺流の家訓", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 342, name: "北条政村", power: 98, hp: 102, attribute: "STRATEGY", desc: "鎌倉幕府の第7代執権。北条義時の子。北条氏一族の長老として重きをなし、連署として執権北条長時を補佐したのち、自身も執権に就任。蒙古襲来（元寇）の危機が迫る中で、若き北条時宗に執権の座を譲って再び連署に戻り、未曾有の国難に立ち向かう幕府の指導体制の安定化と御家人の結束に大きく貢献した。", skill: { name: "長老の譲譲", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 343, name: "足利義詮", power: 110, hp: 90, attribute: "STRATEGY", desc: "室町幕府の第2代将軍。足利尊氏の嫡男。観応の擾乱などで混乱する幕府を立て直すため、半済令を制定して守護の権限を強化し、武士の経済的基盤を確保した。また、南朝方の細川清氏らを討伐し、大内氏や山名氏などの有力守護を幕府の体制内に組み込むことで、次代の義満による幕府全盛期の確固たる土台を築いた。", skill: { name: "半済令の発布", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 344, name: "足利義持", power: 105, hp: 95, attribute: "STRATEGY", desc: "室町幕府の第4代将軍。足利義満の嫡男。父の死後、義満が始めた明との朝貢貿易（勘合貿易）を屈辱的であるとして一時中断した。上杉禅秀の乱を鎮圧して鎌倉府の統制を強める一方、守護大名の合議による安定した政治を目指した。後継者をくじ引きで決めるよう遺言し、弟の義教が第6代将軍となる原因を作った。", skill: { name: "朝貢の拒絶", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 345, name: "斯波義将", power: 112, hp: 88, attribute: "STRATEGY", desc: "室町時代初期の守護大名。足利一門の有力者で、細川頼之の失脚（康暦の政変）ののちに幕府の管領に就任した。足利義満・義持の2代にわたって幕政を主導し、南北朝の合一や明徳の乱・応永の乱の鎮圧に貢献。彼以降、管領は細川・斯波・畠山の三家（三管領）が交代で就任する体制が確立し、幕政の安定期を支えた。", skill: { name: "三管領の確立", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 346, name: "畠山基国", power: 97, hp: 103, attribute: "STRATEGY", desc: "室町時代初期の守護大名。明徳の乱で山名氏の討伐に軍功を挙げ、山城・紀伊・河内などの守護を兼任して強大な勢力を築いた。斯波義将や細川氏とともに幕政に参与し、のちに初代の管領に就任。以後、畠山氏は三管領の一つとして幕府の最高権力層に列したが、のちに家督争いが応仁の乱の引き金の一つとなった。", skill: { name: "紀伊・河内守護", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.95 } },
  { id: 347, name: "浅野長政", power: 113, hp: 87, attribute: "STRATEGY", desc: "安土桃山時代の武将・大名。豊臣秀吉の正室・ねね（北政所）の義兄にあたり、豊臣政権の五奉行の一人として太閤検地や刀狩などの内政政策を中心となって推進した。行政手腕に極めて優れていたが、関ヶ原の戦いでは徳川家康の東軍に味方し、戦後は徳川氏に従って常陸に転封され、大名としての家を存続させた。", skill: { name: "太閤検地の遂行", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 348, name: "増田長盛", power: 108, hp: 92, attribute: "STRATEGY", desc: "安土桃山時代の武将・大名。豊臣政権の五奉行の一人で、石田三成らとともに検地奉行として全国の土地調査を担当し、豊臣政権の経済基盤の確立に貢献。また京都の土木工事などでも手腕を発揮した。関ヶ原の戦いでは大坂城に留まり西軍に与したが敗北し、戦後は改易されて高野山に追放されるという結末を迎えた。", skill: { name: "検地奉行の手腕", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 349, name: "大久保忠隣", power: 118, hp: 82, attribute: "STRATEGY", desc: "江戸時代初期の譜代大名・老中。徳川家康の信任が厚く、武蔵国小田原藩主として初期の幕政を本多正信とともに主導した。しかし、キリシタン問題や幕閣内の権力闘争において正信派と激しく対立。1614年に突如として改易され、近江に配流された。この失脚は、家康による大名統制の厳しさを示す事件となった。", skill: { name: "初期老中の権勢", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 350, name: "本多正信", power: 122, hp: 78, attribute: "STRATEGY", desc: "江戸時代初期の武将・老中。徳川家康の側近として「知恵袋」と呼ばれ、初期の幕政を実質的に取り仕切った。武功よりも謀略や内政に長け、江戸幕府の基礎となる法制度やキリシタン弾圧、朝廷統制などの政策を立案した。大久保忠隣ら武断派の家臣とは対立したが、家康の死後まで幕府の文治体制の枠組みを支え続けた。", skill: { name: "家康の知恵袋", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.9 } },
  { id: 351, name: "土井利勝", power: 115, hp: 85, attribute: "STRATEGY", desc: "江戸時代前期の譜代大名。徳川秀忠・家光の2代にわたって大老（老中）を務め、幕政の最高責任者として権勢を振るった。武家諸法度（寛永令）の制定による参勤交代の制度化や、キリスト教の厳禁、鎖国体制の完成などを強力に推し進め、将軍の絶対的な権力を背景とする強力な幕藩体制の確立に決定的な役割を果たした。", skill: { name: "寛永の幕政", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 352, name: "酒井忠清", power: 109, hp: 91, attribute: "STRATEGY", desc: "江戸時代前期の譜代大名。第4代将軍・徳川家綱のもとで大老を務め、将軍が病弱であったことから幕政の実権を独占し「下馬将軍」と恐れられた。伊達騒動などの御家騒動の処理や、文治政治への転換を進めたが、家綱の死後に有栖川宮の親王を将軍に擁立しようとしたため、新将軍の綱吉に忌避されて失脚した。", skill: { name: "下馬将軍の威", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 353, name: "堀田正俊", power: 114, hp: 86, attribute: "STRATEGY", desc: "江戸時代前期の大老。第5代将軍・徳川綱吉の将軍就任に大きく貢献し、大老として天和の治と呼ばれる文治政治を補佐した。武家諸法度（天和令）を制定して「文武忠孝」を奨励し、代官の粛正や治水事業など善政を敷いた。しかし、江戸城内で若年寄の稲葉正休に突如刺殺され、以後は側用人による政治へと移行した。", skill: { name: "天和の治", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.6 } },
  { id: 354, name: "徳川斉昭", power: 111, hp: 89, attribute: "STRATEGY", desc: "幕末の水戸藩主。藤田東湖らを登用して藩政改革を行い、弘道館を設立して水戸学（尊王攘夷論）を大成させた。ペリー来航時には幕府の海防参与に就任し、強硬な攘夷を主張。将軍継嗣問題では一橋慶喜を推して井伊直弼と対立し、安政の大獄で蟄居させられた。彼の過激な思想は、のちの桜田門外の変や倒幕運動の原動力となった。", skill: { name: "烈公の攘夷論", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 355, name: "山内豊信", power: 105, hp: 95, attribute: "STRATEGY", desc: "幕末の土佐藩主（容堂）。吉田東洋を登用して藩政改革を断行した「幕末の四賢侯」の一人。公武合体派として将軍継嗣問題に介入して安政の大獄で隠居。のち後藤象二郎の進言を受け、15代将軍・徳川慶喜に対して「大政奉還」を建白し、幕府を平和裏に終わらせることで徳川氏を中心とした新体制（公議政体）を目指した。", skill: { name: "四賢侯の建白", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.95 } },
  { id: 356, name: "後藤新平", power: 120, hp: 80, attribute: "STRATEGY", desc: "明治から昭和初期の政治家・官僚。医師出身で、児玉源太郎の下で台湾総督府民政長官を務め、土地調査や鉄道・衛生設備を整え台湾の近代化に成功。満鉄初代総裁として満洲経営を主導した。関東大震災後には内務大臣兼帝都復興院総裁として、区画整理や道路拡張など、現在の東京の骨格となる壮大な都市復興計画を推進した。", skill: { name: "帝都復興計画", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 357, name: "大木喬任", power: 100, hp: 100, attribute: "STRATEGY", desc: "明治期の政治家。肥前国佐賀藩出身。初代文部卿として、フランスの制度を範とした近代的な学校教育制度の基本法である「学制」の制定を主導した。また司法卿としても新政府の法体系整備に尽力し、江藤新平の佐賀の乱や萩の乱、西南戦争などの士族反乱の事後処理と厳格な処罰にあたり、明治国家の法治体制を確立した。", skill: { name: "学制の制定", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 358, name: "副島種臣", power: 102, hp: 98, attribute: "STRATEGY", desc: "明治期の政治家・外交官。肥前国佐賀藩出身。外務卿として日清修好条規の締結やマリア・ルス号事件の処理など初期の明治外交を主導。征韓論争に敗れて下野した後は、板垣退助らとともに愛国公党を結成し、民撰議院設立の建白書を提出して自由民権運動の口火を切った。のち清国に渡り、優れた漢詩人としても名声を博した。", skill: { name: "民撰議院の建白", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 359, name: "西園寺公望", power: 126, hp: 74, attribute: "STRATEGY", desc: "明治から昭和期の政治家。公家の名門出身で、フランス留学で自由主義を学ぶ。伊藤博文の後を継いで立憲政友会総裁となり、桂太郎と交互に政権を担当する「桂園時代」を築いた。首相として鉄道国有法や工場法の制定に関与。最後の元老として、大正デモクラシー期から昭和初期にかけて政党政治を保護・育成し続けた。", skill: { name: "最後の元老", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 360, name: "若槻礼次郎", power: 104, hp: 96, attribute: "STRATEGY", desc: "大正・昭和期の政治家。憲政会（のち立憲民政党）の総裁として2度組閣した。第1次内閣では金融恐慌の処理にあたったが枢密院の反対で総辞職。第2次内閣ではロンドン海軍軍縮条約の調印を強行して統帥権干犯問題を引き起こし、また満洲事変の勃発に対して不拡大方針を声明したが軍部の暴走を止められず退陣した。", skill: { name: "不拡大の声明", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 361, name: "阿倍仲麻呂", power: 85, hp: 115, attribute: "CULTURE", desc: "奈良時代の留学生。吉備真備や玄昉らとともに遣唐使として唐に渡る。玄宗皇帝にその文才を愛されて朝衡と名乗り、李白や王維ら一流の詩人たちと深く交流した。日本への帰国を熱望し「天の原 ふりさけ見れば 春日なる 三笠の山に出でし月かも」の望郷の歌を詠んだが、船が難破して安南に漂着し、ついに帰国できなかった。", skill: { name: "望郷の月", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 362, name: "小野小町", power: 82, hp: 118, attribute: "CULTURE", desc: "平安時代前期の女流歌人。六歌仙の一人。絶世の美女であったという伝説が後世に数多く残る。「花の色は うつりにけりな いたづらに わが身世にふる ながめせしまに」など、恋愛の情熱や自身の衰えへの哀愁を詠んだ美しく情念的な和歌を『古今和歌集』に残し、平安王朝の雅な国風文化を象徴する歌人として名高い。", skill: { name: "絶世の情歌", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 363, name: "円仁", power: 97, hp: 103, attribute: "CULTURE", desc: "平安時代初期の天台宗の僧（慈覚大師）。最澄の弟子で、遣唐使とともに唐に渡る。五台山などを巡礼して密教や念仏の教えを深く学び、唐の仏教弾圧（会昌の廃仏）の苦難を逃れて帰国した。その詳細な旅行記『入唐求法巡礼行記』は世界的な史料価値を持つ。帰国後は天台宗の密教化（台密）を大きく推し進め、比叡山を興隆させた。", skill: { name: "台密の発展", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 364, name: "円珍", power: 95, hp: 105, attribute: "CULTURE", desc: "平安時代初期の天台宗の僧（智証大師）。円仁に続いて入唐し、天台の教義と密教を学んで帰国した。第5代天台座主となり比叡山の発展に尽くしたが、死後、彼の門徒（寺門派）と円仁の門徒（山門派）との間で激しい対立が勃発し、寺門派は比叡山を下りて園城寺（三井寺）を拠点としたため、天台宗は真っ二つに分裂した。", skill: { name: "寺門派の祖", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.95 } },
  { id: 365, name: "橘逸勢", power: 88, hp: 112, attribute: "CULTURE", desc: "平安時代初期の貴族・書家。空海・最澄らとともに遣唐使として唐に渡り、その卓越した書と語学の才能で唐の人々を驚嘆させた。空海、嵯峨天皇とともに「三筆」の一人に数えられる唐様（中国風）の書の名手。しかし、承和の変で謀反の罪を着せられ、伊豆への流罪の途中で病没するという非業の最期を遂げた。", skill: { name: "三筆の唐様", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 366, name: "小野道風", power: 93, hp: 107, attribute: "CULTURE", desc: "平安時代中期の書家。藤原佐理、藤原行成とともに「三跡（三蹟）」の一人に数えられる。それまでの中国風（唐様）の書風から脱却し、日本の風土や美意識に合った優美で柔らかな「和様」の書道を創始した。花札の絵柄にも描かれている「柳に飛びつく蛙を見て努力の大切さを悟った」という逸話でも広く知られている。", skill: { name: "和様の創始", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 367, name: "藤原佐理", power: 90, hp: 110, attribute: "CULTURE", desc: "平安時代中期の公卿・書家。「三跡」の一人。小野道風が創始した和様の書風を受け継ぎ、躍動感あふれる独特の草書体（佐理流）を確立した。大宰府へ赴任する途中で甥に宛てて書いた詫び状である『離洛帖』は、国風文化における書道の最高傑作の一つとされ、彼の自由奔放な筆致と当時の貴族の生活の様子を今に伝えている。", skill: { name: "離洛帖の筆致", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 368, name: "藤原行成", power: 92, hp: 108, attribute: "CULTURE", desc: "平安時代中期の公卿・書家。「三跡」の一人。藤原道長の厚い信任を受けて蔵人頭として活躍する一方で、和様の書道を極限まで洗練させ、のちに「世尊寺流」と呼ばれる日本の書道の標準的な様式を完成させた。また、彼の日記『権記』は、『小右記』『御堂関白記』と並び、摂関政治全盛期の朝廷の動向を知る最重要史料である。", skill: { name: "世尊寺流の完成", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 369, name: "巨勢金岡", power: 86, hp: 114, attribute: "CULTURE", desc: "平安時代前期の宮廷画家。宇多天皇・醍醐天皇の時代に活躍し、神泉苑の障壁画などを描いたとされる。中国風の唐絵から離れ、日本の自然風景や風俗を題材とする「大和絵」の基礎を築いた伝説的な始祖とされる。彼の作品は現存しないが、のちの巨勢派の祖として、日本美術史において極めて重要な地位を占めている。", skill: { name: "大和絵の始祖", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 370, name: "快慶", power: 104, hp: 96, attribute: "CULTURE", desc: "鎌倉時代初期の奈良仏師。運慶とともに慶派を代表する彫刻家。重源の招きで東大寺の復興造仏に参加し、運慶らと東大寺南大門の金剛力士像（阿形像）を造立した。運慶の力強くダイナミックな作風に対し、理知的で絵画的な繊細さを持つ「安阿弥様」と呼ばれる独自の美しい作風を確立し、東大寺僧形八幡神像などを残した。", skill: { name: "安阿弥様", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 371, name: "阿仏尼", power: 78, hp: 122, attribute: "CULTURE", desc: "鎌倉時代中期の女流歌人。藤原定家の子である冷泉為相の母。実子と継子の間で起こった所領（播磨国細川荘）の相続争いの訴訟のため、京都から鎌倉へと下った。その旅の道中から鎌倉での滞在中の出来事や心情、和歌を綴った紀行文『十六夜日記』を著し、当時の東海道の様子や武家政権下の社会風俗を鮮やかに伝えた。", skill: { name: "十六夜日記", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 372, name: "絶海中津", power: 99, hp: 101, attribute: "CULTURE", desc: "室町時代初期の臨済宗の禅僧。夢窓疎石に学び、義堂周信とともに「五山文学」の最高峰と称される双璧。明に渡って洪武帝（朱元璋）に謁見し、漢詩を唱和してその文才を絶賛された。帰国後は足利義満の厚い信任を受け、相国寺の住持を務めながら、幕府の対明外交の顧問として日明貿易（勘合貿易）の開始に深く関与した。", skill: { name: "五山文学の双璧", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 373, name: "義堂周信", power: 96, hp: 104, attribute: "CULTURE", desc: "室町時代初期の臨済宗の禅僧。絶海中津と並ぶ五山文学の双璧。鎌倉公方の足利基氏に招かれて関東の禅宗を興隆させ、のち足利義満に請われて京都に戻り、建仁寺や南禅寺の住持を歴任した。義満に対して仏教や儒教を講義して多大な思想的影響を与え、室町幕府の政治や外交の背後にある最高級の知識人として君臨した。", skill: { name: "将軍への進講", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 374, name: "村田珠光", power: 84, hp: 116, attribute: "CULTURE", desc: "室町時代後期の茶人。奈良の称名寺の僧であったが、一休宗純に参禅して禅の精神を学び、それを茶の湯に持ち込んだ。豪華な唐物茶碗を誇示する闘茶などの遊興的な茶会を否定し、四畳半の狭い空間で精神的な深まりや静寂を重んじる「侘茶」を創始した。彼の精神は武野紹鴎を経て、千利休へと受け継がれていく。", skill: { name: "侘茶の創始", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 375, name: "武野紹鴎", power: 81, hp: 119, attribute: "CULTURE", desc: "戦国時代の堺の豪商・茶人。村田珠光が創始した侘茶をさらに発展させた。連歌を学び、和歌の「枯れかじかむ」という美意識を茶の湯に取り入れ、日常の雑器を茶具に見立てるなどして、茶室や作法のさらなる簡素化を進めた。堺の豪商たちの間で茶の湯を大流行させ、弟子の千利休による茶道大成への決定的な橋渡しをした。", skill: { name: "茶の湯の簡素化", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 376, name: "伊藤仁斎", power: 104, hp: 96, attribute: "CULTURE", desc: "江戸時代前期の儒学者。京都の町人出身。幕府の正学であった朱子学を批判し、『論語』や『孟子』の原典に直接立ち返って孔子や孟子の真意を探求する「古義学」を提唱した。京都の堀川に私塾「古義堂」を開き、身分を問わず全国から集まった約3000人の門人を育成し、自由で人間味あふれる学風で町人層に多大な影響を与えた。", skill: { name: "古義学の提唱", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 377, name: "熊沢蕃山", power: 108, hp: 92, attribute: "CULTURE", desc: "江戸時代前期の陽明学者。中江藤樹に師事し、岡山藩主・池田光政に登用されて藩政改革（花畠教場の設立や治水事業）で大きな成果を挙げた。しかし、「知行合一」の実践を重んじる思想が幕府に警戒され、のちに幕政批判の書『大学或問』を著したことで弾圧を受け、古河藩に幽閉されたまま生涯を終えた。", skill: { name: "大学或問の諫言", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 378, name: "中江藤樹", power: 95, hp: 105, attribute: "CULTURE", desc: "江戸時代前期の儒学者。伊予国大洲藩に仕えていたが、老母を養うために脱藩して近江に帰り、独学で陽明学を修めた。「知行合一」や、人間の心にある道徳的本心を意味する「良知」を重んじる教えを説き、身分を問わず多くの人々に慕われて「近江聖人」と称された。日本における陽明学の祖であり、熊沢蕃山らを育てた。", skill: { name: "近江聖人の良知", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 379, name: "塙保己一", power: 101, hp: 99, attribute: "CULTURE", desc: "江戸時代後期の国学者。幼くして失明するという苦難を乗り越え、驚異的な記憶力で賀茂真淵らに国学や和漢の学問を学んだ。古代から江戸初期に至る日本の膨大な史料や文学作品を分類・編纂し、一大叢書『群書類従』を完成させるという歴史的偉業を成し遂げた。幕府の許可を得て和学講談所を設立し、日本文化の研究基盤を確立した。", skill: { name: "群書類従の編纂", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 380, name: "平田篤胤", power: 110, hp: 90, attribute: "CULTURE", desc: "江戸時代後期の国学者。本居宣長の没後の門人を自称し、復古神道をさらに宗教的な国粋主義へと過激化させた平田神道を確立。儒教や仏教を厳しく排斥し、死後の世界（幽冥）や尊王論を強く主張した。その思想は、幕末において尊王攘夷運動の強力な精神的支柱となり、多くの草莽の志士や豪農・神官たちを倒幕へと駆り立てた。", skill: { name: "復古神道の熱狂", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 381, name: "円山応挙", power: 91, hp: 109, attribute: "CULTURE", desc: "江戸時代後期の画家。狩野派の画法を学んだのち、遠近法などの西洋画法や中国清代の画法を取り入れ、実物をありのままに描く「写生」を極めて重視した新しい画風を確立（円山派）。『雪松図屏風』に代表される、装飾的でありながら写実的で親しみやすい画風は京都の町衆から圧倒的な支持を受け、のちの日本画壇を席巻した。", skill: { name: "写生画の極致", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 382, name: "近松半二", power: 79, hp: 121, attribute: "CULTURE", desc: "江戸時代中期の人形浄瑠璃の狂言作者。近松門左衛門の死後、衰退しつつあった浄瑠璃界にあって、史実とフィクションを巧みに織り交ぜた波乱万丈の時代物を次々と書き上げ、竹本座の全盛期を再び現出させた。『妹背山婦女庭訓』『本朝廿四孝』『伊賀越道中双六』などの名作は、現在でも歌舞伎や文楽の代表的な演目となっている。", skill: { name: "浄瑠璃の中興", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 383, name: "上田秋成", power: 82, hp: 118, attribute: "CULTURE", desc: "江戸時代後期の読本作家・国学者。大坂の町人出身。中国の白話小説や日本の古典怪異譚を翻案し、和漢混淆の流麗な文体で、人間の執念や怨念が引き起こす怪異の世界を見事に描き出した傑作『雨月物語』や『春雨物語』を著した。賀茂真淵に学んだ国学者でもあり、本居宣長と神代史の解釈を巡って激しい論争を展開した。", skill: { name: "雨月物語の怪異", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 384, name: "司馬江漢", power: 89, hp: 111, attribute: "CULTURE", desc: "江戸時代後期の洋風画家・蘭学者。鈴木春信に浮世絵を学んだのち、平賀源内や前野良沢との交流を通じて西洋の科学や美術に傾倒した。遠近法や陰影法を用いた日本初の銅版画の制作に成功し、『不忍池図』などの洋風画を描いた。また、コペルニクスの地動説を日本で初めて通俗的に解説するなど、西洋文明の啓蒙に大きく貢献した。", skill: { name: "日本初の銅版画", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 385, name: "中村正直", power: 100, hp: 100, attribute: "CULTURE", desc: "明治時代の啓蒙思想家・教育者。旧幕臣としてイギリスに留学し、帰国後にサミュエル・スマイルズの著書を『西国立志編』として、J.S.ミルの著書を『自由之理』として翻訳・出版。これらは「天は自ら助くる者を助く」という自助努力の精神を説き、福沢諭吉の『学問のすゝめ』と並んで明治の青年に爆発的な影響を与えた。", skill: { name: "西国立志の啓蒙", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 386, name: "中江兆民", power: 112, hp: 88, attribute: "CULTURE", desc: "明治時代の思想家・ジャーナリスト。「東洋のルソー」と呼ばれる。フランス留学でルソーの思想に深く感銘を受け、帰国後に『民約訳解』を著して天賦人権論を日本に紹介した。仏学塾を開き、新聞を通じて急進的なフランス流の自由民権運動を理論的に指導したが、保安条例により東京から追放され、第1回衆議院議員も辞職した。", skill: { name: "東洋のルソー", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.94 } },
  { id: 387, name: "島崎藤村", power: 102, hp: 98, attribute: "CULTURE", desc: "明治から昭和期の詩人・小説家。雑誌『文学界』に参加し、詩集『若菜集』でロマン主義詩の先駆となった。のち小説に転じ、被差別部落出身の青年の苦悩を描いた『破戒』を発表して日本における自然主義文学を確立。さらには『夜明け前』などの歴史小説の大作を生み出すなど、日本の近代文学史を体現し牽引し続けた文豪。", skill: { name: "自然主義の確立", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 388, name: "田山花袋", power: 86, hp: 114, attribute: "CULTURE", desc: "明治・大正期の小説家。日清戦争の従軍記者を経て、尾崎紅葉らに学んだ。1907年、女弟子への抑えきれない愛欲と自身の醜態を赤裸々に描写した自伝的小説『蒲団』を発表し、日本の文壇に多大な衝撃を与えた。以後、『田舎教師』などを著し、島崎藤村とともに日本の自然主義文学（私小説）を代表する中心作家として活躍した。", skill: { name: "私小説の衝撃", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.7 } },
  { id: 389, name: "石川啄木", power: 75, hp: 125, attribute: "CULTURE", desc: "明治時代の歌人・詩人。岩手県に生まれ、与謝野鉄幹の『明星』でロマン派詩人として登場したが、極度の貧困と病に苦しむ。生活派の短歌へと移行し、三行書きという斬新な形式で日常の哀歓を詠んだ歌集『一握の砂』や『悲しき玩具』で絶大な共感を呼んだ。大逆事件を機に社会主義に傾倒したが、26歳の若さで病死した。", skill: { name: "一握の砂", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 390, name: "与謝野晶子", power: 98, hp: 102, attribute: "CULTURE", desc: "明治から昭和期の歌人。雑誌『明星』の看板歌人として、女性の官能や情熱的な恋愛を大胆に謳い上げた処女歌集『みだれ髪』を発表し、ロマン主義の絶頂を築いた。日露戦争従軍中の弟を思いやった反戦詩「君死にたまふこと勿れ」でも知られる。夫・鉄幹を支え、源氏物語の現代語訳や女性解放運動でも多大な足跡を残した。", skill: { name: "みだれ髪の情熱", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 391, name: "蘇我入鹿", power: 79, hp: 121, attribute: "VALOR", desc: "飛鳥時代の有力豪族。父の蝦夷とともに朝廷の権力を独占し、皇位継承の有力候補であった聖徳太子の子・山背大兄王を一族もろとも斑鳩宮に攻め滅ぼすなど独裁的な権勢を振るった。しかし、その専横に危機感を抱いた中大兄皇子や中臣鎌足らによって、645年の乙巳の変において飛鳥板蓋宮で暗殺され、蘇我氏本宗家は滅亡した。", skill: { name: "専横の刃", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 392, name: "源経基", power: 123, hp: 77, attribute: "VALOR", desc: "平安時代中期の武将。清和天皇の孫にあたる皇族であったが臣籍降下して源姓を賜り、清和源氏の祖となった（経基王）。武蔵介として東国に赴任中に平将門の乱に遭遇し、いち早く上京して朝廷に将門の謀反を報告した。また、藤原純友の乱の追討使としても功績を挙げ、武士の棟梁としての清和源氏の基礎を築き上げた。", skill: { name: "清和源氏の祖", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 393, name: "源為朝", power: 146, hp: 54, attribute: "VALOR", desc: "平安時代末期の武将。源為義の八男で「鎮西八郎」と呼ばれる。身の丈2メートルを超える巨漢で、強弓を引く天下無双の猛将。保元の乱では父とともに崇徳上皇方について奮戦し、白河殿の防衛で平清盛や兄の義朝の軍勢を散々に射散らした。敗戦後は伊豆大島に流され、のちに追討軍を迎え撃って日本初の切腹を遂げたという伝説を持つ。", skill: { name: "鎮西の強弓", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 394, name: "楠木正行", power: 133, hp: 67, attribute: "VALOR", desc: "南北朝時代の武将。楠木正成の嫡男。「小楠公」と称される。父の戦死後、後村上天皇を擁して南朝の軍事的な中心となり、住吉の戦いや藤井寺の戦いで足利方の軍勢を次々と打ち破る目覚ましい武功を挙げた。しかし、高師直率いる幕府の大軍を迎え撃った1348年の四条畷の戦いにおいて、力尽き弟の正時とともに壮絶な討死を遂げた。", skill: { name: "小楠公の決死", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 395, name: "赤松則村", power: 127, hp: 73, attribute: "VALOR", desc: "鎌倉時代末期から南北朝時代の武将。法名の円心で知られる。播磨国の悪党出身であったが、後醍醐天皇の倒幕の綸旨に応じて挙兵し、六波羅探題の軍勢を度々撃破して建武の新政樹立に大きく貢献した。しかし新政下での恩賞に不満を持ち、足利尊氏が反旗を翻すとこれに味方し、湊川の戦いや室町幕府の創立において多大な軍功を立てた。", skill: { name: "悪党の戦陣", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 396, name: "足利直冬", power: 119, hp: 81, attribute: "VALOR", desc: "南北朝時代の武将。足利尊氏の庶子であるが父から冷遇され、叔父の足利直義の養子となった。観応の擾乱において直義派の軍事力の中核として中国地方や九州で大勢力を築き、一時は京都を占領するなど父・尊氏を大いに苦しめた。直義の死後も南朝と結んで幕府への抵抗を続けたが、のちに九州探題今川了俊の前に勢力を失い没落した。", skill: { name: "養子の反逆", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 397, name: "真田昌幸", power: 138, hp: 62, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。武田信玄に仕えたのち、小大名ながら智謀の限りを尽くして上杉・北条・徳川の間を渡り歩いて独立を保った。第一次上田合戦では徳川の大軍を撃退。関ヶ原の戦いでは西軍に属し、第二次上田合戦で徳川秀忠の主力軍を釘付けにして遅参させるという神業を演じた。豊臣秀吉から「表裏比興の者」と評された。", skill: { name: "表裏比興の智謀", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 398, name: "立花道雪", power: 135, hp: 65, attribute: "VALOR", desc: "戦国時代の武将。大友氏の重臣で、元の名は戸次鑑連。「雷神を斬った」という伝説から「雷神」と恐れられた猛将。半身不随となりながらも輿に乗って陣頭指揮を執り、毛利氏や島津氏の侵攻から豊後や筑前を命懸けで守り抜いた。主君・大友宗麟の乱行を度々諫めるなど忠義に厚く、九州に立花道雪ありと諸大名から畏敬された。", skill: { name: "雷神の威容", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 399, name: "山中鹿介", power: 131, hp: 69, attribute: "VALOR", desc: "戦国時代の武将。尼子氏の家臣。本名は幸盛。毛利元就によって主家が滅ぼされた後も、「願わくば、我に七難八苦を与えたまえ」と三日月に祈り、尼子氏再興のために生涯を捧げた。諸国を流浪しながら山陰地方で度々挙兵して毛利軍を苦しめたが、上月城の戦いで敗れて捕らえられ、護送中に暗殺された悲劇の忠臣。", skill: { name: "七難八苦の誓い", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 400, name: "山本勘助", power: 111, hp: 89, attribute: "VALOR", desc: "戦国時代の武将。武田信玄に軍師として仕えたとされる伝説的な人物。築城術や兵法に極めて優れていた。第四次川中島の戦いにおいて、軍勢を二手に分けて上杉謙信の本陣を奇襲する「啄木鳥の戦法」を献策したが、謙信に看破されて逆襲を受け、自らの策の失敗を恥じて敵陣に単騎で突撃し、壮絶な討死を遂げた。", skill: { name: "啄木鳥の戦法", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.95 } },
  { id: 401, name: "馬場信春", power: 128, hp: 72, attribute: "VALOR", desc: "戦国時代の武将。武田四天王の一人。武田信玄・勝頼の2代に仕え、生涯で70回以上の合戦に参加しながら一つも傷を負わなかったため「不死身の鬼美濃」と称えられた。深志城などの築城にも手腕を発揮。長篠の戦いでは無謀な突撃に反対しつつも出陣し、勝頼を退却させるための殿（しんがり）を務めて立派な戦死を遂げた。", skill: { name: "不死身の鬼美濃", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 402, name: "滝川一益", power: 125, hp: 75, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。織田信長に仕え、鉄砲の腕前と水軍の統率力を買われて重用された。長島一向一揆の鎮圧や甲州征伐で大功を挙げ、関東管領格として上野国を与えられて東国支配を任された。しかし本能寺の変後、神流川の戦いで北条氏に大敗して失脚し、のちの清洲会議や賤ヶ岳の戦いでも不遇の晩年を送った。", skill: { name: "鉄砲の達人", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 403, name: "丹羽長秀", power: 114, hp: 86, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。織田信長の重臣で「米五郎左」と呼ばれ、米のように欠くことのできない万能の武将として行政・軍事の両面で深く信頼された。安土城の築城奉行を務め、四国征伐の準備中に本能寺の変に遭遇。直後の山崎の戦いで羽柴秀吉に味方して勝利に貢献し、のちに越前などを領する大名となった。", skill: { name: "米五郎左の万能", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 404, name: "小西行長", power: 116, hp: 84, attribute: "VALOR", desc: "安土桃山時代の武将。堺の商人出身で豊臣秀吉に仕え、水軍を率いて活躍し肥後国の半分の領主となった。熱心なキリシタン大名（洗礼名アウグスティヌス）としても有名。文禄の役では先鋒として朝鮮に出兵したが、泥沼化する戦局を憂いて明との講和交渉に奔走。関ヶ原の戦いでは西軍の主力として戦うが敗れ、信仰を理由に切腹を拒み斬首された。", skill: { name: "和平への奔走", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.85 } },
  { id: 405, name: "宇喜多秀家", power: 118, hp: 82, attribute: "VALOR", desc: "安土桃山時代の武将。宇喜多直家の子。豊臣秀吉の寵愛を受けて猶子となり、備前国岡山に57万石の大領を領した。豊臣政権下で五大老の最年少として重きをなし、朝鮮出兵では総大将として出陣。関ヶ原の戦いでは西軍の副大将格として最大HPを率いて大いに奮戦したが敗北し、八丈島へ流罪となって50年以上の配流生活を送った。", skill: { name: "五大老の奮戦", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 406, name: "黒田長政", power: 102, hp: 98, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。黒田官兵衛（孝高）の嫡男。豊臣秀吉に仕えて数々の武功を挙げた。秀吉の死後は徳川家康に接近し、関ヶ原の戦いにおいて小早川秀秋や吉川広家らを東軍に寝返らせるという決定的な外交・調略工作を成功させ、東軍勝利の最大の功労者となった。戦後は筑前国福岡藩52万石の初代藩主となる。", skill: { name: "寝返りの調略", desc: "敵全員の歴史力を30%減少させる", type: "debuff_all", value: 0.3, rate: 0.6 } },
  { id: 407, name: "最上義光", power: 120, hp: 80, attribute: "VALOR", desc: "戦国時代から江戸時代初期の大名。出羽国山形城主。伊達政宗の伯父にあたる。「羽州の狐」と呼ばれるほどの優れた謀略と苛烈な軍事行動で領国を拡大し、最上氏の全盛期を築いた。関ヶ原の戦いでは東軍に属し、上杉景勝の重臣・直江兼続率いる大軍の猛攻を長谷堂城で防ぎ切り、戦後に57万石の巨大な領地を獲得した。", skill: { name: "羽州の狐", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 408, name: "佐竹義重", power: 129, hp: 71, attribute: "VALOR", desc: "戦国時代の常陸国の戦国大名。「鬼義重」と恐れられた猛将でありながら、外交にも優れていた。北条氏の関東制覇に激しく抵抗し、伊達政宗とも奥州の覇権を巡って抗争を繰り広げた。豊臣秀吉の小田原征伐にいち早く参陣して所領を安堵されたが、関ヶ原の戦いにおいて嫡男の義宣が中立を保ったため、出羽国秋田へと減転封された。", skill: { name: "鬼義重の武威", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 409, name: "毛利隆元", power: 108, hp: 92, attribute: "VALOR", desc: "戦国時代の武将。毛利元就の長男。偉大すぎる父の陰に隠れがちだが、非常に温厚で誠実な人柄であり、内政や外交に優れた手腕を発揮して毛利家を裏から支え続けた。弟の吉川元春・小早川隆景とともに「毛利両川」体制の要であったが、父の存命中に尼子氏討伐の出陣準備のさなかに急死し、毛利家の未来に暗い影を落とした。", skill: { name: "長兄の誠実", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 410, name: "北条氏政", power: 112, hp: 88, attribute: "VALOR", desc: "戦国時代の相模国の戦国大名。後北条氏の第4代当主。武田信玄や上杉謙信との同盟と破棄を繰り返し、北条氏の最大版図を築き上げた。しかし、豊臣秀吉による全国統一の波に抗し、上洛要求を拒絶して小田原城での徹底抗戦を選択した。結果として約20万の大軍に包囲され（小田原攻め）、降伏ののちに切腹を命じられて戦国大名北条氏は滅亡した。", skill: { name: "小田原の籠城", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 411, name: "島津家久", power: 141, hp: 59, attribute: "VALOR", desc: "戦国時代の武将。島津四兄弟の末弟。祖父から「軍法戦術に妙を得た男」と評された天才的な戦術家。沖田畷の戦いでは「釣り野伏せ」の戦法を用いて龍造寺隆信の大軍を打ち破り、戸次川の戦いでは長宗我部元親の長男・信親を討ち取るなど、九州制覇を目指す島津軍の快進撃を支えた。しかし秀吉の九州平定直後に陣中で急死した。", skill: { name: "釣り野伏せ", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 412, name: "高山右近", power: 103, hp: 97, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。摂津国高槻城主などで、熱心なキリシタン大名として知られる。織田信長や豊臣秀吉に仕えて武功を挙げたが、秀吉のバテレン追放令に際して信仰を捨てることを拒否し、領地を没収された。その後も前田利家のもとで信仰を貫いたが、徳川家康のキリスト教禁教令によってマニラへ追放され、同地で客死した。", skill: { name: "信仰の殉教", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.92 } },
  { id: 413, name: "鍋島直茂", power: 126, hp: 74, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。肥前国の龍造寺隆信の重臣として主家の勢力拡大を大いに支えた。沖田畷の戦いで隆信が討死した後は龍造寺家の実権を握り、豊臣秀吉の九州平定にいち早く服属。朝鮮出兵でも活躍し、関ヶ原の戦いでは西軍から東軍へ転じて本領を安堵され、主家にかわって肥前佐賀藩35万石の藩祖となった。", skill: { name: "肥前の藩祖", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 414, name: "前田慶次", power: 144, hp: 56, attribute: "VALOR", desc: "戦国時代末期の武将。名は利益。前田利家の甥にあたるが、前田家を出奔して諸国を流浪した。長谷堂城の戦いでは直江兼続に与して最上軍の追撃を見事に防ぎ切るなど、天下無双の槍術と武勇を誇った。また、権威に屈しない「傾奇者（かぶきもの）」として派手な装いと自由奔放な生き方を貫き、優れた教養をも併せ持った文武両道の快男児。", skill: { name: "天下の傾奇者", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 415, name: "柳生宗厳", power: 139, hp: 61, attribute: "VALOR", desc: "戦国時代から江戸時代初期の剣豪。大和国の土豪出身で、「石舟斎」の号で知られる。上泉信綱から新陰流を学び、素手で太刀を奪う「無刀取り」の技などを極めて柳生新陰流を創始した。徳川家康の前でその腕前を披露して絶賛され、以後は息子・宗矩とともに徳川将軍家の兵法指南役として幕府に仕え、柳生一族の繁栄の基礎を築いた。", skill: { name: "無刀取り", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 416, name: "永倉新八", power: 137, hp: 63, attribute: "VALOR", desc: "幕末の剣客で、新選組二番隊組長。神道無念流の達人であり、沖田総司や斎藤一と並んで新選組最強の剣士と謳われた。池田屋事件などで常に先頭に立って尊攘派と切り結び、数々の死線をくぐり抜けた。戊辰戦争の最中に近藤勇と対立して靖兵隊を結成。明治維新後も生き延びて、晩年には『新撰組顛末記』を残して彼らの記録を後世に伝えた。", skill: { name: "無念流の剛剣", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 417, name: "吉村虎太郎", power: 118, hp: 82, attribute: "VALOR", desc: "幕末の土佐藩出身の志士。武市瑞山の土佐勤王党に参加したのち脱藩し、急進的な尊王攘夷運動の先頭に立った。1863年の八月十八日の政変に前後して、公家の中山忠光を擁立して大和国五条の代官所を襲撃する「天誅組の変」を引き起こした。しかし、政変により朝廷から賊軍とされて幕府軍の猛追を受け、鷲家口で凄惨な討死を遂げた。", skill: { name: "天誅組の先陣", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 418, name: "桐野利秋", power: 135, hp: 65, attribute: "VALOR", desc: "幕末から明治初期の薩摩藩出身の武士・軍人。幕末期は中村半次郎と名乗り、「人斬り半次郎」と恐れられた凄腕の剣客として暗躍。維新後は陸軍少将となるが、征韓論争で西郷隆盛が下野するとともに職を辞して鹿児島に帰郷した。1877年の西南戦争では西郷軍の主力部隊を指揮して政府軍と激戦を繰り広げ、城山で西郷に殉じて戦死した。", skill: { name: "人斬り半次郎", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 419, name: "伊東祐亨", power: 120, hp: 80, attribute: "VALOR", desc: "明治時代の海軍軍人・元帥。薩摩藩出身。日清戦争において連合艦隊司令長官を務め、黄海海戦で清の誇る北洋艦隊を大破し、さらに威海衛の戦いでこれを完全に降伏させて黄海・渤海の制海権を掌握した。降伏した敵将の丁汝昌の死を深く悼み、敬意を持ってその遺体を清国へ返還したというエピソードは、武士道精神の発露として国際的に称賛された。", skill: { name: "黄海の制海権", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 420, name: "黒木為楨", power: 126, hp: 74, attribute: "VALOR", desc: "明治時代の陸軍大将。薩摩藩出身。日露戦争において第一軍司令官として鴨緑江を渡り、九連城の戦いでロシア軍を撃破して日本軍最初の陸上戦の大勝利をもたらした。その後も遼陽、沙河、奉天の各会戦において、常に最前線で猛烈な突撃を指揮してロシア軍を圧倒し、「猛将黒木」として海外の観戦武官からも極めて高い評価を受けた。", skill: { name: "鴨緑江の突破", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.95 } },
  { id: 421, name: "蘇我稲目", power: 102, hp: 98, attribute: "STRATEGY", desc: "飛鳥時代の有力豪族で、蘇我馬子の父。大臣に任じられ、屯倉（直轄地）の設置や部民の編成を通じてヤマト政権の財政基盤の強化に尽力した。百済から仏教が公伝した際、積極的にこれを受容し、仏像を私邸で礼拝した。これが排仏派の物部尾輿らの激しい反発を招き、以後の半世紀に及ぶ崇仏・排仏論争の口火を切ることとなった。", skill: { name: "崇仏の先駆け", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 422, name: "物部尾輿", power: 106, hp: 94, attribute: "STRATEGY", desc: "飛鳥時代の有力豪族。大連として軍事や神祇祭祀を取り仕切った。百済からの仏教公伝に対して、古来の国つ神の怒りを買うとして強硬に受容を反対し（排仏派）、疫病の流行を理由に蘇我稲目が祀っていた仏像を難波の堀江に投げ捨てた。この対立は子の守屋と馬子の代に引き継がれ、丁未の乱による物部氏滅亡の遠因となった。", skill: { name: "排仏の強硬", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.9 } },
  { id: 423, name: "葛城襲津彦", power: 111, hp: 89, attribute: "STRATEGY", desc: "5世紀（古墳時代中期）の有力豪族。大王家と婚姻関係を結んで外戚として強大な権力を誇った葛城氏の祖とされる人物。『日本書紀』には、朝鮮半島へ度々出兵し、新羅を討って捕虜を連れ帰ったという伝承が記されている。彼をはじめとする葛城氏は、ヤマト政権の初期における軍事や外交の中核を担い、5世紀の大王権力の拡大を支えた。", skill: { name: "葛城の祖", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 424, name: "紀古佐美", power: 94, hp: 106, attribute: "STRATEGY", desc: "奈良時代後期から平安時代初期の貴族。桓武天皇の命により、征東大使として大規模な軍勢を率いて東北地方の蝦夷の平定に向かった。しかし、789年の巣伏の戦いにおいて、地の利を活かした阿弖流為ら蝦夷の軍勢の奇襲を受けて大敗を喫し、多くの兵を失って更綴された。この敗戦が、のちの坂上田村麻呂登用の契機となった。", skill: { name: "征東大使の苦戦", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.7 } },
  { id: 425, name: "藤原良房", power: 115, hp: 85, attribute: "STRATEGY", desc: "平安時代前期の公卿。藤原冬嗣の子。承和の変や応天門の変など数々の政変を利用して伴氏や橘氏などの他氏を排斥し、藤原北家の権力を確固たるものにした。娘の明子を文徳天皇の女御とし、その間に生まれた清和天皇を幼くして即位させ、皇族以外で初めての「摂政」に就任。以後数百年に及ぶ藤原氏の摂関政治の絶対的基礎を築いた。", skill: { name: "初の摂政", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 426, name: "藤原師輔", power: 108, hp: 92, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原忠平の子で右大臣を務めた。兄の実頼と権力を争いながら、娘の安子を村上天皇の中宮とし、冷泉天皇や円融天皇の外祖父となって天皇家との深い結びつきを構築した。彼の日記『九暦』は有職故実の宝庫であり、彼が定めた家訓『九条殿遺誡』は後世の藤原氏一族の行動規範として長く重んじられた。", skill: { name: "九条殿遺誡", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 427, name: "藤原道隆", power: 110, hp: 90, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原兼家の子で、道長の長兄。父の跡を継いで摂政・関白となり権勢を極めた。長女の定子を一条天皇の中宮とし、定子のサロンには清少納言らが集って華やかな宮廷文化（国風文化）が花開いた。しかし、疫病により若くして病没し、その死後、息子である伊周の失脚によって彼の一族（中関白家）は急速に没落した。", skill: { name: "中関白の栄華", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 428, name: "藤原道兼", power: 98, hp: 102, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原兼家の次男で、道隆の弟、道長の兄。花山天皇を欺いて出家退位させる（寛和の変）という陰謀を実行し、父・兼家の権力掌握に大いに貢献した。道隆の死後に念願の関白に就任したが、そのわずか数日後に疫病で急死してしまい「七日関白」と呼ばれた。このあっけない死が、弟・道長の栄華への道を開く結果となった。", skill: { name: "七日関白", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 429, name: "大江匡房", power: 113, hp: 87, attribute: "STRATEGY", desc: "平安時代後期の学者・公卿。菅原道真と並び称される当代随一の学者（大学頭）であり、後三条天皇や白河天皇の側近として延久の荘園整理令などの国政改革を理論面から深く補佐した。また兵法にも通じ、源義家に陣形を教授したという伝説も持つ。彼が著した『闘戦経』は日本の伝統的な兵学書として、のちの武士社会にも影響を与えた。", skill: { name: "大学頭の兵法", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 430, name: "源通親", power: 117, hp: 83, attribute: "STRATEGY", desc: "平安末期から鎌倉時代初期の公卿。土御門通親とも呼ばれる。源平の争乱から鎌倉幕府草創期という激動の時代において、後白河法皇や後鳥羽上皇の側近として巧みに立ち回り、朝廷の最高権力者へと上り詰めた。幕府との協調を図る九条兼実を建久七年の政変で失脚させ、自らの養女を天皇の后として権威を絶頂に高めた希代の策謀家。", skill: { name: "建久の政変", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 431, name: "藤原清衡", power: 112, hp: 88, attribute: "STRATEGY", desc: "平安時代後期の武将。奥州藤原氏の初代当主。前九年合戦・後三年合戦という凄惨な戦乱を生き抜き、源義家と結んで一族の覇権を確立した。平泉を根拠地とし、奥州で産出される豊かな砂金や馬を背景に京都の朝廷や摂関家に接近して独立した勢力を築き上げた。戦死者の霊を弔い、極楽浄土を現世に再現するために中尊寺を建立した。", skill: { name: "平泉の浄土", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 432, name: "大内義弘", power: 120, hp: 80, attribute: "STRATEGY", desc: "室町時代初期の守護大名。周防・長門など中国・北九州の6カ国を領する強大な勢力を誇り、勘合貿易の先駆けとなる朝鮮との独自貿易も行っていた。足利義満の南北朝合一にも大きく貢献したが、その強大すぎる力を義満に警戒され、1399年に挑発に乗る形で和泉国堺で挙兵（応永の乱）し、幕府軍の大軍に包囲されて討ち死にした。", skill: { name: "応永の乱", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 433, name: "本多正純", power: 112, hp: 88, attribute: "STRATEGY", desc: "江戸時代初期の老中。本多正信の子。父の知謀を受け継ぎ、大坂の陣や武家諸法度の制定など徳川家康・秀忠の初期の幕政を中枢で支え、幕藩体制の基礎を強固なものにした。しかし、その専横を恐れた秀忠や他の幕閣たちにより、宇都宮城に将軍暗殺のための「釣天井」を設けたという濡れ衣（宇都宮城釣天井事件）を着せられ改易・流罪となった。", skill: { name: "老中の暗躍", desc: "相手が【軍事】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.4, rate: 0.95 } },
  { id: 434, name: "大久保長安", power: 109, hp: 91, attribute: "STRATEGY", desc: "江戸時代初期の幕臣。もとは武田信玄に仕える猿楽師であったが、のちに徳川家康に見出された。検地や街道の整備で並外れた行政手腕を発揮し、特に佐渡金山や石見銀山などの鉱山開発を統括して幕府に莫大な富をもたらした。しかし彼の死後、その権勢を恐れた幕府により不正蓄財を理由に一族は処刑され、莫大な財産も没収された。", skill: { name: "鉱山の錬金術", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.6 } },
  { id: 435, name: "安藤信正", power: 114, hp: 86, attribute: "STRATEGY", desc: "幕末の老中。井伊直弼の暗殺後、老中首座の久世広周とともに幕政を主導した。失墜した幕府の権威を回復するため、朝廷との融和を図る「公武合体」政策を推進し、和宮（孝明天皇の妹）の14代将軍徳川家茂への降嫁を実現させた。しかし、この政策が尊攘派の激しい怒りを買い、1862年の坂下門外の変で襲撃されて負傷し、老中を辞任した。", skill: { name: "公武合体の策", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 436, name: "徳川家慶", power: 101, hp: 99, attribute: "STRATEGY", desc: "江戸幕府の第12代将軍。大御所として実権を握っていた父・家斉の死後、老中水野忠邦を重用して「天保の改革」を行わせ、奢侈の禁止や物価引き下げなどの幕政の引き締めを図った。しかし改革は失敗に終わり、晩年にはペリーの黒船来航という未曾有の国難に直面する中で病に倒れ、幕末の動乱の幕開けを見届けるように世を去った。", skill: { name: "天保の緊縮", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 437, name: "徳川家定", power: 85, hp: 115, attribute: "STRATEGY", desc: "江戸幕府の第13代将軍。黒船来航直後の混乱の中で将軍に就任したが、生来病弱であり政務を自ら執ることは困難であった。彼に継嗣がいなかったことが、一橋派（徳川慶喜推し）と南紀派（徳川慶福推し）による激しい「将軍継嗣問題」を引き起こした。大老に就任した井伊直弼によって慶福が後継に決定した直後、35歳で急死した。", skill: { name: "継嗣問題の波紋", desc: "相手が【政治】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.85 } },
  { id: 438, name: "伊達宗城", power: 116, hp: 84, attribute: "STRATEGY", desc: "幕末の宇和島藩主。「幕末の四賢侯」の一人。高野長英や村田蔵六（大村益次郎）などの優秀な人材を藩の身分にとらわれず積極的に登用し、西洋式の軍備導入や蒸気船の建造など富国強兵策を推進した。将軍継嗣問題では一橋派に属して安政の大獄で隠居させられるが、のちに四侯会議に参加して幕政の改革と公議政体の実現を目指した。", skill: { name: "四賢侯の開明", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 439, name: "島津久光", power: 126, hp: 74, attribute: "STRATEGY", desc: "幕末の薩摩藩の実力者。藩主・島津忠義の父として「国父」と呼ばれ、事実上の最高権力者として振る舞った。公武合体を目指して大軍を率いて上洛し、寺田屋事件で過激な尊攘派藩士を粛清して朝廷の信任を得た。江戸へ下って文久の改革を推進したが、帰国途中に生麦事件を引き起こし、これが薩英戦争へと発展して薩摩藩の倒幕への契機となった。", skill: { name: "国父の上洛", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 440, name: "横井小楠", power: 108, hp: 92, attribute: "STRATEGY", desc: "幕末の熊本藩出身の思想家。松平慶永（春嶽）に招かれて越前藩の政治顧問となり、藩政改革を指導。早くから開国と富国強兵、公議政体論（議会制度の導入）を主張し、幕府の文久の改革にも大きな影響を与えた。勝海舟や坂本龍馬らにも深い思想的影響を与えた、幕末きっての開明的な天才であったが、維新後に保守派の刺客によって暗殺された。", skill: { name: "公議政体の提唱", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 441, name: "橋本左内", power: 104, hp: 96, attribute: "STRATEGY", desc: "幕末の越前藩士。若くして緒方洪庵の適塾に学び、優れた蘭学の知識を持っていた。藩主・松平慶永に見出されて藩校明道館の学監となり、開国・貿易の推進と西洋技術の導入による富国強兵を訴えた。将軍継嗣問題において一橋慶喜の擁立に奔走したが、大老・井伊直弼による安政の大獄で捕らえられ、わずか26歳で無念の斬首となった。", skill: { name: "啓発の蘭学", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 442, name: "三条実美", power: 110, hp: 90, attribute: "STRATEGY", desc: "幕末から明治期の公卿。尊王攘夷派の公卿の中心人物として長州藩と結び朝廷を動かしたが、八月十八日の政変で失脚し長州へ逃れた（七卿落ち）。王政復古後に復帰し、明治新政府では右大臣や太政大臣という最高職を歴任。岩倉具視らとともに旧弊を打破し、廃藩置県などの中央集権化を円滑に進めるための朝廷の権威を担保する調整役を担った。", skill: { name: "太政大臣の威光", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 443, name: "佐野常民", power: 97, hp: 103, attribute: "STRATEGY", desc: "幕末から明治期の政治家。肥前藩出身。パリ万博の視察などを経て、明治政府で海軍創設や博覧会の開催に尽力した。西南戦争における激しい戦闘で多くの死傷者が出た悲惨な状況を目の当たりにし、敵味方の区別なく傷兵を救護するための「博愛社」（のちの日本赤十字社）を創設。日本の近代人道主義と医療救護活動の礎を築いた。", skill: { name: "博愛社の創設", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 444, name: "森有礼", power: 113, hp: 87, attribute: "STRATEGY", desc: "明治時代の政治家・外交官。薩摩藩出身。初代文部大臣として、帝国大学令や師範学校令などの「学校令」を公布し、国家のための有為な人材育成を目指す近代日本の教育制度（国家主義的教育）の骨格を完成させた。また、明六社の初代社長として啓蒙思想の普及にも努めたが、大日本帝国憲法発布の朝に、国粋主義者の青年に暗殺された。", skill: { name: "学校令の公布", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 445, name: "青木周蔵", power: 107, hp: 93, attribute: "STRATEGY", desc: "明治時代の外交官・政治家。長州藩出身。ドイツ留学で近代法学を学び、第1次山県・第1次松方内閣の外務大臣として条約改正交渉に専念した。イギリスとの新条約調印の目前まで迫ったが、1891年の大津事件（来日中のロシア皇太子襲撃）の責任をとって辞任。のちに再び外相となり、日英通商航海条約の締結に裏方として大きく貢献した。", skill: { name: "条約改正の執念", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 446, name: "高橋是清", power: 121, hp: 79, attribute: "STRATEGY", desc: "大正から昭和初期の政治家・大蔵大臣。「ダルマ宰相」と呼ばれた。日露戦争では日本銀行副総裁として外債募集に奔走し戦費を調達。昭和恐慌に際しては、犬養毅内閣の蔵相として金輸出再禁止と管理通貨制度への移行を即座に断行し、赤字国債の発行による積極財政で日本を世界恐慌からいち早く脱出させたが、二・二六事件で暗殺された。", skill: { name: "積極財政の決断", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 447, name: "加藤高明", power: 118, hp: 82, attribute: "STRATEGY", desc: "明治から大正期の外交官・政治家。三菱財閥の岩崎弥太郎の娘婿。外相として日英同盟を主導し、第一次世界大戦時には中国への「二十一カ条の要求」を強行した。のちに憲政会総裁として「護憲三派内閣」を組閣。1925年に普通選挙法を成立させて大正デモクラシーの頂点を築くとともに、社会主義運動を弾圧する治安維持法をも制定した。", skill: { name: "普選と治安維持", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 448, name: "浜口雄幸", power: 75, hp: 125, attribute: "STRATEGY", desc: "昭和初期の政治家。「ライオン宰相」の異名をとる。立憲民政党総裁として内閣を組織し、井上準之助蔵相とともに財政の緊縮と金解禁を断行したが、折からの世界恐慌と重なり深刻な昭和恐慌を招いた。外交では幣原喜重郎外相と協調外交を進め、軍部の激しい反対を押し切ってロンドン海軍軍縮条約を締結したが、東京駅で右翼青年に狙撃され落命した。", skill: { name: "ライオンの軍縮", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 449, name: "井上準之助", power: 85, hp: 115, attribute: "STRATEGY", desc: "昭和初期の財政家・政治家。日本銀行総裁を歴任後、浜口雄幸・第2次若槻礼次郎内閣の大蔵大臣を務めた。日本の国際経済への復帰を目指し、激しい痛みを伴うデフレ政策（財政緊縮・産業合理化）を推し進めて1930年に金解禁（金輸出解禁）を断行。しかし世界恐慌の直撃を受けて経済は混乱し、血盟団事件で一人一殺の標的となり暗殺された。", skill: { name: "金解禁の断行", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 450, name: "近衛文麿", power: 124, hp: 76, attribute: "STRATEGY", desc: "昭和期の政治家。五摂家の筆頭という名門の出身で、国民から絶大な人気と期待を集めて3度にわたり首相を務めた。日中戦争の勃発時には「国民政府を対手とせず」と声明して戦争を泥沼化させ、のちに新体制運動を推進して大政翼賛会を創設し、日独伊三国同盟を結んだ。対米戦争回避に動いたが失敗し、戦後にA級戦犯に指定され自決した。", skill: { name: "新体制の構築", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.6 } },
  { id: 451, name: "大伴家持", power: 85, hp: 115, attribute: "CULTURE", desc: "奈良時代の貴族・歌人。大伴旅人の子で、越中守などを歴任した。日本最古の和歌集である『万葉集』の編纂に最も深く関わり、彼自身の歌も全4500首のうち1割近くを占める最多の473首が収められている。政治闘争で一族が没落していく悲哀や、繊細な自然の風景を哀切に詠んだ歌が多く、万葉集の掉尾を飾る代表的歌人。", skill: { name: "万葉の編纂", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 452, name: "僧正遍昭", power: 92, hp: 108, attribute: "CULTURE", desc: "平安時代前期の僧侶・歌人。桓武天皇の孫にあたるが、仁明天皇の崩御を機に出家した。六歌仙・三十六歌仙の一人に数えられる。「天つ風 雲の通ひ路 吹きとぢよ 乙女の姿 しばしとどめむ」に代表される、宮廷の雅で理知的な情景を詠んだ歌が多く残る。花山にある元慶寺を建立するなど、仏教界でも高い地位を極めた。", skill: { name: "六歌仙の雅", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.7 } },
  { id: 453, name: "藤原道綱母", power: 78, hp: 122, attribute: "CULTURE", desc: "平安時代中期の女流作家。藤原兼家の妻のひとりであり、絶世の美女と謳われた。夫である兼家の奔放な女性関係に悩み、自らの結婚生活の苦悩や嫉妬、そして絶望を赤裸々に書き綴った『蜻蛉日記』を著した。この作品は、日本で最初の女性によるかな書きの日記文学であり、のちの『源氏物語』などの女流文学の発達に絶大な影響を与えた。", skill: { name: "蜻蛉の嘆き", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 454, name: "赤染衛門", power: 88, hp: 112, attribute: "CULTURE", desc: "平安時代中期の女流歌人。藤原道長の正妻である源倫子、のちにはその娘で一条天皇の中宮となった藤原彰子に仕えた。紫式部や和泉式部と並ぶ才女であり、穏やかで情愛に満ちた優れた和歌を数多く残した。また、藤原道長の栄華を賛美しつつ、摂関政治期の貴族社会の歴史を和文で記した歴史物語『栄花物語』の正編の作者と推定されている。", skill: { name: "栄花の記述", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 455, name: "源順", power: 95, hp: 105, attribute: "CULTURE", desc: "平安時代中期の学者・歌人。梨壺の五人の一人として『万葉集』の訓読と『後撰和歌集』の編纂にあたった。漢詩文に極めて優れる一方、日本最初の分類体による百科漢和辞書である『和名類聚抄（和名抄）』を編纂し、当時の日本語の語彙や万葉仮名の発音を知るための決定的な史料を残した。『竹取物語』の作者とする説もある。", skill: { name: "和名類聚抄", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.9 } },
  { id: 456, name: "藤原俊成", power: 103, hp: 97, attribute: "CULTURE", desc: "平安時代末期から鎌倉時代初期の公卿・歌人。藤原定家の父。後白河法皇の院宣を受けて『千載和歌集』を編纂した。保元・平治の乱などの戦乱の時代を生き抜く中で、和歌に「幽玄」という、言葉の奥に広がる余情や神秘的な美しさを重んじる理念をもたらした。彼が確立したこの美意識は、中世の文学や芸術全般の根幹的な精神となった。", skill: { name: "幽玄の提唱", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 457, name: "一遍", power: 112, hp: 88, attribute: "CULTURE", desc: "鎌倉時代中期の僧で、時宗の開祖（智真・遊行上人）。伊予国の豪族の出身。浄土教を学び、すべてを捨てて「南無阿弥陀仏」の札を配りながら全国を巡礼する遊行（賦算）を行った。極楽往生の喜びを表現するために鉦や太鼓を叩いて群衆とともに踊る「踊念仏」を広め、身分を問わず熱狂的な信者を集めて独自の民衆仏教を確立した。", skill: { name: "踊念仏の熱狂", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 458, name: "狩野探幽", power: 118, hp: 82, attribute: "CULTURE", desc: "江戸時代前期の絵師。狩野永徳の孫。徳川家康に見出されて江戸に下り、江戸幕府の御用絵師として鍛冶橋狩野家の祖となった。二条城や名古屋城、大徳寺方丈などの襖絵を手掛け、桃山時代の豪壮な画風から一転して、余白を大胆に生かした瀟洒で淡麗な新しい様式を確立し、江戸時代における狩野派の絶対的な指導力と権威を不動のものとした。", skill: { name: "余白の美学", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 459, name: "小林一茶", power: 84, hp: 116, attribute: "CULTURE", desc: "江戸時代後期の俳人。信濃国の農家に生まれ、継母との確執から江戸へ出て俳諧を学んだ。晩年に帰郷し、家庭的な不幸に見舞われながらも、「やせ蛙 まけるな一茶 これにあり」など、農民の生活に根ざした素朴で人間味あふれる独自の俳風を確立した。また、自らの生涯を日記風に綴った俳文集『おらが春』などの名著を残した。", skill: { name: "おらが春の情", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 460, name: "呉春", power: 97, hp: 103, attribute: "CULTURE", desc: "江戸時代後期の画家。もとの名は松村月溪。与謝蕪村に学んで南画（文人画）の技法を習得したのち、円山応挙の写生画に深く感銘を受けて弟子入りした。蕪村の詩情豊かな表現と、応挙の客観的で精密な写実性を見事に統合し、親しみやすい「四条派」という新たな一派を京都で創始して、近代の京都画壇に絶大な影響を残した。", skill: { name: "四条派の創始", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 461, name: "賀茂真淵", power: 110, hp: 90, attribute: "CULTURE", desc: "江戸時代中期の国学者。遠江国の神官の家に生まれ、荷田春満に師事したのち、田安宗武（吉宗の子）に仕えた。『万葉集』などの古代文学の語彙を厳密に研究（古言）し、そこから古代日本人の雄大で男性的・素朴な精神である「高く直き心（ますらをぶり）」を導き出した。本居宣長を指導し、国学が思想として確立する大きな基礎を築いた。", skill: { name: "ますらをぶり", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 462, name: "前野良沢", power: 79, hp: 121, attribute: "CULTURE", desc: "江戸時代中期の蘭方医・蘭学者。豊前中津藩医。長崎に遊学してオランダ語を学び、杉田玄白や中川淳庵らとともに、刑死者の解剖に立ち会って『ターヘル・アナトミア』の正確さに驚嘆した。辞書すらない中で、類まれな語学力を駆使して翻訳作業の中心的な役割を担い、『解体新書』の完成に最大の貢献をしたが、自身の名の掲載は辞退した。", skill: { name: "翻訳の執念", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.88 } },
  { id: 463, name: "尾崎紅葉", power: 109, hp: 91, attribute: "CULTURE", desc: "明治時代の小説家。山田美妙らと文学結社「硯友社」を創立し、同人雑誌『我楽多文庫』を発刊して文学の大衆化を図った。井原西鶴の写実的な手法を近代小説に取り入れ、華麗な文体による『多情多恨』や、未完の大作である『金色夜叉』を著して読者の圧倒的な支持を集め、幸田露伴とともに明治中期の文壇を支配する「紅露時代」を築いた。", skill: { name: "金色夜叉の情念", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 464, name: "幸田露伴", power: 116, hp: 84, attribute: "CULTURE", desc: "明治から昭和期の小説家・随筆家。尾崎紅葉とともに「紅露時代」と呼ばれる一時代を築いた。東洋的な道徳観や仏教的な理想主義を背景に、己の信念を不屈の精神で貫き通す職人や芸術家の姿を描いた『五重塔』や『風流仏』などの名作を発表した。深い古典の素養に基づいた格調高い擬古典主義的な文体は、近代文学に独自の輝きを放った。", skill: { name: "五重塔の不屈", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 465, name: "与謝野鉄幹", power: 96, hp: 104, attribute: "CULTURE", desc: "明治から昭和期の詩人・歌人。本名は寛。東京新詩社を創設して雑誌『明星』を創刊し、旧態依然とした和歌を否定して、個人の感情や自我を大胆に表現する「浪漫主義」の和歌運動を強力に牽引した。のちに妻となる与謝野晶子をはじめ、北原白秋や石川啄木など、近代短歌・現代詩を担う多くの優れた若手歌人を育成し文壇に送り出した。", skill: { name: "明星の浪漫", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 466, name: "高浜虚子", power: 105, hp: 95, attribute: "CULTURE", desc: "明治から昭和期の俳人・小説家。正岡子規に師事し、子規の死後は俳句雑誌『ホトトギス』を引き継いで主宰した。河東碧梧桐らの新傾向俳句に対抗し、花鳥風月を客観的に詠む「客観写生」や、五七五と季語を厳格に守る「有季定型」という伝統的な俳句の理念を力強く主張して俳壇を統一し、現代にまで続く俳句の基本形を確立した巨人。", skill: { name: "客観写生の眼", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 467, name: "志賀直哉", power: 126, hp: 74, attribute: "CULTURE", desc: "大正から昭和期の小説家。武者小路実篤らと雑誌『白樺』を創刊した白樺派の代表的作家。極めて簡潔で無駄のない冷徹な文体（写実的手法）で、強靭な自我や倫理観を描き出し「小説の神様」と称賛された。『城の崎にて』『和解』などの短編のほか、自身の父との深い葛藤と和解を描いた唯一の長編小説である名作『暗夜行路』を残した。", skill: { name: "暗夜行路の光", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.95 } },
  { id: 468, name: "武者小路実篤", power: 114, hp: 86, attribute: "CULTURE", desc: "大正から昭和期の小説家・劇作家。志賀直哉らと雑誌『白樺』を創刊し、白樺派の思想的な中核を担った。強烈な自我の肯定と人道主義、理想主義を掲げ、『お目出たき人』や『友情』などの作品を発表。自らの理想とする階級闘争のない平等な社会を実現するため、宮崎県（のちに埼玉県）に共同体である「新しき村」を建設して実践活動も行った。", skill: { name: "新しき村の理想", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 469, name: "有島武郎", power: 108, hp: 92, attribute: "CULTURE", desc: "大正期の小説家。白樺派の代表的作家の一人。学習院を経てアメリカに留学し、キリスト教や社会主義思想に深く触れた。帰国後、本能のままに生きようとして破滅する自立した近代女性を描いた『或る女』や、北海道の苛酷な小作農を描いた『カインの末裔』を発表。自己の出自（有産階級）と社会主義的理想との深い矛盾に苦悩し、軽井沢で情死した。", skill: { name: "或る女の苦悩", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.5 } },
  { id: 470, name: "中山晋平", power: 93, hp: 107, attribute: "CULTURE", desc: "大正から昭和期の作曲家。島村抱月らに才能を見出され、松井須磨子が歌って大流行した「カチューシャの唄」を作曲し、日本の大衆歌謡の歴史を切り開いた。また、野口雨情らとともに『赤い鳥』運動などの児童文化運動に共鳴し、「シャボン玉」や「証城寺の狸囃子」など、現在でも広く歌い継がれる数多くの国民的な童謡や新民謡を生み出した。", skill: { name: "大衆歌謡の調べ", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 471, name: "フェノロサ", power: 72, hp: 128, attribute: "CULTURE", desc: "明治時代に来日したアメリカの哲学者・美術史家。東京大学でお雇い外国人として哲学や政治学を講義する傍ら、欧化主義の波で破壊・軽視されていた日本古来の伝統美術の芸術的価値を高く再評価した。岡倉天心とともに古社寺の文化財調査を行い、東京美術学校の設立に尽力するなど、日本美術の保護と復興に決定的な役割を果たした恩人。", skill: { name: "伝統美術の再評価", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.94 } },
  { id: 472, name: "高橋由一", power: 101, hp: 99, attribute: "CULTURE", desc: "明治時代の洋画家。川上冬崖やイギリス人のワーグマンに師事して本格的な油絵の技法を習得した、日本における近代洋画の開拓者。代表作である『鮭』や『花魁』では、徹底した写実主義によって対象の質感を克明に描き出し、当時の日本人に西洋画の持つ写実性の驚きと魅力を伝えた。また、画塾「天絵楼」を開いて後進の育成にも努めた。", skill: { name: "写実の油絵", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 473, name: "志賀潔", power: 112, hp: 88, attribute: "CULTURE", desc: "明治から昭和期の細菌学者。伝染病研究所に入り、北里柴三郎の熱心な指導を受けて細菌学を研究した。1897年、当時日本で猛威を振るい多くの死者を出していた伝染病の原因である赤痢菌を世界で初めて発見するという偉業を成し遂げた。この功績により国際的な名声を獲得し、のちに京城帝国大学総長などを歴任して医学の発展に貢献した。", skill: { name: "赤痢菌の発見", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 474, name: "鈴木梅太郎", power: 107, hp: 93, attribute: "CULTURE", desc: "明治から昭和期の農芸化学者。東京帝国大学教授。米ぬかの成分を研究し、1910年に脚気の原因が特定の栄養素の欠乏にあることを突き止め、抗脚気有効成分である「オリザニン（のちのビタミンB1）」の抽出に世界で初めて成功した。ビタミン学の基礎を築いた世界的発見であったが、当時は国内の医学界から十分な理解を得られなかった。", skill: { name: "オリザニンの抽出", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 475, name: "菱田春草", power: 119, hp: 81, attribute: "CULTURE", desc: "明治時代の日本画家。東京美術学校に学び、岡倉天心や橋本雅邦の指導を受けた。天心が野に下ると日本美術院の創設に参加し、横山大観とともに輪郭線を用いずに色彩の濃淡だけで空気や光を表現する「朦朧体」という斬新な画法を試み、伝統的な日本画の革新に挑んだ。代表作に『落葉』や『黒き猫』があるが、36歳の若さで眼病と腎炎のため夭折した。", skill: { name: "朦朧体の革新", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 476, name: "青木繁", power: 125, hp: 75, attribute: "CULTURE", desc: "明治時代の洋画家。東京美術学校で黒田清輝に学んだが、外光派の明るい画風とは異なり、日本神話や古代の伝説に深い着想を得た、神秘的で生命力あふれる独自のロマン主義的な画風を築き上げた。代表作『海の幸』では、大魚を担いで浜を歩く裸の漁師たちの群像を力強く描き、日本近代洋画史上に不滅の足跡を残したが、28歳で放浪の末に病死した。", skill: { name: "海の幸の生命力", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 477, name: "長岡半太郎", power: 130, hp: 70, attribute: "CULTURE", desc: "明治から昭和期の物理学者。東京帝国大学教授。ドイツ留学などを経て、1903年に土星の環のような構造を持つ「原子模型」の理論を世界に先駆けて提唱し、量子物理学の発展に極めて重要な示唆を与えた。また、初代大阪帝国大学総長や初代日本学士院院長を務めるなど、日本の近代物理学の基礎を確立し、多くの優秀な後進の学者を育て上げた。", skill: { name: "原子模型の提唱", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 478, name: "西田幾多郎", power: 127, hp: 73, attribute: "CULTURE", desc: "大正から昭和期の哲学者。京都帝国大学教授。西洋の観念論哲学（カントやヘーゲル）を深く研究しつつ、禅などの東洋的な「無」の思想を加味して、主観と客観が未分化な直接経験の状態を説く「純粋経験」の概念を提唱した。1911年に出版された主著『善の研究』において、日本で初めての独創的で体系的な哲学（西田哲学）を打ち立てた巨人。", skill: { name: "純粋経験の境地", desc: "相手が【軍事】属性なら敵の歴史力を50%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.5, rate: 1 } },
  { id: 479, name: "河上肇", power: 115, hp: 85, attribute: "CULTURE", desc: "大正から昭和期のマルクス主義経済学者。京都帝国大学教授時代に新聞に連載した『貧乏物語』がベストセラーとなり、貧困の解消には資本主義制度の根本的な変革が必要であると説いて、当時の青年や知識層に絶大な影響を与えた。のちに大学を辞して非合法下の日本共産党に入党し、投獄されるなど、学問的信念と実践を貫いた生涯を送った。", skill: { name: "貧乏物語の啓蒙", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 480, name: "柳宗悦", power: 105, hp: 95, attribute: "CULTURE", desc: "大正から昭和期の美術評論家・思想家。白樺派の同人として活動する中で、無名の職人たちが実用のためにつくった日用の雑器（陶磁器や染織物など）の中にこそ、作為のない健康で真の美しさが宿っているという「用の美」を提唱した。「民芸（民衆的工芸）」という新しい言葉を創り出し、日本各地を歩いて民芸運動を主導し、日本民藝館を設立した。", skill: { name: "用の美の発見", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 481, name: "源義平", power: 139, hp: 61, attribute: "VALOR", desc: "平安時代末期の武将。源義朝の長男。「悪源太」の異名をとる勇猛な武将で、弱冠15歳にして叔父の源義賢を大蔵合戦で討ち取った。平治の乱では父とともに奮戦し、平重盛の軍勢を京都の待賢門で何度も退けるという凄まじい武威を見せたが、敗走後に捕らえられ、六条河原で斬首される際にも最期まで剛胆な態度を貫いた。", skill: { name: "悪源太の武威", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 482, name: "平維盛", power: 114, hp: 86, attribute: "VALOR", desc: "平安時代末期の武将。平重盛の嫡男。容姿端麗で宮廷行事では光源氏の再来と絶賛された貴公子。武将としては、富士川の戦いで水鳥の羽音を源氏の夜襲と勘違いして大敗を喫し、倶利伽羅峠の戦いでも源義仲の火牛の計によって壊滅的な打撃を受けた。一門の没落に絶望し、屋島の陣を抜け出して那智の海に身を投げた。", skill: { name: "貴公子の悲哀", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 483, name: "結城宗広", power: 129, hp: 71, attribute: "VALOR", desc: "鎌倉末期から南北朝時代の武将。白河結城氏の当主。後醍醐天皇の倒幕の呼びかけに応じて挙兵し、新田義貞の鎌倉攻めに加わって幕府滅亡に貢献。建武政権下で陸奥将軍府の要職に就き、北畠顕家とともに足利尊氏を追って西上し、京都奪還などで大活躍した南朝の猛将。しかし再度の西上途中に伊勢沖で難破し病没した。", skill: { name: "白河の猛将", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 484, name: "脇屋義助", power: 126, hp: 74, attribute: "VALOR", desc: "南北朝時代の武将。新田義貞の弟。兄とともに後醍醐天皇の綸旨を受けて挙兵し、鎌倉幕府の滅亡に大きく貢献した。建武政権崩壊後も南朝方の主力として足利軍と各地で激戦を繰り広げ、兄の戦死後も新田一族を率いて北陸や四国で頑強な抵抗を続けた。四国伊予国へ渡って再起を期したが、その地で急死を遂げた。", skill: { name: "新田の同胞", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 485, name: "大内義興", power: 121, hp: 79, attribute: "VALOR", desc: "戦国時代の中国地方の戦国大名。周防など7カ国を領する大内氏の全盛期を築く。追放された10代将軍足利義尹（義稙）を保護し、大軍を率いて上洛して細川政元らを破り、将軍を復職させて自らは管領代として幕政の実権を握った。また、日明貿易（勘合貿易）を独占し、京都の文化を山口に持ち込んで西国一の繁栄をもたらした。", skill: { name: "管領代の上洛", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 486, name: "陶晴賢", power: 133, hp: 67, attribute: "VALOR", desc: "戦国時代の武将。大内氏の重臣。もとの名は隆房。文治派の相良武任を重用して武備を怠る主君・大内義隆に対してクーデターを起こし、義隆を自刃させて大内氏の実権を掌握した（大寧寺の変）。その後、安芸で台頭してきた毛利元就を討伐するために大軍を率いたが、厳島の戦いで元就の奇襲に敗れ、自刃した。", skill: { name: "西国一の侍大将", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 487, name: "尼子晴久", power: 118, hp: 82, attribute: "VALOR", desc: "戦国時代の山陰地方の戦国大名。尼子経久の孫。大内氏や毛利氏と激しく対立し、出雲・伯耆など山陰・山陽の広大な地域を支配して尼子氏の最盛期を築き上げた。大内義隆の出雲侵攻を月山富田城で撃退し、一時は中国地方最大の版図を誇ったが、毛利元就の台頭に直面するなかで陣没し、その後尼子氏は急速に衰退した。", skill: { name: "山陰の覇者", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 488, name: "武田信繁", power: 124, hp: 76, attribute: "VALOR", desc: "戦国時代の武将。武田信玄の同母弟。武田軍の副将として兄をよく補佐し、家臣団からの人望も極めて厚かった。『武田信繁家訓』を残し、武士としての道徳や規律を示した。第四次川中島の戦いで、上杉謙信の猛攻を受ける兄の本陣を守るために身代わりとなって最前線に立ち、壮絶な討死を遂げた「真の副将」。", skill: { name: "真の副将", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 489, name: "島津豊久", power: 136, hp: 64, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。島津家久の嫡男。沖田畷の戦いで初陣を飾り、のちの九州征伐や小田原攻め、朝鮮出兵でも武功を挙げた。関ヶ原の戦いにおいて伯父の島津義弘とともに西軍で奮戦し、退路を断たれた島津軍が敵中突破を図る「島津の退き口」の際、殿（しんがり）を務めて徳川の追撃を一身に浴びて討死した。", skill: { name: "捨奸の覚悟", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 490, name: "高橋紹運", power: 138, hp: 62, attribute: "VALOR", desc: "戦国時代の武将。大友氏の重臣。立花道雪とともに「大友の双璧」と称された猛将。島津氏の5万の大軍が筑前岩屋城に迫った際、わずか700余りの兵で徹底抗戦を繰り広げた。半月におよぶ壮絶な防衛戦の末に城兵全員とともに玉砕したが、この戦いが島津軍の消耗を招き、豊臣秀吉の九州平定軍到着までの時間を稼いだ。", skill: { name: "岩屋城の玉砕", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.5 } },
  { id: 491, name: "後藤基次", power: 132, hp: 68, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。通称は又兵衛。黒田孝高（官兵衛）に仕え、朝鮮出兵などで「黒田二十四騎」に数えられる武功を挙げた。しかし黒田長政と対立して出奔し、大坂冬の陣で豊臣方に招かれて入城。大坂夏の陣の道明寺の戦いでは、真田信繁らの到着を待たずに徳川方の大軍に単独で突撃し、壮絶に討ち死にした。", skill: { name: "又兵衛の突撃", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 492, name: "木村重成", power: 127, hp: 73, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。豊臣秀頼の乳母の子で、秀頼の側近として育つ。容姿端麗な若武者であり、大坂冬の陣における今福の戦いで徳川軍を相手に華々しい初陣を飾った。夏の陣にあたっては兜に香を焚き込めて死の覚悟を決め、八尾・若江の戦いで井伊直孝らの軍勢と激闘の末に立派な戦死を遂げた。", skill: { name: "決死の香", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 493, name: "真田信之", power: 116, hp: 84, attribute: "VALOR", desc: "戦国時代から江戸時代前期の武将。真田昌幸の長男で、信繁（幸村）の兄。本多忠勝の娘を正室に迎え、関ヶ原の戦いでは父や弟と袂を分かち徳川家康の東軍に味方した。戦後、父弟の助命を嘆願し、真田家の存続に心血を注いだ。その冷静で堅実な手腕により松代藩10万石の基礎を築き、幕府からも絶大な信頼を得た名君。", skill: { name: "真田家存続の才", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 494, name: "片倉景綱", power: 111, hp: 89, attribute: "VALOR", desc: "戦国時代から江戸時代初期の武将。通称は小十郎。伊達政宗の幼少期から近習として仕え、政宗の「右目」として軍事・外交の両面で卓越した手腕を発揮した。小田原攻めへの参陣を渋る政宗を説得して豊臣秀吉に服属させ、伊達家の危機を幾度も救った。秀吉からもその才を愛され直臣に誘われたが、生涯政宗に忠義を尽くした。", skill: { name: "独眼竜の右目", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.95 } },
  { id: 495, name: "伊達輝宗", power: 122, hp: 78, attribute: "VALOR", desc: "戦国時代の武将。伊達政宗の父。周辺諸国との外交と抗争を通じて伊達氏の勢力を拡大し、南奥州における伊達氏の最盛期の基礎を築いた。有能な嫡男の政宗に若くして家督を譲って隠居したが、政宗の苛烈な勢力拡大に危機感を抱いた二本松義継によって拉致され、政宗の軍勢による銃撃の巻き添えとなって非業の死を遂げた。", skill: { name: "奥州の調停者", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 496, name: "斎藤義龍", power: 130, hp: 70, attribute: "VALOR", desc: "戦国時代の武将。美濃国の戦国大名。斎藤道三の長男であったが、父との不和から家臣の支持を集めてクーデターを起こし、1556年の長良川の戦いで道三を討ち取って家督を奪った。その後、尾張の織田信長の侵攻を度々撃退し、独自の領国支配体制を固めて美濃の独立を維持したが、若くして病死した。", skill: { name: "長良川の反逆", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 497, name: "鳥居元忠", power: 135, hp: 65, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。徳川家康の幼少期（人質時代）からの側近で、忠義に厚い三河武士の典型。関ヶ原の戦いの前哨戦において、家康の命によりわずかな兵で伏見城の守備を任され、石田三成ら西軍の大軍を相手に半月以上も籠城戦を繰り広げた。落城時に討死したが、東軍勝利のための貴重な時間を稼いだ。", skill: { name: "伏見城の忠死", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 498, name: "服部正成", power: 125, hp: 75, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。通称は半蔵。「鬼の半蔵」と恐れられた徳川家康の重臣。伊賀出身の国人を父に持ち、伊賀・甲賀の忍びや地侍を配下として統率した。本能寺の変の際、堺にいた家康を無事に三河へ逃がすため、一揆の頻発する伊賀の山中を踏破する「伊賀越え」の護衛を成功させた最大の功労者。", skill: { name: "神君伊賀越え", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 499, name: "浅井久政", power: 108, hp: 92, attribute: "VALOR", desc: "戦国時代の武将。北近江の戦国大名。浅井長政の父。六角氏の圧力に屈して従属的な外交路線をとったため、家臣の不満を招いてクーデターを起こされ、嫡男の長政に家督を譲らされて隠居した。しかし織田信長が越前の朝倉義景を攻めた際、古くからの朝倉氏との同盟を重んじて長政に信長離反を強く主張し、小谷城で自刃した。", skill: { name: "朝倉との旧誼", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 500, name: "足利義輝", power: 142, hp: 58, attribute: "VALOR", desc: "室町幕府の第13代将軍。塚原卜伝や上泉信綱に学んだ「剣豪将軍」として名高い。細川氏や三好氏の専横を逃れて諸国を流浪したが、幕府権力の回復を目指して大名間の争いの調停を精力的に行った。しかし、その自立的な動きを警戒した松永久秀や三好三人衆によって二条御所を襲撃され、自ら名刀を振るって奮戦した末に暗殺された。", skill: { name: "剣豪将軍の奮戦", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 501, name: "細川忠興", power: 118, hp: 82, attribute: "VALOR", desc: "戦国時代から江戸時代前期の武将。正室は明智光秀の娘である細川ガラシャ。関ヶ原の戦いでは東軍につき、豊前国小倉藩39万石の藩主となった。武勇に優れるだけでなく、千利休の高弟「利休七哲」の一人に数えられるほど茶の湯に通じ、和歌や能にも造詣が深いという、戦国時代を代表する文武両道の教養人。", skill: { name: "利休七哲の教養", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 502, name: "伊東一刀斎", power: 145, hp: 55, attribute: "VALOR", desc: "戦国時代から江戸時代初期の剣豪。「一刀流」の開祖。伊豆国の出身とされ、鐘捲自斎に学んで剣の奥義を極めた。諸国を巡って三十三回の真剣勝負を行い、一度も敗れなかったと伝わる。瓶割刀の伝説など数々の武勇伝を残し、彼の弟子の小野忠明が徳川将軍家の兵法指南役となったことで、一刀流は絶大な影響力を持った。", skill: { name: "一刀流の極意", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.4 } },
  { id: 503, name: "塚原卜伝", power: 143, hp: 57, attribute: "VALOR", desc: "戦国時代の剣豪。常陸国鹿島出身で「鹿島新当流」の開祖。生涯に数多くの真剣勝負や合戦に臨みながら、一度も負傷しなかったと伝えられる。足利義輝や北畠具教など数々の有力な大名や武将に剣術を指南し、戦わずして勝つ「無手勝流」の逸話でも知られる、戦国時代を代表する伝説的な兵法家。", skill: { name: "無手勝流", desc: "受ける被ダメージを45%軽減する", type: "damage_cut", value: 0.45, rate: 0.6 } },
  { id: 504, name: "丸目長恵", power: 139, hp: 61, attribute: "VALOR", desc: "戦国時代から江戸時代初期の剣豪。「タイ捨流」の開祖。相良氏に仕えたのち上京し、新陰流の上泉信綱の高弟となって免許皆伝を受けた。西国一の剣術家として名声を轟かせ、島津氏などの九州の武将たちに兵法を指南した。のちに相良氏に帰参して隠居し、開墾や農政にも尽力した文武両道の武人。", skill: { name: "タイ捨流の剣", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
