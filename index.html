  { id: 505, name: "河井継之助", power: 127, hp: 73, attribute: "VALOR", desc: "幕末の越後国長岡藩の家老。藩政改革を断行して財政を再建し、ガトリング砲など最新兵器を導入して軍の近代化を強力に進めた。戊辰戦争では、新政府軍と旧幕府軍の間の武装中立を目指したが、新政府軍との小千谷談判が決裂したため抗戦を決意。北越戦争において長岡城を奪還するなど新政府軍を大いに苦しめたが、戦傷により命を落とした。", skill: { name: "ガトリング砲", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 506, name: "伊東甲子太郎", power: 120, hp: 80, attribute: "VALOR", desc: "幕末の志士。新選組の参謀。学問に優れ、北辰一刀流の剣客でもあった。近藤勇に請われて新選組に加わり重きをなしたが、尊王攘夷の思想を強く抱いていたため、佐幕派の近藤らと路線が対立。孝明天皇の御陵衛士を拝命して新選組から分離独立したが、新選組の警戒を招き、油小路事件で暗殺された。", skill: { name: "御陵衛士の分離", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 507, name: "山南敬助", power: 115, hp: 85, attribute: "VALOR", desc: "幕末の武士。新選組の総長。北辰一刀流の剣客で、近藤勇や土方歳三とともに試衛館時代からの古参幹部。温厚で教養豊かな人柄から隊士の信望を集め、屯所の移転問題や隊規をめぐって度々土方と意見を対立させた。のちに新選組を脱走するが捕らえられ、厳格な局中法度に従い、沖田総司の介錯で切腹した悲劇の幹部。", skill: { name: "総長の温情", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 508, name: "立見尚文", power: 132, hp: 68, attribute: "VALOR", desc: "幕末から明治期の軍人。旧桑名藩士として戊辰戦争を戦い、新政府軍を度々撃破した猛将。維新後に赦免され、裁判官を経て陸軍将校に転じた。西南戦争や日清戦争で武功を挙げ、日露戦争では黒溝台会戦において第8師団長としてロシア軍の大軍を破るという決定的な働きを見せ、旧幕臣ながら陸軍大将にまで上り詰めた。", skill: { name: "不敗の戦術", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 509, name: "野津道貫", power: 129, hp: 71, attribute: "VALOR", desc: "明治時代の陸軍大将・元帥。薩摩藩出身。戊辰戦争から西南戦争にかけて実戦指揮官として活躍し、日本陸軍の基礎を築いた。日清戦争では第1軍司令官として平壌の戦いを制し、日露戦争では第4軍司令官として沙河会戦や奉天会戦で日本軍の中央突破を担う猛烈な攻撃を指揮し、「猛将」として名を轟かせた。", skill: { name: "中央突破の猛進", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 510, name: "井上成美", power: 113, hp: 87, attribute: "VALOR", desc: "昭和期の海軍大将。海軍省軍務局長時代に、米内光政や山本五十六とともに日独伊三国同盟の締結に最後まで強硬に反対したことで知られる。太平洋戦争中は第四艦隊司令長官や海軍兵学校長などを歴任。大戦末期には海軍次官として終戦工作に奔走し、日本海軍における「最後の海軍大将」として理性的かつ冷徹な判断を貫いた。", skill: { name: "海軍の理性", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 511, name: "橘奈良麻呂", power: 104, hp: 96, attribute: "STRATEGY", desc: "奈良時代中期の貴族。左大臣であった橘諸兄の子。父の引退後、光明皇太后の威光を背景に台頭した藤原仲麻呂によって政治の表舞台から排除された。これに強い不満を抱き、757（天平宝字元）年に大伴氏や佐伯氏ら反仲麻呂派の貴族を結集して仲麻呂の暗殺と孝謙天皇の廃立を企てたが、事前に密告されて捕らえられ獄死した。", skill: { name: "反仲麻呂の密謀", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 512, name: "藤原薬子", power: 107, hp: 93, attribute: "STRATEGY", desc: "平安時代初期の女官。藤原式家の出身で、藤原仲成の妹。平城天皇の寵愛を一身に受け、尚侍（ないしのかみ）として宮中で絶大な権力を握った。嵯峨天皇の即位後、平城太上天皇に平安京から平城京への遷都や復位をそそのかし、二所朝廷の対立を引き起こした。しかし嵯峨天皇側の迅速な武力制圧（薬子の変）により失敗し、服毒自殺した。", skill: { name: "二所朝廷の混乱", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 513, name: "早良親王", power: 98, hp: 102, attribute: "STRATEGY", desc: "奈良時代後期の皇族。光仁天皇の皇子で桓武天皇の同母弟。皇太子に立てられていたが、785年に長岡京造営の責任者であった藤原種継の暗殺事件に関与した疑いをかけられて廃太子となり、淡路国への配流途中に憤死した。その後、桓武天皇の近親者の相次ぐ死や都の疫病などが彼の怨霊のたたりと恐れられ、崇道天皇の号を追贈された。", skill: { name: "崇道天皇の怨霊", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 514, name: "藤原実頼", power: 111, hp: 89, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原忠平の長男。村上天皇の親政（天暦の治）を左大臣として補佐し、有職故実を重んじて「小野宮殿」と呼ばれた。冷泉天皇の即位に伴い関白に就任し、安和の変の事後処理にあたって源高明を左遷。さらに円融天皇の摂政となり、摂関政治が一時的なものではなく常置の制度として定着する流れを作った。", skill: { name: "小野宮の故実", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 515, name: "藤原隆家", power: 122, hp: 78, attribute: "STRATEGY", desc: "平安時代中期の公卿。藤原道隆の次男で、中宮定子や伊周の弟。長徳の変で花山法皇に矢を射かけて大宰府へ左遷され、中関白家没落の要因を作った。のちに許され、大宰権帥として赴任していた1019年に、大陸から女真族が九州を襲撃した「刀伊の入寇」が発生。現地の武士たちを的確に指揮してこれを撃退する大功を立てた。", skill: { name: "刀伊の撃退", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.85 } },
  { id: 519, name: "平時忠", power: 113, hp: 87, attribute: "STRATEGY", desc: "平安時代末期の公卿。平清盛の正室・平時子の弟。清盛の義弟として平氏政権の政治的謀略を支え、後白河法皇の近臣としても暗躍した。「平家にあらずんば人にあらず」と豪語したとされるほど一門の権勢を誇示。源平合戦の敗北後は捕虜となり、能登国へ流罪となったが、平氏の全盛期から滅亡までを見届けた辣腕の政治家。", skill: { name: "平家の驕り", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 520, name: "北条貞時", power: 115, hp: 85, attribute: "STRATEGY", desc: "鎌倉幕府の第9代執権。北条時宗の子。1285年の霜月騒動で安達泰盛を滅ぼしたのち、1293年には平禅門の乱で専横を極めた内管領の平頼綱をも討伐し、北条得宗家による絶対的な独裁体制（得宗専制政治）を確立した。また、元寇後の御家人の窮乏を救うため、1297年に幕府として最初の徳政令である「永仁の徳政令」を発布した。", skill: { name: "永仁の徳政令", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 521, name: "北条高時", power: 94, hp: 106, attribute: "STRATEGY", desc: "鎌倉幕府の第14代（最後）の執権。政治の実権は内管領の長崎高資ら得宗被官に握られ、自身は闘犬や田楽などの遊興に耽溺したとされる。後醍醐天皇による二度の倒幕運動（正中の変・元弘の乱）に対して鎮圧軍を派遣したが、足利尊氏や新田義貞の離反を招いて幕府軍は崩壊。新田軍に鎌倉を攻め込まれ、東勝寺で一族とともに自刃して鎌倉幕府は滅亡した。", skill: { name: "闘犬の執権", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 522, name: "足利基氏", power: 112, hp: 88, attribute: "STRATEGY", desc: "室町時代初期の武将。足利尊氏の次男。父の命により初代の鎌倉公方（関東公方）に就任し、関東8カ国と伊豆・甲斐の統治を任された。武蔵野合戦などで南朝方と戦い、上杉憲顕を関東管領に任じて鎌倉府の行政機構を整備。以後、彼の子孫が代々鎌倉公方を世襲し、関東において幕府から半ば独立した強い権力を持つ基礎を築いた。", skill: { name: "初代鎌倉公方", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.7 } },
  { id: 523, name: "足利持氏", power: 108, hp: 92, attribute: "STRATEGY", desc: "室町時代中期の第4代鎌倉公方。上杉禅秀の乱を鎮圧して関東での勢力を拡大したが、将軍職への野心を強めて6代将軍足利義教と激しく対立した。関東管領の上杉憲実の諫言も聞かずに幕府に反抗したため、1438年に義教の命を受けた幕府軍と憲実によって討伐され（永享の乱）、鎌倉の永安寺で自害に追い込まれた。", skill: { name: "永享の野心", desc: "相手が【軍事】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.88 } },
  { id: 524, name: "足利成氏", power: 110, hp: 90, attribute: "STRATEGY", desc: "室町時代後期の第5代鎌倉公方。持氏の子。永享の乱後に幕府から許されて公方となったが、父を死に追いやった関東管領上杉氏に深い恨みを抱き、1454年に上杉憲忠を謀殺した（享徳の乱）。これにより幕府軍から追討を受けて鎌倉を追われ、下総の古河に逃れて初代「古河公方」となり、関東地方を約30年に及ぶ大乱の時代へと引きずり込んだ。", skill: { name: "古河公方の意地", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 525, name: "上杉憲実", power: 120, hp: 80, attribute: "STRATEGY", desc: "室町時代中期の武将。関東管領として鎌倉公方の足利持氏を補佐したが、幕府に反抗的な持氏を再三諫め、ついには対立して将軍足利義教と結び、永享の乱で持氏を自害させた。学問を重んじる文化人でもあり、荒廃していた下野国の足利学校に多くの古典籍を寄進して再興し、のちに「坂東の大学」と呼ばれる全国的な学問の拠点へと育て上げた。", skill: { name: "足利学校の再興", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.8 } },
  { id: 526, name: "日野富子", power: 87, hp: 113, attribute: "STRATEGY", desc: "室町幕府の第8代将軍・足利義政の正室。実子の義尚が生まれると、夫が次期将軍に約束していた足利義視を差し置いて義尚を将軍に就けるため山名宗全に接近し、これが応仁の乱の大きな原因となった。戦乱の最中には東西両軍の諸大名に高利で金を貸し付け、関所を設けて関銭を徴収するなどして莫大な富を築き、幕政に絶大な影響力を及ぼした。", skill: { name: "蓄財の女傑", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 527, name: "北畠親房", power: 126, hp: 74, attribute: "STRATEGY", desc: "南北朝時代の公卿・武将。後醍醐天皇の絶対的な信任を受け、子の顕家とともに陸奥将軍府を支えた。南朝の指導者として、吉野から伊勢、関東へと渡って南朝勢力の結集に奔走。常陸国の小田城に籠城中、三種の神器を所有する南朝こそが正統な天皇であるとする歴史書『神皇正統記』を執筆し、南朝の理論的・精神的な大黒柱となった。", skill: { name: "神皇正統記", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.95 } },
  { id: 528, name: "細川高国", power: 109, hp: 91, attribute: "STRATEGY", desc: "戦国時代初期の武将。室町幕府の管領。大内義興と結んで足利義稙を将軍に復帰させ、畿内の実権を掌握した。義興が周防に帰国した後も単独で政権を維持したが、細川氏内部の家督争い（両細川の乱）で細川晴元や三好元長らと激しく対立。1531年の大物崩れで敗北し、尼崎に逃れたが捕らえられて自害に追い込まれた。", skill: { name: "両細川の抗争", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 529, name: "大内義隆", power: 114, hp: 86, attribute: "STRATEGY", desc: "戦国時代の中国地方の戦国大名。父・義興の後を継いで広大な領国を支配し、日明貿易で得た富を背景に公家や宣教師（ザビエル）を保護して山口に華やかな文化を築いた。しかし出雲の尼子氏遠征に失敗したのちは文弱に流れ、文治派の相良武任を重用したため武断派の重臣・陶晴賢のクーデターを招き、大寧寺で自刃に追い込まれた。", skill: { name: "西の京の悲劇", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 530, name: "今川氏親", power: 121, hp: 79, attribute: "STRATEGY", desc: "戦国時代の駿河国の戦国大名。今川義元の父。叔父の北条早雲の支援を得て家督争いに勝利し、遠江国を平定して今川氏の戦国大名化を強力に推し進めた。1526年に、家臣の統制や土地・裁判の規定をまとめた全33カ条からなる『今川仮名目録』を制定し、領国支配の基準を確立した、分国法制定の先駆者として歴史に名を残す。", skill: { name: "仮名目録の制定", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 531, name: "徳川家継", power: 82, hp: 118, attribute: "STRATEGY", desc: "江戸幕府の第7代将軍。徳川家宣の子で、わずか4歳で将軍職を継いだため、江戸幕府史上最年少の将軍となった。政務は父の代から引き続き新井白石と側用人の間部詮房が主導し、「正徳の治」と呼ばれる文治政治が継続された。しかし生まれつき病弱であり、8歳で早世したため、家康以来の徳川将軍家の直系血脈は断絶した。", skill: { name: "幼君の御世", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 532, name: "大岡忠相", power: 128, hp: 72, attribute: "STRATEGY", desc: "江戸時代中期の幕臣。徳川吉宗の「享保の改革」において、山田奉行から江戸の町奉行に大抜擢され、市民の行政や裁判で卓越した手腕を発揮した。「大岡裁き」と呼ばれる名裁判の伝説で庶民に親しまれたほか、町火消の創設や小石川養生所の設置、青木昆陽への甘藷栽培の推奨など、江戸の都市政策に数々の多大な功績を残した。", skill: { name: "大岡裁きの名奉行", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 533, name: "徳川家治", power: 75, hp: 125, attribute: "STRATEGY", desc: "江戸幕府の第10代将軍。徳川家重の子。非常に聡明で幼少期は祖父・吉宗から大きな期待を寄せられた。将軍就任後は、側用人から老中に昇進した田沼意次を深く信任し、幕政の実権を委ねた。彼の治世は、株仲間の公認や専売制の強化など商業資本を利用した田沼の積極的な経済政策が展開されたが、天明の飢饉の最中に病没した。", skill: { name: "田沼への信任", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 534, name: "鳥居耀蔵", power: 110, hp: 90, attribute: "STRATEGY", desc: "江戸時代後期の幕臣。老中水野忠邦のもとで江戸南町奉行などを務め、「天保の改革」における風俗統制や物価引き下げなどの厳しい取り締まりを冷酷に実行し、「妖怪（耀蔵）」と恐れられた。また保守的な儒学者でもあり、渡辺崋山や高野長英ら開明的な蘭学者を弾圧する「蛮社の獄」を引き起こした中心人物である。", skill: { name: "妖怪の弾圧", desc: "敵全員の歴史力を30%減少させる", type: "debuff_all", value: 0.3, rate: 0.6 } },
  { id: 535, name: "遠山景元", power: 115, hp: 85, attribute: "STRATEGY", desc: "江戸時代後期の幕臣。通称は金四郎。江戸北町奉行として、水野忠邦が進める天保の改革における極端な風俗統制や芝居小屋の廃止令に対し、庶民の生活を重んじて猛烈に反対し、緩和に努めた。このため南町奉行の鳥居耀蔵と激しく対立して大目付に左遷されたが、のちに「遠山の金さん」として講談や時代劇のヒーローとなった。", skill: { name: "桜吹雪の情", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 536, name: "徳川家茂", power: 106, hp: 94, attribute: "STRATEGY", desc: "江戸幕府の第14代将軍。紀州藩主・徳川慶福として、井伊直弼ら南紀派に推されて将軍継嗣問題に勝利し、13歳で就任。公武合体策により、孝明天皇の妹である和宮を正室に迎えた。幕末の動乱期にあって、攘夷の勅命を受けるために将軍として229年ぶりに上洛。第二次長州征討の指揮を執るために大坂城に滞在中、脚気により21歳で病没した。", skill: { name: "公武合体の将軍", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 537, name: "和宮", power: 90, hp: 110, attribute: "STRATEGY", desc: "幕末の皇族。孝明天皇の異母妹。有栖川宮熾仁親王と婚約していたが、幕府の強い公武合体政策の要請により破談となり、国家のために14代将軍徳川家茂に降嫁した。江戸城大奥では武家の風習と対立しながらも家茂と深い愛情で結ばれた。家茂の死後、戊辰戦争の際には朝廷に嘆願書を送り、徳川家の存続と江戸城の無血開城に大きく貢献した。", skill: { name: "降嫁の悲命", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.85 } },
  { id: 538, name: "小松帯刀", power: 120, hp: 80, attribute: "STRATEGY", desc: "幕末の薩摩藩家老。島津久光に見出されて藩政改革を主導し、西郷隆盛や大久保利通を登用して彼らの活動を藩の首脳として全面的に庇護した。坂本龍馬を匿い、京都の自邸を薩長同盟の交渉の場として提供するなど、倒幕への道を決定づけた裏の立役者。1867年には徳川慶喜に大政奉還を勧告する建白書に薩摩藩代表として署名した。", skill: { name: "幻の宰相", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 539, name: "山田顕義", power: 125, hp: 75, attribute: "STRATEGY", desc: "幕末から明治期の軍人・政治家。長州藩出身で吉田松陰の松下村塾に学ぶ。大村益次郎の後継者として近代陸軍の創設に貢献し、西南戦争でも活躍。のちに司法大臣を長く務め、ボアソナードとともに民法や商法などの近代法典の編纂に心血を注いだ。また、日本法律学校（現在の日本大学）や國學院大學の創設に関わり、法学教育に尽力した。", skill: { name: "法典編纂の尽力", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 540, name: "松岡洋右", power: 129, hp: 71, attribute: "STRATEGY", desc: "昭和期の外交官・政治家。満鉄総裁などを経て、1933年の国際連盟総会でリットン報告書が採択されると、抗議演説を行って議場を退場し、日本の国際連盟脱退を主導した。第2次近衛文麿内閣の外務大臣に就任し、日独伊三国同盟を締結し、さらに日ソ中立条約を結んでアメリカを牽制しようとする強硬な外交を展開し、対米開戦の道筋を作った。", skill: { name: "連盟脱退の演説", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 541, name: "慧慈", power: 85, hp: 115, attribute: "CULTURE", desc: "飛鳥時代の高句麗の僧侶。595年に日本へ渡来し、飛鳥寺に住んで仏教の布教に努めた。百済から渡来した僧・慧聡とともに仏教界の発展に大きく貢献し、特に厩戸王（聖徳太子）の仏教の師として、『法華経』などの経典や大陸の最新の政治・国際情勢を教授し、太子の政治思想や仏教理解に多大な影響を与えたとされる。", skill: { name: "太子の師", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 542, name: "鞍作鳥", power: 93, hp: 107, attribute: "CULTURE", desc: "飛鳥時代の仏師。止利仏師とも呼ばれる。渡来人の司馬達等の孫にあたり、推古天皇や聖徳太子の厚い信任を受けて飛鳥時代の仏像彫刻を主導した。面長な顔立ちや杏仁形の目、左右対称の幾何学的な衣のひだ（古式微笑）を特徴とする北魏様式の仏像を制作し、日本最古の仏像である飛鳥寺の「飛鳥大仏」や法隆寺金堂の「釈迦三尊像」を残した。", skill: { name: "止利様式", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 543, name: "壬生忠岑", power: 88, hp: 112, attribute: "CULTURE", desc: "平安時代前期の歌人。三十六歌仙の一人。身分は下級の官人であったが、和歌の才能に恵まれ、紀貫之や凡河内躬恒らとともに醍醐天皇の命を受けて最初の勅撰和歌集である『古今和歌集』の撰者に選ばれた。哀調を帯びた優美な歌風で知られ、「有明のつれなく見えし別れより あかつきばかり憂きものはなし」などの名歌を残した。", skill: { name: "有明の哀調", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 544, name: "藤原家隆", power: 104, hp: 96, attribute: "CULTURE", desc: "鎌倉時代初期の公卿・歌人。藤原俊成に和歌を学び、藤原定家と並び称される新古今時代の代表的な歌人。後鳥羽上皇の信任を得て『新古今和歌集』の撰者の一人となった。定家の技巧的で幽玄な歌風に対し、おおらかで力強い叙情性を持つ歌風で知られ、後鳥羽院歌壇の隆盛に大きく貢献し、鎌倉幕府の源実朝にも多大な影響を与えた。", skill: { name: "新古今の双璧", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 545, name: "虎関師錬", power: 111, hp: 89, attribute: "CULTURE", desc: "鎌倉時代末期から南北朝時代の臨済宗の禅僧。東福寺や南禅寺の住持を務めた。五山文学の先駆者として優れた漢詩文を残すとともに、1322年に日本最初の仏教通史である『元亨釈書』全30巻を完成させ、後醍醐天皇に献上した。中国の史書にならった紀伝体で日本の高僧の伝記や仏教の歴史を体系化し、日本の仏教史学を確立した。", skill: { name: "元亨釈書", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.85 } },
  { id: 546, name: "湛慶", power: 125, hp: 75, attribute: "CULTURE", desc: "鎌倉時代前期の仏師。運慶の長男で、慶派の中心として活躍した。父の力強く男性的な作風を受け継ぎつつ、それをより洗練させ、穏やかで理知的な写実性を加えた独自の彫刻様式を確立した。京都の三十三間堂（蓮華王院本堂）の再建にあたり、本尊である巨大な「千手観音坐像」の制作を主導し、鎌倉彫刻の極致を示した。", skill: { name: "千手観音の造立", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 547, name: "如拙", power: 102, hp: 98, attribute: "CULTURE", desc: "室町時代初期の画僧。相国寺に属し、足利義持の厚い庇護を受けて幕府の御用絵師的に活躍した。中国の南宋画の技法を深く研究し、初期の日本の水墨画の基礎を築いた。ぬるぬるしたなまずを、丸いひょうたんで押さえることができるかという禅の公案（禅問答）をユーモラスに描いた国宝『瓢鮎図』の作者として極めて有名である。", skill: { name: "瓢鮎図の公案", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 548, name: "周文", power: 109, hp: 91, attribute: "CULTURE", desc: "室町時代中期の画僧。相国寺に属し、如拙から水墨画を学び、のちに雪舟を育てた。幕府の御用絵師として足利義教に仕え、遣唐使として朝鮮に渡って大陸の画法を直接学んだ。日本の風景に宋元画の複雑な構図を取り入れ、書斎の理想的な風景を描く「書斎図」の様式を完成させ、日本における水墨山水画を本格的に大成させた。", skill: { name: "水墨山水の大成", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 549, name: "古田織部", power: 115, hp: 85, attribute: "CULTURE", desc: "安土桃山時代から江戸時代初期の武将・茶人。千利休の「利休七哲」の一人で、利休の死後に天下一の茶匠となった。利休の静寂でストイックな「わび茶」に対し、意図的に形を歪めたり、斬新で派手な幾何学模様を用いたりする「ひょうげた（破調の美）」茶風を確立し、美濃焼の「織部焼」を指導して大名茶道の基礎を築いた。", skill: { name: "ひょうげた美学", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 550, name: "小堀遠州", power: 112, hp: 88, attribute: "CULTURE", desc: "江戸時代初期の武将・茶人・作庭家。古田織部に茶道を学び、その死後に将軍家茶道指南役となった。織部の「破調の美」を洗練させ、より優美で調和のとれた「綺麗さび」と呼ばれる茶風を確立。また、幕府の作事奉行として類まれな才能を発揮し、桂離宮や二条城二の丸庭園、大徳寺孤篷庵などの設計・作庭に関わったとされる総合芸術家。", skill: { name: "綺麗さび", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 551, name: "酒井抱一", power: 108, hp: 92, attribute: "CULTURE", desc: "江戸時代後期の画家・俳人。姫路藩主の弟という高い身分に生まれながら、江戸の文化人たちと広く交流し出家した。尾形光琳を熱狂的に私淑してその画風を復興し、江戸に洗練された「江戸琳派」を創始した。光琳の『風神雷神図屏風』の裏面に、銀箔を背景に雨に打たれる秋草を描いた傑作『夏秋草図屏風』を残したことで名高い。", skill: { name: "江戸琳派の洗練", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 552, name: "竹本義太夫", power: 94, hp: 106, attribute: "CULTURE", desc: "江戸時代前期の浄瑠璃語り。大坂で独自の力強く劇的な語り口である「義太夫節」を創始し、道頓堀に竹本座を開設した。座付作者として近松門左衛門を迎え、『曽根崎心中』などの名作を次々と上演して空前の大ヒットを記録し、三味線と操り人形を組み合わせた人形浄瑠璃（文楽）を元禄文化を代表する大衆演劇へと発展させた。", skill: { name: "義太夫節", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 553, name: "太宰春台", power: 116, hp: 84, attribute: "CULTURE", desc: "江戸時代中期の儒学者。荻生徂徠の古文辞学派（蘐園学派）の高弟。儒学を単なる道徳や個人の修養の学問ではなく、政治や経済といった国家統治の実学（経世済民）として展開した。主著『経済録』において、武士も商業活動を行って利益を得るべきだとし、諸藩に専売制の導入を推奨するなど、画期的な重商主義的経済論を提唱した。", skill: { name: "経済録の重商論", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.94 } },
  { id: 554, name: "契沖", power: 105, hp: 95, attribute: "CULTURE", desc: "江戸時代前期の真言宗の僧・古典学者。徳川光圀の依頼を受け、実証的な文献学の手法を用いて『万葉代匠記』を著し、中世以来の秘伝や憶測を排した科学的な万葉集研究の基礎を築いた。また『和字正濫鈔』で歴史的仮名遣いを提唱するなど、のちの国学発展の原点となる客観的な古典研究（国学の祖）を始めた偉大な学者。", skill: { name: "国学の祖", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 555, name: "荷田春満", power: 98, hp: 102, attribute: "CULTURE", desc: "江戸時代中期の国学者。京都の伏見稲荷の神官の家に生まれ、契沖の実証的研究に影響を受けて古典や神道を研究した。幕府に国学を講じる学校の設立を建白し、儒教や仏教など外来思想の影響を排除して、日本固有の古道を明らかにする学問としての「国学」の方向性を決定づけた。門人に賀茂真淵がおり、国学四大人の一人に数えられる。", skill: { name: "古道の探求", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 556, name: "桂川甫周", power: 101, hp: 99, attribute: "CULTURE", desc: "江戸時代後期の蘭方医・蘭学者。幕府の奥医師を務め、前野良沢や杉田玄白らとともに『解体新書』の翻訳作業に参加した。語学力に優れ、のちに大槻玄沢らを指導して江戸における蘭学の発展を牽引した。また、ロシアから帰国した大黒屋光太夫を尋問して、ロシアの地理や風俗を詳細に記した『北槎聞略』を編纂し、幕府の北方政策に寄与した。", skill: { name: "北槎聞略", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 557, name: "大槻玄沢", power: 110, hp: 90, attribute: "CULTURE", desc: "江戸時代後期の蘭学者。杉田玄白や前野良沢に学び、江戸に蘭学塾「芝蘭堂」を開いて多くの門人を育て、江戸蘭学の最盛期を築いた。オランダ語の入門書である『蘭学階梯』を著し、蘭学を体系的な学問として確立した。また、1794年のオランダの正月（新暦の1月1日）を祝う「オランダ正月」の宴を初めて催したことでも知られる。", skill: { name: "芝蘭堂の教育", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 558, name: "緒方洪庵", power: 107, hp: 93, attribute: "CULTURE", desc: "江戸時代後期の蘭方医・蘭学者。大坂に蘭学塾「適塾（適々斎塾）」を開き、福沢諭吉、大村益次郎、橋本左内など、のちの幕末・明治維新を牽引する幾多の極めて優秀な人材を育成した。また、当時猛威を振るっていた天然痘の予防のために「除痘館」を設立し、牛痘法（種痘）の普及に尽力して多くの人命を救った日本の近代医学の祖。", skill: { name: "適塾の育成", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 559, name: "高橋至時", power: 117, hp: 83, attribute: "CULTURE", desc: "江戸時代後期の天文学者。大坂で麻田剛立に学び、のちに幕府の天文方に登用された。西洋の天文学の成果を取り入れ、従来よりはるかに精度の高い「寛政暦」を作成するという大事業を成し遂げた。また、50歳で弟子入りしてきた伊能忠敬に測量術や天文学を熱心に指導し、日本全土の実測地図作成という世界的偉業を背後で強力に支えた。", skill: { name: "寛政暦の作成", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 560, name: "最上徳内", power: 122, hp: 78, attribute: "CULTURE", desc: "江戸時代後期の探検家。本多利明に学んだのち幕命を受け、たびたび蝦夷地や千島列島、さらに得撫島（エトロフ島）まで探検した。アイヌの風俗やロシアの南下の脅威を克明に記録し、幕府の北方防備の必要性を説いた。彼が著した『蝦夷草紙』は、当時の北方地域の情勢を知るための第一級の史料であり、シーボルトらにも大きな影響を与えた。", skill: { name: "蝦夷地の探検", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 561, name: "間宮林蔵", power: 126, hp: 74, attribute: "CULTURE", desc: "江戸時代後期の探検家・幕臣。伊能忠敬に測量術を学び、幕命により樺太（サハリン）の探検を行った。1808年と翌年の二度にわたる過酷な探検により、樺太が大陸と陸続きの半島ではなく、海峡によって隔てられた「島」であることを世界で初めて確認した。この海峡は彼の名にちなんで「間宮海峡（タタール海峡）」と名付けられている。", skill: { name: "間宮海峡の発見", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 562, name: "松浦武四郎", power: 114, hp: 86, attribute: "CULTURE", desc: "幕末から明治初期の探検家。生涯で6度にわたり蝦夷地（アイヌモシリ）や樺太、千島を探検し、詳細な地図や地誌を作成した。松前藩や商人によるアイヌへの過酷な搾取を激しく告発し、アイヌ保護を訴え続けた。明治維新後、開拓判官に任じられ、蝦夷地に代わる名称として「北海道」を提案し名付け親となったが、のちに政府と対立し辞職した。", skill: { name: "北海道の命名", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 563, name: "西周", power: 80, hp: 120, attribute: "CULTURE", desc: "幕末から明治期の啓蒙思想家。津田真道とともに幕府の留学生としてオランダに渡り、哲学や法学を学んだ。帰国後、森有礼らと明六社を結成して『明六雑誌』で西洋思想を紹介。「哲学」「芸術」「理性」などの多くの学術用語（和製漢語）を考案し、日本の近代的な学問体系の構築に絶大な貢献をした。また『軍人勅諭』の起草にも関与した。", skill: { name: "西洋哲学の導入", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 564, name: "クラーク", power: 119, hp: 81, attribute: "CULTURE", desc: "明治時代のお雇い外国人。アメリカの農学者で、1876年に札幌農学校（現在の北海道大学）の初代教頭として招かれた。滞在はわずか8ヶ月であったが、キリスト教の精神に基づいた厳格かつ自由な人格教育を行い、内村鑑三や新渡戸稲造など近代日本を代表する思想家を育てた。離日時の「Boys, be ambitious」の言葉は不朽。", skill: { name: "大志を抱け", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 565, name: "北原白秋", power: 96, hp: 104, attribute: "CULTURE", desc: "明治から昭和期の詩人・歌人。与謝野鉄幹の『明星』に参加して頭角を現した。官能的で異国情緒あふれる耽美的な詩集『邪宗門』や、歌集『桐の花』を発表し、近代詩歌に新境地を開いた。のちに雑誌『アララギ』にも参加。また、山田耕筰らとともに児童向けの童謡創作運動にも尽力し、「からたちの花」や「待ちぼうけ」などの名作詞を残した。", skill: { name: "邪宗門の耽美", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 566, name: "高村光太郎", power: 113, hp: 87, attribute: "CULTURE", desc: "明治から昭和期の彫刻家・詩人。木彫家・高村光雲の長男。欧米留学でロダンに強く傾倒し、帰国後は生命力あふれる近代彫刻の傑作『手』などを制作。また詩人としても、理想主義的で男性的な力強い詩風を確立し、詩集『道程』を発表。心を病んだ妻・智恵子への純粋な愛と喪失の悲しみを見事に綴った詩集『智恵子抄』は広く国民に愛読されている。", skill: { name: "智恵子抄の純愛", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 567, name: "浅井忠", power: 103, hp: 97, attribute: "CULTURE", desc: "明治時代の洋画家。工部美術学校でフォンタネージに学び、明治美術会の創設に参加した。黒田清輝ら外光派の明るい画風とは対照的に、農村の風景や働く人々の姿を、茶褐色を基調とした重厚で渋い色調で描き出す写実的な画風（脂派）を確立した。代表作の『収穫』や『春畝』は、日本の近代洋画における写実主義の最高峰と評価されている。", skill: { name: "重厚なる写実", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 568, name: "横山大観", power: 124, hp: 76, attribute: "CULTURE", desc: "明治から昭和期の日本画家。東京美術学校で岡倉天心や橋本雅邦に学び、天心とともに日本美術院を創設した。菱田春草とともに輪郭線を用いない「朦朧体」を考案して日本画の近代化に挑んだ。大正期に日本美術院を再興し、壮大な水墨画絵巻『生々流転』や富士山を題材とした数多くの名作を残し、近代日本画壇の最高権威として君臨した。", skill: { name: "生々流転の墨", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.9 } },
  { id: 569, name: "本多光太郎", power: 130, hp: 70, attribute: "CULTURE", desc: "明治から昭和期の物理学者・金属学者。東北帝国大学教授。ドイツ留学などを経て磁性材料の研究に打ち込み、1917年に当時としては世界最強の強力な永久磁石である「KS鋼（KS磁石鋼）」を発明し、さらにのちには「新KS鋼」を開発した。物理冶金学という新しい分野を開拓し、日本の鉄鋼研究を世界トップレベルに押し上げた世界的権威。", skill: { name: "KS鋼の発明", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 570, name: "木村栄", power: 128, hp: 72, attribute: "CULTURE", desc: "明治から昭和期の天文学者。岩手県水沢の緯度観測所の初代所長を務めた。1899年、地球の自転軸の微小な変動に関する観測データの中から、既存の理論では説明できない未知の変動要因を発見し、これを「Z項」という数式上の項として導入して国際的に発表。世界の天文学界における長年の謎を見事に解明し、日本の近代科学の実力を世界に示した。", skill: { name: "Z項の発見", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 572, name: "平国香", power: 114, hp: 86, attribute: "VALOR", desc: "平安時代中期の武将。高望王の長男で、桓武平氏の祖の一人。常陸大掾として東国に土着し、広大な所領を形成して武士団を組織した。しかし、一族内の所領争いから甥の平将門と激しく対立し、935年の野本合戦において将門軍の襲撃を受けて討ち死にした。この事件が関東全域を巻き込む平将門の乱（天慶の乱）の発端となった。", skill: { name: "桓武平氏の祖", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 573, name: "源為義", power: 127, hp: 73, attribute: "VALOR", desc: "平安時代後期の武将。源義家の子で、源義朝の父。河内源氏の棟梁として白河法皇や鳥羽上皇に仕えたが、たびたび一族の不祥事や乱行の責任を問われて処罰され、源氏の勢力は一時的に衰退した。1156年の保元の乱では、嫡男の義朝と袂を分かち、崇徳上皇方（敗者側）の主力として奮戦したが敗北し、義朝の手によって処刑された。", skill: { name: "河内源氏の悲哀", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 574, name: "木曾義高", power: 100, hp: 100, attribute: "VALOR", desc: "平安時代末期の武将。木曾義仲の嫡男。父・義仲が源頼朝と和睦した際、人質として鎌倉に送られ、頼朝の長女である大姫の許嫁となった。しかし、父が粟津の戦いで頼朝軍に討たれると、自身も命を狙われることになり、大姫の助けを借りて女装して鎌倉を脱出したが、武蔵国で追手に捕らえられ入間河原で斬首された悲劇の若武者。", skill: { name: "人質の脱出", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 575, name: "源実朝", power: 112, hp: 88, attribute: "VALOR", desc: "鎌倉幕府の第3代将軍。兄・頼家の暗殺後に12歳で就任。政治の実権は北条氏に握られていたが、藤原定家に師事して和歌に並外れた才能を発揮し、万葉調の力強い歌集『金槐和歌集』を編纂した。また、宋への渡航を夢見て巨大な船を建造させるなど独自の行動も見せたが、1219年に鶴岡八幡宮で頼家の遺児・公暁により暗殺された。", skill: { name: "金槐の歌人将軍", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 576, name: "北条時行", power: 124, hp: 76, attribute: "VALOR", desc: "鎌倉時代末期から南北朝時代の武将。第14代執権・北条高時の遺児。鎌倉幕府滅亡後、信濃国で諏訪頼重に匿われて育ち、1335年に建武政権に対して挙兵（中先代の乱）。足利直義を破って一時的に鎌倉を奪還したが、足利尊氏の軍勢に敗れた。のちに南朝に帰順し、新田氏や北畠氏とともに足利軍と頑強に戦い続けた不屈の武将。", skill: { name: "中先代の乱", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 577, name: "結城氏朝", power: 133, hp: 67, attribute: "VALOR", desc: "室町時代中期の武将。下総国の結城氏当主。1440年、永享の乱で敗死した鎌倉公方・足利持氏の遺児である春王丸・安王丸を自らの居城である結城城に匿い、室町幕府に対して反乱を起こした（結城合戦）。関東の諸将を結集して幕府の大軍を相手に約1年にわたり激しい籠城戦を展開したが、最後は力尽きて落城し、討ち死にした。", skill: { name: "結城合戦の籠城", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 578, name: "新田義興", power: 138, hp: 62, attribute: "VALOR", desc: "南北朝時代の武将。新田義貞の次男。父の戦死後も南朝方の主力として関東で奮戦し、足利尊氏や基氏の軍勢を度々苦しめた。1352年の武蔵野合戦では一時的に鎌倉を占領する武功を挙げた。その並外れた武勇を恐れた足利方の関東管領・畠山国清の計略により、武蔵国矢口渡で船底に穴を開けられ、水中で騙し討ちに遭い非業の死を遂げた。", skill: { name: "矢口渡の無念", desc: "敵陣に最大HPの40%の固定ダメージを与える", type: "fixed_damage", value: 0.4, rate: 0.5 } },
  { id: 579, name: "楠木正儀", power: 118, hp: 82, attribute: "VALOR", desc: "南北朝時代の武将。楠木正成の三男。兄の正行が四条畷の戦いで戦死した後、楠木氏の家督を継いで南朝軍の総大将となった。卓越した軍略で京都を一時奪還するなど足利軍を大いに苦しめたが、国際情勢や戦局の限界を冷静に見極め、和平交渉を推進したため南朝強硬派と対立。のちに北朝に降伏し、再び南朝に帰参するなど数奇な運命を辿った。", skill: { name: "和平への苦闘", desc: "相手が【文化】属性なら敵の歴史力を40%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.95 } },
  { id: 580, name: "武田信虎", power: 131, hp: 69, attribute: "VALOR", desc: "戦国時代の甲斐国の戦国大名。武田信玄の父。甲斐国内の有力国人層の反乱を次々と鎮圧して甲斐一国を統一し、のちの武田氏飛躍の盤石な土台を築き上げた。甲府に躑躅ヶ崎館を築き城下町を整備したが、度重なる外征や苛烈な独裁政治が家臣や領民の反発を招き、1541年に嫡男の晴信（信玄）によって駿河国へ追放された。", skill: { name: "甲斐統一の豪腕", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 581, name: "上杉憲政", power: 94, hp: 106, attribute: "VALOR", desc: "戦国時代の武将。山内上杉家の当主で室町幕府の関東管領。北条氏康の関東進出を阻むため、河越夜戦で8万の大軍を率いて北条軍を包囲したが、奇襲を受けて大敗北を喫した。その後も連敗を重ねて居城の平井城を追われ、越後国の長尾景虎（上杉謙信）を頼って逃亡。景虎に上杉の家督と関東管領職を譲り渡し、みずからは歴史の表舞台から去った。", skill: { name: "関東管領の譲渡", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 582, name: "長野業正", power: 135, hp: 65, attribute: "VALOR", desc: "戦国時代の上野国の武将。箕輪城主。関東管領上杉氏が没落する中、上野国の国人衆（箕輪衆）を巧みに束ねて独立勢力を保った。武田信玄が上野へ侵攻してきた際、地の利と優れた戦術を駆使して数度にわたり信玄の大軍を撃退し、「業正がいる限り上野は落とせない」と言わしめた。彼の死後、まもなく箕輪城は武田軍の手に落ちた。", skill: { name: "箕輪城の鉄壁", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 583, name: "村上義清", power: 129, hp: 71, attribute: "VALOR", desc: "戦国時代の北信濃の戦国大名。葛尾城を本拠とし、武田信玄の信濃侵攻に激しく抵抗した。上田原の戦いや砥石崩れでは信玄を直接打ち破り、板垣信方など武田軍の有力武将を討ち取るという大金星を挙げた。しかし、武田方の調略によって家臣が次々と離反して居城を追われ、越後の上杉謙信に救援を求めたことが川中島の戦いの発端となった。", skill: { name: "砥石崩れの猛撃", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 584, name: "下間頼廉", power: 126, hp: 74, attribute: "VALOR", desc: "戦国時代の浄土真宗の僧侶・武将。本願寺の有力な坊官として顕如に仕え、石山合戦においては本願寺軍の事実上の軍事総司令官として活躍した。鈴木孫一率いる雑賀衆などの傭兵部隊や全国の一向一揆勢を束ね上げ、織田信長の大軍を相手に約10年にわたって難攻不落の石山本願寺を守り抜き、信長を最も苦しめた指揮官の一人。", skill: { name: "本願寺の軍奉行", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 585, name: "荒木村重", power: 119, hp: 81, attribute: "VALOR", desc: "戦国時代の武将。もと池田氏の家臣であったが織田信長に仕えて頭角を現し、摂津一国を任される大名に出世した。石山合戦などでも武功を挙げたが、1578年に突如として信長に反旗を翻し、有岡城に籠城した。黒田官兵衛の説得も拒絶して抗戦したが、家臣の裏切りで城を脱出。一族が処刑される中、生き延びてのちに茶人（道薫）となった。", skill: { name: "有岡城の反逆", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 586, name: "三好義継", power: 82, hp: 118, attribute: "VALOR", desc: "戦国時代の武将。三好長慶の養子となって家督を継ぎ、三好三人衆や松永久秀とともに室町幕府13代将軍の足利義輝を暗殺した（永禄の変）。しかし家臣団の内紛を抑えきれず、のちに織田信長が上洛するとこれに服属した。その後、足利義昭の信長包囲網に呼応して再び信長に反旗を翻したが敗れ、若江城で自刃して三好氏の本家は滅亡した。", skill: { name: "三好家の落日", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.95 } },
  { id: 587, name: "筒井順慶", power: 116, hp: 84, attribute: "VALOR", desc: "戦国時代の大和国の武将・僧。興福寺の衆徒から戦国大名化し、松永久秀と大和の覇権をめぐって激しく抗争した。のちに織田信長に服属し、明智光秀の与力として活躍して大和一国の支配を任された。本能寺の変後の山崎の戦いにおいて、光秀から再三の出兵要請を受けながらも洞ヶ峠で形勢を伺い、秀吉方についたという日和見の故事で有名。", skill: { name: "洞ヶ峠の形勢観", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 588, name: "加藤嘉明", power: 130, hp: 70, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。豊臣秀吉の子飼いとして育ち、賤ヶ岳の戦いで「七本槍」の一人として武名を轟かせた。水軍の指揮にも長け、四国攻めや朝鮮出兵（水軍の将）で活躍。関ヶ原の戦いでは石田三成と対立して徳川家康の東軍に属し、戦後に伊予国松山藩主となり、のちに会津藩40万石の大封を得て名城・松山城を築いた。", skill: { name: "水軍の統率", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 589, name: "脇坂安治", power: 122, hp: 78, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。賤ヶ岳の戦いにおける「七本槍」の一人で、豊臣秀吉の水軍の将として九州平定や小田原攻め、朝鮮出兵で活躍した。関ヶ原の戦いでは当初西軍に属して松尾山に布陣したが、小早川秀秋の裏切りに呼応して東軍に寝返り、大谷吉継の陣へ突撃して西軍を壊滅させる決定的な役割を果たした。", skill: { name: "松尾山の寝返り", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 590, name: "池田輝政", power: 128, hp: 72, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。織田信長の乳兄弟である池田恒興の子。徳川家康の次女・督姫を正室に迎え、関ヶ原の戦いでは東軍の主力として岐阜城を攻略するなど大功を挙げた。戦後、播磨国姫路藩52万石を与えられ、現在の壮麗な世界遺産・姫路城（白鷺城）を築城して「西国将軍」と称されるほどの強大な勢力を誇った。", skill: { name: "白鷺城の威容", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 591, name: "浅野幸長", power: 125, hp: 75, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。五奉行の一人・浅野長政の長男。武断派の若手将校として加藤清正らとともに石田三成を襲撃し、関ヶ原の戦いでは東軍の先鋒として岐阜城攻略や本戦で多大な武功を立てた。戦後に紀伊国和歌山藩37万石を与えられたが、のちに豊臣秀頼の身を案じながら二条城の会見直後に若くして急死した。", skill: { name: "武断派の先鋒", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 592, name: "堀秀政", power: 134, hp: 66, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。織田信長の小姓から取り立てられ「名人久太郎」と呼ばれた。あらゆる軍務や政務を完璧にこなす万能の武将であり、山崎の戦いや賤ヶ岳の戦いで常に先陣を切って羽柴秀吉の天下取りを助けた。小牧・長久手の戦いでも唯一の勝利を収めるなど天才的な軍才を示したが、小田原攻めの陣中で惜しくも病死した。", skill: { name: "名人久太郎", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 593, name: "前田利長", power: 115, hp: 85, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の大名。前田利家の長男。父の死後、豊臣政権の五大老として大坂城で秀頼を補佐したが、徳川家康の圧力を受けて生母の芳春院（まつ）を人質として江戸へ送り、徳川への服属を誓った。関ヶ原の戦いでは東軍として北陸の西軍勢力を牽制・制圧し、戦後に加賀・能登・越中119万石の加賀藩の絶対的基礎を固めた。", skill: { name: "加賀百万石の礎", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 594, name: "結城秀康", power: 137, hp: 63, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。徳川家康の次男。豊臣秀吉の養子となり、のちに下総国の名門・結城氏を継いだ。武勇に極めて優れ、関ヶ原の戦いでは上杉景勝の南下を防ぐために関東防衛の総大将として宇都宮に布陣し、家康の背後を完璧に守り抜いた。戦後は越前国福井68万石を与えられ、松平姓に復して越前松平家の祖となった。", skill: { name: "関東防衛の要", desc: "相手が【文化】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 595, name: "蒲生氏郷", power: 120, hp: 80, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。近江国の出身で織田信長に才能を見出されて娘婿となった。本能寺の変後はいち早く秀吉に属し、小田原攻めののちに伊達政宗の抑えとして陸奥国会津92万石という大封を与えられた。黒川城を若松城と改名して城下町を整備し、千利休の高弟「利休七哲」の筆頭とされるなど、一流の教養と武勇を兼ね備えた名将。", skill: { name: "会津の鎮撫", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 596, name: "小早川秀秋", power: 65, hp: 135, attribute: "VALOR", desc: "安土桃山時代の武将。豊臣秀吉の正室・ねね（北政所）の甥で、小早川隆景の養子となって家督を継ぐ。1600年の関ヶ原の戦いにおいて、西軍の重要戦力として松尾山に布陣したが、徳川家康の威嚇射撃を受けて東軍へ寝返り、大谷吉継の陣へ突撃した。これが天下分け目の決戦における東軍勝利の決定打となったが、戦後わずか2年で急死した。", skill: { name: "関ヶ原の寝返り", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 597, name: "毛利秀元", power: 110, hp: 90, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。毛利元就の孫。朝鮮出兵では病気の毛利輝元に代わって毛利軍3万の総大将として渡海し、武功を挙げた。関ヶ原の戦いでは西軍として南宮山に布陣したが、先陣の吉川広家が徳川方と内通して動かなかったため、「弁当を食べている（宰相殿の空弁当）」と誤魔化して本戦に参加できず、毛利家減封の憂き目に遭った。", skill: { name: "宰相殿の空弁当", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 598, name: "安国寺恵瓊", power: 98, hp: 102, attribute: "VALOR", desc: "戦国時代から安土桃山時代の臨済宗の僧・外交僧。毛利氏に仕え、織田信長との和睦交渉や豊臣秀吉との折衝において抜群の外交手腕を発揮した。「信長は高転びする、秀吉が天下を取る」と予言した逸話で知られる。関ヶ原の戦いでは石田三成と結んで毛利輝元を西軍の総大将に担ぎ出し、反徳川の強硬派として暗躍したが、敗戦後に京都で斬首された。", skill: { name: "西軍首脳の暗躍", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 599, name: "井伊直孝", power: 136, hp: 64, attribute: "VALOR", desc: "江戸時代前期の武将・譜代大名。井伊直政の次男。大坂冬の陣では真田丸の猛攻を受け被害を出したが、夏の陣の八尾・若江の戦いで木村重成らを打ち破り、大坂城落城の第一の功労者となった。近江国彦根藩30万石の藩主となり、徳川秀忠・家光・家綱の3代にわたって幕政の最高首脳として重きをなし、井伊家が譜代筆頭となる基礎を築いた。", skill: { name: "赤備えの継承", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 600, name: "片倉重長", power: 128, hp: 72, attribute: "VALOR", desc: "江戸時代前期の武将。伊達政宗の重臣・片倉景綱（小十郎）の長男。大坂夏の陣の道明寺の戦いにおいて、伊達軍の先陣として奮戦し、西軍の猛将である後藤基次（又兵衛）を討ち取るという大功を挙げた。その際、真田信繁の軍勢とも激突し、信繁から自身の娘（阿梅）の保護を託されたという逸話が残り、「鬼の小十郎」と恐れられた猛将。", skill: { name: "鬼の小十郎", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.7 } },
  { id: 608, name: "藤原種継", power: 108, hp: 92, attribute: "STRATEGY", desc: "奈良時代後期の公卿。藤原式家の出身で、桓武天皇の厚い信任を受けて重用された。仏教勢力が強い平城京からの脱却を目指す桓武天皇の意を受け、784年の長岡京造営において造宮使として建設事業を強力に推進した。しかし、新都造営に反発する大伴氏や佐伯氏らの反対派によって、建設工事の最中に突如暗殺され、早良親王配流の引き金となった。", skill: { name: "長岡京の造営", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 609, name: "橘広相", power: 110, hp: 90, attribute: "STRATEGY", desc: "平安時代前期の学者・公卿。優れた漢学の才を持ち、宇多天皇の厚い信任を受けて天皇の側近として活躍した。887年、天皇が藤原基経を関白に任命する勅書の起草を任され、「阿衡に任ず」という中国の故事に由来する雅語を用いたが、これに激怒した基経が政務をボイコットしたため（阿衡の紛議）、全責任を負わされて処罰・罷免された。", skill: { name: "阿衡の勅書", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.92 } },
  { id: 610, name: "藤原忠通", power: 115, hp: 85, attribute: "STRATEGY", desc: "平安時代末期の公卿。藤原忠実の長男で、長きにわたり摂政・関白を務めた。父の忠実から弟の頼長に藤原氏の氏長者を譲るよう強要されて激しく対立。1156年の保元の乱では後白河天皇方につき、平清盛や源義朝らの武力を利用して弟の頼長を討ち破った。戦後は氏長者の地位を回復したが、武士の台頭を防ぐことはできず摂関家の弱体化を招いた。", skill: { name: "保元の勝者", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 611, name: "藤原頼長", power: 89, hp: 111, attribute: "STRATEGY", desc: "平安時代末期の公卿。藤原忠実の次男。学問に極めて秀でて有職故実を重んじ、法律や規則を厳格に適用して政務を行ったため「悪左府（峻烈な左大臣）」と恐れられた。兄の忠通から氏長者を奪って摂関家の実権を握ったが、鳥羽法皇の不興を買って失脚。保元の乱で崇徳上皇を擁して挙兵したが敗北し、流れ矢に当たって敗死した。", skill: { name: "悪左府の厳格", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 615, name: "足利義嗣", power: 96, hp: 104, attribute: "STRATEGY", desc: "室町幕府第3代将軍・足利義満の次男で、第4代将軍義持の弟。父の義満から極端な寵愛を受け、親王と同等の破格の待遇を与えられて元服し、次期将軍または天皇にすら擬されるほどの権勢を誇った。しかし義満の急死によって後ろ盾を失い、のちに兄の義持に対する謀反の疑いをかけられて出家させられ、最後は暗殺されるという数奇な運命を辿った。", skill: { name: "寵児の悲劇", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.7 } },
  { id: 616, name: "足利義栄", power: 100, hp: 100, attribute: "STRATEGY", desc: "室町幕府の第14代将軍。13代将軍足利義輝が松永久秀らに暗殺された後、三好三人衆によって阿波国から擁立されて将軍に就任した。しかし、京都に入ることもできないまま摂津国に留まり、織田信長が足利義昭を奉じて大軍で上洛してくると抵抗できずに逃亡し、まもなく病死した。室町幕府の権威が完全に失墜していたことを象徴する将軍。", skill: { name: "阿波公方の没落", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 617, name: "足利義昭", power: 75, hp: 125, attribute: "STRATEGY", desc: "室町幕府の第15代（最後）の将軍。兄の足利義輝が暗殺された後、越前などを流浪し、最終的に織田信長に擁立されて上洛し将軍となった。幕府の再興を目指して信長と激しく対立し、武田信玄や朝倉義景らに御内書を送って「信長包囲網」を形成したが、信玄の病死により包囲網は瓦解。1573年に信長によって京都から追放され、室町幕府は滅亡した。", skill: { name: "信長包囲網", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 618, name: "徳川家斉", power: 108, hp: 92, attribute: "STRATEGY", desc: "江戸幕府の第11代将軍。一橋家から入り、歴代最長の50年にわたり将軍職を務めた。治世の前期は松平定信を老中に任せて寛政の改革を行わせたが、のちに定信を罷免し、自身が実権を握って放漫な政治（大御所時代）を展開した。彼のもとで町人文化である化政文化が爛漫と咲き誇った一方で、賄賂の横行や幕府財政の悪化、諸藩の困窮を招いた。", skill: { name: "大御所の爛漫", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 619, name: "水野忠之", power: 111, hp: 89, attribute: "STRATEGY", desc: "江戸時代中期の老中。徳川吉宗の「享保の改革」において、勝手掛老中として幕府の財政再建の陣頭指揮を執った。諸大名に対して1万石につき100石の米を上納させる「上げ米の制」を導入し、また新田開発の奨励や定免法の採用など、米を基本とする幕府の増収策を次々と実行して、破綻寸前であった幕府財政を一時的に黒字へと転換させた。", skill: { name: "上げ米の断行", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 620, name: "牧野忠精", power: 103, hp: 97, attribute: "STRATEGY", desc: "江戸時代後期の老中。越後国長岡藩主。松平定信の「寛政の改革」において老中として定信を強力に補佐し、厳しい倹約令や風俗統制、昌平坂学問所の整備などに尽力した。定信の辞任後も老中に留まり続け、幕政の安定維持に努めた。藩政においても、藩校である崇徳館を設立して人材育成を図るなど、有能な文治派の政治家として活躍した。", skill: { name: "寛政の補佐", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 621, name: "久世広周", power: 107, hp: 93, attribute: "STRATEGY", desc: "幕末の老中首座。安藤信正とともに、井伊直弼暗殺後の混乱する幕政を主導した。朝廷と幕府の融和を図る「公武合体」政策を強力に推進し、14代将軍徳川家茂のもとへ皇妹である和宮の降嫁を実現させた。しかし、この政策が尊王攘夷派の激しい反発を招き、坂下門外の変で安藤が失脚したのち、自身も島津久光の圧力による文久の改革により罷免された。", skill: { name: "和宮降嫁の策", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 622, name: "井上毅", power: 122, hp: 78, attribute: "STRATEGY", desc: "明治時代の官僚・政治家。伊藤博文の懐刀として、ドイツ人顧問のロエスレルから立憲君主制の理論を学び、『大日本帝国憲法』や『皇室典範』の起草に中心的な役割を果たした。また、『教育勅語』の起草にも深く関与し、天皇を中心とした強力な国家体制と、国民の道徳的規範を法的に確立させた、近代日本の法制・教育の最大の黒衣の一人。", skill: { name: "憲法と勅語の起草", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 623, name: "伊東巳代治", power: 114, hp: 86, attribute: "STRATEGY", desc: "明治から昭和期の政治家・官僚。伊藤博文の側近として、井上毅や金子堅太郎とともに『大日本帝国憲法』の起草に尽力した。枢密院書記官長などを歴任し、のちに東京日日新聞を買収して政府の御用新聞とし、藩閥政府と政党（自由党など）との連携工作に暗躍した。晩年は枢密顧問官として、政党内閣や国際協調外交に対して強硬な反対姿勢を貫いた。", skill: { name: "枢密院の重鎮", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.7 } },
  { id: 624, name: "金子堅太郎", power: 118, hp: 82, attribute: "STRATEGY", desc: "明治時代の政治家。アメリカのハーバード大学に学び、伊藤博文の指示で井上毅らとともに『大日本帝国憲法』の起草作業に参画した。日露戦争の際には、アメリカ大統領セオドア・ローズヴェルトと大学時代の同窓であったコネクションを活かして特使として渡米し、世論工作や講和の斡旋に向けた極秘の外交交渉に奔走し、ポーツマス条約への道を開いた。", skill: { name: "渡米の特使", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 625, name: "寺内正毅", power: 126, hp: 74, attribute: "STRATEGY", desc: "明治から大正期の陸軍大将・政治家。初代朝鮮総督として、武断政治と呼ばれる強権的な朝鮮統治を行った。1916年に首相となると、非立憲的な「ビリケン内閣」と揶揄された。第一次世界大戦のさなか、西原借款を通じて中国の段祺瑞政権を支援し、ロシア革命への干渉であるシベリア出兵を強行したが、米騒動の激化の責任をとって総辞職した。", skill: { name: "ビリケン内閣", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 626, name: "加藤友三郎", power: 115, hp: 85, attribute: "STRATEGY", desc: "大正期の海軍大将・政治家。ワシントン会議に日本の首席全権として出席し、対米英協調の立場から、海軍内の強硬派を抑え込んで主力艦の保有制限（米英5：日3）を定めたワシントン海軍軍縮条約に調印した。帰国後に首相となり、山梨半造陸相のもとでの陸軍の軍縮や、シベリアからの日本軍の完全撤兵を実現したが、在任中に病没した。", skill: { name: "海軍軍縮の決断", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 627, name: "清浦奎吾", power: 101, hp: 99, attribute: "STRATEGY", desc: "大正期の政治家。山県有朋の側近として官僚閥の重鎮となる。1924年、虎の門事件で退陣した第2次山本権兵衛内閣の後を受け、貴族院議員を中心とする超然内閣を組織した。しかしこの内閣は、政党政治を求める国民の期待に反していたため、憲政会・立憲政友会・革新倶楽部による第2次護憲運動を引き起こし、総選挙で大敗して約5カ月で退陣した。", skill: { name: "超然内閣の限界", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.8 } },
  { id: 628, name: "幣原喜重郎", power: 128, hp: 72, attribute: "STRATEGY", desc: "大正から昭和期の外交官・政治家。加藤高明内閣などで外務大臣を務め、軍事力ではなく経済的進出を重視し、英米との協調や中国への内政不干渉を貫く「幣原外交」を展開した。ワシントン会議に参加し、ロンドン海軍軍縮条約の調印も主導。戦後に首相となり、GHQのマッカーサーと協力して、戦争放棄を明記した『日本国憲法』の草案作成に深く関わった。", skill: { name: "協調外交の貫徹", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 629, name: "鈴木貫太郎", power: 120, hp: 80, attribute: "STRATEGY", desc: "昭和期の海軍大将・政治家。侍従長時代に二・二六事件で青年将校の襲撃を受けて重傷を負うも一命を取り留める。太平洋戦争末期、沖縄戦のさなかの1945年4月に首相に就任。終戦工作に苦心し、ポツダム宣言に対する当初の「黙殺」声明が原爆投下やソ連参戦を招いたが、最後は御前会議で昭和天皇の「聖断」を仰ぎ、終戦の決定と無条件降伏を成し遂げた。", skill: { name: "聖断の要請", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 630, name: "東久邇宮稔彦王", power: 106, hp: 94, attribute: "STRATEGY", desc: "昭和期の皇族・陸軍大将。1945年8月15日の敗戦直後、日本初の皇族首相として内閣を組織し、降伏文書の調印や日本軍の武装解除という敗戦処理を円滑に進める役割を担った。しかし、GHQによる治安維持法の廃止や政治犯の釈放などの人権指令に対して「国内の治安が維持できない」として受け入れをためらい、成立からわずか54日で総辞職した。", skill: { name: "皇族首相の敗戦処理", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 631, name: "太安万侶", power: 122, hp: 78, attribute: "CULTURE", desc: "奈良時代初期の文官。元明天皇の命を受け、712年に稗田阿礼が暗誦した神代から推古天皇に至る神話や伝承、大王家の系譜を和化漢文（日本的な漢字の用法）を用いて筆録し、現存する日本最古の歴史書『古事記』を完成させた。1979年に奈良市で彼の墓と記された墓誌が発見され、実在の人物であったことが歴史的に完全に証明された。", skill: { name: "古事記の筆録", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.9 } },
  { id: 632, name: "稗田阿礼", power: 76, hp: 124, attribute: "CULTURE", desc: "飛鳥時代から奈良時代の官人。天武天皇の舎人。一度見聞きしたものは決して忘れないという並外れた驚異的な記憶力の持ち主であったとされる。天武天皇の命により、『帝紀』（天皇の系譜）や『旧辞』（朝廷の神話や伝承）を暗誦し、のちにその内容を太安万侶が筆録することで『古事記』が編纂された。性別も含めてその生涯の多くは謎に包まれている。", skill: { name: "驚異の暗誦", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 633, name: "舎人親王", power: 80, hp: 120, attribute: "CULTURE", desc: "奈良時代初期の皇族。天武天皇の皇子。元正天皇の時代の720年、政府の命を受けて藤原不比等らとともに編纂作業を進めてきた、日本最初の官撰正史である『日本書紀』全30巻を完成させた。漢文の編年体で記されたこの書物は、中国の史書にならって国家の威信を内外に示す目的があり、以後の「六国史」の編纂へとつながる歴史的偉業となった。", skill: { name: "日本書紀の編纂", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 634, name: "淡海三船", power: 108, hp: 92, attribute: "CULTURE", desc: "奈良時代後期の貴族・文人。天智天皇の曽孫で、大友皇子（弘文天皇）の孫にあたる。漢詩文に極めて優れ、石上宅嗣とともに「文人の首（第一人者）」と称賛された。神武天皇から元正天皇までの歴代天皇の「漢風諡号」を一括して撰定したことで知られる。また、来日した鑑真の弟子の証言をもとに伝記『唐大和上東征伝』を著し、その苦難の旅を後世に伝えた。", skill: { name: "漢風諡号の撰定", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 635, name: "石上宅嗣", power: 111, hp: 89, attribute: "CULTURE", desc: "奈良時代後期の公卿・文人。物部氏の末裔。淡海三船と並び称される当代随一の漢詩人であり、現存する日本最古の漢詩集『懐風藻』の編者とする説が有力である。仏教への信仰も厚く、旧宅を寺に改めて「芸亭（うんてい）」という書庫を設け、自身が収集した数多くの典籍を好学の徒に自由に閲覧させた。これは日本最初の公開図書館とされている。", skill: { name: "芸亭の公開", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 636, name: "高階隆兼", power: 98, hp: 102, attribute: "CULTURE", desc: "鎌倉時代後期の宮廷絵師。朝廷の絵所預を務め、大和絵の最高峰として活躍した。藤原氏の氏神である春日大社の霊験と藤原氏の繁栄を、極めて精緻で華麗な筆致で描いた全20巻の大作絵巻物『春日権現験記絵』の作者として著名である。絹地に極彩色で描かれたこの作品は、鎌倉時代における貴族や武士の生活風俗を知るための第一級の史料となっている。", skill: { name: "春日大社の霊験", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 637, name: "藤原信実", power: 113, hp: 87, attribute: "CULTURE", desc: "鎌倉時代前期の画家・公家。藤原隆信の子。父の画風を受け継ぎ、対象の顔つきや個性を極めてリアルに写し取る「似絵」という日本独自の肖像画の技法を完成させた。「後鳥羽上皇像」や、歌人たちの姿を描いた『三十六歌仙絵巻』などの傑作を残し、鎌倉時代の武士や貴族の精神性を表現する写実的な肖像画文化の最盛期を築き上げた天才絵師。", skill: { name: "似絵の完成", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 638, name: "藤原隆信", power: 105, hp: 95, attribute: "CULTURE", desc: "平安時代末期から鎌倉時代初期の画家・公家。藤原信実の父。それまで類型的に描かれていた人物画から脱却し、個人の風貌をリアルに写し取る「似絵」の創始者とされる。京都の神護寺に伝来する国宝の肖像画「伝源頼朝像」「伝平重盛像」「伝藤原光能像」の作者と長年伝えられており、武家の力強さや貴族の威厳を鋭く描き出したとされる。", skill: { name: "似絵の創始", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 639, name: "尊円入道親王", power: 109, hp: 91, attribute: "CULTURE", desc: "鎌倉時代後期から南北朝時代の皇族・書家。伏見天皇の第6皇子。天台座主を務めた。日本の伝統的な和様の書風に、宋から伝来した力強い書風を調和させ、「青蓮院流」と呼ばれる実用的で美しく読みやすい新しい書道の流派を確立した。この書風は室町幕府の公文書に採用され、江戸時代には「御家流」として武士から庶民の寺子屋まで広く普及した。", skill: { name: "青蓮院流の筆", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 640, name: "長光", power: 125, hp: 75, attribute: "CULTURE", desc: "鎌倉時代後期の備前国（現在の岡山県）の刀工。長船派の祖である光忠の子。備前長船派は砂鉄と良質な水・木炭に恵まれた地で発展し、長光はその技術を極め、「大般若長光」などの名刀を鍛造して備前物の名声を全国に高めた。実践的で折れにくく、かつ丁子乱れなどの華麗な刃文を持つ彼の刀は、多くの武将たちにこよなく愛された。", skill: { name: "備前長船の名刀", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 641, name: "正宗", power: 133, hp: 67, attribute: "CULTURE", desc: "鎌倉時代末期の相模国（鎌倉）の刀工。「相州正宗」と呼ばれる。モンゴル襲来を経験した武士たちが求める、兜や鎧を断ち切るほどの強靭な刀を追求し、硬軟の鉄を組み合わせる独自の鍛造法を編み出して「相州伝」を完成させた。その作は日本刀の最高峰と称され、のちの豊臣秀吉や徳川将軍家などの天下人によって至宝として珍重された。", skill: { name: "相州伝の極み", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 642, name: "粟田口吉光", power: 121, hp: 79, attribute: "CULTURE", desc: "鎌倉時代中期の山城国（京都）の刀工。「藤四郎吉光」とも呼ばれる。短刀や短剣の制作において並ぶ者がいないほどの名手であり、直刃の美しい刃文を特徴とする山城伝を代表する名工。正宗・郷義弘とともに「天下三作」と称される。彼が鍛えた名物「平野藤四郎」や「厚藤四郎」などの短刀は、大名たちの間で恩賞や贈答品として最高の価値を持った。", skill: { name: "天下三作の短刀", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 643, name: "加藤景正", power: 110, hp: 90, attribute: "CULTURE", desc: "鎌倉時代初期の伝説的な陶工。「藤四郎」の通称で知られる。1223年に曹洞宗の開祖である道元に従って南宋へ渡り、最先端の陶器の製造法や釉薬の技術を深く学んだとされる。帰国後、良質な土を求めて全国を歩き、尾張国の瀬戸に窯を開いて日本で初めて本格的な釉薬をかけた陶器を作り、「瀬戸焼」の祖となったと語り継がれている。", skill: { name: "瀬戸焼の祖", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 644, name: "吉田光由", power: 104, hp: 96, attribute: "CULTURE", desc: "江戸時代前期の和算家。京都の角倉一族の出身。中国の数学書『算法統宗』を研究し、日本の日常の経済生活に合わせて応用し、1627年に名著『塵劫記』を出版した。そろばん（珠算）の詳しい使い方や、土地の測量、金利の計算などを豊富な挿絵を用いてわかりやすく解説し、江戸時代を通じて庶民の数学教育のバイブルとして爆発的なベストセラーとなった。", skill: { name: "塵劫記の計算", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 645, name: "関孝和", power: 130, hp: 70, attribute: "CULTURE", desc: "江戸時代前期の数学者。甲府藩士から幕臣となる。吉田光由の『塵劫記』から始まった日本の和算を、世界最高水準にまで引き上げた「算聖」。独自の代数記号（傍書法）を考案し、円周率の精緻な計算や、西洋のライプニッツより早く行列式を発見するなど、1674年の著書『発微算法』を通じて高等数学における画期的な業績を次々と打ち立てた。", skill: { name: "算聖の微分積分", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 646, name: "建部賢弘", power: 118, hp: 82, attribute: "CULTURE", desc: "江戸時代中期の和算家。関孝和の最も優秀な高弟。8代将軍徳川吉宗にその才能を見出されて幕臣として登用され、吉宗の命を受けて日本全国の正確な地図（日本総図）の作成事業を主導した。和算においては、円周率の計算をさらに進め、無限級数展開を用いて円周率を41桁まで正確に算出するという、当時の世界的にも驚異的な偉業を成し遂げた。", skill: { name: "円理の極致", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 647, name: "渋川春海", power: 122, hp: 78, attribute: "CULTURE", desc: "江戸時代前期の天文学者・囲碁棋士。安井算哲とも称する。800年以上使われて誤差が生じていた唐の宣明暦の誤りを指摘し、自ら天体観測を行って中国の授時暦を日本向けに改良した「貞享暦」を作成。1684年に幕府に採用させ、日本独自の暦を初めて完成させた。この功績により初代の幕府天文方に任じられ、地球儀や天球儀の製作も行った。", skill: { name: "貞享暦の作成", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 648, name: "戸田茂睡", power: 102, hp: 98, attribute: "CULTURE", desc: "江戸時代前期の歌学者・国学者。中世以来の古今伝授など権威化された秘伝の無意味さを痛烈に批判し、和歌において「制の詞」と呼ばれる使用を禁じられた言葉の規則を撤廃すべきだと主張した。和歌に日常語（俗語）を取り入れる自由を説き、著書『梨本集』などで実証的な和歌研究を行い、契沖とともに近代的な国学発展の先駆的な役割を果たした。", skill: { name: "制の詞の打破", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 649, name: "北村季吟", power: 106, hp: 94, attribute: "CULTURE", desc: "江戸時代前期の歌学者・俳人。松永貞徳に師事して貞門派の俳諧を学んだが、古典研究において極めて大きな業績を残した。『源氏物語湖月抄』や『枕草子春曙抄』など、難解な古典文学の注釈を平易な言葉でまとめた啓蒙的な注釈書を次々と著し、古典を一部の貴族から一般庶民の教養へと広く開放した。のちに幕府の初代歌学方に任命された。", skill: { name: "源氏物語湖月抄", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 650, name: "富永仲基", power: 115, hp: 85, attribute: "CULTURE", desc: "江戸時代中期の大坂の町人学者。懐徳堂に学んだが、その合理的で過激な思想のために破門された。『出定後語』において「大乗非仏説」を提唱し、現在の大乗仏教の経典は釈迦が直接説いたものではないと歴史学的に厳密に証明した。さらに儒教・仏教・神道をすべて批判し、日本の風土に合った「誠の道」を主張した、当時極めて先駆的な無神論的思想家。", skill: { name: "大乗非仏説", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 651, name: "山片蟠桃", power: 112, hp: 88, attribute: "CULTURE", desc: "江戸時代後期の大坂の町人学者。大両替商・升屋の番頭として主家を再建する実務の傍ら、懐徳堂で中井竹山らに学んだ。西洋の天文学を取り入れた主著『夢の代』において地動説を支持し、神代の神話や迷信を徹底して否定する「無鬼論（無神論）」を主張。町人ならではの極めて合理的で唯物論的な独自の思想体系を構築した異色の知識人。", skill: { name: "無鬼論の合理", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.85 } },
  { id: 652, name: "貝原益軒", power: 75, hp: 125, attribute: "CULTURE", desc: "江戸時代前期の朱子学者・本草学者。筑前国福岡藩に仕える。儒学においては理気二元論を批判して独自の実学を重んじた。科学的で実証的な観察にもとづき、日本最初の本格的な本草学（植物・薬物学）の書である『大和本草』を編纂し、多くの動植物を分類した。また、女性の道徳を説いた『女大学』などの平易な教訓書を著し、庶民教育に貢献した。", skill: { name: "大和本草の編纂", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 653, name: "稲生若水", power: 101, hp: 99, attribute: "CULTURE", desc: "江戸時代前期の医学者・本草学者。伊藤仁斎に古義学を学んだのち、医学と本草学に転じた。前田綱紀に招かれて加賀藩に仕え、中国や日本の膨大な動植物・鉱物に関する書物を分類・整理した百科事典『庶物類纂』の編纂を開始した（死後に弟子が完成）。日本の本草学を単なる薬物学から自然博物学へと引き上げる基礎を作った先駆者。", skill: { name: "庶物類纂", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 654, name: "野呂元丈", power: 107, hp: 93, attribute: "CULTURE", desc: "江戸時代中期の医学者・蘭学者。稲生若水に本草学を学ぶ。8代将軍徳川吉宗にその実証的な学風を認められて幕府の奥医師に抜擢された。吉宗の命を受けて青木昆陽とともにオランダ語を学び、オランダのドドネウスの植物書を翻訳した『阿蘭陀本草和解』を著述。これが日本における本格的な蘭学発展の最初の礎石となった重要な業績である。", skill: { name: "蘭学の端緒", desc: "敵全員の歴史力を20%減少させる", type: "debuff_all", value: 0.2, rate: 0.8 } },
  { id: 655, name: "青木昆陽", power: 67, hp: 133, attribute: "CULTURE", desc: "江戸時代中期の儒学者・蘭学者。町人の出身だが、伊藤東涯に学んだのち江戸町奉行の大岡忠相に見出された。吉宗の命で飢饉対策としてサツマイモ（甘藷）の栽培法を研究した『蕃薯考』を著し、「甘藷先生」と呼ばれて多くの農民を餓死から救った。また野呂元丈とともにオランダ語を学び、『和蘭文字略考』を著して蘭学草創期を牽引した。", skill: { name: "甘藷先生の救荒", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 656, name: "宇田川玄随", power: 108, hp: 92, attribute: "CULTURE", desc: "江戸時代後期の蘭方医・蘭学者。美作国津山藩の藩医。大槻玄沢や桂川甫周らと交流して深い蘭学の知識を得た。オランダ人のゴルテルの内科書を翻訳し、1793年に日本最初の西洋内科学の専門書である『西説内科撰要』として刊行した。この書物は、これまでの漢方医学に代わる近代的な西洋医学の診断と治療法を日本の医学界に定着させた。", skill: { name: "西説内科撰要", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 657, name: "稲村三伯", power: 111, hp: 89, attribute: "CULTURE", desc: "江戸時代後期の蘭学者・蘭方医。鳥取藩の藩医。江戸に出て大槻玄沢の芝蘭堂に入門し、わずか1年でオランダ語を習得した天才。蘭学を学ぶ者にとって辞書がないことが最大の障壁であったため、宇田川玄随らとともにハルマの蘭仏辞書を苦心の末に翻訳し、1796年に日本最初の蘭和辞典である『ハルマ和解（江戸ハルマ）』を完成させた。", skill: { name: "江戸ハルマの完成", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 658, name: "志筑忠雄", power: 123, hp: 77, attribute: "CULTURE", desc: "江戸時代後期の蘭学者・天文学者。長崎のオランダ通詞の家に生まれたが、病のため通詞を辞して蘭書の翻訳と天文学の研究に生涯を捧げた。ニュートン力学やコペルニクスの地動説を体系的に紹介した『暦象新書』を著述。「重力」「遠心力」などの科学用語を考案した。また、ケンペルの『日本誌』の一部を訳し、初めて「鎖国」という言葉を生み出した。", skill: { name: "鎖国という概念", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 659, name: "伊東玄朴", power: 117, hp: 83, attribute: "CULTURE", desc: "幕末の蘭方医。肥前国の農家の出身だが、長崎の鳴滝塾でシーボルトに近代医学を深く学んだ。江戸に蘭学塾「象桑塾」を開き、大槻俊斎らとともに幕府に働きかけて「お玉ヶ池種痘所」を設立し、猛威を振るっていた天然痘の予防（牛痘法）に絶大な貢献をした。のちに蘭方医として初めて幕府の奥医師や将軍の侍医に登用され、西洋医学の公認を勝ち取った。", skill: { name: "種痘所の設立", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 660, name: "高野長英", power: 129, hp: 71, attribute: "CULTURE", desc: "幕末の蘭学者・医師。陸奥国水沢の出身。鳴滝塾でシーボルトから医学や広範な西洋科学を学び、渡辺崋山らと尚歯会を結成した。モリソン号事件に対する幕府の強硬な打払政策を『戊戌夢物語』を著して痛烈に批判したため、蛮社の獄で終身刑となる。のちに牢から脱獄し、薬品で顔を焼いて偽名で逃亡生活を続けたが、江戸で捕吏に襲われ自刃した。", skill: { name: "戊戌夢物語", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 662, name: "大伴御行", power: 70, hp: 130, attribute: "VALOR", desc: "飛鳥時代の大連。壬申の乱において大海人皇子（天武天皇）の軍の将として大和方面で激戦を指揮し、大友皇子側の近江朝廷軍を打ち破る大功を立てた。天武天皇の厚い信任を受け、八色の姓の制定に伴い最高位の「真人」に次ぐ「朝臣」を賜り、軍事をつかさどる大伴氏の全盛期を築き上げた武断派の重鎮。", skill: { name: "大連の猛攻", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 663, name: "伊治呰麻呂", power: 122, hp: 78, attribute: "VALOR", desc: "奈良時代後期の蝦夷の族長。朝廷に帰順して陸奥国の郡司となったが、国司や按察使による差別的で過酷な支配に激怒し、780（宝亀11）年に多賀城を焼き討ちにする大反乱（宝亀の乱）を起こした。この反乱は東北地方全域に波及し、桓武天皇による数十年に及ぶ三十八年戦争（蝦夷征討）の引き金となった。", skill: { name: "多賀城焼き討ち", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.7 } },
  { id: 664, name: "渡辺綱", power: 78, hp: 122, attribute: "VALOR", desc: "平安時代中期の武将。嵯峨源氏の出で、源頼光に仕えた「頼光四天王」の筆頭。京都の一条戻橋において、美女に化けた鬼（茨木童子）の腕を名刀・髭切で斬り落としたという有名な伝説を持つ。剛勇無双の武士として恐れられ、鬼さえも逃げ出すとして、節分の豆まきにおいて「渡辺」姓の者は豆をまかなくてもよいという俗信を生んだ。", skill: { name: "戻橋の鬼斬り", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.95 } },
  { id: 665, name: "坂田金時", power: 60, hp: 140, attribute: "VALOR", desc: "平安時代中期の武将。幼名を金太郎といい、足柄山で熊を相撲で投げ飛ばすほどの怪力をもっていたところを源頼光に見出され、「頼光四天王」の一人として家臣となった伝説を持つ。大江山の酒呑童子退治などで大いに活躍し、のちの江戸時代には端午の節句の五月人形のモデルとして、健康と力強さの象徴として親しまれた。", skill: { name: "足柄の怪力", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 666, name: "源義光", power: 85, hp: 115, attribute: "VALOR", desc: "平安時代後期の武将。源頼義の三男で「新羅三郎」と称される。後三年合戦において、苦戦する兄・源義家を助けるために朝廷の制止を振り切って官を辞し、奥州へと駆けつけて清原氏の平定に多大な貢献をした。のちに常陸国や甲斐国に勢力を広げ、武田氏や佐竹氏、小笠原氏など東国の名門武家を数多く輩出する祖となった。", skill: { name: "新羅三郎の援軍", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 667, name: "安倍貞任", power: 72, hp: 128, attribute: "VALOR", desc: "平安時代後期の陸奥国の豪族。奥六郡を支配する安倍氏の首領として、朝廷の国司の支配に反抗し、独立した王国を築こうとした（前九年合戦）。源頼義率いる朝廷軍を黄海の戦いで大破するなど長年にわたり猛威を振るったが、最後は清原氏の援軍を得た源氏の軍勢の前に厨川柵で敗れ、斬首された誇り高き蝦夷の猛将。", skill: { name: "黄海の大破", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 668, name: "清原武則", power: 90, hp: 110, attribute: "VALOR", desc: "平安時代後期の出羽国の豪族。前九年合戦において、長引く戦乱に苦しむ源頼義の要請を受け、1万の大軍を率いて参戦した。その圧倒的な軍事力で安倍氏を滅亡に追い込み、功績により鎮守府将軍に任じられ、奥羽両国（東北地方全域）を支配する強大な権力を手にした。彼の一族はのちに後三年合戦で滅亡する。", skill: { name: "出羽の大軍", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 669, name: "平正盛", power: 84, hp: 116, attribute: "VALOR", desc: "平安時代後期の武将。伊勢平氏の出身。白河上皇の院政下において、北面の武士として重用され、出雲国で反乱を起こした源義親（源義家の子）を討伐して武名を轟かせた。この功績により、源氏にかわって平氏が武家の第一人者として台頭する決定的な契機を作り、のちの平清盛へと続く平氏政権の強固な土台を築き上げた。", skill: { name: "義親討伐", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 670, name: "源義賢", power: 88, hp: 112, attribute: "VALOR", desc: "平安時代末期の武将。源為義の次男で、木曾義仲の父。兄の源義朝と対立して東国に下り、上野国などを拠点に独自の勢力を築いて義朝の対抗馬となった。しかし、義朝の長男である「悪源太」源義平の急襲を受け、大蔵合戦において討ち死にした。彼が遺した義仲は信濃国に逃れ、のちに平氏打倒の兵を挙げることになる。", skill: { name: "大蔵の激突", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.7 } },
  { id: 671, name: "大庭景親", power: 76, hp: 124, attribute: "VALOR", desc: "平安時代末期の武将。相模国の有力な平氏方武士。1180年、伊豆で挙兵した源頼朝を石橋山の戦いで迎え撃ち、その大軍で頼朝を大敗させて洞窟へと追い詰めた。しかし頼朝を取り逃がしたため、のちに勢力を盛り返した頼朝軍と富士川の戦いで対峙することなく敗走し、最後は降伏して斬首された悲運の平家家人。", skill: { name: "石橋山の大勝", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 672, name: "源頼家", power: 65, hp: 135, attribute: "VALOR", desc: "鎌倉幕府の第2代将軍。源頼朝の嫡男。父の死後、若くして将軍職を継いだが、有力御家人による「十三人の合議制」が敷かれて独裁権力を制限された。これに反発して比企能員らと結び、北条氏と激しく対立（比企能員の乱）したが敗北。伊豆の修禅寺に幽閉されたのち、北条時政の刺客によって暗殺された悲劇の将軍。", skill: { name: "若き将軍の怒り", desc: "自身の歴史力を50%上昇させる", type: "buff_self", value: 0.5, rate: 0.5 } },
  { id: 673, name: "北畠具教", power: 92, hp: 108, attribute: "VALOR", desc: "戦国時代の伊勢国の国司・大名。塚原卜伝から剣術（新当流）の奥義「一つの太刀」を授けられた剣豪大名として名高い。織田信長の伊勢侵攻に激しく抵抗したが、大河内城の戦いで和睦を余儀なくされ、信長の次男（信雄）を養子として迎えた。のちに信長の命を受けた旧臣たちに襲撃され、自ら太刀を振るって奮戦するも暗殺された。", skill: { name: "一つの太刀", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 674, name: "朝倉孝景", power: 86, hp: 114, attribute: "VALOR", desc: "室町時代後期の武将。英林孝景と呼ばれる越前朝倉氏の初代当主。応仁の乱では西軍の主力として活躍したが、幕府から越前守護職を約束されて東軍に寝返り、戦乱の勝敗を決定づけた。主家の斯波氏を追放して越前一国を平定し、分国法『朝倉孝景条々』を制定して一乗谷に家臣を集住させるなど、戦国大名の先駆けとなった。", skill: { name: "英林の家法", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.8 } },
  { id: 675, name: "斎藤龍興", power: 68, hp: 132, attribute: "VALOR", desc: "戦国時代の美濃国の戦国大名。斎藤義龍の子で、斎藤道三の孫。酒色に溺れて政務を怠ったため、竹中半兵衛に居城である稲葉山城をわずかな手勢で乗っ取られるという屈辱を味わう。その後、織田信長の猛攻を受けて美濃を追われ、諸国を流浪したのち、朝倉義景軍に加わって信長に挑んだが刀根坂の戦いで討死した。", skill: { name: "没落の流浪", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 676, name: "三好長逸", power: 89, hp: 111, attribute: "VALOR", desc: "戦国時代の武将。「三好三人衆」の筆頭。三好長慶の死後、松永久秀とともに室町幕府13代将軍・足利義輝を暗殺（永禄の変）して畿内の実権を握った。のちに松永とも対立し、東大寺大仏殿の戦いで大仏を焼失させる。織田信長が上洛すると激しく抵抗を続けたが、野田城・福島城の戦いで敗れ、歴史の表舞台から姿を消した。", skill: { name: "三人衆の筆頭", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 677, name: "森蘭丸", power: 62, hp: 138, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。名は成利。織田信長の小姓として幼少から仕え、その類まれな美貌と機転の利く聡明さから信長に異常なほど寵愛された。使者や奉行としても極めて有能に立ち働き、若くして美濃岩村城を与えられる。本能寺の変において、明智光秀の軍勢から主君を守るため最後まで槍を振るって討ち死にした。", skill: { name: "至高の忠誠", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.7 } },
  { id: 678, name: "松平忠吉", power: 74, hp: 126, attribute: "VALOR", desc: "安土桃山時代から江戸時代初期の武将。徳川家康の四男。関ヶ原の戦いにおいて、舅である井伊直政とともに東軍の先鋒を抜け駆けして宇喜多秀家軍に発砲し、天下分け目の戦いの火蓋を切った。本戦で島津軍の退き口を追撃して重傷を負い、戦後に尾張清洲藩52万石の大名となったが、その戦傷がもとで28歳の若さで早世した。", skill: { name: "関ヶ原の先駆け", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 679, name: "村上武吉", power: 80, hp: 120, attribute: "VALOR", desc: "戦国時代の武将。能島村上水軍の当主。瀬戸内海の制海権を握り、「海賊大名」として恐れられた。毛利元就と結んで厳島の戦いで毛利軍を勝利に導き、第一次木津川口の戦いでも焙烙火矢を用いて織田信長の強力な水軍を壊滅させた。しかし、秀吉の海賊停止令によってその特権を奪われ、水軍としての独立を失った。", skill: { name: "焙烙火矢の嵐", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.88 } },
  { id: 680, name: "毛利輝元", power: 81, hp: 119, attribute: "VALOR", desc: "戦国時代から江戸時代初期の大名。毛利元就の孫。中国地方112万石の強大な大名として豊臣秀吉に仕え、五大老の一人となった。関ヶ原の戦いにおいて、石田三成に担がれて西軍の総大将となったが、大坂城から動かず、一族の吉川広家の内通によって本戦にも不参加のまま敗北。戦後に周防・長門の2国に大幅に減封された。", skill: { name: "西軍総大将", desc: "敵HPの30%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.3, rate: 0.6 } },
  { id: 681, name: "北条氏直", power: 77, hp: 123, attribute: "VALOR", desc: "戦国時代から安土桃山時代の大名。後北条氏の第5代（最後）の当主。徳川家康の娘・督姫を正室に迎え、関東に240万石とも言われる最大版図を築いた。しかし、名胡桃城の奪取事件を機に豊臣秀吉の小田原攻めを招き、圧倒的な大軍の前に約3カ月の籠城戦の末に降伏。義父・家康の助命嘆願で高野山へ追放されたのち病没した。", skill: { name: "相模の落日", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 682, name: "上村彦之丞", power: 83, hp: 117, attribute: "VALOR", desc: "明治から大正期の海軍大将。薩摩藩出身。日露戦争において第二艦隊司令長官を務め、蔚山沖海戦でロシアのウラジオストク巡洋艦隊を撃破して日本海の制海権を確保した。その際、沈没する敵艦の乗組員600名余りを救助した行動は、武士道精神に基づく人道的措置として国内外から広く称賛された「海の猛将」。", skill: { name: "蔚山沖の情け", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.6 } },
  { id: 683, name: "山口素臣", power: 87, hp: 113, attribute: "VALOR", desc: "明治時代の陸軍大将。長州藩出身で奇兵隊に入り戊辰戦争を戦う。日清戦争において旅順攻略に貢献し、1900年の北清事変（義和団戦争）では、北京の公使館区域に籠城する列国の人々を救出するため、第5師団長として日本軍を率いて進撃した。各国連合軍の中で最も規律正しく勇猛に戦い、日本の国際的評価を大きく高めた。", skill: { name: "北京の解放", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 684, name: "福島安正", power: 79, hp: 121, attribute: "VALOR", desc: "明治から大正期の陸軍大将。情報将校として卓越した語学力を持ち、シベリア単騎横断という前人未到の壮挙を成し遂げてロシアの軍事情報を収集した。日清戦争や北清事変で活躍し、日露戦争では大本営参謀としてロシア軍の後方攪乱（満洲義軍の組織）を指揮し、情報戦と諜報活動によって日本の勝利を影で支えた英雄。", skill: { name: "シベリア単騎横断", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 685, name: "奥保鞏", power: 73, hp: 127, attribute: "VALOR", desc: "明治から大正期の陸軍元帥・大将。小倉藩出身。旧幕府軍として戊辰戦争を戦い敗北したが、のちに陸軍に登用される。日露戦争では第2軍司令官として出陣し、南山・得利寺の戦いや遼陽・沙河会戦において、常に最前線で激しい突撃を指揮してロシア軍を圧倒し、薩長出身者以外で元帥にまで上り詰めた叩き上げの猛将。", skill: { name: "南山の激突", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 686, name: "橘周太", power: 67, hp: 133, attribute: "VALOR", desc: "明治時代の陸軍軍人（中佐）。日露戦争の遼陽会戦の前哨戦である首山堡の戦いにおいて、第34連隊の第1大隊長として最前線で夜襲を指揮した。ロシア軍の機関銃の猛烈な十字砲火を浴びて全身に銃弾を受けながらも、軍刀を杖にして立ち上がり部下を鼓舞し続けて壮絶な戦死を遂げ、「軍神・橘中佐」として広く国民に讃えられた。", skill: { name: "首山堡の軍神", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 687, name: "板垣征四郎", power: 95, hp: 105, attribute: "VALOR", desc: "昭和期の陸軍大将。関東軍の高級参謀として石原莞爾らとともに柳条湖事件を謀略し、満洲事変を引き起こして満洲国を建国した中核的人物。日中戦争が泥沼化するなかで第1次近衛内閣の陸軍大臣に就任し、国家総動員法の制定を推し進めて戦時体制を強化した。戦後、極東国際軍事裁判においてA級戦犯として処刑された。", skill: { name: "満洲国の謀略", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.7 } },
  { id: 688, name: "米内光政", power: 64, hp: 136, attribute: "VALOR", desc: "昭和期の海軍大将・政治家。海軍大臣として山本五十六や井上成美を登用し、日独伊三国同盟に強硬に反対して戦争回避に尽力した「海軍の良識」。のちに首相となるが陸軍の圧力で倒閣。太平洋戦争末期には再び海軍大臣として入閣し、鈴木貫太郎首相を支えてポツダム宣言受諾と終戦工作に極めて大きな役割を果たした。", skill: { name: "海軍の良識", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.8 } },
  { id: 689, name: "大蔵春実", power: 69, hp: 131, attribute: "VALOR", desc: "平安時代中期の武将。大宰府の役人。941年に瀬戸内海で反乱を起こした藤原純友の軍勢が大宰府を焼き討ちにした際、追捕使の小野好古に従って水軍を率いて博多湾で純友軍を大破した。この武功により、彼の子孫は大蔵氏として九州で広く繁栄し、秋月氏や高橋氏などの九州の有力武家へと発展していく基礎を作った。", skill: { name: "博多湾の追捕", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.7 } },
  { id: 690, name: "安倍宗任", power: 71, hp: 129, attribute: "VALOR", desc: "平安時代後期の陸奥国の豪族。安倍頼時の子で貞任の弟。前九年合戦において兄とともに源頼義の朝廷軍に激しく抵抗し、黄海の戦いなどで大勝した。厨川柵の陥落で捕らえられて伊予国に流罪となった際、都の貴族に梅の花を示されて和歌を求められ、「わが国の梅の花とは見つれども 大宮人はいかがいふらむ」と優雅に返し都人を驚かせた。", skill: { name: "蝦夷の雅歌", desc: "自軍のHPを最大HPの25%回復する", type: "heal_hp", value: 0.25, rate: 0.8 } },
  { id: 697, name: "巨勢徳太", power: 88, hp: 112, attribute: "STRATEGY", desc: "飛鳥時代の有力な廷臣。乙巳の変において中大兄皇子に協力し、事件直後に蘇我氏の軍勢を説得して解散させるという重要な役割を果たした。大化改新後の新政府では左大臣・阿倍内麻呂、右大臣・蘇我倉山田石川麻呂に次ぐ大紫の冠位を受け、のちに左大臣に昇進して白村江の戦い前夜の緊迫した外交・防衛政策の舵取りを行った。", skill: { name: "蘇我軍の説得", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 721, name: "菩提僊那", power: 85, hp: 115, attribute: "CULTURE", desc: "奈良時代のインド（天竺）出身の渡来僧。ベトナム、中国を経て736年に日本へ渡来し、大安寺に住んで華厳経などの教えを伝えた。752年に聖武太上天皇らによって盛大に挙行された東大寺大仏開眼供養会において、大仏の目に墨を入れる重要な儀式である「開眼導師」を務め、天平文化の国際性の豊かさを象徴する人物となった。", skill: { name: "大仏開眼導師", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.7 } },
  { id: 722, name: "良弁", power: 80, hp: 120, attribute: "CULTURE", desc: "奈良時代の華厳宗の僧。幼少時に鷲にさらわれて二月堂の杉の木に置き去りにされたという伝説を持つ。聖武天皇の厚い信任を受け、国家事業である東大寺の建立計画を仏教的・思想的な面から深く指導し、初代の東大寺別当（長官）に就任した。華厳宗の教え（一即多・多即一）を用いて、鎮護国家の思想を理論づけた大僧正。", skill: { name: "東大寺初代別当", desc: "自軍のHPを最大HPの35%回復する", type: "heal_hp", value: 0.35, rate: 0.6 } },
  { id: 723, name: "真済", power: 82, hp: 118, attribute: "CULTURE", desc: "平安時代初期の真言宗の僧。空海（弘法大師）の十大弟子の一人で、師に深く寵愛された。優れた漢詩文の才能を持ち、空海が作成した上表文や詩賦、書簡などを集めて編纂し、日本初の個人の漢詩文集である『性霊集（遍照発揮性霊集）』を完成させた。これにより空海の思想や文学的才能、そして密教の教えが後世に伝えられることとなった。", skill: { name: "性霊集の編纂", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.85 } },
  { id: 724, name: "安然", power: 90, hp: 110, attribute: "CULTURE", desc: "平安時代前期の天台宗の僧。円仁に連なる山門派の学僧で、最澄や円仁、円珍らが唐から持ち帰った膨大な密教の教義を体系的に整理した。天台宗の教えにおいて密教を最高のものとする「理同事勝」の理論を確立し、天台密教（台密）を真言密教（東密）に対抗しうる一つの完成された教学として大成させた比叡山の重鎮。", skill: { name: "台密の大成", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.8 } },
  { id: 725, name: "紀長谷雄", power: 78, hp: 122, attribute: "CULTURE", desc: "平安時代前期の学者・漢詩人・公卿。菅原道真と並び称される当代随一の文人であり、文章経国の思想のもとで宮廷の公文書の起草を多く担った。『竹取物語』の作者とする説もある。羅城門で鬼と双六をして美女を勝ち取ったという「紀長谷雄草紙」の伝説の主人公としても知られ、平安初期の漢文学の隆盛を支えた知の巨人。", skill: { name: "羅城門の双六", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 726, name: "紀友則", power: 75, hp: 125, attribute: "CULTURE", desc: "平安時代前期の宮廷歌人。紀貫之の従兄弟にあたり、三十六歌仙の一人。醍醐天皇の命を受け、貫之や凡河内躬恒らとともに最初の勅撰和歌集である『古今和歌集』の撰者に選ばれたが、完成を待たずに没した。「ひさかたの 光のどけき 春の日に しづ心なく 花の散るらむ」という桜の散る様子を詠んだ名歌で広く知られている。", skill: { name: "春の日の桜花", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 727, name: "喜撰法師", power: 88, hp: 112, attribute: "CULTURE", desc: "平安時代前期の僧侶・歌人。六歌仙の一人。京都南部の宇治山に隠棲して庵を結んだとされる。「わが庵は 都のたつみ しかぞすむ 世をうぢ山と 人はいふなり」という、自らの隠遁生活を詠んだ和歌一首のみが『古今和歌集』に採録されており、その生涯はほとんど謎に包まれているが、後世の茶（宇治茶）の銘柄にも名を残す伝説的歌人。", skill: { name: "宇治の隠遁", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 728, name: "大弐三位", power: 84, hp: 116, attribute: "CULTURE", desc: "平安時代中期の女流歌人。本名は藤原賢子。紫式部と藤原宣孝の一人娘。母の才能を受け継ぎ、優れた和歌を多数残した。母に代わって藤原彰子に仕え、のちに後冷泉天皇の乳母となるなど宮廷で高い地位を占めた。『百人一首』に「有馬山 猪名の笹原 風吹けば いでそよ人を 忘れやはする」の情熱的な歌が収められている。", skill: { name: "有馬山の風", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 729, name: "慶滋保胤", power: 76, hp: 124, attribute: "CULTURE", desc: "平安時代中期の文人・僧侶。はじめ大学寮で紀伝道を学んで文章生となったが、仏教への信仰を深めて出家した。源信の『往生要集』に先駆けて、念仏による極楽往生を遂げた人々の伝記を集めた日本初の往生伝である『日本往生極楽記』を著した。また、京都の都市生活の喧騒を逃れて隠遁を志向する『池亭記』を執筆し、隠者文学の祖となった。", skill: { name: "池亭の隠遁", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 730, name: "証空", power: 72, hp: 128, attribute: "CULTURE", desc: "鎌倉時代前期の僧。法然の高弟であり、西山義（のちの浄土宗西山派）の祖。法然の『選択本願念仏集』の執筆を補佐するなど教学に優れていた。師の没後、他の門弟たちが念仏の解釈を巡って対立するなかで、天台宗の教理を用いて浄土教を理論化し、京都の公家社会や武士層に専修念仏の教えを広く浸透させることに成功した。", skill: { name: "西山義の念仏", desc: "相手が【軍事】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 731, name: "孤雲懐奘", power: 86, hp: 114, attribute: "CULTURE", desc: "鎌倉時代前期の曹洞宗の禅僧。比叡山で天台宗を学んだのち、帰国した道元に深く帰依してその筆頭弟子となった。道元が越前国に永平寺を開くとこれに従い、師の厳しい修行を支えた。道元の没後に永平寺の第2代住持となり、道元の説法や教えを忠実に記録した『正法眼蔵随聞記』を編纂して、曹洞禅の純粋な思想を後世に伝えた。", skill: { name: "随聞の記録", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 732, name: "兀庵普寧", power: 81, hp: 119, attribute: "CULTURE", desc: "鎌倉時代中期に南宋から渡来した禅僧。蘭渓道隆の招きを受けて来日し、第5代執権・北条時頼の厚い帰依を受けて建長寺の第2代住持となった。時頼に対して、公案を用いて厳格な悟りを求める本格的な臨済禅を直接指導し、武家政権のトップが自ら禅の修行に打ち込むという、鎌倉武士と禅宗が深く結びつく決定的な契機を作った。", skill: { name: "執権への指南", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.7 } },
  { id: 733, name: "他阿真教", power: 74, hp: 126, attribute: "CULTURE", desc: "鎌倉時代後期の時宗の僧。時宗の開祖である一遍の筆頭弟子で、第2代遊行上人。一遍の死後、自然消滅の危機にあった教団を組織化し、「時宗」としての独立した教団体制を確立した。一遍の足跡をたどって全国を遊行して踊念仏を広め、武士から庶民まで熱狂的な信者を獲得し、時宗を鎌倉時代における最大の教団の一つに育て上げた。", skill: { name: "遊行の教団化", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 734, name: "日朗", power: 79, hp: 121, attribute: "CULTURE", desc: "鎌倉時代後期の法華宗（日蓮宗）の僧。日蓮の高弟（六老僧）の一人。日蓮が鎌倉幕府によって佐渡へ流罪となった際にも師に付き従い、激しい弾圧と苦難を共にした。日蓮の死後は、池上本門寺や比企谷妙本寺を開いて関東における布教の拠点とし、武士や商人層に力強く法華経の信仰を広め、日蓮宗発展の強固な基礎を築いた。", skill: { name: "法華の布教", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 735, name: "春屋妙葩", power: 89, hp: 111, attribute: "CULTURE", desc: "室町時代初期の臨済宗の禅僧。夢窓疎石の甥で高弟。足利尊氏・義詮・義満の3代の将軍から絶大な帰依を受け、五山派の中心として活躍した。義満によって初代の「僧録」に任命され、幕府の権力と結びついて全国の禅宗寺院の人事や統制を司った。また、五山版（禅宗寺院での出版事業）を推進し、室町文化の発展に多大な貢献をした。", skill: { name: "初代僧録の権威", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 736, name: "中巌円月", power: 77, hp: 123, attribute: "CULTURE", desc: "南北朝時代の臨済宗の学僧。元に渡って本格的な禅と儒学を学んで帰国した。五山文学の代表的文人であり、足利尊氏らに重用された。仏教的視点から日本の歴史を記述した『日本書』を著し、神話時代の天皇の系譜に対する合理的な批判を試みたため、朝廷の激しい怒りを買って著書は発禁処分となり、彼自身も一時投獄される弾圧を受けた。", skill: { name: "日本書の合理", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 737, name: "飛鳥井雅有", power: 73, hp: 127, attribute: "CULTURE", desc: "鎌倉時代後期の公家・歌人・蹴鞠の達人。将軍の蹴鞠の師範として鎌倉幕府に出仕し、公家でありながら武家社会と深く関わった。京都と鎌倉を何度も往復し、その道中の見聞や武士との交流を『東関紀行』や『阿仏尼』の『十六夜日記』に続く優れた紀行日記『嵯峨野物語』や『春の深山路』に書き残し、東海道の宿場の様子を鮮やかに伝えた。", skill: { name: "東海道の蹴鞠", desc: "敵HPの20%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.2, rate: 0.8 } },
  { id: 738, name: "宗長", power: 83, hp: 117, attribute: "CULTURE", desc: "室町時代後期の連歌師。駿河の今川氏に仕えたのち、宗祇に師事して連歌を学んだ。師の宗祇、同門の肖柏とともに「水無瀬三吟百韻」を詠み、正風連歌の黄金期を築いた。今川氏や武田氏など戦国大名とも深く交わり、連歌を通じた文化的・政治的なネットワークを構築。また、自由で滑稽な『宗長手記』などの俳諧的な作品も残した。", skill: { name: "水無瀬の連歌", desc: "味方全員の歴史力を30%上昇させる", type: "buff_all", value: 0.3, rate: 0.7 } },
  { id: 739, name: "音阿弥", power: 87, hp: 113, attribute: "CULTURE", desc: "室町時代中期の猿楽師。世阿弥の甥で、観世座の三世大夫。将軍・足利義教の熱狂的な寵愛と庇護を受け、世阿弥を佐渡への流罪に追いやる形で観世座の実権を握った。義教をはじめとする武家や公家の前で数多くの華やかな演能を行い、能楽のパトロンを将軍家から広く大名層へと拡大させて、室町時代の能楽の全盛期を盤石なものとした。", skill: { name: "将軍の寵遇", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.92 } },
  { id: 740, name: "可翁", power: 70, hp: 130, attribute: "CULTURE", desc: "南北朝時代から室町時代初期にかけて活躍したとされる謎の画僧。生没年などその生涯の詳細は不明であるが、日本における初期水墨画の最高傑作とされる国宝『寒山拾得図』や『蜆子和尚図』の作者として知られる。中国の禅宗絵画の様式をいち早く吸収し、大胆で簡略化された力強い筆致によって、深い禅の精神的境地を見事に表現した。", skill: { name: "寒山拾得の悟り", desc: "受ける被ダメージを40%軽減する", type: "damage_cut", value: 0.4, rate: 0.6 } },
  { id: 741, name: "狩野山楽", power: 92, hp: 108, attribute: "CULTURE", desc: "安土桃山時代から江戸時代初期の絵師。浅井長政の旧臣であったが、狩野永徳に画才を見出されて養子となった。豊臣秀吉に仕えて大坂城の障壁画などを手掛け、永徳の豪壮な画風を受け継いだ『牡丹図襖』などの金碧障壁画の傑作を残した。豊臣氏滅亡後は徳川家康に追われたが、のちに赦免されて京都に留まり、京狩野の祖となった。", skill: { name: "京狩野の祖", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.5 } },
  { id: 742, name: "今井宗久", power: 95, hp: 105, attribute: "CULTURE", desc: "戦国時代から安土桃山時代の堺の豪商・茶人。武野紹鴎に茶を学び、千利休、津田宗及とともに「天下三宗匠」と称された。武具や火薬の取引で巨万の富を築き、織田信長が堺に矢銭（軍資金）を要求した際はいち早く服属して茶器を献上し、信長の茶頭として重用された。秀吉の代にも御用商人として活躍し、堺の自治と経済を裏から支えた。", skill: { name: "天下三宗匠", desc: "相手が【軍事】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.95 } },
  { id: 743, name: "名古屋山三郎", power: 68, hp: 132, attribute: "CULTURE", desc: "安土桃山時代の武将・伊達者。蒲生氏郷などに仕え、数々の武功を挙げた絶世の美男子として知られる。非常に派手で傾いた（かぶいた）装いを好み、出雲阿国と深い仲であったという伝説が広まった。彼が戦死したのち、阿国は彼を悼む亡霊劇を取り入れた「かぶき踊り」を演じて大流行させ、これが歌舞伎の起源となったと伝えられている。", skill: { name: "傾奇者の艶", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 744, name: "向井去来", power: 71, hp: 129, attribute: "CULTURE", desc: "江戸時代前期の俳人。松尾芭蕉の高弟で、蕉門十哲の一人。武士の身分を捨てて京都の嵯峨に落柿舎を結んで隠遁し、芭蕉を深く敬愛してその俳風の確立を支えた。芭蕉が京都に滞在した際の俳諧の理論や問答を詳細に記録した『去来抄』を編纂し、「不易流行」などの芭蕉の高度な芸術論を後世に正確に伝えるという極めて重要な役割を果たした。", skill: { name: "去来抄の記録", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 745, name: "辰松八郎兵衛", power: 69, hp: 131, attribute: "CULTURE", desc: "江戸時代中期（元禄期）の人形遣い。竹本義太夫が創設した竹本座において、近松門左衛門が脚本を書き、義太夫が語る人形浄瑠璃において、人形操りの最高の名手として活躍した。彼ら三人の才能の融合によって、『曽根崎心中』などの傑作が空前の大ヒットとなり、人形浄瑠璃は江戸時代の庶民を熱狂させる最高の総合芸術へと発展した。", skill: { name: "神業の人形遣い", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 746, name: "鈴木其一", power: 85, hp: 115, attribute: "CULTURE", desc: "江戸時代後期の画家。酒井抱一の最も優秀な一番弟子であり、江戸琳派の画風を受け継いだ。師の洗練された情緒的な作風をさらに推し進め、極めて鮮やかな色彩と、近代的で人工的なまでに計算された斬新な構図（『朝顔図屏風』や『夏秋渓流図屏風』）を用いて、幕末の江戸画壇に強烈な個性を放つ独自の装飾画の世界を確立した。", skill: { name: "江戸琳派の鬼才", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 747, name: "歌川国芳", power: 91, hp: 109, attribute: "CULTURE", desc: "江戸時代後期の浮世絵師。歌川豊国に学ぶ。水滸伝の英雄たちを描いた「武者絵」で大ブレイクし、武者絵の国芳と呼ばれた。天保の改革で華美な浮世絵が禁止されると、役者や遊女を猫や金魚などの動物に擬人化して幕府を強烈に風刺する「戯画」を次々と発表し、江戸の庶民から喝采を浴びた。奇想天外なアイデアで幕末の浮世絵界を席巻した。", skill: { name: "反骨の戯画", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 748, name: "伊藤東涯", power: 65, hp: 135, attribute: "CULTURE", desc: "江戸時代中期の儒学者。古義学の創始者・伊藤仁斎の長男。父の死後、京都の私塾「古義堂」を受け継ぎ、約40年にわたって多くの門人を育成して古義学派（堀川学派）の全盛期を築いた。語学や歴史学にも極めて造詣が深く、日本語の語源を研究した『制度通』などを著し、儒学にとどまらない幅広い学問の発展に大きく貢献した。", skill: { name: "古義堂の継承", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 749, name: "服部南郭", power: 67, hp: 133, attribute: "CULTURE", desc: "江戸時代中期の儒学者・漢詩人。荻生徂徠の高弟で、太宰春台とともに「徂徠門の双璧」と称された。経世済民（政治・経済）の実学を重んじた太宰春台に対し、南郭は詩文や芸術を重んじる文学的な分野で古文辞学を発展させた。唐の詩人の作品を集めた『唐詩選』を刊行して空前の大ベストセラーとなり、江戸時代の漢詩ブームを牽引した。", skill: { name: "唐詩選の流行", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 750, name: "伴信友", power: 66, hp: 134, attribute: "CULTURE", desc: "江戸時代後期の国学者。若狭国小浜藩の出身。本居宣長の没後の門人（夢中門人）を自称した。平田篤胤が宗教的な復古神道へと傾斜していったのに対し、信友は文献の厳密な考証を重んじる実証的な文献史学の道を進んだ。『史籍念忘』などの歴史的な考証書を数多く著し、国学を科学的な歴史研究へと高めた幕末の大学者である。", skill: { name: "実証の文献史学", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 751, name: "物部麁鹿火", power: 92, hp: 108, attribute: "VALOR", desc: "古墳時代後期の大連。継体天皇の命を受け、527年に新羅と結んで反乱をおこした九州北部の有力豪族・筑紫国造磐井を討伐するため、大軍を率いて九州へ向かった。激戦の末に磐井を討ち取り、ヤマト政権の九州支配を確固たるものにし、のちの屯倉設置など地方支配強化の契機を作った古代の猛将。", skill: { name: "磐井討伐", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 752, name: "藤原広嗣", power: 86, hp: 114, attribute: "VALOR", desc: "奈良時代中期の廷臣。藤原式家の宇合の子。大宰少弐に左遷されたことに不満を持ち、740年に吉備真備や玄昉の排除を名目に九州で大規模な反乱（藤原広嗣の乱）を起こした。しかし、大野東人率いる政府の討伐軍に敗れて斬られ、この乱に衝撃を受けた聖武天皇は恭仁京や紫香楽宮へと都を転々と移すことになった。", skill: { name: "大宰府の反乱", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 753, name: "平宗盛", power: 75, hp: 125, attribute: "VALOR", desc: "平安時代末期の武将・公卿。平清盛の三男。兄・重盛の死後、一門の棟梁となるが、温厚で武将としての覇気に欠けたとされる。源義仲の攻勢を受けて安徳天皇と三種の神器を奉じて都落ちし、一ノ谷・屋島と敗走を重ねる。壇ノ浦の戦いで平氏が滅亡した際に生け捕りとなり、鎌倉に護送されたのち近江国で斬首された。", skill: { name: "棟梁の苦悩", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 754, name: "平重衡", power: 88, hp: 112, attribute: "VALOR", desc: "平安時代末期の武将。平清盛の五男。武勇に優れ、治承・寿永の乱で平氏軍の主力として活躍。1180年、以仁王の挙兵に加担した南都（奈良）の寺社勢力を鎮圧に向かい、東大寺や興福寺の堂塔の大半を焼き尽くした（南都焼討）。一ノ谷の戦いで捕らえられ、のちに南都の衆徒の強い要求により引き渡されて木津川畔で斬首された。", skill: { name: "南都焼討", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.95 } },
  { id: 755, name: "源行家", power: 81, hp: 119, attribute: "VALOR", desc: "平安時代末期の武将。源為義の十男で頼朝の叔父。1180年、以仁王の平氏打倒の令旨を奉じて諸国をまわり、頼朝や義仲らの挙兵を促した源平争乱の火付け役。しかし自身には戦の才能や人望がなく、頼朝や義仲と次々に対立し、最後は義経と結んで頼朝に反旗を翻したが敗れ、和泉国で捕らえられて斬られた。", skill: { name: "令旨の伝達", desc: "味方全員の歴史力を20%上昇させる", type: "buff_all", value: 0.2, rate: 0.8 } },
  { id: 756, name: "安達景盛", power: 94, hp: 106, attribute: "VALOR", desc: "鎌倉時代前期の有力御家人。源頼朝から深い信任を受け、比企能員の乱などで北条氏に協力して武功を立てた。1221年の承久の乱では、北条政子の演説ののち、北条泰時とともにいち早く幕府軍の先鋒として上京し、朝廷軍を打ち破る大功を挙げた。のちに出家して高野山に入り、安達氏の有力御家人としての地位を固めた。", skill: { name: "承久の先鋒", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 757, name: "三浦泰村", power: 89, hp: 111, attribute: "VALOR", desc: "鎌倉時代中期の有力御家人。三浦義村の次男。評定衆として幕政に重きをなし、北条氏に次ぐ強大な勢力を誇った。しかし、第5代執権・北条時頼を擁する安達景盛らと激しく対立し、1247年の宝治合戦において鎌倉で武力衝突へと発展。激戦の末に敗れ、源頼朝の法華堂で一族500名余りとともに自刃し三浦氏は滅亡した。", skill: { name: "三浦の意地", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 758, name: "長崎高資", power: 95, hp: 105, attribute: "VALOR", desc: "鎌倉時代末期の武将。北条得宗家の被官である御内人の筆頭（内管領）。執権の北条高時が遊興に耽るなかで幕政の実権を完全に掌握し、専横を極めた。賄賂を横行させ、安藤氏の乱などの対応を誤り幕府の権威を失墜させた。新田義貞の鎌倉攻め（1333年）において、高時らとともに東勝寺で自刃し鎌倉幕府は滅亡した。", skill: { name: "内管領の専横", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 759, name: "高師泰", power: 98, hp: 102, attribute: "VALOR", desc: "南北朝時代の武将。足利尊氏の執事である高師直の兄弟。武勇に極めて優れ、師直とともに足利軍の主力として建武政権の打倒や南朝軍との戦いで数々の武功を挙げた。「ばさら」と呼ばれる権威を無視した傲慢な振る舞いで知られ、足利直義ら保守派と激しく対立した観応の擾乱の末に、師直とともに暗殺された。", skill: { name: "ばさらの猛進", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 760, name: "山名時氏", power: 91, hp: 109, attribute: "VALOR", desc: "南北朝時代から室町時代初期の守護大名。足利尊氏に従って武功を挙げ、伯耆や出雲などの守護となる。のちに尊氏と対立して一時は南朝に属し、京都を占領するなど幕府を大いに脅かした。その後、幕府に帰順して所領を安堵され、彼の子孫は全国66カ国のうち11カ国を領有する「六分一衆」と呼ばれる巨大な勢力となった。", skill: { name: "六分一衆の祖", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 761, name: "上杉憲顕", power: 87, hp: 113, attribute: "VALOR", desc: "南北朝時代の武将・守護大名。足利尊氏の母方の親戚にあたる。鎌倉公方である足利基氏を補佐して初代の関東管領（関東執事）に就任し、南朝勢力である新田氏らと戦って関東の平定に多大な貢献をした。一時、観応の擾乱で失脚したが復権し、以後、彼の子孫である山内上杉家が関東管領職を世襲する基礎を築き上げた。", skill: { name: "初代関東管領", desc: "受ける被ダメージを30%軽減する", type: "damage_cut", value: 0.3, rate: 0.8 } },
  { id: 762, name: "長尾景春", power: 93, hp: 107, attribute: "VALOR", desc: "室町時代後期の武将。関東管領・山内上杉家の家宰であったが、家督相続への不満から1476年に主家に対して大規模な反乱（長尾景春の乱）を起こした。関東の諸将を巻き込み、扇谷上杉家の家宰である太田道灌と各地で激しく戦ったが鎮圧された。この乱は享徳の乱とともに、関東地方における戦国時代の本格的な幕開けとなった。", skill: { name: "下克上の乱", desc: "相手が【政治】属性なら自身の歴史力を40%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.85 } },
  { id: 763, name: "清水宗治", power: 84, hp: 116, attribute: "VALOR", desc: "戦国時代の武将。毛利氏に属し、備中高松城の城主として織田信長の命を受けた羽柴秀吉の中国攻めに頑強に抵抗した。秀吉の奇策による大規模な「水攻め」を受け、本能寺の変の直後に城兵の助命を条件として開城に同意。水上に船を浮かべて見事な舞を舞ったのちに潔く切腹し、その武士の鑑たる姿勢は後世に語り継がれた。", skill: { name: "高松城の水攻め", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 764, name: "内藤昌豊", power: 96, hp: 104, attribute: "VALOR", desc: "戦国時代の武将。武田四天王の一人。武田信玄の副将格として数多くの合戦に参加し、「武田の副将」として軍政両面で主君を支えた。常に裏方に徹して功を誇らず、信玄から一度も感状（感謝状）をもらわなかったという逸話が残るほど実直な武将。長篠の戦いにおいて、崩壊する武田軍の中で最後まで奮戦し討ち死にした。", skill: { name: "無冠の副将", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 765, name: "高坂昌信", power: 85, hp: 115, attribute: "VALOR", desc: "戦国時代の武将。武田四天王の一人。農民の出身だが武田信玄に見出され、海津城の城代として越後の上杉謙信の防えという最重要の任を長年務めた。「逃げ弾正」の異名を持ち、退却戦や防御戦において類まれな戦術眼を発揮した。長篠の戦いの敗報を受けるとただちに軍を率いて勝頼を迎え、武田家崩壊の危機を一時的に救った。", skill: { name: "逃げ弾正の守り", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 766, name: "本多重次", power: 82, hp: 118, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。通称は作左衛門。「鬼作左」と恐れられた徳川家康の重臣で、三河一向一揆の鎮圧などで活躍し、行政官としても厳格な手腕を発揮した。長篠の戦いの陣中から妻に宛てた「一筆啓上 火の用心 お仙泣かすな 馬肥やせ」という、日本一短い手紙の作者として極めて有名である。", skill: { name: "鬼作左の一筆", desc: "相手が【文化】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.95 } },
  { id: 767, name: "森長可", power: 99, hp: 101, attribute: "VALOR", desc: "戦国時代から安土桃山時代の武将。森蘭丸の兄で、「鬼武蔵」の異名で恐れられた織田信長の猛将。甲州征伐で大功を挙げ、信濃国川中島を与えられた。本能寺の変後に領地を放棄して美濃へ戻り、羽柴秀吉に臣従した。小牧・長久手の戦いでは池田恒興とともに徳川家康の本拠地・三河を奇襲しようとしたが、家康の反撃に遭い討ち死にした。", skill: { name: "鬼武蔵の猛威", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.6 } },
  { id: 768, name: "松倉重政", power: 78, hp: 122, attribute: "VALOR", desc: "江戸時代前期の大名。大和国から移封され、肥前国島原藩の初代藩主となる。島原城を新築し、ルソン（フィリピン）遠征を幕府に提言するなど野心的な大名であったが、領内のキリシタンへの過酷な弾圧と、石高に見合わない異常に重い年貢の取り立てを強行した。この苛政が、のちの大規模な島原の乱勃発の直接的な原因となった。", skill: { name: "過酷な苛政", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 769, name: "寺沢広高", power: 79, hp: 121, attribute: "VALOR", desc: "安土桃山時代から江戸時代前期の大名。豊臣秀吉に仕えて長崎奉行などを務め、のちに唐津藩主として天草地方の領主となった。当初はキリシタンを黙認したが、のちに弾圧に転じ、実際の収穫量をはるかに超える過大で不当な石高を設定して重税を課した。この唐津藩の圧政が、松倉氏の圧政とともに島原・天草一揆の暴発を招いた。", skill: { name: "天草の重税", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 770, name: "板倉重昌", power: 80, hp: 120, attribute: "VALOR", desc: "江戸時代前期の武将。三河譜代の家臣で、島原の乱が発生した際、幕府軍の最初の総大将として討伐に派遣された。しかし、HP不足や諸大名の統制に苦しみ、原城に立てこもる一揆軍の頑強な抵抗の前に総攻撃を幾度も失敗した。老中・松平信綱が新たな総大将として向かっていることを知り、焦りから無謀な突撃を行って戦死した。", skill: { name: "原城の焦燥", desc: "自身の歴史力を35%上昇させる", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 771, name: "相楽総三", power: 76, hp: 124, attribute: "VALOR", desc: "幕末の志士。赤報隊の隊長。西郷隆盛の密命を受け、江戸の薩摩藩邸を拠点に放火などのゲリラ活動を行って幕府を挑発し、戊辰戦争の開戦を誘発した。鳥羽・伏見の戦い後は、新政府軍の先鋒として「年貢半減」を掲げて東山道を進撃したが、財政難の新政府が年貢半減を撤回したため「偽官軍」の汚名を着せられ、下諏訪で処刑された。", skill: { name: "偽官軍の汚名", desc: "相手が【政治】属性なら自身の歴史力を45%上昇させる", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.88 } },
  { id: 772, name: "佐々木只三郎", power: 90, hp: 110, attribute: "VALOR", desc: "幕末の幕臣・剣客。神道無念流を学び、京都見廻組の与頭として京都の治安維持にあたり、尊王攘夷派の志士たちを取り締まった。近江屋事件において、坂本龍馬と中岡慎太郎を暗殺した実行犯のリーダーであるとされている。戊辰戦争が始まると鳥羽・伏見の戦いで旧幕府軍として最前線で戦ったが、銃弾を受けて戦死した。", skill: { name: "見廻組の刃", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 773, name: "永田鉄山", power: 97, hp: 103, attribute: "VALOR", desc: "大正から昭和期の陸軍軍人。陸軍省軍務局長として、高度国防国家の建設と国家総動員体制の確立を目指す「統制派」の中心的指導者であった。軍部内での合法的な主導権確保を進めたが、これに反発する急進的な「皇道派」の青年将校との対立が激化。1935年の相沢事件において、陸軍省内で白昼に皇道派の相沢三郎中佐に斬殺された。", skill: { name: "統制派の頭脳", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 774, name: "荒木貞夫", power: 83, hp: 117, attribute: "VALOR", desc: "昭和期の陸軍大将。犬養毅内閣や斎藤実内閣で陸軍大臣を務め、精神主義を重んじて天皇親政を直接的な実力行使で実現しようとする「皇道派」の首領として青年将校から絶大な支持を集めた。二・二六事件の鎮圧後に軍における実権を失ったが、のちに第1次近衛文麿内閣などで文部大臣を務め、軍国主義教育の推進役となった。", skill: { name: "皇道派の首領", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
  { id: 775, name: "橋本欣五郎", power: 77, hp: 123, attribute: "VALOR", desc: "昭和期の陸軍軍人・右翼活動家。陸軍中堅将校の秘密結社「桜会」を結成し、政党政治の腐敗を激しく批判して、軍部による強力な独裁国家の樹立を画策した。1931年にクーデターによって軍部内閣の樹立を狙った三月事件や十月事件を首謀したが、いずれも未遂に終わって処罰された。のちに大政翼賛会の要職などを務めた。", skill: { name: "桜会の陰謀", desc: "敵HPの25%を吸収し、自軍を回復する", type: "absorb_hp", value: 0.25, rate: 0.7 } },
  { id: 776, name: "本庄繁", power: 88, hp: 112, attribute: "VALOR", desc: "昭和期の陸軍大将。1931年の満洲事変勃発時に関東軍司令官を務め、石原莞爾ら強硬派参謀の作戦を追認して満洲全土の占領を指揮し、満洲国建国の立役者の一人となった。のちに天皇の軍事顧問である侍従武官長となったが、二・二六事件において反乱軍（皇道派）に同情的な態度をとったため、昭和天皇の不興を買い辞任した。", skill: { name: "関東軍の追認", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.8 } },
  { id: 777, name: "山下奉文", power: 95, hp: 105, attribute: "VALOR", desc: "昭和期の陸軍大将。太平洋戦争の開戦直後、第25軍司令官としてマレー半島に上陸し、自転車部隊などを駆使した驚異的なスピードで進撃。難攻不落とされたイギリスの拠点シンガポールをわずか70日で攻略し、「マレーの虎」の異名で世界に知れ渡った。大戦末期にはフィリピン防衛戦を指揮したが敗れ、戦後に軍事裁判で処刑された。", skill: { name: "マレーの虎", desc: "自身の歴史力を45%上昇させる", type: "buff_self", value: 0.45, rate: 0.6 } },
  { id: 778, name: "寺内寿一", power: 91, hp: 109, attribute: "VALOR", desc: "昭和期の陸軍大将・元帥。元首相・寺内正毅の長男。二・二六事件直後に広田弘毅内閣の陸軍大臣となり、軍部大臣現役武官制を復活させて軍部の政治的発言力を決定的に強めた。太平洋戦争においては南方軍総司令官として、東南アジア全域における日本軍の作戦を統括したが、終戦直後にシンガポールで病死した。", skill: { name: "南方軍総司令官", desc: "相手が【政治】属性なら敵の歴史力を45%減少させる", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.94 } },
  { id: 779, name: "今村均", power: 89, hp: 111, attribute: "VALOR", desc: "昭和期の陸軍大将。太平洋戦争においてジャワ島攻略を指揮し、オランダ軍を降伏させた。軍政長官として現地住民に対し寛明な政策をとり、インドネシアの独立運動をある程度容認した。のちにラバウル（第8方面軍）の司令官となり、補給が絶たれる中で自給自足の地下要塞を構築して約10万の将兵を餓死から救い、終戦まで持ちこたえた。", skill: { name: "ラバウルの持久戦", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 780, name: "南雲忠一", power: 86, hp: 114, attribute: "VALOR", desc: "昭和期の海軍大将。太平洋戦争の開戦にあたり、第1航空艦隊司令長官として空母機動部隊を率いて真珠湾攻撃を実行し、アメリカ太平洋艦隊に壊滅的な打撃を与えた。しかし、続く1942年のミッドウェー海戦において、敵空母の発見の遅れから主力空母4隻を失う大敗北を喫し、大戦末期のサイパン島防衛戦で玉砕した。", skill: { name: "機動部隊の長", desc: "敵陣に最大HPの35%の固定ダメージを与える", type: "fixed_damage", value: 0.35, rate: 0.6 } },
  { id: 781, name: "平群真鳥", power: 82, hp: 118, attribute: "STRATEGY", desc: "5世紀末（古墳時代後期）の有力豪族・大臣。武内宿禰の子孫。雄略天皇ののち、清寧・顕宗・仁賢の各天皇に仕えて政治の実権を握り、専横を極めた。自ら大王を自称して宮殿を構えるなど大王家をしのぐ権勢を誇ったとされるが、498年に大伴金村らの武力攻撃によって討伐され、平群氏本宗家は滅亡した。", skill: { name: "大臣の専横", desc: "自身の歴史力を40%上昇させる", type: "buff_self", value: 0.4, rate: 0.6 } },
  { id: 782, name: "大伴連狭手彦", power: 85, hp: 115, attribute: "STRATEGY", desc: "6世紀（飛鳥時代）の武将。大伴金村の息子。562年に新羅によって任那（加耶諸国）が滅ぼされると、欽明天皇の命を受けて数万の軍勢を率いて朝鮮半島へ出兵し、高句麗軍を打ち破って数多くの戦利品を持ち帰ったとされる。日本神話の「松浦佐用姫」の伝説（出征する彼を悲しんで石になった妻）の主人公としても有名。", skill: { name: "高句麗への出兵", desc: "敵陣に最大HPの30%の固定ダメージを与える", type: "fixed_damage", value: 0.3, rate: 0.7 } },
  { id: 783, name: "中臣金", power: 79, hp: 121, attribute: "STRATEGY", desc: "飛鳥時代の政治家。中臣鎌足の従兄弟。天智天皇のもとで右大臣に就任して朝廷の重鎮となった。672年の壬申の乱において、大友皇子（弘文天皇）を擁立する近江朝廷側の首脳として大海人皇子（天武天皇）の軍勢に徹底抗戦したが敗北。乱の後、捕らえられて近江国の浅井野で斬首されるという過酷な最期を遂げた。", skill: { name: "近江朝廷の重鎮", desc: "受ける被ダメージを35%軽減する", type: "damage_cut", value: 0.35, rate: 0.7 } },
  { id: 784, name: "藤原麻呂", power: 88, hp: 112, attribute: "STRATEGY", desc: "奈良時代初期の公卿。藤原不比等の四男で、藤原京家の祖。兄の武智麻呂・房前・宇合とともに「藤原四兄弟」として国政を主導し、参議として蝦夷征討などの任にあたった。737年に猛威を振るった天然痘の流行により、他の3人の兄に続いて最後に病死し、政権を独占していた藤原四子の体制は完全に崩壊した。", skill: { name: "京家の祖", desc: "味方全員の歴史力を25%上昇させる", type: "buff_all", value: 0.25, rate: 0.7 } },
  { id: 785, name: "橘嘉智子", power: 75, hp: 125, attribute: "STRATEGY", desc: "平安時代初期の皇族。橘清友の娘で、嵯峨天皇の皇后（檀林皇后）。藤原氏以外の出身で皇后となった極めて稀な例であり、橘氏の全盛期を支えた。仏教を厚く信仰して京都に檀林寺を創建。また、橘氏の大学別曹である学館院を設立して一族の子弟の教育に尽力し、承和の変の後も朝廷内で強い発言力を持ち続けた。", skill: { name: "学館院の創設", desc: "自軍のHPを最大HPの30%回復する", type: "heal_hp", value: 0.3, rate: 0.7 } },
  { id: 786, name: "藤原長良", power: 81, hp: 119, attribute: "STRATEGY", desc: "平安時代前期の公卿。藤原冬嗣の長男で、良房の兄。権中納言にまで昇進した。政治的な野心は弟の良房に譲り、温厚な人柄で朝廷の信望を集めた。のちに彼の娘である高子が清和天皇の女御となって陽成天皇を生み、さらに息子の基経が事実上の初代関白となって権勢を極めたため、死後に太政大臣と正一位を追贈された。", skill: { name: "長兄の温情", desc: "敵全員の歴史力を25%減少させる", type: "debuff_all", value: 0.25, rate: 0.8 } },
